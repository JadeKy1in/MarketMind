      string: "\uFEFF<?xml version=\"1.0\" encoding=\"utf-8\"?>\r\n<feed xmlns=\"http://www.w3.org/2005/Atom\">\r\n
        \ <title type=\"text\">RSS - BCB Feeds</title>\r\n  <subtitle type=\"text\"></subtitle>\r\n
        \ <id>sitefeedsen</id>\r\n  <updated>2026-05-17T08:35:03-03:00</updated>\r\n
        \ <category term=\"RSS - BCB Feeds\" />\r\n  <category term=\"Itens Fora do
        Menu\" />\r\n  <link rel=\"alternate\" href=\"https://www.bcb.gov.br/\" />\r\n
        \ <entry>\r\n    <id>sitefeedsen_2532</id>\r\n    <title type=\"text\">BCB
        - Copom Statements - 262 Meeting - Copom reduces the Selic rate to 10.50%
        p.a.</title>\r\n    <updated>2024-05-08T18:34:29-03:00</updated>\r\n    <link
        rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2532\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        global environment has become more adverse because of the heightened and persistent
        uncertainty about the beginning of the easing cycle in the United States and
        the speed of sustained disinflation in many countries. The central banks of
        major economies remain committed to bringing inflation back to its targets
        in a context characterized by labor market pressures. The Committee judges
        that the environment continues to require caution from emerging market economies.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Regarding the domestic scenario,
        the set of indicators on economic activity and labor market has exhibited
        more strength than expected by Copom. Headline consumer inflation remains
        in a path of disinflation, while various measures of underlying inflation
        are above the inflation target in recent releases.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Inflation
        expectations for 2024 and 2025 collected by the Focus survey are around 3.7%
        and 3.6%, respectively.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom's
        inflation projections in the reference scenario* stand at 3.8% for 2024, and
        3.3% for 2025. Inflation projections for administered prices are 4.8% for
        2024, and 4.0% for 2025. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee emphasizes that risks to its scenarios remain in both directions.
        Among the upside risks for the inflationary scenario and inflation expectations,
        it should be emphasized (i) a greater persistence of global inflationary pressures;
        and (ii) a stronger-than-expected resilience of services inflation due to
        a tighter output gap. Among the downside risks, it should be noted (i) a greater-than-projected
        deceleration of global economic activity; and (ii) an impact on global inflation
        larger than expected from synchronized monetary policy tightening. The Committee
        judges that the domestic and international environments should remain more
        uncertain, requiring greater caution on the conduct of monetary policy.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The Committee has followed closely
        the recent developments on the fiscal side and their impacts on monetary policy.
        The Committee stresses that a credible fiscal policy, committed to debt sustainability,
        contributes to the anchoring of inflation expectations and to the reduction
        in the risk premia of financial assets, therefore impacting monetary policy.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Considering the evolution of the
        disinflationary process, the assessed scenarios, the balance of risks, and
        the broad array of available information, Copom decided to reduce the Selic
        rate by 0.25 percentage points, to 10.50% p.a., and judges that this decision
        is consistent with the strategy for inflation convergence to a level around
        its target throughout the relevant horizon for monetary policy, which includes
        2025. Without compromising its fundamental objective of ensuring price stability,
        this decision also implies smoothing economic fluctuations and fostering full
        employment.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The current
        context, characterized by a stage in which the disinflationary process tends
        to be slower, deanchored inflation expectations, and a challenging global
        outlook, requires serenity and moderation in the conduct of monetary policy.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The Committee unanimously judges
        that the uncertain global scenario and the domestic scenario, marked by resilient
        economic activity and deanchored expectations, require greater caution. The
        Committee also stresses that monetary policy should continue being contractionary
        until the consolidation of both the disinflation process and the anchoring
        of expectations around the targets. The Committee also reinforces, with special
        emphasis, that the extension and adequacy of future changes in the interest
        rate will be determined by the firm commitment of reaching the inflation target
        in the relevant horizon.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        following members of the Committee voted for a reduction of 0.25 percentage
        points&amp;#58; Roberto de Oliveira Campos Neto (Governor), Carolina de Assis
        Barros, Diogo Abry Guillen, Ot\xE1vio Ribeiro Damaso, and Renato Dias de Brito
        Gomes. The following members voted for a reduction of 0.50 percentage points&amp;#58;
        Ailton de Aquino Santos, Gabriel Muricca Gal\xEDpolo, Paulo Picchetti, and
        Rodrigo Alves Teixeira.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 5.15 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;green&amp;quot;
        in December of years 2024 and 2025. The value for the exchange rate was obtained
        according to the procedure of rounding the average exchange rate observed
        on the ten business days ending on the last day of the week before the Copom
        meeting, as it started being adopted in the 258&lt;sup&gt;th&lt;/sup&gt; meeting.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58; This press release
        represents the Copom's best effort to provide an English version of its policy
        statement. In case of any inconsistency, the original version in Portuguese
        prevails.&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n  <entry>\r\n    <id>sitefeedsen_2519</id>\r\n
        \   <title type=\"text\">BCB - Copom Statements - 261 Meeting - Copom reduces
        the Selic rate to 10.75% p.a.</title>\r\n    <updated>2024-03-20T18:36:17-03:00</updated>\r\n
        \   <link rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2519\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        global environment remains volatile, with debates about the beginning of the
        easing cycle in major economies and the speed of sustained disinflation in
        many countries. The central banks of major economies remain committed to bringing
        inflation back to its targets in a context characterized by labor market pressures.
        The Committee judges that the environment continues to require caution from
        emerging market economies.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Regarding
        the domestic scenario, the set of indicators on economic activity remains
        consistent with the scenario of deceleration expected by Copom. Headline consumer
        inflation remains in a path of disinflation, while various measures of underlying
        inflation are above the inflation target in recent releases.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Inflation expectations for 2024 and
        2025 collected by the Focus survey are around 3.8% and 3.5%, respectively.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Copom's inflation projections in
        the reference scenario* stand at 3.5% for 2024, and 3.2% for 2025. Inflation
        projections for administered prices are 4.4% for 2024, and 3.9% for 2025.
        &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The Committee emphasizes
        that risks to its scenarios remain in both directions. Among the upside risks
        for the inflationary scenario and inflation expectations, it should be emphasized
        (i) a greater persistence of global inflationary pressures; and (ii) a stronger-than-expected
        resilience of services inflation due to a tighter output gap. Among the downside
        risks, it should be noted (i) a greater-than-projected deceleration of global
        economic activity; and (ii) an impact on global inflation larger than expected
        from synchronized monetary policy tightening. The Committee judges that the
        domestic and international environments are more uncertain, requiring caution
        on the conduct of monetary policy.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Given
        the importance of the execution of the fiscal targets already established
        for the anchoring of inflation expectations, and hence for the conduct of
        monetary policy, the Committee reaffirms the importance of firmly pursuing
        those targets.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Considering
        the evolution of the disinflationary process, the assessed scenarios, the
        balance of risks, and the broad array of available information, Copom decided
        to reduce the Selic rate by 0.50 percentage point, to 10.75% p.a., and judges
        that this decision is consistent with the strategy for inflation convergence
        to a level around its target throughout the relevant horizon for monetary
        policy, which includes 2024 and, to a larger degree, 2025. Without compromising
        its fundamental objective of ensuring price stability, this decision also
        implies smoothing economic fluctuations and fostering full employment.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The current context, characterized
        by a stage in which the disinflationary process tends to be slower, with only
        partial reanchoring of inflation expectations and a challenging global outlook,
        requires serenity and moderation in the conduct of monetary policy. The Committee
        reinforces the need to persist on a contractionary monetary policy until the
        disinflationary process consolidates and inflation expectations anchor around
        its targets.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The committee
        judges that the baseline scenario has not changed substantially. Due to heightened
        uncertainty and the need for more flexibility in the conduct of monetary policy,
        the Committee members unanimously decided to communicate that, if the scenario
        evolves as expected, they anticipate a reduction of the same magnitude in
        the next meeting. The Committee judges that this monetary policy stance is
        appropriate to keep the necessary contractionary monetary policy for the disinflationary
        process. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The Committee
        emphasizes that the total magnitude of the easing cycle throughout time will
        depend on the inflation dynamics, especially the components that are more
        sensitive to monetary policy and economic activity, on inflation expectations,
        in particular the longer-term ones, on its inflation projections, on the output
        gap, and on the balance of risks.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        following members of the Committee voted for a reduction of 0.50 percentage
        point&amp;#58; Roberto de Oliveira Campos Neto (Governor), Ailton de Aquino
        Santos, Carolina de Assis Barros, Diogo Abry Guillen, Gabriel Muricca Gal\xEDpolo,
        Ot\xE1vio Ribeiro Damaso, Paulo Picchetti, Renato Dias de Brito Gomes and
        Rodrigo Alves Teixeira.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 4.95 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;green&amp;quot;
        in December 2024 and 2025. The value for the exchange rate was obtained according
        to the procedure of rounding the average USD/BRL exchange rate observed on
        the ten business days ending on the last day of the week before the Copom
        meeting, as it started being adopted in the 258&lt;sup&gt;th&lt;/sup&gt; meeting.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58;
        This press release represents the Copom's best effort to provide an English
        version of its policy statement. In case of any inconsistency, the original
        version in Portuguese prevails.&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n
        \ <entry>\r\n    <id>sitefeedsen_2512</id>\r\n    <title type=\"text\">BCB
        - Copom Statements - 260 Meeting - Copom reduces the Selic rate to 11.25%
        p.a.</title>\r\n    <updated>2024-01-31T18:34:35-03:00</updated>\r\n    <link
        rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2512\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        global environment remains volatile, with a debate about the beginning of
        the easing cycle in major economies and signs of lower core inflation, despite
        remaining at high levels in many countries. The central banks of major economies
        remain committed to bringing inflation back to its targets in an environment
        characterized by labor market pressures. The Committee judges that the environment
        continues to require caution from emerging market economies.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Regarding the domestic scenario,
        the set of indicators on economic activity remains consistent with the scenario
        of deceleration expected by Copom. Headline consumer inflation, as expected,
        remains in a path of disinflation, and various measures of underlying inflation
        are closer to the inflation target in recent releases.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Inflation
        expectations for 2024, and 2025 collected by the Focus survey are around 3.8%,
        and 3.5%, respectively.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom's
        inflation projections in the reference scenario* stand at 3.5% for 2024, and
        3.2% for 2025. Inflation projections for administered prices are 4.2% for
        2024, and 3.8% for 2025. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee emphasizes that risks to its scenarios remain in both directions.
        Among the upside risks for the inflationary scenario and inflation expectations,
        it should be emphasized (i) a greater persistence of global inflationary pressures;
        and (ii) a stronger-than-expected resilience of services inflation due to
        a tighter output gap. Among the downside risks, it should be noted (i) a greater-than-projected
        deceleration of global economic activity; and (ii) an impact on global inflation
        larger than expected from synchronized monetary policy tightening. In light
        of the international environment, the Committee judges that the current conjuncture
        remains uncertain and requires caution on the conduct of monetary policy.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Given the importance of the execution
        of the fiscal targets already established for the anchoring of inflation expectations,
        and hence for the conduct of monetary policy, the Committee reaffirms the
        importance of firmly pursuing those targets.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Considering
        the evolution of the disinflationary process, the assessed scenarios, the
        balance of risks, and the broad array of available information, Copom decided
        to reduce the Selic rate by 0.50 percentage point, to 11.25% p.a., and judges
        that this decision is consistent with the strategy for inflation convergence
        to a level around its target throughout the relevant horizon for monetary
        policy, which includes 2024 and, to a larger degree, 2025. Without compromising
        its fundamental objective of ensuring price stability, this decision also
        implies smoothing economic fluctuations and fostering full employment.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The current context, characterized
        by a stage in which the disinflationary process tends to be slower, with only
        partial reanchoring of inflation expectations and a challenging global outlook,
        requires serenity and moderation in the conduct of monetary policy. The Committee
        reinforces the need to persist on a contractionary monetary policy until the
        disinflationary process consolidates and inflation expectations anchor around
        its targets.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;If the
        scenario evolves as expected, the Committee members unanimously anticipate
        further reductions of the same magnitude in the next meetings, and judge that
        this pace is appropriate to keep the necessary contractionary monetary policy
        for the disinflationary process. The Committee emphasizes that the total magnitude
        of the easing cycle throughout time will depend on the inflation dynamics,
        especially the components that are more sensitive to monetary policy and economic
        activity, on inflation expectations, in particular the longer-term ones, on
        its inflation projections, on the output gap, and on the balance of risks.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The following members of the Committee
        voted for a reduction of 0.50 percentage point&amp;#58; Roberto de Oliveira
        Campos Neto (Governor), Ailton de Aquino Santos, Carolina de Assis Barros,
        Diogo Abry Guillen, Gabriel Muricca Gal\xEDpolo, Ot\xE1vio Ribeiro Damaso,
        Paulo Picchetti, Renato Dias de Brito Gomes and Rodrigo Alves Teixeira.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;*
        In the reference scenario, the interest rate path is extracted from the Focus
        survey, and the exchange rate starts at USD/BRL 4.95 and evolves according
        to the purchasing power parity (PPP). The Committee assumes that oil prices
        follow approximately the futures market curve for the following six months
        and then start increasing 2% per year onwards. Moreover, the energy flag is
        assumed to be &amp;quot;green&amp;quot; in December 2024, and 2025. The value
        for the exchange rate was obtained according to the procedure of rounding
        the average USD/BRL exchange rate observed on the ten business days ending
        on the last day of the week before the Copom meeting, as it started being
        adopted in the 258&lt;sup&gt;th&lt;/sup&gt; meeting.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58; This press release
        represents the Copom's best effort to provide an English version of its policy
        statement. In case of any inconsistency, the original version in Portuguese
        prevails.&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n  <entry>\r\n    <id>sitefeedsen_2506</id>\r\n
        \   <title type=\"text\">BCB - Copom Statements - 259 Meeting - Copom reduces
        the Selic rate to 11.75% p.a.</title>\r\n    <updated>2023-12-13T18:33:40-03:00</updated>\r\n
        \   <link rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2506\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        global environment remains volatile and is less adverse than in the previous
        meeting, with a reduction in longer-term interest rates in the United States
        and some incipient signs of lower core inflation, despite remaining at high
        levels in many countries. The central banks of major economies remain committed
        to bringing inflation back to its targets in an environment characterized
        by labor market pressures. The Committee judges that the environment continues
        to require caution from emerging market economies.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Regarding
        the domestic scenario, the set of indicators on economic activity remains
        consistent with the scenario of deceleration expected by Copom. Headline consumer
        inflation, as expected, remains in a path of disinflation, and various measures
        of underlying inflation are closer to the inflation target in recent releases.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Inflation expectations for 2023,
        2024, and 2025 collected by the Focus survey are around 4.5%, 3.9%, and 3.5%,
        respectively.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom's
        inflation projections in the reference scenario* stand at 4.6% for 2023, 3.5%
        for 2024, and 3.2% for 2025. Inflation projections for administered prices
        are 9.1% for 2023, 4.5% for 2024, and 3.6% for 2025. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee emphasizes that risks to its scenarios remain in both directions.
        Among the upside risks for the inflationary scenario and inflation expectations,
        it should be emphasized (i) a greater persistence of global inflationary pressures;
        and (ii) a stronger-than-expected resilience of services inflation due to
        a tighter output gap. Among the downside risks, it should be noted (i) a greater-than-projected
        deceleration of global economic activity; and (ii) an impact on global inflation
        larger than expected from synchronized monetary policy tightening. In light
        of the international environment, the Committee judges that the current conjuncture
        remains uncertain and requires caution on the conduct of monetary policy.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Given the importance of the execution
        of the fiscal targets already established for the anchoring of inflation expectations,
        and hence for the conduct of monetary policy, the Committee reaffirms the
        importance of firmly pursuing those targets.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Considering
        the evolution of the disinflationary process, the assessed scenarios, the
        balance of risks, and the broad array of available information, Copom decided
        to reduce the Selic rate by 0.50 percentage point, to 11.75% p.a., and judges
        that this decision is consistent with the strategy for inflation convergence
        to a level around its target throughout the relevant horizon for monetary
        policy, which includes 2024 and 2025. Without compromising its fundamental
        objective of ensuring price stability, this decision also implies smoothing
        economic fluctuations and fostering full employment.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        current context, characterized by a stage in which the disinflationary process
        tends to be slower, with only partial reanchoring of inflation expectations
        and a challenging global outlook, requires serenity and moderation in the
        conduct of monetary policy. The Committee reinforces the need to persist on
        a contractionary monetary policy until the disinflationary process consolidates
        and inflation expectations anchor around its targets.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;If
        the scenario evolves as expected, the Committee members unanimously anticipate
        further reductions of the same magnitude in the next meetings, and judge that
        this pace is appropriate to keep the necessary contractionary monetary policy
        for the disinflationary process. The Committee emphasizes that the total magnitude
        of the easing cycle throughout time will depend on the inflation dynamics,
        especially the components that are more sensitive to monetary policy and economic
        activity, on inflation expectations, in particular the longer-term ones, on
        its inflation projections, on the output gap, and on the balance of risks.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The following members of the Committee
        voted for a reduction of 0.50 percentage point&amp;#58; Roberto de Oliveira
        Campos Neto (Governor), Ailton de Aquino Santos, Carolina de Assis Barros,
        Diogo Abry Guillen, Fernanda Magalh\xE3es Rumenos Guardado, Gabriel Muricca
        Gal\xEDpolo, Maur\xEDcio Costa de Moura, Ot\xE1vio Ribeiro Damaso and Renato
        Dias de Brito Gomes.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 4.90 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;green&amp;quot;
        in December 2024, and 2025. The value for the exchange rate was obtained according
        to the procedure of rounding the average USD/BRL exchange rate observed on
        the ten business days ending on the last day of the week before the Copom
        meeting, as it started being adopted in the 258&lt;sup&gt;th&lt;/sup&gt; meeting.&lt;br&gt;&lt;/p&gt;</content>\r\n
        \ </entry>\r\n  <entry>\r\n    <id>sitefeedsen_2500</id>\r\n    <title type=\"text\">BCB
        - Copom Statements - 258 Meeting - Copom reduces the Selic rate to 12.25%
        p.a.</title>\r\n    <updated>2023-11-01T18:37:16-03:00</updated>\r\n    <link
        rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2500\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        global environment is adverse, due to an increase in longer-term interest
        rates in the United States, the persistence of high core inflation in many
        countries, and new geopolitical tensions. The central banks of major economies
        remain committed to bringing inflation back to its targets in an environment
        characterized by labor market pressures. The Committee judges that the environment
        requires attention and caution from emerging market economies.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Regarding the domestic scenario,
        the set of indicators on economic activity remains consistent with the scenario
        of deceleration over the next quarters expected by Copom. Headline consumer
        inflation remains in a path of disinflation, but continues to be above the
        tolerance interval around the target, while various measures of underlying
        inflation remain above the inflation target. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Inflation
        expectations for 2023, 2024, and 2025 collected by the Focus survey are around
        4.6%, 3.9%, and 3.5%, respectively.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom's
        inflation projections in the reference scenario* stand at 4.7% for 2023, 3.6%
        for 2024, and 3.2% for 2025. Inflation projections for administered prices
        are 9.3% for 2023, 5.0% for 2024, and 3.6% for 2025. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee emphasizes that risks to its scenarios remain in both directions.
        Among the upside risks for the inflationary scenario and inflation expectations,
        it should be emphasized (i) a greater persistence of global inflationary pressures;
        and (ii) a stronger-than-expected resilience of services inflation due to
        a tighter output gap. Among the downside risks, it should be noted (i) a greater-than-projected
        deceleration of global economic activity; and (ii) an impact on global inflation
        larger than expected from synchronized monetary policy tightening. In light
        of the international environment, the Committee judges that the current conjuncture
        is more uncertain than usual and requires caution on the conduct of monetary
        policy. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Given the
        importance of the execution of the fiscal targets already established for
        the anchoring of inflation expectations, and hence for the conduct of monetary
        policy, the Committee reaffirms the importance of firmly pursuing those targets.
        &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Considering the evolution
        of the disinflationary process, the assessed scenarios, the balance of risks,
        and the broad array of available information, Copom decided to reduce the
        Selic rate by 0.50 percentage point, to 12.25% p.a., and judges that this
        decision is consistent with the strategy for inflation convergence to a level
        around its target throughout the relevant horizon for monetary policy, which
        includes 2024 and 2025. Without compromising its fundamental objective of
        ensuring price stability, this decision also implies smoothing economic fluctuations
        and fostering full employment.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        current context, characterized by a stage in which the disinflationary process
        tends to be slower, with only partial reanchoring of inflation expectations
        and a challenging global outlook, requires serenity and moderation in the
        conduct of monetary policy. The Committee reinforces the need to persist on
        a contractionary monetary policy until the disinflationary process consolidates
        and inflation expectations anchor around its targets. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;If
        the scenario evolves as expected, the Committee members unanimously anticipate
        further reductions of the same magnitude in the next meetings, and judge that
        this pace is appropriate to keep the necessary contractionary monetary policy
        for the disinflationary process. The Committee emphasizes that the total magnitude
        of the easing cycle throughout time will depend on the inflation dynamics,
        especially the components that are more sensitive to monetary policy and economic
        activity, on inflation expectations, in particular the longer-term ones, on
        its inflation projections, on the output gap, and on the balance of risks.
        &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The following members
        of the Committee voted for a reduction of 0.50 percentage point&amp;#58; Roberto
        de Oliveira Campos Neto (Governor), Ailton de Aquino Santos, Carolina de Assis
        Barros, Diogo Abry Guillen, Fernanda Magalh\xE3es Rumenos Guardado, Gabriel
        Muricca Gal\xEDpolo, Maur\xEDcio Costa de Moura, Ot\xE1vio Ribeiro Damaso
        and Renato Dias de Brito Gomes. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 5.00 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;green&amp;quot;
        in December 2023, 2024, and 2025. The value for the exchange rate was obtained
        according to the procedure of rounding the average USD/BRL exchange rate observed
        on the ten business days ending on the last day of the week before the Copom
        meeting, as it was announced in the Inflation Report of September 2023.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58; This press release
        represents the Copom's best effort to provide an English version of its policy
        statement. In case of any inconsistency, the original version in Portuguese
        prevails.&lt;br&gt;&lt;/p&gt;&lt;p&gt;&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n
        \ <entry>\r\n    <id>sitefeedsen_2493</id>\r\n    <title type=\"text\">BCB
        - Copom Statements - 257 Meeting - Copom reduces the Selic rate to 12.75%
        p.a.</title>\r\n    <updated>2023-09-20T18:40:45-03:00</updated>\r\n    <link
        rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2493\"
        />\r\n    <content type=\"html\">&lt;p&gt;\u200B&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The global environment became more
        uncertain, with the disinflationary process continuing despite an environment
        of high core inflation and resilience in the labor market of many countries.
        The central banks of major economies remain committed to bringing inflation
        back to its targets. The Committee noted an increase in long-term interest
        rates in the United States as well as forecasts of lower growth in China,
        both demanding further attention from emerging market economies.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Regarding the domestic scenario,
        economic activity showed stronger resiliency than previously expected, but
        the Committee continues to anticipate economic deceleration for the next quarters.
        As expected, twelve-month headline consumer inflation increased in the recent
        period. Various measures of underlying inflation have recently fallen but
        remain above the inflation target. Inflation expectations for 2023, 2024,
        and 2025 collected by the Focus survey are around 4.9%, 3.9%, and 3.5%, respectively.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Copom's inflation projections in
        the reference scenario* stand at 5.0% for 2023, 3.5% for 2024, and 3.1% for
        2025. Inflation projections for administered prices are 10.5% for 2023, 4.5%
        for 2024, and 3.6% for 2025. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee emphasizes that risks to its scenarios remain in both directions.
        Among the upside risks for the inflationary scenario and inflation expectations,
        it should be emphasized (i) a greater persistence of global inflationary pressures;
        and (ii) a stronger than expected resilience of services inflation due to
        a tighter output gap. Among the downside risks, it should be noted (i) a greater
        than projected deceleration of global economic activity; and (ii) an impact
        on global inflation larger than expected from synchronized monetary policy
        tightening. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Given
        the importance of the execution of the fiscal targets already established
        for the anchoring of inflation expectations, and hence for the conduct of
        monetary policy, the Committee reinforces the importance of firmly pursuing
        those targets. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Considering
        the evolution of the disinflationary process, the assessed scenarios, the
        balance of risks, and the broad array of available information, Copom decided
        to reduce the Selic rate by 0.50 percentage point, to 12.75% p.a., and judges
        that this decision is consistent with the strategy for inflation convergence
        to a level around its target throughout the relevant horizon for monetary
        policy, which includes the year of 2024 and, to a lesser extent, 2025. Without
        compromising its fundamental objective of ensuring price stability, this decision
        also implies smoothing economic fluctuations and fostering full employment.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The current context, characterized
        by a stage in which the disinflationary process tends to be slower and with
        partial reanchoring of inflation expectations, requires serenity and moderation
        in the conduct of monetary policy. The Committee reinforces the need to persist
        on a contractionary monetary policy until the disinflationary process consolidates
        and inflation expectations anchor around its targets. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;If
        the scenario evolves as expected, the Committee members unanimously anticipate
        further reductions of the same magnitude in the next meetings and judge that
        this pace is appropriate to keep the necessary contractionary monetary policy
        for the disinflationary process. The Committee emphasizes that the total magnitude
        of the easing cycle throughout time will depend on the inflation dynamics,
        especially the components that are more sensitive to monetary policy and economic
        activity, on inflation expectations, in particular the longer-term ones, on
        its inflation projections, on the output gap, and on the balance of risks.
        &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The following members
        of the Committee voted for a reduction of 0.50 percentage point&amp;#58; Roberto
        de Oliveira Campos Neto (Governor), Ailton de Aquino Santos, Carolina de Assis
        Barros, Diogo Abry Guillen, Fernanda Magalh\xE3es Rumenos Guardado, Gabriel
        Muricca Gal\xEDpolo, Maur\xEDcio Costa de Moura, Ot\xE1vio Ribeiro Damaso
        and Renato Dias de Brito Gomes. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 4.90 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;green&amp;quot;
        in December 2023, 2024, and 2025. The value for the exchange rate is obtained
        according to the usual procedure of rounding the average USD/BRL exchange
        rate observed on the five business days ending on the last day of the week
        before the Copom meeting.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58; This press release
        represents the Copom's best effort to provide an English version of its policy
        statement. In case of any inconsistency, the original version in Portuguese
        prevails.&lt;br&gt;&lt;/p&gt;&lt;p&gt;&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n
        \ <entry>\r\n    <id>sitefeedsen_2486</id>\r\n    <title type=\"text\">BCB
        - Copom Statements - 256 Meeting - Copom reduces the Selic rate to 13.25%
        p.a.</title>\r\n    <updated>2023-08-02T18:47:28-03:00</updated>\r\n    <link
        rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2486\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        global environment remains uncertain, with some disinflation at the margin,
        but in an environment with still high core inflation and resilience in the
        labor market of many countries. The central banks of major economies remain
        committed to bringing inflation back to its targets.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Regarding
        the domestic scenario, the recent set of indicators of activity remains consistent
        with the scenario of economic deceleration for the next quarters. Notwithstanding
        the recent reduction of headline consumer inflation, the Committee anticipates
        an increase in the twelve-month headline inflation over the second half of
        the year. Various measures of underlying inflation have recently fallen but
        remain above the inflation target. Inflation expectations for 2023, 2024,
        and 2025 collected by the Focus survey have reduced and are around 4.8%, 3.9%,
        and 3.5%, respectively.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom's
        inflation projections in the reference scenario* stand at 4.9% for 2023, 3.4%
        for 2024, and 3.0% for 2025. Inflation projections for administered prices
        are 9.4% for 2023, 4.6% for 2024, and 3.5% for 2025. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee emphasizes that risks to its scenarios remain in both directions.
        Among the upside risks for the inflationary scenario and inflation expectations,
        it should be emphasized (i) a greater persistence of global inflationary pressures;
        and (ii) a stronger than expected resiliency on services inflation due to
        a tighter output gap. Among the downside risks, it should be noted (i) a greater
        than projected deceleration of global economic activity, particularly due
        to adverse conditions in the global financial system; and (ii) an impact on
        global inflation larger than expected from synchronized monetary policy tightening.
        &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The Committee judges
        that the improvement on the inflation scenario, reflecting in part the lagged
        effects of monetary policy, coupled with the reduction of longer-term inflation
        expectations, after the recent decision of the National Monetary Council on
        the inflation target, have given the necessary confidence to start a gradual
        cycle of monetary policy easing. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Considering
        the assessed scenarios, the balance of risks, and the broad array of available
        information, Copom decided to reduce the Selic rate by 0.50 percentage point,
        to 13.25% p.a., and judges that this decision is consistent with the strategy
        for inflation convergence to a level around its target throughout the relevant
        horizon for monetary policy, which includes the year of 2024 and, to a lesser
        extent, 2025. Without compromising its fundamental objective of ensuring price
        stability, this decision also implies smoothing economic fluctuations and
        fostering full employment.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee reinforces the need to persist on a contractionary monetary policy
        until the disinflationary process consolidates and inflation expectations
        anchor around its targets. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom
        considered the alternative option to reduce the Selic rate to 13.50%, but
        it concluded that it was appropriate to adopt a 0.50 percentage point pace
        in this meeting due to an improvement in the inflation dynamics, reinforcing
        however the firm objective of keeping a contractionary monetary policy to
        reanchor expectations and bring inflation to the target in the relevant horizon.
        The current context, characterized by a stage in which the disinflationary
        process tends to be slower and with partial reanchoring of inflation expectations,
        requires serenity and moderation in the conduct of monetary policy. If the
        scenario evolves as expected, the Committee members unanimously anticipate
        further reductions of the same magnitude in the next meetings, and it judges
        that this pace is appropriate to keep the necessary contractionary monetary
        policy for the disinflationary process. The Committee emphasizes that the
        total magnitude of the easing cycle throughout time will depend on the inflation
        dynamics, especially the components that are more sensitive to monetary policy
        and economic activity, on inflation expectations, in particular the longer-term
        ones, on its inflation projections, on the output gap, and on the balance
        of risks. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The following
        members of the Committee voted a reduction of 0.50 percentage point&amp;#58;
        Roberto de Oliveira Campos Neto (Governor), Ailton de Aquino Santos, Carolina
        de Assis Barros, Gabriel Muricca Gal\xEDpolo, and Ot\xE1vio Ribeiro Damaso.
        The following members voted for a reduction of 0.25 percentage point&amp;#58;
        Diogo Abry Guillen, Fernanda Magalh\xE3es Rumenos Guardado, Maur\xEDcio Costa
        de Moura, and Renato Dias de Brito Gomes.&amp;#160;&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 4.75 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;green&amp;quot;
        in December 2023, 2024, and 2025. The value for the exchange rate is obtained
        according to the usual procedure of rounding the average USD/BRL exchange
        rate observed on the five business days ending on the last day of the week
        before the Copom meeting.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58; This press release
        represents the Copom's best effort to provide an English version of its policy
        statement. In case of any inconsistency, the original version in Portuguese
        prevails.&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n  <entry>\r\n    <id>sitefeedsen_2483</id>\r\n
        \   <title type=\"text\">BCB - Copom Statements - 255 Meeting - Copom maintains
        the Selic rate at 13.75% p.a.</title>\r\n    <updated>2023-06-21T18:40:18-03:00</updated>\r\n
        \   <link rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2483\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        global environment remains challenging, albeit with some positive revisions
        on output growth for the year. Despite some attenuation on the stress involving
        banks in the US and Europe, the situation still requires monitoring. The central
        banks of major economies remain committed to bringing inflation back to its
        targets, in some cases by resuming the hiking cycles, in an environment in
        which inflation has been resilient.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Regarding
        the domestic scenario, the recent set of indicators of activity remains consistent
        with the scenario of economic deceleration for the next quarters. Growth in
        the first quarter was stronger than expected due mainly to the agricultural
        sector. Notwithstanding the recent reduction of headline consumer inflation,
        the Committee anticipates an increase in the twelve-month headline inflation
        over the second half of the year. Moreover, various measures of underlying
        inflation remain above the range compatible with meeting the inflation target.
        Inflation expectations for 2023 and 2024 collected by the Focus survey have
        reduced and are around 5.1% and 4.0%, respectively.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom's
        inflation projections in the reference scenario* stand at 5.0% for 2023 and
        3.4% for 2024. Inflation projections for administered prices are 9.0% for
        2023 and 4.6% for 2024. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee emphasizes that risks to its scenarios remain in both directions.
        Among the upside risks for the inflationary scenario and inflation expectations,
        it should be emphasized (i) a greater persistence of global inflationary pressures;
        (ii) some residual uncertainty about the final fiscal framework to be approved
        by the National Congress and, more relevant for monetary policy, its impacts
        on the expected paths of the public debt and of inflation expectations, and
        on risky assets; and (iii) a larger or more persistent deanchoring of long-term
        inflation expectations. Among the downside risks, it should be noted (i) an
        additional reduction in the prices of international commodities measured in
        local currency, even though a sizeable portion of this movement has already
        been observed; (ii) a greater than projected deceleration of global economic
        activity, particularly due to adverse conditions in the global financial system;
        and (iii) a slowdown in domestic credit concession larger than what would
        be compatible with the current stance of monetary policy. &lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Considering the assessed scenarios,
        the balance of risks, and the broad array of available information, Copom
        decided to maintain the Selic rate at 13.75% p.a. and judges that this decision
        is consistent with the strategy for inflation convergence to a level around
        its target throughout the relevant horizon for monetary policy, which includes
        the year of 2024. Without compromising its fundamental objective of ensuring
        price stability, this decision also implies smoothing economic fluctuations
        and fostering full employment.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        current context, characterized by a stage in which the disinflationary process
        tends to be slower and in an environment of deanchored inflation expectations
        continues to require caution and parcimony. Copom reaffirms its commitment
        to set monetary policy to meet the targets and judges that the strategy of
        maintaining the Selic rate for a long period has been adequate to ensure the
        convergence of inflation. The Committee emphasizes that it will persist until
        the disinflationary process consolidates and inflation expectations anchor
        around its targets. The Committee judges that the current scenario demands
        patience and serenity in the conduct of monetary policy and reminds that the
        future steps of monetary policy will depend on the inflationary dynamics,
        especially the components that are more sensitive to monetary policy and economic
        activity, on inflation expectations, in particular the longer-term ones, on
        its inflation projections, on the output gap, and on the balance of risks.
        &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The following members
        of the Committee voted for this decision&amp;#58; Roberto de Oliveira Campos
        Neto (Governor), Carolina de Assis Barros, Diogo Abry Guillen, Fernanda Magalh\xE3es
        Rumenos Guardado, Maur\xEDcio Costa de Moura, Ot\xE1vio Ribeiro Damaso, Paulo
        S\xE9rgio Neves de Souza and Renato Dias de Brito Gomes. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 4.85 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;green&amp;quot;
        in December 2023 and 2024. The value for the exchange rate is obtained according
        to the usual procedure of rounding the average USD/BRL exchange rate observed
        on the five business days ending on the last day of the week before the Copom
        meeting.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58; This press release
        represents the Copom's best effort to provide an English version of its policy
        statement. In case of any inconsistency, the original version in Portuguese
        prevails.&lt;br&gt;&lt;/p&gt;&lt;p&gt;&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n
        \ <entry>\r\n    <id>sitefeedsen_2475</id>\r\n    <title type=\"text\">BCB
        - Copom Statements - 254 Meeting - Copom maintains the Selic rate at 13.75%
        p.a.</title>\r\n    <updated>2023-05-03T18:49:02-03:00</updated>\r\n    <link
        rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2475\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        global environment remains challenging. The episodes involving banks abroad
        have increased the uncertainty, but with limited contagion on financial conditions
        so far, requiring constant monitoring. At the same time, the central banks
        of major economies remain committed to bringing inflation back to its targets,
        in an environment in which inflation has been resilient.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Regarding
        the domestic scenario, the recent set of indicators of activity continues
        to be in line with the deceleration expected by Copom, although with more
        resilience observed in the labor market. Consumer inflation as well as the
        various measures of underlying inflation are above the range compatible with
        meeting the inflation target. Inflation expectations for 2023 and 2024 collected
        by the Focus survey have increased marginally and are around 6.1% and 4.2%,
        respectively.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom's
        inflation projections in the reference scenario* stand at 5.8% for 2023 and
        3.6% for 2024. Inflation projections for administered prices are 10.8% for
        2023 and 5.2% for 2024. In an alternative scenario, with a constant interest
        rate throughout the relevant horizon, inflation projections stand at 5.7%
        and 2.9% for 2023 and 2024, respectively. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        Committee emphasizes that risks to its scenarios remain in both directions.
        Among the upside risks for the inflationary scenario and inflation expectations,
        it should be emphasized (i) a greater persistence of global inflationary pressures;
        (ii) the lingering uncertainty about the final fiscal framework to be approved
        by the National Congress and, more relevant for monetary policy, its impacts
        on the expected paths of the public debt and of inflation expectations, and
        on risky assets; and (iii) a larger or more persistent deanchoring of long-term
        inflation expectations. Among the downside risks, it should be noted (i) an
        additional reduction in the prices of international commodities measured in
        local currency; (ii) a greater than projected deceleration of global economic
        activity, particularly due to adverse conditions in the global financial system;
        and (iii) a slowdown in domestic credit concession larger than what would
        be compatible with the current stance of monetary policy. &lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;On the one hand, the reinstatement
        of fuel taxes and, primarily, the presentation of a proposal for the fiscal
        framework have partly reduced the uncertainty arising from fiscal policy.
        On the other hand, the current scenario, characterized by a stage in which
        the disinflationary process tends to be slower in an environment of deanchored
        inflation expectations, requires further attention when conducting monetary
        policy. Copom emphasizes that there is no mechanical relationship between
        the convergence of inflation and the fiscal framework, and judges that the
        deanchoring of long-term inflation expectations raises the cost of the disinflation
        that is needed to reach the targets established by the National Monetary Council.
        In this scenario, Copom reaffirms its commitment to set monetary policy to
        meet the targets.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Considering
        the assessed scenarios, the balance of risks, and the broad array of available
        information, Copom decided to maintain the Selic rate at 13.75% p.a. The Committee
        judges that this decision is consistent with the strategy for inflation convergence
        to a level around its target throughout the relevant horizon for monetary
        policy, which includes the year of 2024. Without compromising its fundamental
        objective of ensuring price stability, this decision also implies smoothing
        economic fluctuations and fostering full employment.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Taking
        into account the uncertainty of the scenarios, the Committee remains vigilant,
        assessing if the strategy of maintaining the Selic rate for a long period
        will be enough to ensure the convergence of inflation. The Committee emphasizes
        that it will persist until the disinflationary process consolidates and inflation
        expectations anchor around its targets. The Committee judges that the current
        scenario demands patience and serenity in the conduct of monetary policy.
        Copom emphasizes that, although a less likely scenario, it will not hesitate
        to resume the tightening cycle if the disinflationary process does not proceed
        as expected.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The following
        members of the Committee voted for this decision&amp;#58; Roberto de Oliveira
        Campos Neto (Governor), Diogo Abry Guillen, Fernanda Magalh\xE3es Rumenos
        Guardado, Maur\xEDcio Costa de Moura, Ot\xE1vio Ribeiro Damaso, Paulo S\xE9rgio
        Neves de Souza and Renato Dias de Brito Gomes. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 5.05 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;green&amp;quot;
        in December 2023 and 2024. The value for the exchange rate is obtained according
        to the usual procedure of rounding the average USD/BRL exchange rate observed
        on the five business days ending on the last day of the week before the Copom
        meeting.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58; This press release
        represents the Copom's best effort to provide an English version of its policy
        statement. In case of any inconsistency, the original version in Portuguese
        prevails.&lt;br&gt;&lt;/p&gt;&lt;p&gt;&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n
        \ <entry>\r\n    <id>sitefeedsen_2467</id>\r\n    <title type=\"text\">BCB
        - Copom Statements - 253 Meeting - Copom maintains the Selic rate at 13.75%
        p.a.</title>\r\n    <updated>2023-03-22T18:33:49-03:00</updated>\r\n    <link
        rel=\"alternate\" href=\"https://www.bcb.gov.br/en/monetarypolicy/copomstatements/2467\"
        />\r\n    <content type=\"html\">&lt;p style=\"text-align&amp;#58;justify;\"&gt;Since
        its previous meeting of the Monetary Policy Committee (Copom), the global
        environment has deteriorated. The episodes involving banks in the United States
        and Europe have increased the uncertainty and the volatility in markets and
        require monitoring. At the same time, recent data on global activity and inflation
        remain resilient and the process of monetary policy tightening in major economies
        continued to advance. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Regarding
        the domestic scenario, the recent set of indicators of activity continues
        to be in line with the deceleration expected by Copom. Consumer inflation
        as well as the various measures of underlying inflation are above the range
        compatible with meeting the inflation target. Inflation expectations for 2023
        and 2024 collected by the Focus survey have increased, and are around 6.0%
        and 4.1%, respectively.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;Copom's
        inflation projections in the reference scenario* also increased and stand
        at 5.8% for 2023 and 3.6% for 2024. Inflation projections for administered
        prices are 10.2% for 2023 and 5.3% for 2024. The Committee decided again to
        emphasize the six-quarter-ahead horizon, which refers to the third quarter
        of 2024, in which the 12-month inflation projection stands at 3.8%. In an
        alternative scenario, with a constant interest rate throughout the relevant
        horizon, inflation projections stand at 5.7%, 3.3% and 3.0% for 2023, the
        third quarter of 2024 and the year 2024, respectively. The Committee judges
        that the uncertainty in its assumptions and projections is higher than usual.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;The Committee emphasizes that risks
        to its scenarios remain in both directions. Among the upside risks for the
        inflationary scenario and inflation expectations, it should be emphasized
        (i) a greater persistence of global inflationary pressures; (ii) the uncertainty
        about the fiscal framework and its impacts on the expected path of the public
        debt; and (iii) a larger or more persistent deanchoring of long-term inflation
        expectations. Among the downside risks, it should be noted (i) an additional
        reduction in the prices of international commodities measured in local currency;
        (ii) a greater than projected deceleration of global economic activity, particularly
        due to adverse conditions in the global financial system; and (iii) a slowdown
        in domestic credit concession larger than what would be compatible with the
        current stance of monetary policy. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;On
        one hand, the recent reinstatement of fuel taxes has reduced the uncertainty
        of the fiscal results in the short term. On the other hand, the current scenario,
        marked by high volatility in financial markets and deanchored long-term inflation
        expectations from the targets, requires further attention when conducting
        monetary policy. The Committee judges that the deanchoring of long-term inflation
        expectations raises the cost of the disinflation that is needed to reach the
        targets established by the National Monetary Council. In this scenario, Copom
        reaffirms its commitment to set monetary policy to meet the targets.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Considering the assessed scenarios,
        the balance of risks, and the broad array of available information, Copom
        decided to maintain the Selic rate at 13.75% p.a. The Committee judges that
        this decision is consistent with the strategy for inflation convergence to
        a level around its target throughout the relevant horizon for monetary policy,
        which includes 2023 and, to a larger degree, 2024. Without compromising its
        fundamental objective of ensuring price stability, this decision also implies
        smoothing economic fluctuations and fostering full employment.&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Taking into account the uncertainty
        of the scenarios, the Committee remains vigilant, assessing if the strategy
        of maintaining the Selic rate for a long period will be enough to ensure the
        convergence of inflation. The Committee emphasizes that it will persist until
        the disinflationary process consolidates and inflation expectations anchor
        around its targets, which have shown additional deterioration, especially
        at longer horizons. The Committee reinforces that future monetary policy steps
        can be adjusted and will not hesitate to resume the tightening cycle if the
        disinflationary process does not proceed as expected.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;The
        following members of the Committee voted for this decision&amp;#58; Roberto
        de Oliveira Campos Neto (Governor), Bruno Serra Fernandes, Carolina de Assis
        Barros, Diogo Abry Guillen, Fernanda Magalh\xE3es Rumenos Guardado, Maur\xEDcio
        Costa de Moura, Ot\xE1vio Ribeiro Damaso, Paulo S\xE9rgio Neves de Souza and
        Renato Dias de Brito Gomes. &lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;* In the reference scenario, the
        interest rate path is extracted from the Focus survey, and the exchange rate
        starts at USD/BRL 5.25 and evolves according to the purchasing power parity
        (PPP). The Committee assumes that oil prices follow approximately the futures
        market curve for the following six months and then start increasing 2% per
        year onwards. Moreover, the energy flag is assumed to be &amp;quot;yellow&amp;quot;
        in December 2023 and 2024. The value for the exchange rate is obtained according
        to the usual procedure of rounding the average USD/BRL exchange rate observed
        on the five business days ending on the last day of the week before the Copom
        meeting.&lt;/p&gt;&lt;p style=\"text-align&amp;#58;justify;\"&gt;&amp;#160;&lt;br&gt;&lt;/p&gt;&lt;p
        style=\"text-align&amp;#58;justify;\"&gt;Note&amp;#58; This press release
        represents the Copom's best effort to provide an English version of its policy
        statement. In case of any inconsistency, the original version in Portuguese
        prevails.&lt;br&gt;&lt;/p&gt;&lt;p&gt;&lt;br&gt;&lt;/p&gt;</content>\r\n  </entry>\r\n</feed>"
