        16 May 2026 10:07:43 +0530</pubDate></item><item><title><![CDATA[Sebi eases
        onboarding norms for foreign portfolio investors]]> </title><description><![CDATA[The
        Securities and Exchange Board of India has simplified rules for foreign investors.
        This eases the process of obtaining PAN cards for overseas portfolio investors.
        New rules introduced by the Income-tax Department had created difficulties.
        The Central Board of Direct Taxes has now issued relaxations. This aims to
