        width=\"4096\"/>\n    </item>\n    <item>\n      <author>Yuanyue Dang</author>\n
        \     <dc:creator>Yuanyue Dang</dc:creator>\n      <description>China\u2019s
        Ministry of Commerce said on Saturday that it had reached an agreement with
        the United States over the purchase of aeroplanes, jet engines and components.\n\u201CThe
        two sides have reached arrangements on China\u2019s purchase of aircraft from
        the US and the US ensuring the supply of aircraft engines and components to
        China, and agreed to continue advancing cooperation in related areas,\u201D
        the ministry said in a statement on its website.\nThe world\u2019s two biggest
        economies agreed to establish a trade...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/diplomacy/article/3353826/china-confirms-deal-buy-us-aircraft-and-engines-after-donald-trumps-visit?utm_source=rss_feed</guid>\n
