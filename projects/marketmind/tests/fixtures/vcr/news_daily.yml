        \                           </item>\n                    <item>\n                <title><![CDATA[I
        am proud to announce the site of the NATIONAL GARDEN OF AMERICAN HEROES. This
        magnificent exhibition of statues will be located in West Potomac Park, which
        we are transforming into one of the World's most beautiful public spaces.
        Right now, it is a totally BARREN field of Prime Waterfront Real Estate along
        our Mighty Potomac River. When finished, West Potomac Park will be a World
        Class Masterpiece with elegant Landscaping, and adorned with Beautiful Statues,
        and be yet another one of my great projects to make Washington, D.C., the
        Safest and Most Beautiful Capital in the World. The National Garden of American
        Heroes will feature the MOST BEAUTIFUL collection of statues of AMERICAN HEROES,
        featuring our Illustrious Founding Fathers, Military Warriors, Religious Leaders,
        Civil Rights Champions, World Class Athletes, Artists, Entertainers, and MORE.
        The people of America (and the World!) will come here to learn and be inspired
        by the \"Greats\". The National Garden of American Heroes is one more project
        we are undertaking to honor the 250th Birthday of the Greatest Nation on Earth,
        THE UNITED STATES OF AMERICA! President DONALD J. TRUMP]]></title>\n                <link>https://trumpstruth.org/statuses/38454</link>\n
        \               <description><![CDATA[<p>I am proud to announce the site of
        the NATIONAL GARDEN OF AMERICAN HEROES. This magnificent exhibition of statues
        will be located in West Potomac Park, which we are transforming into one of
        the World's most beautiful public spaces. Right now, it is a totally BARREN
        field of Prime Waterfront Real Estate along our Mighty Potomac River. When
        finished, West Potomac Park will be a World Class Masterpiece with elegant
