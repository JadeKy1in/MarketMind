        \     <dc:creator>Amber Wang</dc:creator>\n      <description>Beijing\u2019s
        assessment of whether US President Donald Trump can \u201Cproperly handle\u201D
        the Taiwan issue and US-China relations will largely come down to arms sales
        to the island, analysts said.\nFollowing the summit with his Chinese counterpart
        Xi Jinping, Trump said on Friday that he discussed arms sales to Taiwan with
        Xi and would \u201Cmake a determination\u201D on the matter soon.\nA day earlier,
        Xi had warned him that mishandling the Taiwan question \u2013 the most important
        issue in bilateral relations \u2013 could...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/diplomacy/article/3353831/how-will-beijing-judge-trumps-take-taiwan-look-1-critical-factor?utm_source=rss_feed</guid>\n
