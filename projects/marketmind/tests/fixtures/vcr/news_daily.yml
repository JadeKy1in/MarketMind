        and the Lincoln Memorial. They squandered at least 55 Million Dollars haplessly
        trying, with no chance of success, to get the Reflecting Pool to work. Instead,
        they made it worse, keeping it closed for years, and ending up with a leaking,
        smelling, ode to both of their failed Administrations. It was an embarrassment
        to Washington, D.C., and to our Country, itself. Despite the vast sums of
        money spent, they never got the pool to work, and cosmetically it was a total
        mess for all to see. Now, along comes \u201CTRUMP,\u201D who is asked by many
        patriots if I can fix it. The answer is a resounding, YES, and for a \u201Ctiny\u201D
        fraction of the cost! I worked with our now strong Department of the Interior
        and explained to them that we should view this as a highly sophisticated swimming
        pool, not the leaking, dilapidated facade, joints and all, of a building.
        Instead of taking 4 years to build, at a cost, granite pavers and all, of
        400 Million Dollars, we could construct a far superior Reflecting Pool for
        5 or 6 Million Dollars, and could complete the project in 2 weeks rather than
        4 years. What a difference in time and money, and for a far superior end result!
        This is not just a paint job, like lowlife \u201Creporter,\u201D David Fahrenthold,
        of the NYT so inaccurately and maliciously stated, it is a deeply complicated
