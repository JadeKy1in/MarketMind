        potential reopening is uncertain, impacting global oil supplies and pushing
        prices higher.]]> </description><link>https://economictimes.indiatimes.com/markets/commodities/news/oil-prices-climb-more-than-3-on-fears-of-new-us-iran-combat/articleshow/131131819.cms</link><enclosure
