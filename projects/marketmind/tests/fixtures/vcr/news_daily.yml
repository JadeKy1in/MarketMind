        \   <item>\n      <title>Greg Hyman, Co-Creator of Tickle Me Elmo, Dies at
        78</title>\n      <link>https://www.nytimes.com/2026/05/19/business/greg-hyman-dead.html</link>\n
        \     <guid isPermaLink=\"true\">https://www.nytimes.com/2026/05/19/business/greg-hyman-dead.html</guid>\n
        \     <atom:link href=\"https://www.nytimes.com/2026/05/19/business/greg-hyman-dead.html\"
        rel=\"standout\"></atom:link>\n      <description>An electronics wizard, he
        was already a veteran inventor when he collaborated with Ron Dubren on an
        idea for a toy that giggled. The rest is retail history.</description>\n      <dc:creator>Penelope
        Green</dc:creator>\n      <pubDate>Tue, 19 May 2026 21:28:52 +0000</pubDate>\n
        \     <category domain=\"http://www.nytimes.com/namespaces/keywords/nyt_per\">Hyman,
