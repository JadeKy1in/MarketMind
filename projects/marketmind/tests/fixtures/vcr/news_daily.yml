        end lower on mounting inflation worries]]> </title><description><![CDATA[U.S.
        stocks declined Friday as rising crude prices fueled global inflation fears,
        pushing Treasury yields higher and making equities less attractive. The Trump-Xi
        summit yielded few results, while Jerome Powell's tenure as Fed chair concluded
        amidst concerns about sticky inflation and potential rate hikes. Energy shares
        saw gains, but the broader market retreated from AI-driven highs.]]> </description><link>https://economictimes.indiatimes.com/markets/us-stocks/news/us-stocks-end-lower-on-mounting-inflation-worries/articleshow/131131912.cms</link><enclosure
