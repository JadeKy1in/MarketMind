        Euphoria Turns Six-Week Fund Into Record-Busting AI Trade]]></title><description><![CDATA[Brian
        Emes manages a retail store in Lethbridge, Alberta, a small city on the Canadian
        prairie about a two-hour drive from the US border. On the morning of May 11,
        before opening the shop, the 43-year-old launched his brokerage app and bought
        55 shares of an exchange-traded fund that hadn\u2019t existed until early
        April.]]></description><link>https://www.bloomberg.com/news/articles/2026-05-16/retail-euphoria-turns-six-week-fund-into-record-busting-ai-trade</link><guid
        isPermaLink=\"true\">https://www.bloomberg.com/news/articles/2026-05-16/retail-euphoria-turns-six-week-fund-into-record-busting-ai-trade</guid><dc:creator><![CDATA[Isabelle
