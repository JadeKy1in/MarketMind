        surges 8% in a week to near $110 as Iran war tensions simmer again. Where
        are prices headed?]]> </title><description><![CDATA[Oil prices surged this
        week as U.S. President Trump and Iran's foreign minister exchanged remarks,
        dampening hopes for a near-term agreement on ship attacks around the Strait
        of Hormuz. Brent crude futures rose 7.84% and WTI gained 10.48% amid uncertainty
        over the fragile ceasefire and the potential for prolonged disruptions to
        vital oil and LNG flows.]]> </description><link>https://economictimes.indiatimes.com/markets/commodities/news/crude-oil-prices-surge-8-in-a-week-to-near-110-as-iran-war-tensions-simmer-again-where-are-prices-headed/articleshow/131131604.cms</link><enclosure
