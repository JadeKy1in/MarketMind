        width=\"1040\"/>\n    </item>\n    <item>\n      <author>Albee Zhang</author>\n
        \     <dc:creator>Albee Zhang</dc:creator>\n      <description>Wave-powered
        unmanned surface vessels (USV) could be used for maritime rights and law enforcement,
        researchers said, as Beijing faces heightened tensions in contested waters
        including the South China Sea.\nWriting in the latest issue of Naval and Merchant
        Ships, owned by China State Shipbuilding Corporation, Chen Xin and Chen Ruimiao
        said the self-powered vessels could be \u201Cof great value\u201D to the sustainable
        management of distant waters.\nBy converting vertical wave motion into forward
        thrust using...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/military/article/3353721/can-ai-assisted-unmanned-vessels-be-beijings-answer-south-china-sea-patrols?utm_source=rss_feed</guid>\n
        \     <link>https://www.scmp.com/news/china/military/article/3353721/can-ai-assisted-unmanned-vessels-be-beijings-answer-south-china-sea-patrols?utm_source=rss_feed</link>\n
        \     <pubDate>Sat, 16 May 2026 02:00:16 +0000</pubDate>\n      <title>Can
        AI-assisted unmanned vessels be Beijing\u2019s answer to South China Sea patrols?</title>\n
