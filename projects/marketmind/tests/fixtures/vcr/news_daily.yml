        Engines</category>\n      <category domain=\"http://www.nytimes.com/namespaces/keywords/des\">Artificial
        Intelligence</category>\n      <category domain=\"http://www.nytimes.com/namespaces/keywords/des\">E-Commerce</category>\n
        \     <category domain=\"http://www.nytimes.com/namespaces/keywords/des\">Shopping
        and Retail</category>\n      <category domain=\"http://www.nytimes.com/namespaces/keywords/des\">Photography</category>\n
        \     <category domain=\"http://www.nytimes.com/namespaces/keywords/nyt_org\">OpenAI
        Labs</category>\n      <media:content height=\"1800\" medium=\"image\" url=\"https://static01.nyt.com/images/2026/05/19/multimedia/BIZ-GOOGLE-pzjl/BIZ-GOOGLE-pzjl-mediumSquareAt3X.jpg\"
        width=\"1800\"></media:content>\n      <media:credit>Jason Henry for The New
        York Times</media:credit>\n      <media:description>On Tuesday, Google said
        the A.I. shift had inspired it to overhaul its search bar for the first time
        since 2001.</media:description>\n    </item>\n    <item>\n      <title>Son
