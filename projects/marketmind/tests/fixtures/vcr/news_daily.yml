        width=\"1800\"></media:content>\n      <media:credit>Photo Illustration by
        The New York Times; The Strong National Museum of Play</media:credit>\n      <media:description>Greg
        Hyman in 2012. The toy that he and Ron Dubren designed for Tyco not only giggled
