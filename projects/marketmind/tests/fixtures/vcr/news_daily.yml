        \           <item>\n        <title>Russia to expand Islamic banking rollout</title>\n
        \       <link><![CDATA[https://www.rt.com/business/640053-russia-islamic-banking-push/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/640053-russia-islamic-banking-push/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a07dbe92030272a4d7c5482.jpg\"
        /> Russia is moving to broaden its Islamic banking pilot porgram as demand
        for Sharia-compliant financial services rises, Sber says <br/><a href=\"https://www.rt.com/business/640053-russia-islamic-banking-push/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Demand for Sharia-compliant financial
        products is growing, according to Russia\u2019s largest lender, Sber.</strong></p>\n
        \           \n                        \n            <p data-start=\"0\" data-end=\"42\"><strong
        data-start=\"0\" data-end=\"7\"></strong></p>\n<p data-start=\"0\" data-end=\"42\"><strong
        data-start=\"0\" data-end=\"7\"></strong></p>\n<p data-start=\"537\" data-end=\"714\">Russia
        is seeking to expand a pilot Islamic banking program as demand for Sharia-compliant
        financial products continues to grow, according to the country&rsquo;s largest
        lender, Sber.</p>\n<p data-start=\"716\" data-end=\"1238\">Islamic banking,
        also known as partner financing, follows Sharia principles that prohibit interest-based
        lending and speculative transactions. Instead, it relies on mechanisms such
        as leasing, installment sales, profit-sharing arrangements, and asset-backed
        financing. It also restricts financing for sectors such as gambling, alcohol,
        tobacco, and weapons production. Russia launched the pilot initiative in 2023
        in four predominantly Muslim regions, including the Republic of Tatarstan,
        and later extended it until 2028.</p>\n<p data-start=\"0\" data-end=\"107\"
        data-is-last-node=\"\" data-is-only-node=\"\">An estimated 20 million Muslims
        live in Russia, including more than 2 million in Tatarstan.</p>\n<p data-start=\"1240\"
        data-end=\"1616\">Speaking at KazanForum, an Islamic-themed conference held
        in Tatarstan&rsquo;s capital, Kazan, on Thursday, Sber senior vice president
        Oleg Ganeev said demand was strongest for everyday banking products, including
        accounts, payment services, cards, and deposits. Sber has also launched digital
        sukuk products &ndash; Islamic bonds designed to comply with Sharia principles
        &ndash; Ganeev added.</p>\n\n            ]]> <![CDATA[\n    <p>\n        <a
        target=\"_blank\" href=\"https://www.rt.com/russia/617831-russia-hosts-islamic-diplomatic-forum/\">\n
        \           <span>READ MORE: </span>Russia hosts Islamic diplomatic forum\n
        \       </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p data-start=\"1618\" data-end=\"1892\">Officials
        say Russia&rsquo;s Islamic banking sector still lacks clear regulation and
        unified standards. Anatoly Aksakov, chairman of the State Duma Committee on
        the Financial Market, said at the same event that Russia could adopt its first
        Islamic banking standard within a month.</p>\n<p data-start=\"1894\" data-end=\"2124\">Aksakov
        said lawmakers and financial institutions had identified <em>&ldquo;eight
        priority areas for development&rdquo;</em> based on standards used by the
        Bahrain-based Accounting and Auditing Organization for Islamic Financial Institutions
        (AAOIFI).</p>\n<p data-start=\"2126\" data-end=\"2423\">Tatarstan Economy
        Minister Midhat Shagiakhmetov said the republic had been developing Islamic
        finance for around 15 years and now offers about 35 Sharia-compliant financial
        products. More than half of all transactions under Russia&rsquo;s pilot program
        are currently carried out in the region, he added.</p>\n<p data-start=\"2425\"
        data-end=\"2613\" data-is-last-node=\"\" data-is-only-node=\"\">Russian officials
        have also discussed expanding the pilot program beyond the four participating
        regions and increasing the use of Islamic finance instruments to attract foreign
        investment.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a07dbe92030272a4d7c5482.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Sat, 16 May 2026 02:59:52
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Potato futures are soaring \u2013 should the world be worried?</title>\n
        \       <link><![CDATA[https://www.rt.com/business/640034-middle-east-war-potato-prices-spike/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/640034-middle-east-war-potato-prices-spike/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a07640f20302771b42fe9cf.jpg\"
        /> Potato futures prices have surged more than 700% over the past month, fueling
        fears of a global food crisis <br/><a href=\"https://www.rt.com/business/640034-middle-east-war-potato-prices-spike/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Disruptions to shipping through the
        Strait of Hormuz have triggered warnings of a global food crisis</strong></p>\n
        \           \n                        \n            <p>The US-Israeli war
        on Iran is increasingly hitting consumers far beyond energy prices. Disruptions
        around the Strait of Hormuz are driving up fertilizer costs and fueling a
        sharp rise in global food prices. Potatoes have emerged as the latest casualty
        as futures prices have surged in recent weeks amid mounting warnings over
        food security and supply chain strain.&nbsp;</p>\n<p><strong>Why are potato
        futures prices soaring?</strong></p>\n<p>Potato-linked financial contracts
        have spiked more than 700% over the past month and are up over 34% year-on-year
        as of mid-May, according to Trading Economics data.</p>\n    <figure>\n        <img
        src=\"https://mf.b37mrtl.ru/files/2026.05/original/6a0760e62030277f1f77cb4f.png\"
        \ />\n                    <figcaption>\n                                    \xA9
        Trading Economics\n                \n                <span class = \"copyright\">\n
        \                                                                              </span>\n
        \           </figcaption>\n            </figure>\n\n<p>The surge has been
        driven largely by concerns over the impact of the Middle East war on fertilizer
        supplies, energy costs and agricultural trade routes. Potatoes are a nutrient-intensive
        crop that depends heavily on nitrogen-based fertilizers such as urea and ammonia.
        The Strait of Hormuz, which handles around 20% of global crude exports, is
        also critical for shipments of nitrogen-based fertilizers. Fertilizer prices
        have already surged around 80% since the conflict escalated, according to
        industry estimates.</p>\n<p>According to UN estimates, roughly a third of
        the global fertilizer trade normally passes through the strait, including
        shipments of urea, potash and phosphates. Analysts say markets are increasingly
        pricing in the risk of higher farming costs and weaker future harvests.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ea79d585f540740f19a0b8.jpg\"
        alt=\"Strait of Hormuz.\" />\n            <figcaption><a href=\"https://www.rt.com/business/638971-middle-east-war-consumers/\">Middle
        East war fallout hits consumers worldwide</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><strong>What&rsquo;s the big
        concern?</strong></p>\n<p>Analysts say the spike is unlikely to trigger immediate
        shortages and that markets are reacting instead to expectations of rising
        farming, fertilizer, and transport costs rather than a breakdown in potato
        supplies.</p>\n<p>However, if disruptions to fertilizer flows and energy markets
        persist, the pressure could ripple across the wider food sector. Processed
        potato products such as fries, chips and frozen foods are seen as especially
        vulnerable due to their dependence on industrial farming, energy-intensive
        production and global supply chains.</p>\n<p><strong>Will fries cost more
        in Europe?</strong></p>\n<p>The region is reportedly experiencing a potato
        oversupply after farmers expanded production in recent years to meet growing
        demand, helping cushion consumers from a sharp rise in retail prices.</p>\n<p>However,
        traders remain focused on the longer-term impact of disruptions to global
        trade and energy markets despite the current supply glut.</p>\n\n            ]]>
        <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/business/638932-eu-energy-crisis-iran-war/\">\n
        \           <span>READ MORE: </span>EU energy bill spikes amid Iran war supply
        shock \u2013 commissioner\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>The
        EU has already been grappling with elevated living costs since the escalation
        of the Ukraine conflict in 2022, when it decided to cut energy ties with Russia,
        becoming more exposed to volatility in global markets. The Iran war has added
        further pressure, with the bloc now paying far more for fossil fuel imports.
        This translates to higher gasoline and diesel prices, increasing the cost
        of transporting food to stores and adding further pressure to grocery prices.</p>\n<p><strong>Could
        other staple food prices be affected?</strong></p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e78aea85f54077d7673e47.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/638775-hidden-supply-chains-breaking/\">Supply
        chains breaking: The hidden bottlenecks threatening to bring the global economy
        to a standstill</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Hormuz disruptions have already affected a broader range of agricultural
        commodities, according to analysts and international agencies.</p>\n<p>The
        UN Food and Agriculture Organization says global food prices have risen for
        three consecutive months, with vegetable oil prices reaching their highest
        level since 2022. Wheat, rice and corn have also climbed amid higher transport
        and energy costs linked to instability around the Strait.</p>\n<p>Economists
        say prolonged disruption could eventually affect products ranging from bread
        and dairy to meat and processed foods, especially in economies vulnerable
        to energy shocks.</p>\n<p><strong>Is the world facing a food crisis?</strong></p>\n<p>In
        wealthier economies, consumers are likely to feel the fallout mainly through
        higher grocery bills. In poorer countries, however, the consequences could
        be far more severe, as soaring fuel and fertilizer costs threaten planting,
        weaken harvests and push staple foods further out of reach.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e1271b203027376a09f5c5.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/638507-iran-war-fertilizers-famine/\">War
        on Iran could trigger global famine \u2013 charity founder</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Svein Tore
        Holsether, chief executive of fertilizer giant Yara International, has warned
        that escalating hostilities in the Gulf are endangering global agricultural
        production and could eventually spark a bidding war for food.</p>\n<p>A similar
        warning came from Jose Andres, founder of charity World Central Kitchen, who
        said war-related disruptions to fertilizer supplies could trigger a prolonged
        global food crisis, with poorer and import-dependent countries expected to
        suffer the hardest hit.</p>\n<p>The broader economic fallout from the Middle
        East conflict could <a href=\"https://www.rt.com/news/638355-us-israeli-war-poverty-un/\"
        target=\"_blank\" rel=\"noopener noreferrer\">push</a> more than 30 million
        people into poverty across 162 countries, especially in nations reliant on
        imported energy, according to the United Nations Development Programme.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a07640f20302771b42fe9cf.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 15 May 2026 19:26:39
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Japanese auto giant takes historic hit amid EV pullback</title>\n
        \       <link><![CDATA[https://www.rt.com/business/640008-honda-losses-ev-pullback/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/640008-honda-losses-ev-pullback/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a06324685f540486558d067.jpg\"
        /> Japanese auto giant Honda has posted its first annual loss since 1957 as
        weak EV demand, US tariffs, and Chinese competition hit earnings <br/><a href=\"https://www.rt.com/business/640008-honda-losses-ev-pullback/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Honda has reported its first operating
        loss since 1957, citing weaker demand, US tariffs, and intensifying competition</strong></p>\n
        \           \n                        \n            <p>Japanese auto giant
        Honda has posted its first operating loss since 1957, citing weakening electric
        vehicle (EV) demand, US trade measures, and mounting competition from China.</p>\n<p>On
        Thursday, the automaker reported a net loss of 424 billion yen ($2.7 billion)
        for the fiscal year that ended on March 31, largely due to a massive write-down
        linked to its EV business.</p>\n<p>Honda said the downturn was exacerbated
        by changes in US policy under President Donald Trump, including the removal
        of tax incentives for American consumers purchasing EVs, as well as tariffs
        on imported cars and auto parts.</p>\n<p><em>&ldquo;EV demand has declined
        considerably, due to the rollback of environmental regulations in the US and
        other factors,&rdquo;</em> the company said.</p>\n<p>The group also cited
        intense competition from Chinese producers and slower-than-expected global
        uptake for EVs. Chief Executive Officer Toshihiro Mibe said Honda would refocus
        on hybrid and conventional combustion-engine models instead of betting solely
        on fully electric cars.</p>\n<p>As part of the shift, Honda has shelved a
        planned EV production project in Ontario, a move that Canadian Prime Minister
        Mark Carney described as <em>&ldquo;disappointing.&rdquo;</em></p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b19f5185f540221e7ca693.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/634514-porsche-profits-electric-vehicles/\">Porsche
        profits crash after costly EV strategy U-turn</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Other Japanese automakers have
        come under growing pressure as well. Toyota last week forecast a 22% drop
        in net income for the current fiscal year, while Nissan posted losses of roughly
        $3.4 billion and announced factory closures alongside thousands of job cuts.</p>\n<p>The
        setbacks reflect a broader slowdown in the global EV market, as automakers
        retreat from aggressive expansion plans in the sector after years of heavy
        investment.</p>\n<p>Industry pressures have also been amplified by geopolitical
        instability and rising energy costs. The fallout from reduced Russian energy
        supplies following the escalation of the Ukraine conflict, as well as tensions
        in the Middle East and disruptions to global shipping and energy supplies,
        have added further strain to manufacturing and supply chains worldwide.</p>\n<p>Earlier
        this year, German luxury carmaker Porsche reported a sharp drop in operating
        profits after scaling back parts of its long-term EV strategy and returning
        focus to combustion-engine and hybrid models, a move that sent shockwaves
        through parent company Volkswagen Group.</p>\n<p></p>\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a06324685f540486558d067.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 14 May 2026 21:06:15
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Why the ECB may be forced to raise rates despite weak EU economy</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639993-ecb-rate-hike-weak-economy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639993-ecb-rate-hike-weak-economy/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a05f3102030277d1939dd2c.jpg\"
        /> The European Central Bank may raise interest rates despite a weak EU economy,
        policymaker Alexander Demarco has suggested <br/><a href=\"https://www.rt.com/business/639993-ecb-rate-hike-weak-economy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Rising energy prices linked to the
        Iran war are reviving inflation fears</strong></p>\n            \n                        \n
        \           <p>The European Central Bank (ECB) may be forced to raise interest
        rates despite the risk of further weakening the Eurozone economy, as even
        some of its more cautious policymakers are losing confidence that the oil
        supply shock triggered by the Iran war will fade quickly, according to an
        interview published by Politico.</p>\n<p>Central Bank of Malta Governor Alexander
        Demarco, described by the outlet as a <em>&ldquo;dovish&rdquo;</em> policymaker
        &ndash; an official who typically favors lower interest rates to support economic
        growth &ndash; warned that the ECB may no longer be able to ignore inflation
        driven by the latest market turmoil and could eventually be forced to tighten
        monetary policy to prevent broader price pressures from spreading through
        the economy.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ea79d585f540740f19a0b8.jpg\"
        alt=\"Strait of Hormuz.\" />\n            <figcaption><a href=\"https://www.rt.com/business/638971-middle-east-war-consumers/\">Middle
        East war fallout hits consumers worldwide</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em>&ldquo;The prospects of
        looking through this shock appear to be fading now, given the prolongation
        of the conflict and the prospects of oil prices remaining higher for longer,&rdquo;</em>
        Demarco said in the interview, published Tuesday.</p>\n<p>The ECB kept its
        key deposit rate unchanged at 2% in April but warned that prolonged conflict
        and elevated energy prices could increasingly spill into broader inflation,
        as workers may demand higher wages and businesses may raise prices further.</p>\n<p>Most
        economists surveyed by Reuters expect the ECB to hike rates by 25 basis points
        to 2.25% at the next meeting scheduled for June 11. They also anticipate at
        least two, potentially three, hikes in 2026 to combat rising energy-led inflation.</p>\n<p>However,
        even a resolution of the Middle East war before that day <em>&ldquo;may not
        cool energy prices enough for policymakers to stay put,&rdquo;</em> Demarco
        warned.</p>\n<p>Since the US and Israel attacked Iran in late February causing
        disruptions in the Strait of Hormuz, Brent crude briefly surged above $120
        per barrel in late April and has continued trading around the $100 mark in
        recent weeks, compared with around $70 before the crisis.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a048d3085f54072e92e052f.png\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/639926-belgium-national-strike-energy-defense/\">Thousands
        march in EU capital against austerity measures (VIDEO)</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<h2>Is a hike
        necessary?</h2>\n<p>Higher rates can in many instances help curb inflation
        by reducing demand across the economy and slowing how fast prices rise.</p>\n<p>However,
        opponents argue that the ECB should avoid rushing into rate hikes, warning
        that higher borrowing costs cannot fix the underlying problem of disrupted
        oil supplies and could instead deepen the economic slowdown.</p>\n<p>Both
        ECB Vice President Luis de Guindos and Bank of France Governor Francois Villeroy
        de Galhau have recently called for more data before tightening policy. Berenberg
        chief economist Holger Schmieding has argued that given weak growth and rising
        unemployment workers are unlikely to <em>&ldquo;push through excessive wage
        demands.&rdquo;</em></p>\n<p>Critics of tighter policy also argue that the
        current shock is being driven by geopolitics, meaning hikes risk repeating
        the ECB&rsquo;s widely criticized 2011 decision to raise rates in an already
        fragile economy.</p>\n<h2>Controversial rate decision</h2>\n<p></p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b44e8885f5403b4012d77b.jpg\"
        alt=\"FILE PHOTO: Israeli Prime Minister Benjamin Netanyahu and then German
        Defense Minister Ursula von der Leyen in Jerusalem, Israel, 12 May 2015\"
        />\n            <figcaption><a href=\"https://www.rt.com/news/634844-eu-never-learns-iran/\">The
        EU never learns \u2013 except for the wrong lessons</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>During the Eurozone sovereign
        debt crisis in 2011, the ECB raised interest rates twice as it tried to contain
        inflation driven by surging oil and commodity prices during the Arab Spring
        uprisings in the Middle East and North Africa. Political instability and conflict
        in major oil-producing countries, particularly Libya, pushed the price of
        Brent crude above $120 per barrel, driving Eurozone inflation beyond the ECB&rsquo;s
        2% target. At the same time, several Eurozone economies, including Greece,
        Italy, Spain, and Portugal, were already under severe financial strain following
        the 2008 financial crisis. Critics later argued that the ECB, then led by
        Jean-Claude Trichet, tightened policy at the worst possible moment, helping
        push the Eurozone economy back toward recession. The central bank eventually
        reversed course later that year under incoming President Mario Draghi.</p>\n<p>More
        recently, many economists have argued that the ECB reacted too slowly during
        the energy crisis which followed the escalation of the Ukraine conflict in
        2022. Policymakers initially treated the surge in energy prices as temporary
        and delayed major tightening measures. Inflation eventually climbed above
        10% in October of that year, forcing the ECB into its fastest rate-hiking
        cycle on record, with borrowing costs rising from negative territory to 4%
        in little more than a year. Critics say the delay made the eventual tightening
        cycle far more painful for households and businesses.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f0bca185f5400f7f34189d.jpg\"
        alt=\"This image was generated using AI technology.\" />\n            <figcaption><a
        href=\"https://www.rt.com/news/639205-germany-sputters-toward-crisis/\">Germany
        in four charts: Berlin tumbles back toward crisis</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p></p>\n<h2>What is happening
        with the economy now?</h2>\n<p>The Eurozone economy was already struggling
        before the Iran war oil shock hit. Germany &ndash; traditionally the bloc&rsquo;s
        industrial engine &ndash; contracted by 0.3% in 2025 after shrinking by 0.2%
        the previous year, according to official statistics, as manufacturers continued
        to grapple with high energy costs, weak global demand, and falling competitiveness.
        The European Commission warned in March that even a short-lived disruption
        could reduce 2026 growth by 0.4% percentage points from the 1.2% growth forecast
        before the conflict.</p>\n<p>Households across the bloc are also still recovering
        from years of elevated inflation that eroded purchasing power and pushed up
        housing, food, and borrowing costs after the 2022 inflation peak. Economists
        warn that another prolonged surge in energy prices could further weaken consumer
        spending and industrial output at a moment when the Eurozone&rsquo;s recovery
        remains fragile.</p>\n<h2>Does the EU have alternative oil supply options?</h2>\n<p>The
        EU does have alternative oil suppliers outside the Middle East, including
        Norway, the United States, and Russia. Analysts say, however, that neither
        Norway nor the US have enough spare capacity to fully offset a prolonged Gulf
        disruption.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a04ac3985f540750d14a75c.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/business/639951-eu-russian-gas-imports/\">EU
        buys record volumes of Russian LNG \u2013 report</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Russian oil flows, meanwhile,
        are not directly exposed to the Strait of Hormuz crisis. The country still
        supplies some EU countries through exemptions and pipeline routes despite
        sanctions imposed after the escalation of the Ukraine conflict in 2022.</p>\n<p>Brussels
        has been trying to phase out the remaining Russian fossil fuel imports for
        political and strategic reasons, arguing that dependence on Moscow poses long-term
        security risks.</p>\n<p>The latest energy shock has complicated these plans,
        with the European Commission recently postponing a proposal for a permanent
        ban on Russian oil imports.</p>\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a05f3102030277d1939dd2c.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 14 May 2026 20:10:47
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU buys record volumes of Russian LNG \u2013 report</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639951-eu-russian-gas-imports/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639951-eu-russian-gas-imports/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a04ac3985f540750d14a75c.jpg\"
        /> EU\u2019s imports of Russian liquefied natural gas reached a record high
        in the first quarter of 2026, industry think-tank IEEFA has reported <br/><a
        href=\"https://www.rt.com/business/639951-eu-russian-gas-imports/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Imports surged 16% in Q1 2026 amid
        the US-Israeli war on Iran, according to industry think-tank IEEFA</strong></p>\n
        \           \n                        \n            <p>The EU&rsquo;s imports
        of Russian liquefied natural gas (LNG) has reached a record high this year,
        amid the growing energy crisis triggered by the US-Israeli war on Iran, according
        to a report by a US-based energy think tank.</p>\n<p>The Institute for Energy
        Economics and Financial Analysis (IEEFA) reports that the bloc&rsquo;s imports
        jumped 16% year on year in January-March, with France, Spain, and Belgium
        accounting for most deliveries. Russia remains the EU&rsquo;s second-largest
        LNG supplier, despite the bloc aiming to phase out Russian fossil fuels by
        2027, it noted.</p>\n<p>EU countries spent &euro;5.9 billion ($6.9 billion)
        on Russian pipeline gas and &euro;6.7 billion on Russian LNG in 2025, according
        to the report. Russia accounted for about 13% of the EU&rsquo;s combined natural
        gas and LNG imports in 2025, according to previous data.</p>\n<p>IEEFA said
        that the rise in imports was partly driven by disruptions in global LNG markets
        linked to reduced maritime traffic through the Strait of Hormuz, which curtailed
        Qatari exports and increased the EU&rsquo;s reliance on other major suppliers.<br
        /><em></em></p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a00d07c203027589d4150be.png\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/639836-idiots-fico-eu-russian-energy/\">\u2018Are
        we idiots?\u2019: Fico on EU pivot away from Russian fuel (VIDEO)</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em>&ldquo;The
        war in the Middle East has left Europe more reliant on its two largest LNG
        suppliers, the US and Russia,&rdquo;</em> said Ana Maria Jaller-Makarewicz,
        lead energy analyst at IEEFA.</p>\n<p>The report said that the EU is risking
        a dependence on American LNG as Washington looks set to overtake Norway as
        the bloc&rsquo;s largest gas supplier in 2026 and could account for 80% of
        EU LNG imports by 2028. American LNG is on average the most expensive for
        European buyers, the report added.</p>\n<p>The latest developments have prompted
        some EU politicians to step up calls to reconsider sanctions on Russia. Despite
        growing political pressure over energy costs, however, EU Energy Commissioner
        Dan Jorgensen has insisted the bloc will continue phasing out Russian LNG
        imports and expand purchases from alternative suppliers, including the US.</p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/business/639423-eu-energy-crisis-competitiveness/\">\n
        \           <span>READ MORE: </span>EU \u2018not competitive\u2019 \u2013
        Belgian central bank chief\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Moscow,
        meanwhile, has argued that European countries will eventually be forced to
        restore energy ties with Russia. Kremlin envoy Kirill Dmitriev said EU policy
        under what he called <em>&ldquo;Russophobic politicians&rdquo;</em> risked
        deindustrializing the bloc.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a04ac3985f540750d14a75c.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 13 May 2026 17:06:33
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Russian economy on solid footing despite slowdown \u2013 deputy
        PM</title>\n        <link><![CDATA[https://www.rt.com/business/639915-russian-economy-resilient-sanctions/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639915-russian-economy-resilient-sanctions/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a042de285f54072e92e050b.jpg\"
        /> The Russian economy has shown good fundamentals despite the first quarter
        contraction, Deputy Prime Minister Aleksandr Novak has said <br/><a href=\"https://www.rt.com/business/639915-russian-economy-resilient-sanctions/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Aleksandr Novak has cited record low
        unemployment and rising incomes as signs pointing to renewed growth</strong></p>\n
        \           \n                        \n            <p>The Russian economy
        remains fundamentally strong despite contracting in the first quarter of 2026,
        Deputy Prime Minister Aleksandr Novak has said, citing low unemployment, rising
        household incomes and improving business activity as evidence that the slowdown
        may be temporary.&nbsp;</p>\n<p>Russia&rsquo;s GDP shrank by 0.3% year-on-year
        in the first quarter, marking the country&rsquo;s first quarterly contraction
        since early 2023. The slowdown followed years of rapid expansion, with the
        economy having grown by over 4% in 2023 and 2024 before easing to around 1%
        last year.&nbsp;</p>\n<p>Novak told business daily Vedomosti on Tuesday that
        the downturn was part of a normal economic cycle. <em>&ldquo;After a period
        of high growth, there is always a correction,&rdquo;</em> he said, describing
        the current phase as being accompanied by <em>&ldquo;structural transformation&rdquo;</em>
        under <em>&ldquo;unprecedented pressure from sanctions.&rdquo;</em>&nbsp;</p>\n<p>Russia
        has retained its position as the world&rsquo;s fourth-largest economy by purchasing
        power parity (PPP) &ndash; which adjusts for cost-of-living differences across
        countries &ndash; since 2021, Novak said. Manufacturing output has risen nearly
        23% since 2022, he added, driven by import substitution and increased domestic
        production after many Western companies exited the Russian market.&nbsp;</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69df5c112030273cd32e8487.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/638424-russia-economic-growth-commodities-imf/\">IMF
        raises Russia\u2019s growth outlook</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The deputy prime minister also
        cited historically low unemployment and rising household incomes as signs
        of economic stability. Real disposable incomes had increased by 26.1% over
        the past three years, driven by wage growth, social payments, business income
        and property income, he stated.&nbsp;</p>\n<p><em>&ldquo;Poverty has declined
        to a record low of 6.7%,&rdquo;</em> Novak said, referring to the 2025 data.
        He said unemployment was expected to remain at around 2.3-2.4%, among the
        lowest levels in the country&rsquo;s modern history.&nbsp;</p>\n<p>Novak attributed
        the slowdown partly to labor shortages and tight monetary policy aimed at
        curbing inflation, but said growth was expected to return this year as price
        pressures ease and financial conditions gradually improve.&nbsp; &nbsp;</p>\n<p>Novak&rsquo;s
        views were echoed by Economic Development Minister Maksim Reshetnikov, who
        told President Vladimir Putin on Tuesday that the economy had <em>&ldquo;held
        up well&rdquo;</em> despite sanctions and external pressure. The ministry
        expects GDP growth to reach 0.4% this year before accelerating to 1.4% in
        2027, Reshetnikov said.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a042de285f54072e92e050b.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 12 May 2026 20:14:53
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Netflix sued for spying on children</title>\n        <link><![CDATA[https://www.rt.com/business/639900-netflix-spying-children-lawsuit/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639900-netflix-spying-children-lawsuit/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a034235203027268e328d9c.jpg\"
        /> Texas Attorney General Ken Paxton has sued Netflix, alleging that it harvested
        and sold data from users and their children without consent <br/><a href=\"https://www.rt.com/business/639900-netflix-spying-children-lawsuit/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The streaming giant exploited users
        and their kids to make billions of dollars selling their data, a legal complaint
        alleges</strong></p>\n            \n                        \n            <p>Texas
        Attorney General Ken Paxton has sued Netflix, accusing the streaming company
        of illegally spying and collecting data from users and their children without
        their knowledge or consent.</p>\n<p>In a statement published on Monday, Paxton
        characterized Netflix as <em>&ldquo;a logging company&rdquo;</em> that records
        and monetizes customers&rsquo; behavioral data <em>&ldquo;and occasionally
        streams movies.&rdquo;</em></p>\n<p>The lawsuit, filed in Collin County, Texas
        on Monday, cited past promises by Netflix executives not to exploit users&rsquo;
        personal data for advertising purposes.</p>\n<p>However, despite promising
        privacy, the company allegedly mined information spanning customers&rsquo;
        viewing habits, preferences, devices, household networks, and application
        usage, according to the complaint. After building its customer base, Netflix
        allegedly began to sell user data to commercial data brokers, raking in billions
        of dollars annually, it said.</p>\n<p>The lawsuit also focused on children&rsquo;s
        accounts, which Netflix encouraged customers to make. The complaint alleged
        that the company kept users addicted using features such as autoplay and other
        <em>&ldquo;dark patterns&rdquo;</em> &ndash; design features that push users
        into actions they may not have intended, such as staying on a platform longer
        than intended, or agreeing to things they do not understand.</p>\n<p><em>&ldquo;Netflix
        is not the ad-free and kid-friendly platform it claims to be. Instead, it
        has misled consumers while exploiting their private data to make billions,&rdquo;</em>
        Paxton said.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2025.10/thumbnail/68df7dc285f5400328245213.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/pop-culture/625843-netflix-loses-billions-musk/\">Musk
        tweets wipe $15bn off Netflix value</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The streaming giant has denied
        the allegations. The suit is <em>&ldquo;based on inaccurate and distorted
        information,&rdquo;</em> it told CBS News in a statement.</p>\n<p>Netflix
        has steadily declined in market value and share price since peaking in 2025.
        The company has also increasingly faced accusations of pandering and &lsquo;woke&rsquo;
        bias, including from public figures such as SpaceX CEO Elon Musk.</p>\n<p>Last
        October, the billionaire called for users to <em>&ldquo;cancel Netflix for
        the health of your kids&rdquo;</em> in response to an animated show aimed
        at children seven or older featuring a trans character.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/6a034235203027268e328d9c.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 12 May 2026 16:22:20
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>From market to military: Germany\u2019s private sector is imploding.</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639583-german-private-sector-economy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639583-german-private-sector-economy/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fcbc7585f5407c1a0f0bc1.jpg\"
        /> German public spending has significantly increased as the private sector
        implodes <br/><a href=\"https://www.rt.com/business/639583-german-private-sector-economy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Public spending is coming to the rescue
        for an economy that is facing severe structural problems</strong></p>\n            \n
        \                       \n            <p>After two years of recession, it
        seemed that Germany&rsquo;s economy had stabilized in 2025 and was even inching
        in the direction of a return to growth. Sure, nobody was sounding the trumpets
        of a full-fledged recovery, but it seemed the worst had passed.</p>\n<p>That
        was, admittedly, before the US-Israeli war on Iran muddied those waters. But
        even apart from this black swan event, what has really been going on in the
        German economy deserves a closer look. After all, there are different ways
        of generating GDP growth and not all of them have the same deeper implications.</p>\n<p>In
        Germany&rsquo;s case, it turns out the nascent recovery was almost entirely
        fueled by state spending while the private sector is in virtual free-fall.
        This, incidentally, goes some way toward explaining the ongoing rearmament
        in Germany in response to the supposed threat from Russia &ndash; a threat
        that very conveniently is breathing new life into unsustainable industry.
        This is no less than military Keynesianism, a phenomenon few expected to see
        in Germany. And it is being tasked to address several major structural shifts
        at once.</p>\n<p>RT Newsroom explains what&rsquo;s going on.</p>\n<h2><strong>2025
        marked an inflection point</strong></h2>\n<p>The German economy broke a two-year
        recession, growing by 0.2% in 2025, following a 0.5% contraction in 2024.
        However, the growth was driven in large part by government spending. There
        was a late-year pickup in industrial and construction output &ndash; also
        government-driven &ndash;&nbsp;while exports continued to lag.</p>\n<p>Public
        spending, however, rose 5.6% in 2025 and now represents more than 50% of GDP.
        This number itself isn&rsquo;t particularly eye-popping in a European context.
        Several EU countries have higher ratios. But Germany has historically been
        more fiscally conservative with an economy much more oriented toward private
        industry and exports. Helmut Kohl, German chancellor in the 1980s and &lsquo;90s,
        once called a spending ratio above 50% socialism. This is a threshold beyond
        which Germany would be seen as having adopted a different economic model.</p>\n<p>That
        different economic model is now here. But think about it from this angle:
        What happens when you boost public spending by over 5% and still can only
        barely eke out any economic growth? It means the private sector is crumbling.</p>\n<h2><strong>Digging
        into the data</strong></h2>\n<p>A widening split has opened in Germany&rsquo;s
        economy since 2022, dividing industries more exposed to market forces from
        those being backstopped by public spending. Traditional sectors &ndash; especially
        the automotive and chemical industries &ndash; have struggled with high energy
        costs and global competition. This has been reflected in the share prices,
        which have been very sluggish, with&nbsp;Porsche leading the way among the
        declines.&nbsp;</p>\n<p>The weakness is also visible in underlying demand,
        with domestic orders broadly declining, although amid volatility, since 2022.
        Last year saw periodic spikes driven by large contracts &ndash; almost certainly
        state-driven &ndash; whereas underlying demand remained weak. Exports were
        weak, so was private investment. Capital goods orders, a key gauge of private-sector
        investment, have been falling, pointing to continued contraction in market-driven
        industrial activity.</p>\n<p>The chart below shows relative performance of
        German equities since 2022.&nbsp;</p>\n    <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.05/original/69fe290585f540156f0285bb.jpeg\"
        \ />\n                    <figcaption>\n                \n                <span
        class = \"copyright\">\n                      \xA9&nbsp; RT Newsroom                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p>At the same time, defense
        contractors and state-backed industrial firms have surged on the back of government
        spending. Rheinmetall shares have rocketed more than 1,000% since early 2022,
        with its market cap rising from about &euro;4 billion to roughly &euro;67
        billion. Hensoldt and Renk have also posted strong gains, while even adjacent
        players such as Infineon have nearly doubled in value.</p>\n<p>Construction
        and industrial groups tied to public projects &ndash; including Hochtief,
        Heidelberg Materials, and Bilfinger &ndash; have also rallied sharply, in
        some cases climbing several-fold from 2022 lows.</p>\n<p>This has all come
        while the economy has been in recession and the manufacturing sector has been
        hemorrhaging jobs. What this points to is that Germany&rsquo;s headline market
        gains are masking a lack of real recovery. While the country&rsquo;s stock
        market, the DAX, has risen strongly, most of the growth is concentrated in
        a narrow, state-backed segment.</p>\n<h2><strong>What this means </strong></h2>\n<p>The
        contrast reflects very different operating conditions. Automakers and chemical
        firms compete in open global markets, where rising energy and labor costs
        erode competitiveness and push production to cheaper regions. Consumers can
        choose from many options. Defense contractors, by contrast, operate largely
        outside these pressures, relying on government-funded demand. Arms deals are
        driven by political and strategic decisions rather than market pricing, meaning
        input costs such as energy matter far less.</p>\n<p>Rising costs have made
        large parts of Germany&rsquo;s traditional industrial base less competitive.
        The response of the German state to that has been to shift toward sectors
        insulated from the market. Industry is not recovering in a conventional sense,
        but being redirected to where demand is state-driven rather than market-driven.</p>\n<p>This
        shift is already reshaping Germany&rsquo;s manufacturing base. According to
        the German Chamber of Industry and Commerce (DIHK), about 17% of industrial
        firms are now tied to the defense supply chain, with involvement particularly
        high in vehicle manufacturing at 36%. Some struggling auto plants are being
        repurposed for military production.</p>\n<p>Volkswagen is exploring the possibility
        of producing military vehicles at its Osnabruck factory and is in talks with
        Rheinmetall. Schaeffler, hit by a shrinking auto business and job cuts, is
        also pivoting to defense, while Deutz now supplies engines for air defense
        systems, drones, and armored vehicles. DIHK estimates that up to a quarter
        of German companies could soon be directly or indirectly linked to the defense
        sector, deepening the divide between a market-driven industrial base and a
        state-funded one.</p>\n<h2><strong>The role of debt</strong></h2>\n<p>Germany
        has long had an aversion to high debt levels. The country&rsquo;s fiscal mindset
        was shaped by the Weimar hyperinflation and the lesson that was seared into
        the collective mindset of German policymaking: macroeconomic instability means
        social and political breakdown. This tendency toward restraint was institutionalized
        under Angela Merkel, who instituted what was called the <em>&ldquo;debt brake,&rdquo;</em>
        which limited the federal deficit to 0.35% of GDP, a very low figure by European
        standards. The so-called Schwarze Null, or <em>&ldquo;black zero,&rdquo;</em>
        indicating a balanced budget was an imperative.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fbc11985f54032f7446563.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/639537-germanys-new-militarization-revanchism/\">Germany\u2019s
        new militarization: Revival of the spirit or blatant revanchism? (by Dmitry
        Medvedev)</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>In recent years, however, things have started to slip. In 2022,
        an amendment was passed under then-Chancellor Olaf Scholz that allowed the
        creation of a &euro;100 billion defense fund that would not count toward the
        brake. Another amendment was passed that exempted defense spending over 1%
        of GDP.</p>\n<p>This has unleashed a significant amount of funds that is finding
        its way into the economy via state contracts. The German government plans
        to double defense spending over the next five years from current levels, with
        $761 billion to be spent by the end of 2029, of which more than half ($469
        billion) will be funded through new debt.</p>\n<h2><strong>Decline in industrial
        jobs in context</strong></h2>\n<p>Germany&rsquo;s manufacturing sector has
        shed nearly a quarter of a million jobs since 2019. This figure is often bandied
        about as self-evidently catastrophically large but without much context. In
        itself it isn&rsquo;t a staggering figure: Germany&rsquo;s industrial employment
        has generally been around 7.5 million workers &ndash; figures vary depending
        on how they&rsquo;re counted &ndash; so the 245,000 job losses represent about
        3.25% of sector employment over six years (through 2025).</p>\n<p>Is that
        a lot or a little? The United States lost 5-6 million manufacturing jobs over
        the decade of 2000-2010, representing some 25-30% of the sector. Germany&rsquo;s
        job losses obviously pale in comparison. So why is this a big deal for Germany?</p>\n<p>First
        of all, it&rsquo;s the pace of the losses, which has been picking up. If the
        total for the past six years has been around a quarter of a million, the figure
        for 2025 alone was 120,000 &ndash; or half of the six-year total. The trend
        is extremely worrying.</p>\n<p>Second, the problem is that manufacturing plays
        a much more prominent role in the German economy than it played in the US.
        It sits at the center of dense networks of supply chains, meaning that each
        industrial job supports additional jobs elsewhere. This is called a multiplier
        effect. So even a relatively modest change in employment can trigger a much
        larger shift in the broader economy.</p>\n\n            ]]> <![CDATA[\n    <p>\n
        \       <a target=\"_blank\" href=\"https://www.rt.com/russia/627095-nazis-out-nazis-in-ukraine/\">\n
        \           <span>READ MORE: </span>Nazis out, Nazis in: Here\u2019s how Ukraine
        was freed from fascism and ended up ruled by its heirs\n        </a>\n    </p>\n]]>\n<![CDATA[\n
        \   \n\n<p>The deindustrialization in the US was traumatic but the economy
        was less dependent on manufacturing as its central organizing pillar. The
        US economy, already highly financialized and more dependent on other sectors
        such as services, technology, and healthcare, was, to a larger extent, able
        to absorb these job losses. In fact, unlike the German economy, the US continued
        to post growth for nearly that entire period when those manufacturing jobs
        were disappearing.</p>\n<p>For Germany, which held to a much more export-oriented
        model driven by the private sector, the decrease in manufacturing employment
        is hitting much closer to the heart.</p>\n<h2><strong>Military Keynesianism
        as the solution to three problems at once</strong></h2>\n<p>The term military
        Keynesianism has gained a certain currency in Europe in recent years and for
        good reason. This is an economic policy where a government attempts to boost
        economic growth and employment by significantly increasing military spending.
        It is an offshoot of the economic theories associated with John Maynard Keynes
        which hold that aggregate demand rather than mere private investment is the
        primary driver of the economy and that the government should manage this when
        the private sector weakens.</p>\n<p>Military Keynesianism can absolutely produce
        growth, but it does so without solving underlying productivity or competitiveness
        problems. Defense output is ultimately economically non-reproductive. A machine
        tool &ndash; a specialty of German industry &ndash; sold to a civilian manufacturer
        can produce goods for decades, thus expanding the economic value-added. A
        tank shell, by contrast, generates nothing once produced.</p>\n<p>Germany&rsquo;s
        old model depended on three pillars: cheap Russian energy, Chinese export
        demand, and American security guarantees. All three have weakened simultaneously.
        Germany is attempting to confront all three merely by throwing the state&rsquo;s
        fiscal ledger at them &ndash; all while the private sector shrivels away.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fcbc7585f5407c1a0f0bc1.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 08 May 2026 19:34:54
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US diplomats warned against wagering on Iran talks \u2013 media</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639567-us-diplomats-betting-iran-war/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639567-us-diplomats-betting-iran-war/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fcd5b120302715cd27101b.jpg\"
        /> US diplomats have reportedly been warned against using insider information
        to place bets on Iran talks <br/><a href=\"https://www.rt.com/business/639567-us-diplomats-betting-iran-war/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The scrutiny follows reports of suspiciously-timed
        bets and trades tied to Middle East tensions</strong></p>\n            \n
        \                       \n            <p>US diplomats have been warned against
        using confidential government information to place wagers tied to the Iran
        talks, the Wall Street Journal has reported. The warning comes amid growing
        scrutiny over suspiciously timed bets and trades linked to the war in the
        Middle East.&nbsp;</p>\n<p>The US State Department has issued a memorandum
        reminding employees worldwide that using undisclosed official information
        for financial gain is a <em>&ldquo;very serious offense&rdquo;</em> that <em>&ldquo;will
        not be tolerated,&rdquo;</em> the WSJ wrote on Thursday. The directive reportedly
        referenced online prediction platforms such as Kalshi and Polymarket, where
        users can speculate on global events.&nbsp;</p>\n<p>According to the report,
        the memo came a week after the arrest of a US special forces soldier accused
        of using classified information to profit from wagers tied to the ouster of
        Venezuelan President Nicolas Maduro. Prosecutors allege the suspect &ndash;
        who has since pleaded not guilty &ndash; earned more than $400,000 through
        bets placed ahead of a US military raid in January. &nbsp;</p>\n<p>Polymarket
        has faced mounting scrutiny over the Iran-related wagers, with media outlets
        reporting that a group of accounts earned more than $1 million through bets
        predicting the US-Israeli bombardment of Iran.&nbsp;</p>\n<p>The problem of
        insider trading has also spread to traditional financial markets. &nbsp;</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fda2e785f5404049177a7c.png\"
        alt=\"X / @KobeissiLetter\" />\n            <figcaption><a href=\"https://www.rt.com/business/639563-insider-trading-us-iran-deal/\">Oil
        trader pockets reported $125 mn on suspiciously well-timed Iran bet \u2013
        media</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>A massive short position on crude oil was placed on Wednesday one
        hour before a report of a possible US-Iran peace deal sent prices crashing.
        Energy-market analysts told MarketWatch the activity appeared suspicious,
        describing it as part of a broader pattern that has emerged since the start
        of the conflict in late February.&nbsp;</p>\n<p>The Justice Department and
        the Commodity Futures Trading Commission are also reportedly examining at
        least four oil trades worth more than $2.6 billion that were placed shortly
        before market-moving statements by US and Iranian officials. &nbsp;</p>\n<p>The
        scrutiny over geopolitical wagering has also drawn attention to the Trump
        family&rsquo;s links to the industry over potential conflicts of interest.
        The New York Times reported in January that Donald Trump Jr. had advisory
        ties to both Polymarket and Kalshi, and had an investment in the former through
        his venture firm, 1789 Capital.&nbsp;</p>\n\n            ]]> <![CDATA[\n    <p>\n
        \       <a target=\"_blank\" href=\"https://www.rt.com/news/637377-polymarket-apologizes-bets-us-pilots-iran/\">\n
        \           <span>READ MORE: </span>Polymarket apologizes for allowing bets
        on US pilots downed in Iran\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Trump
        himself downplayed the insider trading controversy, telling reporters he was
        <em>&ldquo;not happy with any of that stuff,&rdquo;</em> while adding that
        <em>&ldquo;the whole world, unfortunately, has become somewhat of a casino.&rdquo;</em></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fcd5b120302715cd27101b.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 07 May 2026 19:34:17
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Oil trader pockets reported $125 mn on suspiciously well-timed
        Iran bet \u2013 media</title>\n        <link><![CDATA[https://www.rt.com/business/639563-insider-trading-us-iran-deal/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639563-insider-trading-us-iran-deal/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fda2e785f5404049177a7c.png\"
        /> A nearly $1 billion oil short placed before news of progress toward US-Iran
        deal to end the war has raised suspicions of insider trading <br/><a href=\"https://www.rt.com/business/639563-insider-trading-us-iran-deal/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The alleged trade came shortly before
        reported progress toward US-Iran deal to end the war, raising suspicions of
        insider information</strong></p>\n            \n                        \n
        \           <p>A massive crude oil bet placed shortly before reports of a
        possible US-Iran peace deal sent prices crashing and fueled suspicion of insider
        trading, after the position reportedly generated a $125 million profit in
        just over an hour.</p>\n<p>According to market commentary platform the Kobeissi
        Letter, nearly 10,000 crude oil short contracts were placed around 3:40 AM
        (07:40 GMT) on Wednesday <em>&ldquo;without any major news,&rdquo;</em> describing
        the roughly $920 million position as unusually large for that time of day.</p>\n<p>At
        4:50 AM, Axios reported that Washington and Tehran were nearing an agreement
        to end the conflict and resume negotiations. Oil prices plunged more than
        12% within two hours of the report, turning the short position into an estimated
        $125 million profit before the price later rebounded, the platform said.</p>\n<p>During
        the US-Israeli war against Iran, prediction and traditional financial markets
        were flooded with suspiciously well-timed bets linked to airstrikes, ceasefire
        announcements, and diplomatic developments.</p>\n<p>According to The Guardian,
        traders placed more than $1 billion in seemingly prescient wagers, including
        an $850,000 bet shortly before US strikes against Iran and around $950 million
        in oil futures hours before Trump announced a ceasefire in April. AP reported
        that the ceasefire announcement alone generated more than 413 million predictions
        and over $100 million in wagers across prediction markets within days.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d8e58085f54068125dad49.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/637925-iran-betting-insider-warning-us/\">White
        House warns staff over Iran war bets \u2013 media</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>On March 24, the White House
        reportedly issued a warning to staff against using insider information on
        the Iran war to trade on financial markets. This came a day after US President
        Donald Trump ordered a five-day pause in planned strikes on Iranian power
        plants and energy infrastructure.</p>\n<p>News outlets, citing market data,
        later reported that around 15 minutes before the abrupt announcement of a
        policy shift, futures markets saw a surge in trading activity. More than $760
        million worth of oil futures contracts reportedly changed hands in under two
        minutes. Several reports also said three Polymarket accounts collectively
        earned over $600,000 after correctly anticipating the timing of the ceasefire
        with Iran.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fda2e785f5404049177a7c.png\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 07 May 2026 15:53:01
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Norway\u2019s fish farm waste \u2018triple the country\u2019s
        sewage\u2019 \u2013 report</title>\n        <link><![CDATA[https://www.rt.com/business/639491-norway-fish-farms-pollution-report/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639491-norway-fish-farms-pollution-report/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fa15d120302739f82e3006.jpg\"
        /> Salmon farms in Norway release three times more waste into fjords than
        the country\u2019s entire population produces, new research has found <br/><a
        href=\"https://www.rt.com/business/639491-norway-fish-farms-pollution-report/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Nitrogen and phosphorus discharged
        into fjords match the raw discharge of millions of people, according to a
        new study</strong></p>\n            \n                        \n            <p>Fish
        farms in Norway release three times more waste into fjords than the country&rsquo;s
        entire population produces, new research has suggested.</p>\n<p>The findings
        come from the Sunstone Institute, an Oslo-based research group, which calculated
        the volume of fish excrement and uneaten feed discharged directly into coastal
        waters by nearly a thousand fjord-based farms in Norway.</p>\n<p>Last year,
        <em>&ldquo;the nitrogen and phosphorus in this waste were equivalent to the
        raw sewage from 17.2 million and 20 million people, respectively,&rdquo;</em>
        the report said. <em>&ldquo;Triple the toilet waste from an entire country,&rdquo;</em>
        it added. Norway&rsquo;s population is about 5.5 million.</p>\n<p>The discharge
        has significant environmental consequences, the report argues. Excess nitrogen
        and phosphorus trigger algal blooms which, as they decompose, deplete oxygen
        and create <em>&ldquo;dead zones&rdquo;</em> where marine life struggles to
        survive. Uneaten feed drifting from cages also attracts wild fish, exposing
        them to elevated nutrient levels and degraded conditions.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2025.03/thumbnail/67d4421385f54048ac5e06df.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/614219-plastic-pollution-alzheimers-seabirds-study/\">Discarded
        plastic causes Alzheimer\u2019s-like damage in seabirds \u2013 study</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The findings
        stand in contrast to Norway&rsquo;s reputation as a global environmental leader.
        In the 2024 Environmental Performance Index (EPI), compiled by Yale and Columbia
        universities, the country ranked 7th out of 180 nations and placed 2nd globally
        for environmental health.</p>\n<p>Norwegian authorities have not yet commented
        on the findings. Industry representatives have pushed back, with the Norwegian
        Seafood Federation telling the Guardian that current production remains <em>&ldquo;well
        within nature&rsquo;s carrying capacity&rdquo;</em> and that there is no documented
        proof that operations are damaging fjords.</p>\n<p>The sector is a major pillar
        of Norway&rsquo;s economy. With the second-longest coastline in the world,
        the country is the largest producer of farmed salmon, accounting for more
        than half of global output. It supplies markets across Europe, the US and
        Asia, exporting 106,000 tonnes worth over $1.1 billion in March alone, according
        to the Norwegian Seafood Council.</p>\n\n            ]]> <![CDATA[\n    <p>\n
        \       <a target=\"_blank\" href=\"https://www.rt.com/business/629937-eu-imports-russian-fish/\">\n
        \           <span>READ MORE: </span>Russian seafood still sold in EU despite
        fishy sanctions \u2013 Euractiv\n        </a>\n    </p>\n]]>\n<![CDATA[\n
        \   \n\n<p>The industry is dominated by a handful of large Norwegian-based
        companies, including Mowi, the world&rsquo;s largest salmon farmer, Ler&oslash;y
        Seafood Group, and SalMar. Profits are concentrated among these major players.
        Mowi&rsquo;s largest shareholder, shipping magnate John Fredriksen, ranks
        118th on Forbes&rsquo; 2026 global billionaires list with a net worth of $21.2
        billion.</p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69fa15d120302739f82e3006.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 05 May 2026 18:31:17
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU \u2018not competitive\u2019 \u2013 Belgian central bank
        chief</title>\n        <link><![CDATA[https://www.rt.com/business/639423-eu-energy-crisis-competitiveness/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639423-eu-energy-crisis-competitiveness/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f8eb4a2030274d410445a8.jpg\"
        /> Soaring energy costs are undermining the EU\u2019s competitiveness, Belgian
        central bank chief Pierre Wunsch has told the Financial Times <br/><a href=\"https://www.rt.com/business/639423-eu-energy-crisis-competitiveness/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Soaring energy costs are squeezing
        the bloc\u2019s industry and pushing it further behind global rivals, Pierre
        Wunsch has warned</strong></p>\n            \n                        \n            <p>The
        EU is <em>&ldquo;not competitive&rdquo;</em> against global rivals as high
        energy costs weigh on the bloc&rsquo;s industry, Belgian&rsquo;s central bank
        governor, Pierre Wunsch, has warned.&nbsp;</p>\n<p>In an interview with the
        Financial Times published on Monday, Wunsch said the EU&rsquo;s energy\u2011intensive
        sectors are under mounting pressure, as the bloc struggles to keep production
        going amid persistently higher power costs following the Covid pandemic, the
        Ukraine conflict, and the US-Israeli war on Iran.&nbsp;</p>\n<p>According
        to Wunsch, the EU is failing to adjust to a new geopolitical reality, citing
        US protectionist policies and Chinese subsidies, warning the bloc is losing
        its ability to shape global standards. &nbsp;</p>\n<p>The EU is <em>&ldquo;just
        not competitive, that&rsquo;s it,&rdquo;</em> he added.&nbsp;</p>\n<p>The
        fallout from the repeated crises has already forced the bloc to scale down
        its green energy policies over concerns about weak growth, Wunsch said.&nbsp;</p>\n<p>EU
        Energy Commissioner Dan Jorgensen has warned that the bloc is facing prolonged
        uncertainty as its energy crisis deepens, with member states now paying significantly
        more for fossil fuel imports. &nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e906f385f54073391b2a08.jpg\"
        alt=\"EU Energy Commissioner Dan Jorgensen.\" />\n            <figcaption><a
        href=\"https://www.rt.com/business/638932-eu-energy-crisis-iran-war/\">EU
        energy bill spikes amid Iran war supply shock \u2013 commissioner</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The EU has
        been grappling with the fallout from its decision to cut energy ties with
        Russia following the escalation of the Ukraine conflict, alongside the costs
        of its green transition policies.&nbsp;</p>\n<p>The US-Israeli war on Iran
        has added pressure to global energy markets, driving oil prices higher and
        increasing fuel costs for consumers worldwide. The EU, which imports around
        75% of its jet fuel from the Middle East, has been hard hit by the disruption
        of the Strait of Hormuz, a key route that handles around a fifth of global
        oil and liquefied natural gas. &nbsp;</p>\n<p>The latest developments have
        prompted some EU politicians to step up calls to reconsider sanctions on Russia.
        &nbsp;</p>\n<p>In January, the European Commission restated its goal of phasing
        out Russian fossil fuels by 2027. However, EU countries have reportedly increased
        imports of Russian LNG in the first quarter of this year. &nbsp;</p>\n\n            ]]>
        <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/business/635302-dmitirev-eu-begging-russia-gas/\">\n
        \           <span>READ MORE: </span>EU will \u2018inevitably beg for more
        Russian gas\u2019 \u2013 Putin envoy\n        </a>\n    </p>\n]]>\n<![CDATA[\n
        \   \n\n<p>Kremlin envoy Kirill Dmitriev has warned the EU risks deindustrialization
        under <em>&ldquo;Russophobic politicians&rdquo;</em> and that Western governments
        will eventually be forced to seek renewed access to Russian energy.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f8eb4a2030274d410445a8.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 04 May 2026 19:34:42
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Putin envoy names \u2018first victim\u2019 of historic energy
        crisis</title>\n        <link><![CDATA[https://www.rt.com/business/639388-spirit-victim-energy-crisis-dmitriev/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639388-spirit-victim-energy-crisis-dmitriev/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f89c0020302717d83c4a8b.jpg\"
        /> US low-cost airline Spirit announced immediate shutdown after failed Washington
        bailout bid and oil price spikes squeezing finances <br/><a href=\"https://www.rt.com/business/639388-spirit-victim-energy-crisis-dmitriev/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Spirit Airlines announced it was shutting
        down immediately following a failed Washington bailout bid and a surge in
        oil prices</strong></p>\n            \n                        \n            <p>Spirit
        Airlines, a US-based low-cost carrier, has succumbed to the unprecedented
        energy crisis, Kremlin envoy Kirill Dmitriev has said, commenting on the company&rsquo;s
        recent shutdown.</p>\n<p>The airline announced on Saturday that it has begun
        an orderly suspension of operations, effective immediately, citing the recent
        surge in fuel costs and other pressures that have significantly impacted its
        financial outlook.</p>\n<p><em>&ldquo;Spirit Airlines collapsed &ndash; the
        first airline victim of the historic energy crisis, as jet fuel prices jumped
        from $2.5 to $4 per gallon. 17,000 laid off,&rdquo;</em> Dmitriev, who serves
        as Russian President Vladimir Putin&rsquo;s special envoy for investment and
        economic cooperation, said later that day in a post on X.</p>\n<p>Spirit&rsquo;s
        bondholders reportedly turned down a last-minute rescue proposal from the
        Trump administration that could have provided up to $500 million to sustain
        the struggling airline. The plan would have placed the government ahead of
        other creditors and granted it a stake of up to 90% in the company.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e8d37b85f5400e925c9b61.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/news/638934-fuel-crisis-summer-holidays-europe/\">Fight
        or flight: How the global jet fuel crisis could ground you</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The shutdown
        is set to leave around 17,000 people without work, including about 14,000
        Spirit employees as well as thousands of contractors and others whose jobs
        rely on the airline. The elimination of the flights is also expected to result
        in higher fares across the industry.</p>\n<p>The sudden and sustained rise
        in fuel prices in recent weeks ultimately left the company with no alternative
        but to pursue an orderly wind-down despite a restructuring plan agreed upon
        with bondholders in March, Spirit&rsquo;s President and CEO, Dave Davis, said
        in a statement.</p>\n<p>A mounting jet fuel crunch is hitting airlines worldwide
        as disruption in the Strait of Hormuz &ndash; a key energy chokepoint handling
        nearly a fifth of the global oil supply &ndash; amid the US-Israeli war on
        Iran has sharply reduced tanker traffic, delaying shipments and raising fears
        of the worst energy crisis in history, the International Energy Agency has
        warned.</p>\n\n            ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\"
        href=\"https://www.rt.com/business/638971-middle-east-war-consumers/\">\n
        \           <span>READ MORE: </span>Middle East war fallout hits consumers
        worldwide\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>US President
        Donald Trump has repeatedly downplayed the impact of the Strait of Hormuz
        energy shock, arguing that the American economy would remain strong, and that
        energy disruptions would be temporary rather than economically damaging.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f89c0020302717d83c4a8b.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Sun, 03 May 2026 14:58:48
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>OPEC+ makes first output decision after UAE exit \u2013 Reuters</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639387-opec-output-increase-uae-exit/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639387-opec-output-increase-uae-exit/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f722d785f5405f770e33fa.jpg\"
        /> Seven members of OPEC+ have reportedly agreed to add 188,000 barrels a
        day in June following the UAE exit <br/><a href=\"https://www.rt.com/business/639387-opec-output-increase-uae-exit/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Seven major exporters of crude reportedly
        agreed to add 188,000 barrels a day in June</strong></p>\n            \n                        \n
        \           <p>Seven OPEC+ countries have agreed to raise oil output targets
        by about 188,000 barrels per day (bpd) in June, Reuters reported on Saturday,
        citing two sources familiar with the group&rsquo;s plans. The report comes
        as the US-Israel war with Iran continues to disrupt Gulf oil supplies and
        follows days after the United Arab Emirates (UAE) quit the cartel.</p>\n<p>The
        UAE, one of the world&rsquo;s largest oil exporters, withdrew from OPEC and
        the wider OPEC+ on May 1. According to Abu Dhabi, the decision is driven by
        national interests and forms part of a long-term strategy &ndash; a <em>&ldquo;sovereign,
        strategic choice&rdquo;</em> aimed at giving it greater flexibility over oil
        output. The country&rsquo;s share in the organization stood at about 13.5%.</p>\n<p>OPEC
        currently includes Saudi Arabia, Iraq, Iran, Kuwait, Algeria, Libya, Nigeria,
        Gabon, Equatorial Guinea, Republic of the Congo, and Venezuela. It coordinates
        oil production policies in an effort to stabilize supply in global energy
        markets. The wider OPEC+ format also includes a group of allied oil-producing
        countries, most notably Russia, as well as Kazakhstan, Azerbaijan, Mexico,
        Malaysia, Oman, Bahrain, Brunei, Sudan, South Sudan and Brazil.</p>\n<p>One
        source told Reuters that the decision to raise output signals that OPEC+ continues
        to take a business-as-usual approach despite Abu Dhabi&rsquo;s decision, adding
        that the move will be similar to last month&rsquo;s hike of 206,000 bpd minus
        the share of the UAE.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f367e785f54048537c4db4.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/639306-uae-opec-power-play/\">The
        UAE\u2019s OPEC gambit: Clever power play or road to chaos?</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The rise
        in output is largely symbolic at this stage, Reuters noted, as shipping through
        the Strait of Hormuz remains severely disrupted by the Iran conflict.</p>\n<p>The
        US-Israel bombing campaign on the Islamic Republic and the subsequent closure
        of the waterway that commonly handles about one-fifth of global energy trade,
        have sharply reduced exports from key OPEC+ members &ndash; Saudi Arabia,
        Iraq, Kuwait and the UAE &ndash; which were previously the only countries
        in the group capable of increasing oil output.</p>\n<p>In March, total oil
        production across all members averaged 35.06 million bpd, down by 7.7 million
        bpd from February levels, according to OPEC.</p>\n<p>Commenting on the Emirates&rsquo;
        exit, Kremlin spokesman Dmitry Peskov said that Moscow respects the country&rsquo;s
        <em>&ldquo;sovereign&rdquo;</em> decision. Peskov stressed that Russia has
        no intention of leaving the group and dismissed suggestions that the UAE&rsquo;s
        move could spell the end of OPEC+.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f722d785f5405f770e33fa.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Sun, 03 May 2026 10:50:10
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Kuwait exports zero barrels of oil for first time in 35 years
        \u2013 monitor</title>\n        <link><![CDATA[https://www.rt.com/news/639378-kuwait-exports-zero-barrels-oil/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/news/639378-kuwait-exports-zero-barrels-oil/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f6dbe9203027378e03fdd6.jpg\"
        /> Kuwait has exported no crude for the first time since 1991, according to
        Tanker Tracker. <br/><a href=\"https://www.rt.com/news/639378-kuwait-exports-zero-barrels-oil/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The halt is due to a blockade of the
        Strait of Hormuz, the country\u2019s only export route, with crude accounting
        for roughly 50% of GDP</strong></p>\n            \n                        \n
        \           <p>Kuwait exported zero barrels of crude oil last month, according
        to data from a shipping monitor, marking the first such halt since the 1991
        Gulf War.&nbsp;&nbsp;</p>\n<p>A major US ally hosting around 13,500 American
        troops and serving as a key regional logistics hub, Kuwait previously produced
        about 2.7 million barrels per day (bpd) and exported roughly 1.85 million
        bpd, with most shipments going to Asian markets including China, India, and
        South Korea.</p>\n<p>On April 17, Kuwait Petroleum Corporation declared force
        majeure, suspending exports after traffic through the Strait of Hormuz was
        effectively halted amid the ongoing US-Israeli war with Iran. Oil accounts
        for roughly 50% of Kuwait&rsquo;s total GDP. Petroleum exports generate about
        90% of the government&rsquo;s budget.&nbsp;&nbsp;</p>\n<p>As of early May
        2026, Kuwait&rsquo;s oil output has fallen to around 1.2 million barrels per
        day, CNBC reported.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f5c83e203027595c661f48.jpg\"
        alt=\"Slovak Prime Minister Robert Fico\" />\n            <figcaption><a href=\"https://www.rt.com/business/639356-oil-prices-trump-sleep-mood/\">Oil
        prices now determined by Trump\u2019s mood \u2013 Fico</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Data from
        Tanker Trackers showed that while Kuwait continued producing crude, it did
        not export any in April, the first such halt since the 1990-1991 Gulf War.
        During that conflict, Iraqi forces under Saddam Hussein invaded Kuwait, prompting
        a US-led coalition to launch a military campaign that forced their withdrawal
        in early 1991.</p>\n<p>Oil prices have surged since the US and Israel attacked
        Iran in late February, prompting the closure of the Strait of Hormuz, a critical
        chokepoint handling about one-fifth of global oil and LNG flows. While Iran
        has kept the vital waterway closed to <em>&ldquo;hostile ships,&rdquo;</em>
        the US Navy has maintained a blockade of Iranian ports in the Persian Gulf.</p>\n<p>With
        negotiations ongoing and no clear solution, crude has climbed above $120 per
        barrel in recent days, reaching its highest levels since 2022.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f6dbe9203027378e03fdd6.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Sun, 03 May 2026 09:32:13
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Oil prices now determined by Trump\u2019s mood \u2013 Fico</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639356-oil-prices-trump-sleep-mood/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639356-oil-prices-trump-sleep-mood/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f5c83e203027595c661f48.jpg\"
        /> Slovak PM Robert Fico quipped that oil prices depend on Trump\u2019s mood
        after reports the US president would be briefed on new Iran options <br/><a
        href=\"https://www.rt.com/business/639356-oil-prices-trump-sleep-mood/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Crude prices have hit their highest
        levels since 2022 following reports that the US president would be briefed
        on new Iran options</strong></p>\n            \n                        \n
        \           <p>Global crude oil prices rise and fall depending on whether
        US President Donald Trump got enough sleep, Slovak Prime Minister Robert Fico
        has said in a sarcastic remark. His comment came after oil rose to a four-year
        high amid reports that the US military would brief Trump on options related
        to the Iran conflict.</p>\n<p>On Friday, Brent jumped nearly 7% to over $126
        per barrel before easing to $108 later in the session. The rally followed
        an Axios report that US Central Command had prepared options for <em>&ldquo;short
        and powerful&rdquo;</em> strikes on Iran aimed at breaking stalled negotiations.</p>\n<p><em>&ldquo;Everything
        is under pressure, including oil prices, depending on how President Trump
        wakes up,&rdquo;</em> Fico said on Friday speaking with journalists in Bratislava.&nbsp;
        <em>&ldquo;If he wakes up in a good mood, oil goes down, if he wakes up in
        a bad mood and makes some statement, oil automatically goes up.&rdquo;</em></p>\n<p>Prices
        saw extreme volatility and a sharp surge after the US and Israel launched
        a bombing campaign on Iran on February 28. Iran responded by barring <em>&ldquo;enemy
        ships&rdquo;</em> from the Strait of Hormuz, which handles about one-fifth
        of global energy trade. In addition, Tehran conducted retaliatory strikes
        on US military bases in several countries across the Middle East.</p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/news/639287-oil-price-iran-us/\">\n
        \           <span>READ MORE: </span>Oil spikes to highest price since 2022\n
        \       </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Gas prices have also surged
        amid concerns over disruptions to global energy supply chains, with volatility
        spreading across European and Asian markets. Broader financial markets saw
        sharp swings due to escalation risks. Analysts have noted that global markets
        remain highly sensitive to political signals and policy decisions by the Trump
        administration.</p>\n<p>Fico also recalled US interventions in Iraq and Venezuela
        and expressed concern about possible aggression toward Cuba, as well as Trump&rsquo;s
        unresolved claims on Greenland, where Washington could <em>&ldquo;continue
        to assert its interests.&rdquo;</em></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.05/thumbnail/69f5c83e203027595c661f48.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Sat, 02 May 2026 12:13:26
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>JPMorgan exec accused of making subordinate her \u2018office
        sex slave\u2019 \u2013 The Sun</title>\n        <link><![CDATA[https://www.rt.com/business/639313-jpmorgan-office-sex-slave/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639313-jpmorgan-office-sex-slave/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f3842f85f54055ce5f5bd7.jpg\"
        /> A senior female JPMorgan executive has reportedly been sued for sexual
        abuse and coercion against a male subordinate <br/><a href=\"https://www.rt.com/business/639313-jpmorgan-office-sex-slave/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>A lawsuit reportedly alleges a senior
        female banker coerced a male coworker using threats, drugs, and career leverage</strong></p>\n
        \           \n                        \n            <p>A senior female JPMorgan
        Chase executive is being sued for allegedly turning a married male banker
        into her <em>&ldquo;office sex slave&rdquo;</em> over the course of several
        months, threatening his career to force compliance, The Sun has reported.</p>\n<p>According
        to <a href=\"https://iapps.courts.state.ny.us/nyscef/DocumentList?docketId=zK1mcFD/pn6UCRb1Vsp2AA==&amp;display=all\"
        target=\"_blank\" rel=\"noopener noreferrer\">legal filings</a> cited by the
        outlet, Lorna Hajdini, 37, drugged, sexually assaulted and coerced a junior
        colleague into <em>&ldquo;non-consensual and humiliating sex acts.&rdquo;</em></p>\n<p>The
        accuser, who has opted to go by the name John Doe, claims the abuse began
        shortly after Hajdini joined his team in April 2024 and escalated rapidly
        from unwanted touching to explicit coercion.</p>\n<p><em>&rdquo;If you don&rsquo;t
        f**k me soon, I&rsquo;m going to ruin you&hellip; I f**king own you,&rdquo;</em>
        Hajdini reportedly threatened.</p>\n<p>The executive also reportedly admitted
        to drugging the accuser with a <em>&ldquo;date rape drug&rdquo;</em> and gave
        him substances affecting sexual performance, while leveraging her senior position
        to control his bonuses, promotions and future at the bank.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/696df4eb85f5407493636359.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/631136-trump-sue-jp-morgan/\">Trump
        to sue JPMorgan over \u2018debanking\u2019\_ \_\_</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>JPMorgan Chase has rejected
        the claims, saying an investigation found no evidence to support the allegations,
        The Sun wrote.</p>\n<p>Court records on the New York State Courts Electronic
        Filing system (NYSCEF) show that a <a href=\"https://iapps.courts.state.ny.us/nyscef/DocumentList?docketId=zK1mcFD/pn6UCRb1Vsp2AA==&amp;display=all\"
        target=\"_blank\" rel=\"noopener noreferrer\">summons and complaint</a> were
        submitted on Monday in New York County Supreme Court, listing <em>&ldquo;John
        Doe&rdquo;</em> as the plaintiff and JPMorgan Chase and Lorna Hajdini as defendants.
        However, the publicly available entry does not include details on the substance
        of the allegations.</p>\n<p>The claims come amid broader legal and reputational
        challenges facing JPMorgan, including the fallout from its long-running ties
        to convicted sex offender Jeffrey Epstein.</p>\n<p>Lawsuits alleged the bank
        <em>&ldquo;turned a blind eye&rdquo;</em> to red flags such as large cash
        withdrawals and kept Epstein as a client for years after his 2008 conviction,
        as well as providing the <em>&ldquo;financial infrastructure&rdquo;</em> for
        his sex trafficking operation. JPMorgan paid $290 million and $75 million
        in 2023 to settle the claims without admitting wrongdoing.</p>\n\n            ]]>
        <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/news/637909-melania-trump-epstein-statement/\">\n
        \           <span>READ MORE: </span>Melania Trump makes surprise Epstein statement
        (VIDEO)\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>In January, US
        President Donald Trump filed a $5 billion lawsuit, accusing JPMorgan of <em>&ldquo;debanking&rdquo;</em>
        him and his businesses for political reasons, claims the financial institution
        has rejected and is seeking to dismiss in court.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f3842f85f54055ce5f5bd7.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 30 Apr 2026 17:08:08
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Middle East war to drive 24% surge in energy costs \u2013 World
        Bank</title>\n        <link><![CDATA[https://www.rt.com/business/639255-iran-war-energy-supply-shock/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639255-iran-war-energy-supply-shock/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f241992030274aa65f7e1c.jpg\"
        /> The Middle East war has triggered a record energy supply shock, with surging
        commodity prices fueling inflation, the World Bank warns <br/><a href=\"https://www.rt.com/business/639255-iran-war-energy-supply-shock/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The world is facing the biggest global
        energy supply shock on record, which will drive inflation and dampen economic
        growth globally</strong></p>\n            \n                        \n            <p>The
        Middle East war has triggered the biggest global energy supply shock on record
        and will drive a sharp rise in commodity prices, pushing inflation higher
        and slowing economic growth worldwide, the World Bank has warned.&nbsp;</p>\n<p>Attacks
        on energy infrastructure and shipping in the critical Strait of Hormuz have
        cut global supply by about 10 million barrels per day in the early stage of
        the US\u2011Israeli war on Iran, according to the bank&rsquo;s Commodity Markets
        Outlook released on Wednesday.&nbsp;</p>\n<p>Energy prices are set to jump
        by 24% this year to their highest level since 2022, while overall commodity
        costs will rise by 16%, the World Bank said, adding that the war has triggered
        <em>&ldquo;the biggest energy supply shock in history.&rdquo;</em>&nbsp;</p>\n<p>Prices
        could climb further if the conflict intensifies, with oil potentially averaging
        $115 per barrel this year under the bank&rsquo;s more severe disruption scenario.
        &nbsp;</p>\n<p>Natural gas prices are also forecast to rise, with the EU particularly
        exposed to supply disruptions and higher import costs. Regional natural gas
        futures have surged in recent weeks.&nbsp;</p>\n<p>The shock will ripple far
        beyond oil and gas, according to the report. Fertilizer prices are projected
        to climb by 31% this year, driven by a 60% surge in urea, raising concerns
        over agricultural output and food affordability. Prices for metals such as
        aluminum, copper and tin are also expected to hit record highs.&nbsp;</p>\n<p><em>&ldquo;The
        poorest people, who spend the highest share of their income on food and fuels,
        will be hit the hardest, as will developing economies already struggling under
        heavy debt burdens,&rdquo;</em> said World Bank Chief Economist Indermit Gill.&nbsp;</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f215d82030274b9c33ac9a.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/639259-iran-war-60-days/\">60
        days later: The US-Israeli war on Iran so far</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Brent crude briefly topped $117
        per barrel on Wednesday, its highest level since March, amid supply concerns
        and after the UAE announced plans to exit OPEC, adding further uncertainty
        to global oil markets.&nbsp;</p>\n<p><em>&ldquo;The current situation is likely
        to keep inflation elevated globally, especially as disruptions in oil and
        commodity markets persist,&rdquo;</em> Iranian economist Peyman Molavi told
        RT, warning that uncertainty around Hormuz remains a key risk for further
        price increases.&nbsp;</p>\n<p>He added that the UAE&rsquo;s decision could
        increase market volatility by giving producers more freedom over pricing and
        output.&nbsp;</p>\n<p>Talks between Washington and Tehran remain stalled,
        with US President Donald Trump reportedly rejecting an Iranian proposal to
        reopen the Strait of Hormuz and lift the naval blockade while postponing nuclear
        negotiations to a later stage.</p>\n<p></p>\n\n            <iframe id=\"odysee-iframe\"
        style=\"width:100%; aspect-ratio:16 / 9;\" src=\"https://odysee.com/%24/embed/%40RT%3Afd%2FMolavi-April-29-2026%3A9?r=CHepXXmPsAJMDMCXMrMFMSCZ1aDr4tUd\"
        allowfullscreen></iframe>\n    \n\n<p></p>\n<p></p>\n<p></p>\n<p></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f241992030274aa65f7e1c.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 29 Apr 2026 17:40:55
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US squares up to China over Panama Canal</title>\n        <link><![CDATA[https://www.rt.com/business/639260-us-led-coalition-panama-china/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639260-us-led-coalition-panama-china/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f20b352030273c60111b23.jpg\"
        /> The US and five countries have said Chinese ownership of ports in the Panama
        Canal is a threat to the Western Hemisphere <br/><a href=\"https://www.rt.com/business/639260-us-led-coalition-panama-china/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Beijing has accused Washington of leading
        a smear campaign over its ownership of two ports</strong></p>\n            \n
        \                       \n            <p>The US has announced a six-nation
        coalition aimed at pressuring China to relinquish its interests in two ports
        in the Panama Canal, accusing Beijing of infringing on Panama&rsquo;s sovereignty
        and politicizing global trade. China has called the claims <em>&ldquo;baseless.&rdquo;</em></p>\n<p>The
        development is part of a pattern of US efforts to push China out of Latin
        America. The US National Security Strategy calls for non-Western <em>&ldquo;competitors&rdquo;</em>
        to be prevented from owning or controlling key assets in the Western Hemisphere.</p>\n<p>Last
        year, US President Donald Trump claimed that China is <em>&ldquo;operating
        the Panama Canal&rdquo;</em> and threatened to <em>&ldquo;take it back.&rdquo;</em></p>\n<p>The
        US State Department issued a joint statement on Tuesday with Bolivia, Costa
        Rica, Guyana, Paraguay, and Trinidad and Tobago, saying they support Panama
        against what they describe as external pressure from China.</p>\n<p><em>&rdquo;Any
        attempts to undermine Panama&rsquo;s sovereignty are a threat to us all,&rdquo;</em>
        the statement read, adding that Panama <em>&ldquo;must remain free from any
        undue external pressure,&rdquo;</em> and that freedom in the region is <em>&ldquo;non-negotiable.&rdquo;</em></p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/697cb5f885f540509f28cabf.jpg\"
        alt=\"US President Donald Trump.\" />\n            <figcaption><a href=\"https://www.rt.com/news/631769-dmitry-trenin-trumps-nds-2026/\">Dmitry
        Trenin: America First goes global</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>China rejected the accusations, with the Foreign Ministry hitting
        back on Wednesday against what it called a smear campaign.</p>\n<p><em>&rdquo;It
        is the United States that is politicizing and over-securitizing the port issue...
        hypocritically posturing and spreading rumors and smears everywhere,&rdquo;</em>
        spokesman Lin Jian said, dismissing the claims as <em>&ldquo;baseless and
        a complete distortion of facts.&rdquo;</em></p>\n<p>Lin urged the countries
        involved not to <em>&ldquo;be deceived or used by forces with ulterior motives&rdquo;</em>
        regarding the port inspections, which he said were conducted lawfully.</p>\n<p>The
        US-led campaign follows a ruling in January by Panama&rsquo;s Supreme Court
        that annulled contracts held by a subsidiary of Hong Kong-based CK Hutchison
        Holdings for the Balboa and Cristobal, two key ports at the canal&rsquo;s
        entrances &ndash; a move that the US has backed.</p>\n<p>The Chinese company,
        which managed the terminals for nearly three decades, has contested the ruling,
        alleging unlawful expropriation, and has launched international arbitration,
        seeking over $2 billion in reparations.</p>\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f20b352030273c60111b23.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 29 Apr 2026 15:47:35
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Ukraine told to hike taxes to unlock Western aid \u2013 media</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639242-ukraine-taxes-imf-eu/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639242-ukraine-taxes-imf-eu/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f1d6ee85f5407a5e3de3ef.jpg\"
        /> Ukraine faces pressure from the EU and IMF to overhaul its tax system as
        both reportedly tie future aid to fiscal reforms <br/><a href=\"https://www.rt.com/business/639242-ukraine-taxes-imf-eu/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Both the EU and the IMF are reportedly
        making further funding conditional on specific fiscal reforms by Kiev</strong></p>\n
        \           \n                        \n            <p></p>\n<p>Ukraine&rsquo;s
        two main financial backers, the EU and IMF, are tying further aid to tax hikes
        and fiscal reforms, according to media reports.</p>\n<p>Kiev, facing mounting
        battlefield pressure, is increasingly pushing for faster aid disbursements
        as it relies heavily on foreign funding to plug a widening budget gap and
        sustain its war effort against Russia. However, most multi-year support comes
        with strict conditions. The EU is now considering linking part of its &euro;90
        billion ($105 billion) loan package to business tax reforms, Bloomberg reported
        on Wednesday, citing sources.</p>\n<p>The bloc formally <a href=\"https://www.rt.com/news/638976-eu-approves-ukraine-loan/\">approved</a>&nbsp;the
        long-contested, interest-free loan last week after Hungary lifted its veto
        following the election victory of pro-EU politician Peter <a href=\"https://www.rt.com/news/638921-eu-envoys-approve-90-billion-ukraine/\">Magyar</a>.
        Brussels has pledged to begin disbursements in the second quarter of 2026.</p>\n<p>However,
        according to the report, around &euro;8.4 billion in macro-financial assistance,
        roughly 10% of the total due this year, could depend on reforming Ukraine&rsquo;s
        preferential tax regime.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ed132f85f5401c411a3212.jpg\"
        alt=\"FILE PHPTO: European Commission President Ursula von der Leyen delivering
        an address.\" />\n            <figcaption><a href=\"https://www.rt.com/news/639065-eu-ukraine-money-costa/\">EU\u2019s
        \u20AC90 billion \u2018may not be enough\u2019 for Ukraine \u2013 WSJ</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Under the
        current Simplified Taxation System, some businesses pay a flat 5% tax on revenue
        instead of profit &ndash; a system donors say drains state revenues and fuels
        the shadow economy. Brussels is now considering requiring firms under the
        scheme to pay a 20% value-added tax (VAT) once turnover exceeds 4 million
        hryvnia (about $91,000).</p>\n<p>A European Commission spokesperson told Bloomberg
        the bloc is <em>&ldquo;working tirelessly&rdquo;</em> to finalize the memorandum
        outlining the funding conditions, but offered no further details or timeline.</p>\n<p>The
        <a href=\"https://www.rt.com/business/631207-imf-ukraine-electricity-heating-subsidies/\">IMF</a>,
        meanwhile, is pushing Kiev to widen its tax base under its current $8.1 billion
        funding program, Reuters reported. Alongside backing the EU&rsquo;s push on
        business taxes, the fund is demanding Ukraine introduce VAT on low-value imported
        parcels ahead of a key review of aid in June. Goods worth under &euro;150
        are currently exempt, but removing the threshold could raise around 10 billion
        hryvnia ($227 million) annually, according to the Finance Ministry.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69eb7d7885f540480f2e47fd.jpg\"
        alt=\"FILE PHOTO: Ukraine\u2019s Vladimir Zelensky talking to Western media.\"
        />\n            <figcaption><a href=\"https://www.rt.com/russia/639001-zelensky-corruption-ukraine-eu/\">Zelensky
        likely \u2018directly involved in corruption\u2019 \u2013 EU-funded anti-graft
        NGO</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>A draft law has been submitted to parliament but has yet to be
        debated due to lack of backing, media reports say. Prime Minister Yulia Sviridenko
        earlier warned the measures are <em>&ldquo;not constructive&rdquo;</em> and
        <em>&ldquo;highly sensitive,&rdquo;</em> pointing to growing domestic resistance
        to further tax hikes.</p>\n<p>Analysts warn that failure to pass the required
        laws could delay the IMF&rsquo;s June review, jeopardizing not only upcoming
        tranches from the fund but also related EU support, as both closely coordinate
        their reform demands for Kiev.</p>\n\n            ]]> <![CDATA[\n    <p>\n
        \       <a target=\"_blank\" href=\"https://www.rt.com/russia/636304-ukraine-financial-catastrophy/\">\n
        \           <span>READ MORE: </span>Ukraine \u2018on the verge of a financial
        catastrophe\u2019 \u2013 senior MP\n        </a>\n    </p>\n]]>\n<![CDATA[\n
        \   \n\n<p>Russia has repeatedly warned that continued Western funding will
        merely prolong the conflict while shifting the burden onto European taxpayers.
        Russian Security Council Secretary Sergey Shoigu said earlier this month the
        EU package would further strain <em>&ldquo;ordinary Europeans,&rdquo;</em>
        calling the move <em>&ldquo;another step&rdquo;</em> toward a loss of sovereignty
        for European states.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f1d6ee85f5407a5e3de3ef.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 29 Apr 2026 10:04:52
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>OPEC loses key member: Will the oil bloc survive?</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639228-uae-exits-opec-oil-market/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639228-uae-exits-opec-oil-market/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f1be2385f54048537c4d04.jpg\"
        /> The UAE has announced its exit from OPEC and OPEC+, sparking fears of further
        turmoil in oil markets amid the Middle East conflict <br/><a href=\"https://www.rt.com/business/639228-uae-exits-opec-oil-market/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The UAE says its decision is driven
        by national interests, as Middle East tensions disrupt energy markets</strong></p>\n
        \           \n                        \n            <p>The United Arab Emirates,
        one of the world&rsquo;s biggest oil exporters, has announced it will leave
        the Organization of the Petroleum Exporting Countries (OPEC) and the wider
        OPEC+ on May 1. The move is seen by analysts as a serious setback for the
        group and its informal leader, Saudi Arabia.&nbsp;</p>\n<p>The decision comes
        amid a crisis in the Middle East triggered by the US-Israeli war against Iran,
        which has disrupted oil flows from the Persian Gulf.&nbsp;Shipments have been
        choked by the blockade of the Strait of Hormuz &ndash; a narrow waterway off
        the UAE&rsquo;s coast that normally carries around a fifth of the world&rsquo;s
        oil.</p>\n<p></p>\n<p><strong>Why did it happen?&nbsp;</strong></p>\n<p>Abu
        Dhabi says the move is driven by national interests and is part of a long-term
        strategy and a <em>&ldquo;sovereign, strategic choice&rdquo;</em> aimed at
        giving it more flexibility over oil output. Emirati officials have repeatedly
        indicated that the country no longer wants to be bound by production quotas,
        which have limited how much it can actually pump despite heavy investment
        in expanding capacity. A government source reportedly told AFP that the Gulf
        nation is seeking greater freedom to raise output once current supply disruptions
        ease.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f0b5d520302728f07cd719.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/639211-uae-withdrawal-opec-energy/\">Key
        OPEC member to leave bloc</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>The UAE, which joined OPEC in 1967, also expressed appreciation
        for cooperation within the organization and with OPEC+ partners, a broader
        group formed in 2016 that includes Russia, Kazakhstan, Oman, Mexico, and other
        non-OPEC countries.</p>\n<p></p>\n<p><strong>Who has left and who remains
        in OPEC?&nbsp;</strong></p>\n<p>Over the past decade, several members have
        left OPEC &ndash; including Angola, Ecuador, Indonesia, and Qatar &ndash;
        citing reasons ranging from production quotas and membership costs to broader
        political tensions.</p>\n<p>The group currently has 12 members, while the
        broader OPEC+ adds ten more producers, bringing the total to 22 countries,
        including major non-OPEC players such as Russia, Kazakhstan, Oman, and Mexico.</p>\n<p>Some
        analysts say the UAE&rsquo;s move could encourage others seeking to raise
        output to reconsider their membership. Robin Mills, the head of Dubai-based
        consultancy Qamar Energy, told CNN that <em>&ldquo;now is the time to leave&rdquo;</em>
        for members aiming to grow production, pointing to Kazakhstan as a possible
        candidate.</p>\n<p></p>\n<p><strong>How much oil does the UAE produce?&nbsp;</strong></p>\n<p>Under
        recent OPEC agreements, the UAE&rsquo;s output has been capped at around 3-3.5
        million barrels per day, with actual production hovering around 3.2 million
        barrels per day. The country has consistently ranked behind fellow OPEC members
        such as Saudi Arabia and Iraq in terms of production quotas.</p>\n\n            <blockquote
        class=\"twitter-tweet\"><p lang=\"en\" dir=\"ltr\">Before tumbling last month
        to 2.2 million bpd, the UAE had steadily increased production to around 3.6
        million bpd. The UAE\u2019s stated crude oil production capacity currently
        stands at 4.85 million bpd, with an official target to raise that to 5.0 million
        bpd by 2027 through\u2026 <a href=\"https://t.co/Qra7xzQfuG\">pic.twitter.com/Qra7xzQfuG</a></p>&mdash;
        Ole S Hansen (@Ole_S_Hansen) <a href=\"https://twitter.com/Ole_S_Hansen/status/2049109814475633022?ref_src=twsrc%5Etfw\">April
        28, 2026</a></blockquote> <script async src=\"https://platform.twitter.com/widgets.js\"
        charset=\"utf-8\"></script>\n    \n\n<p>Abu Dhabi has long sought higher quotas
        as it expanded capacity beyond these limits. The country now reportedly aims
        to raise its production capacity to around 5 million barrels per day by 2027.
        Analysts say that outside OPEC, it will be able to pump closer to its full
        capacity, rather than levels set by the group.</p>\n<p></p>\n<p><strong>What
        will OPEC do now?</strong>&nbsp;</p>\n<p>The UAE&rsquo;s departure removes
        a significant share of the group&rsquo;s production capacity &ndash; estimated
        by the International Energy Agency at around 13% &ndash; dealing a blow to
        OPEC+, analysts say.</p>\n<p>Rather than triggering an immediate price war,
        experts expect a period of higher volatility and <em>&ldquo;soft adjustment,&rdquo;</em>
        as remaining members monitor the UAE&rsquo;s output and eventually renegotiate
        production quotas. OPEC+ countries are expected to discuss Abu Dhabi&rsquo;s
        decision at their next scheduled meeting in June.</p>\n\n            <blockquote
        class=\"twitter-tweet\"><p lang=\"en\" dir=\"ltr\">The UAE quitting Opec means
        the group has lost 13% of its production capacity (IEA assessments), a damaging
        blow to its market management capabilities. <br><br>For the broader Opec+
        alliance, the UAE holds 9% of capacity <a href=\"https://twitter.com/hashtag/OOTT?src=hash&amp;ref_src=twsrc%5Etfw\">#OOTT</a>
        <a href=\"https://t.co/NOuU88NOBI\">pic.twitter.com/NOuU88NOBI</a></p>&mdash;
        Jamie Ingram (@Jamie__Ingram) <a href=\"https://twitter.com/Jamie__Ingram/status/2049111276219945451?ref_src=twsrc%5Etfw\">April
        28, 2026</a></blockquote> <script async src=\"https://platform.twitter.com/widgets.js\"
        charset=\"utf-8\"></script>\n    \n\n<p>Economist Jorge Leon of Rystad Energy
        has argued that the UAE&rsquo;s move could <em>&ldquo;structurally weaken
        OPEC&rdquo;</em> over time, giving the Gulf nation greater incentive to increase
        output and raising questions over Saudi Arabia&rsquo;s role as the group&rsquo;s
        main stabilizing force. Ole Hansen, the head of commodity strategy at Saxo
        Bank, added that while the market can absorb additional UAE supply in the
        short term, a shift by producers toward prioritizing market share over quota
        discipline could undermine OPEC&rsquo;s ability to manage supply through coordinated
        action.</p>\n<p></p>\n<p><strong>How did oil markets react?&nbsp;</strong></p>\n<p>Oil
        markets were already on edge before the UAE&rsquo;s announcement, given the
        US-Israeli war against Iran which is disrupting shipments in the Persian Gulf
        and raising fears of supply shortages. Brent crude has climbed above $110
        a barrel for the first time in weeks, trading around $111 on Tuesday, while
        US benchmark WTI hovered near $99.</p>\n<p>Analysts say the UAE&rsquo;s exit
        has added to uncertainty, with traders weighing the prospect of additional
        supply against ongoing disruptions in the Strait of Hormuz. Most expect the
        immediate impact to be increased volatility. David Oxley, chief commodities
        economist at Capital Economics, said the move could initially push prices
        lower but make markets more volatile for decades,&nbsp;particularly if other
        producers follow.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ea79d585f540740f19a0b8.jpg\"
        alt=\"Strait of Hormuz.\" />\n            <figcaption><a href=\"https://www.rt.com/business/638971-middle-east-war-consumers/\">Middle
        East war fallout hits consumers worldwide</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><strong>Good news for US?<br
        /></strong></p>\n<p>Some observers say the move could be politically convenient
        for Washington.</p>\n<p>US President Donald Trump has accused OPEC of <em>&ldquo;ripping
        off the rest of the world&rdquo;</em> by what he described as inflating oil
        prices and openly linked US military support for Gulf states to energy costs,
        arguing that while the US defended OPEC members, they <em>&ldquo;exploited&rdquo;</em>
        this by keeping prices high. A weaker, less coordinated bloc could give the
        US more leverage over individual exporters and global benchmarks, analysts
        say.</p>\n<p></p>\n<p><strong>Is OPEC good for global consumers?</strong></p>\n<p>Founded
        more than six decades ago to give oil-exporting countries greater control
        over prices by coordinating production, OPEC has often been criticized by
        analysts for what they described as using quotas and output cuts to influence
        global markets.</p>\n<p>Supporters say this coordination has at times helped
        stabilize prices, including during the 2008 financial crisis and the Covid-19
        demand shock, by preventing a deeper market collapse.</p>\n<p>Analysts agree
        that a weaker and more fragmented OPEC could make global oil markets less
        predictable and harder to manage, with potentially greater price swings and
        less coordinated control over supply.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f1be2385f54048537c4d04.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 28 Apr 2026 23:25:20
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>SpaceX links Musk mega-pay to colonizing Mars \u2013 Reuters</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639207-musk-spacex-compensation-mars-colonization/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639207-musk-spacex-compensation-mars-colonization/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f0ebc9203027625f20e427.jpg\"
        /> Aerospace giant SpaceX has linked CEO Elon Musk\u2019s stock awards to
        Mars colonization and valuation targets, according to a report <br/><a href=\"https://www.rt.com/business/639207-musk-spacex-compensation-mars-colonization/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The ambitious plan could reportedly
        raise investor concerns over the billionaire\u2019s competing roles across
        his businesses</strong></p>\n            \n                        \n            <p>SpaceX
        has approved a plan linking stock compensation for founder and CEO Elon Musk
        to building a colony on Mars and operating large-scale data centers in space,
        Reuters has reported, citing confidential company filings.&nbsp;</p>\n<p>Under
        the ambitious plan, Musk could be granted up to 200 million super\u2011voting
        shares if the company reaches a valuation of $7.5 trillion and helps establish
        a permanent human settlement on Mars with at least one million residents,
        according to the report on Tuesday. &nbsp;</p>\n<p>Additional incentives are
        tied to developing space-based computing infrastructure capable of delivering
        at least 100 terawatts of processing power, roughly comparable to 100,000
        one\u2011gigawatt nuclear reactors running at the same time.&nbsp;</p>\n<p>The
        structure means Musk would not receive any shares unless the targets are met.
        The goals are not bound to a fixed deadline provided he stays with the company.
        Musk, who founded SpaceX in 2002 and is currently regarded as the world&rsquo;s
        richest person with an estimated net worth of around $800 billion, has drawn
        a nominal salary of about $54,000 per year since 2019, while holding tens
        of millions of stock options.&nbsp;</p>\n<p>The compensation package comes
        as SpaceX is reportedly preparing for a massive IPO in June, with potential
        valuations estimated at about $1.75 trillion.&nbsp;</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69bfa24f85f540223f527948.jpg\"
        alt=\"FILE PHOTO: Tesla and SpaceX CEO Elon Musk arriving at federal court
        in San Francisco.\" />\n            <figcaption><a href=\"https://www.rt.com/news/635792-musk-twitter-misleading-investors/\">Musk
        found guilty of misleading investors</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Corporate governance experts
        cited by Reuters said the arrangement could raise questions for investors,
        particularly given Musk&rsquo;s leadership of multiple companies, including
        electric vehicle maker Tesla, where his compensation has also been tied to
        performance targets. Analysts said the plan may intensify scrutiny over how
        he allocates his time and attention among competing businesses.&nbsp;</p>\n<p>Last
        week, a New York Times investigation suggested that SpaceX had provided loans
        to Musk, including borrowing backed by his holdings. The newspaper said he
        borrowed about $500 million from SpaceX between 2018 and 2020 at below-market
        interest rates, using the company as a source of financing for other ventures
        such as Tesla and SolarCity.</p>\n<p>The NYT described the arrangement as
        effectively turning the aerospace firm into a <em>&ldquo;piggy bank&rdquo;</em>
        for Musk&rsquo;s wider business empire and said he may face increased scrutiny
        from Wall Street as SpaceX prepares to go public.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f0ebc9203027625f20e427.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 28 Apr 2026 17:37:30
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Key OPEC member to leave bloc</title>\n        <link><![CDATA[https://www.rt.com/business/639211-uae-withdrawal-opec-energy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639211-uae-withdrawal-opec-energy/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f0b5d520302728f07cd719.jpg\"
        /> The United Arab Emirates, OPEC\u2019s third-biggest oil producer, has announced
        that it will leave the organization <br/><a href=\"https://www.rt.com/business/639211-uae-withdrawal-opec-energy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The move by the UAE is a significant
        blow to the global organization of major oil producers</strong></p>\n            \n
        \                       \n            <p>The United Arab Emirates has decided
        to leave the Organization of the Petroleum Exporting Countries (OPEC), as
        well as OPEC+, the state Emirates News Agency (WAM) reports.</p>\n<p>The withdrawal,
        which is set to come into force on May 1, is viewed as a serious blow to Saudi
        Arabia, the informal leader of OPEC.</p>\n<p>The news comes amid a crisis
        in the Middle East triggered by the US-Israeli war against Iran, which resulted
        in the suspension of crude exports from the Persian Gulf and damage to Arab
        nations that host US military bases.</p>\n<p>The statement expressed appreciation
        for cooperation within the organization and with members of OPEC+, which was
        formed in 2016 and includes Russia, Kazakhstan, Oman, Mexico, and other non-OPEC
        countries.</p>\n<p>The UAE has consistently ranked behind fellow OPEC members
        Saudi Arabia and Iraq in terms of production quotas. Angola, Ecuador, Indonesia,
        and Qatar have withdrawn from OPEC in the past for various reasons, ranging
        from an unwillingness to pay membership fees to broader political tensions
        among Gulf nations in the case of Qatar&rsquo;s 2019 decision to leave.</p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/india/635682-how-middle-energy-crisis-straight-of-hormuz/\">\n
        \           <span>READ MORE: </span>How the Middle East crisis is rewriting
        energy security doctrine\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Earlier
        on Tuesday, Brent crude price hit $110 for the first time in three weeks,
        as peace talks between US and Iran <a href=\"https://www.rt.com/news/639142-iran-us-talks-stall/\"
        target=\"_blank\" rel=\"noopener noreferrer\">stalled</a>, raising risks that
        the global supply of crude will remain throttled for the foreseeable future.
        The price decreased following the UAE&rsquo;s announcement, but overall volatility
        persisted.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69f0b5d520302728f07cd719.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 28 Apr 2026 12:59:47
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US government quadruples its $9 bn Intel bet</title>\n        <link><![CDATA[https://www.rt.com/business/639036-us-intel-chips-investment/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639036-us-intel-chips-investment/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ebe51185f54068ac260904.jpg\"
        /> The US government has gained nearly $27 billion from its Intel investment
        as the chipmaker posted strong results, sending shares higher <br/><a href=\"https://www.rt.com/business/639036-us-intel-chips-investment/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The state obtained 10% of the chipmaker\u2019s
        stock in 2025, near its lowest valuation in over a decade</strong></p>\n            \n
        \                       \n            <p data-start=\"69\" data-end=\"120\"><strong
        data-start=\"69\" data-end=\"76\"></strong>The US government has profited
        an estimated $27 billion in unrealized gains from its Intel investment as
        the chipmaker&rsquo;s shares have more than doubled since the beginning of
        this year alone.</p>\n<p data-start=\"69\" data-end=\"120\">Intel shares jumped
        more than 20% on Friday after the company reported better-than-expected results.
        The Silicon Valley firm revealed on Thursday that it had generated $13.6 billion
        in revenue for the first quarter of 2026, up 7% year-on-year and above forecasts.</p>\n<p
        data-start=\"1107\" data-end=\"1470\">The results, along with a stronger outlook
        for the next quarter, put Intel on track for one of its biggest single-day
        gains in decades. The stock was trading at $82.50, up about 125% since the
        start of the year, making it one of the top performers in the S&amp;P 500,
        helping lift the tech-heavy Nasdaq Composite, and nearing levels last seen
        during the dot-com boom.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2025.08/thumbnail/6894b32d20302725b124b1a2.jpg\"
        alt=\"FILE PHOTO: Intel CEO Lip-Bu Tan.\" />\n            <figcaption><a href=\"https://www.rt.com/news/622624-trump-intel-ceo-resign/\">Trump
        demands \u2018conflicted\u2019 Intel CEO resign</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p data-start=\"1472\" data-end=\"1784\">The
        rally has significantly increased the value of the US government&rsquo;s stake
        in Intel. The state acquired roughly 10% of the company in August 2025, purchasing
        about 433 million shares at around $20.47 per share as part of efforts to
        expand domestic chip production amid national security concerns and AI competition
        with China.</p>\n<p data-start=\"1786\" data-end=\"2041\"><em>&ldquo;The next
        wave of AI will bring intelligence closer to the end user, moving from foundational
        models to inference to agentic. This shift is significantly increasing the
        need for Intel&rsquo;s CPUs, wafers, and advanced packaging offerings,&rdquo;</em>
        said CEO Lip-Bu Tan.</p>\n<p data-start=\"2043\" data-end=\"2247\">Intel&rsquo;s
        rebound follows a steep decline in 2024, when its shares plunged 60% to less
        than $19 in their worst year on record, alongside leadership changes including
        the departure of then-CEO Pat Gelsinger.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ebe51185f54068ac260904.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 24 Apr 2026 22:59:40
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US big tech giants to axe up to 16,000 employees \u2013 FT</title>\n
        \       <link><![CDATA[https://www.rt.com/business/639027-meta-microsoft-fires-thousands-ai/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/639027-meta-microsoft-fires-thousands-ai/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69eb857c20302735642773ff.jpg\"
        /> Meta and Microsoft are reportedly planning to cut up to 10% of their staff
        due to rising costs <br/><a href=\"https://www.rt.com/business/639027-meta-microsoft-fires-thousands-ai/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Plans by Meta and Microsoft to cut
        up to 10% of staff reportedly come amid rising costs from heavy AI investments</strong></p>\n
        \           \n                        \n            <p>American tech giants
        Meta and Microsoft are set to cut up to 10% of staff as both companies face
        rising costs linked to their expensive investments in artificial intelligence
        (AI), the Financial Times has reported.</p>\n<p>The Facebook parent company
        is expected to lay off 10% of its workforce, or roughly 8,000 employees, and
        close about 6,000 open roles, according to an internal memo sent to staff
        and leaked on Thursday. Meta specified that the layoffs will start on May
        20.</p>\n<p>The move comes as the company invests billions of dollars in AI
        infrastructure, including costly data centers, while recruiting top talent
        to catch up with major tech rivals such as Google and OpenAI in developing
        advanced AI models, the newspaper noted.</p>\n<p>In January, Meta said it
        expects capital expenditure for 2026 to reach $115 billion to $135 billion,
        driven largely by infrastructure costs, including payments to third-party
        cloud providers, higher depreciation of its AI data center assets, and rising
        operating expenses.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ea261620302712b44f623b.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/business/638979-global-billionaires-growth/\">Number
        of billionaires set to soar on AI gains \u2013 report</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Meanwhile, rival big tech firm
        Microsoft said it is offering voluntary redundancy to around 7% of its US
        workforce. In a memo seen by the FT, the corporation told employees the option
        will be available to long-serving staff, whose combined age and years of service
        total 70 or more. More than 8,000 people will be eligible out of its roughly
        125,000-strong US workforce, the news outlet reported.</p>\n<p>According to
        Microsoft&rsquo;s chief people officer, Amy Coleman, the offer is intended
        to provide these employees with <em>&ldquo;the choice to take that next step...&thinsp;with
        generous company support.&rdquo;</em>&nbsp;</p>\n<p>It follows Microsoft&rsquo;s
        decision to cut more than 15,000 jobs in 2025. Earlier this year, the company
        committed to spending $140 billion in capital expenditure, having pledged
        to accelerate the development of its own advanced AI models.</p>\n<p>Job cuts
        linked to the development of AI are becoming increasingly common in the US
        labor market, raising concerns over the technology&rsquo;s impact on employment.
        Earlier this month, Bloomberg reported that the number of layoffs due to the
        implementation of AI in the country&rsquo;s tech sector exceeded 52,000 in
        the first quarter of the year.&nbsp;&nbsp;</p>\n<p>A poll conducted earlier
        this year showed that 57% of Americans think the technology is advancing <em>&ldquo;too
        fast&rdquo;</em> and 79% are concerned the government has no plan to protect
        workers from job losses.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69eb857c20302735642773ff.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 24 Apr 2026 15:37:57
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Middle East war fallout hits consumers worldwide</title>\n
        \       <link><![CDATA[https://www.rt.com/business/638971-middle-east-war-consumers/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638971-middle-east-war-consumers/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ea79d585f540740f19a0b8.jpg\"
        /> Consumers worldwide are facing more shortages and higher prices as the
        Middle East war is disrupting supply chains and global trade <br/><a href=\"https://www.rt.com/business/638971-middle-east-war-consumers/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Disruptions to shipping and energy
        flows are driving up costs, straining supply chains and reshaping global trade
        routes</strong></p>\n            \n                        \n            <p>The
        fallout from the US\u2011Israeli war on Iran is spreading across the global
        economy, driving up costs, disrupting supply chains, and leaving consumers
        to absorb the impact as trade flows shift. A growing number of companies have
        warned of higher costs and weaker demand as disruptions to energy supplies
        and shipping routes linked to the Hormuz chokepoint ripple through global
        markets.&nbsp;</p>\n<p></p>\n<p><strong>Global businesses under pressure</strong>&nbsp;</p>\n<p>Higher
        fuel prices, shipping delays and more expensive raw materials are weighing
        on companies across industries. According to a Reuters review, more than 20
        firms globally have cut or withdrawn financial guidance since the Iran war
        began, while 32 have signaled price increases and 31 have warned of a financial
        hit. Executives reportedly say the pressure is coming through higher freight
        bills, pricier oil-linked inputs and persistent uncertainty over shipping
        through the Strait of Hormuz. &nbsp;</p>\n<p>Manufacturers are facing rising
        costs for oil\u2011based materials and transport. Leading tech company TE
        Connectivity said it would have to pass on higher freight and resin costs
        if the war drags on, while 3M warned that rising oil prices could lift product
        prices. British goods conglomerate Reckitt also flagged weaker margins due
        to higher energy costs.&nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e78aea85f54077d7673e47.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/638775-hidden-supply-chains-breaking/\">Supply
        chains breaking: The hidden bottlenecks threatening to bring the global economy
        to a standstill</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Travel companies are among the hardest hit. German tourism group
        TUI cut its full-year outlook and suspended revenue guidance, citing uncertainty
        and weaker demand, while United Airlines warned of lower-than-expected profits
        as higher fuel costs weigh on booking. Lufthansa reportedly plans to cut 20,000
        short-haul flights through October because of soaring jet fuel costs.&nbsp;</p>\n<p><strong>Supply
        disruptions spread&nbsp;</strong></p>\n<p>Logistics disruptions are slowing
        deliveries and affecting production across sectors. French food group Danone
        has reported war\u2011related disruption to baby\u2011formula shipments, which
        it says could translate into temporary shortages or higher shelf prices in
        some markets. Elevator maker Otis has also warned of delays in equipment sales
        due to shipping issues and tariffs.&nbsp;</p>\n<p>Malaysia&rsquo;s Karex Berhad,
        the world&rsquo;s largest condom maker, has warned of 20-30% price increases
        as the conflict pushes up the cost of synthetic rubber, nitrile, packaging,
        and lubricants while doubling shipping times. <em>&ldquo;We have no choice
        but to transfer the costs right now to the customers,&rdquo;</em> chief executive
        Goh Miah Kiat told Reuters. &nbsp;&nbsp;</p>\n<p>Dulux paint maker AkzoNobel
        has said its <em>&ldquo;raw material basket&rdquo;</em> is set to increase
        by a high\u2011teens percentage as oil-based inputs and freight become more
        expensive, raising the prospect of more costly paints and coatings. &nbsp;</p>\n<p></p>\n<p><strong>Unexpected
        winners</strong>&nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69dd060b85f54001f865e2f8.jpg\"
        alt=\"Displaced Palestinians offer Eid al-Fitr prayers in a Palestinian displaced
        persons camp on April 10, 2024 in Rafah, Gaza.\" />\n            <figcaption><a
        href=\"https://www.rt.com/news/638355-us-israeli-war-poverty-un/\">US-Israeli
        war on Iran could push 32 million into poverty \u2013 UN</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Shifts in
        global trade flows are benefiting some routes as shipments are rerouted away
        from the Middle East. Demand has surged for transit through the Panama Canal,
        pushing up prices for shipping slots amid tighter capacity. The Panama Canal
        Authority said some ships have recently paid more than $1 million for auction
        slots, while average prices have risen to about $385,000 from roughly $135,000&ndash;$140,000
        before the conflict.&nbsp;</p>\n<p>Attention is also increasingly turning
        to the Strait of Malacca, a key shipping lane linking the Indian and Pacific
        oceans and a critical route for energy supplies to Asia. The 900-km-long strait
        carries a large share of global maritime oil trade, with more than 20 million
        barrels passing through daily, making it one of the world&rsquo;s most important
        chokepoints alongside the Strait of Hormuz.&nbsp;</p>\n<p></p>\n<p><strong>Consumers
        take the hit</strong></p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e906f385f54073391b2a08.jpg\"
        alt=\"EU Energy Commissioner Dan Jorgensen.\" />\n            <figcaption><a
        href=\"https://www.rt.com/business/638932-eu-energy-crisis-iran-war/\">EU
        energy bill spikes amid Iran war supply shock \u2013 commissioner</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The knock-on
        effects of the nearly two-month Middle East war are hitting households, pushing
        up inflation and raising concerns about growth and food supplies. The International
        Monetary Fund has downgraded its global growth outlook, citing higher energy
        prices, and warned of a more <em>&ldquo;adverse scenario&rdquo;</em> for the
        global economy if the disruption persists.&nbsp;</p>\n<p>Airlines and tour
        operators have raised fares and added fuel surcharges, while in some cases
        cutting capacity, making travel more expensive and less available.&nbsp;</p>\n<p>The
        latest S&amp;P Global surveys show that across the euro zone economic activity
        has contracted while input costs have surged, driven by higher production
        costs and supply shortages. &nbsp;</p>\n<p>The European Commission has warned
        that the EU&rsquo;s fossil\u2011fuel import bill has risen sharply since the
        conflict began and that energy markets are facing <em>&ldquo;months of uncertainty.&rdquo;</em>&nbsp;
        &nbsp;</p>\n\n            ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\"
        href=\"https://www.rt.com/business/636940-uk-energy-shock-imf/\">\n            <span>READ
        MORE: </span>UK facing worst economic shock in decades \u2013 IMF\n        </a>\n
        \   </p>\n]]>\n<![CDATA[\n    \n\n<p>Soaring <a href=\"https://www.rt.com/business/637989-iran-war-global-economy/\"
        target=\"_blank\" rel=\"noopener noreferrer\">energy prices</a> and supply
        risks have reportedly raised demand for rooftop solar systems in Europe as
        households and businesses seek to reduce power bills and reliance on imported
        fuel. Installers say inquiries and orders have picked up, although the initial
        investment costs still fall on consumers. &nbsp;</p>\n<p>In the US, consumers
        are also adjusting as fuel prices surge, cutting travel or making people turn
        to alternatives such as electric vehicles and rentals.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ea79d585f540740f19a0b8.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 23 Apr 2026 20:04:49
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Number of billionaires set to soar on AI gains \u2013 report</title>\n
        \       <link><![CDATA[https://www.rt.com/business/638979-global-billionaires-growth/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638979-global-billionaires-growth/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ea261620302712b44f623b.jpg\"
        /> The global billionaire population is set to rise 25% to nearly 4,000 by
        2031, driven by AI-fueled wealth creation, according to Knight Frank <br/><a
        href=\"https://www.rt.com/business/638979-global-billionaires-growth/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>A 25% jump in the ultra-wealthy ranks
        by 2031 is being \u201Csupercharged\u201D by profits from artificial intelligence,
        consultancy Knight Frank has said</strong></p>\n            \n                        \n
        \           <p>The number of billionaires worldwide is expected to climb to
        nearly 4,000 by 2031, rising about 25% from current levels as the pace of
        wealth creation accelerates, according to global property consultancy Knight
        Frank.</p>\n<p>There are currently 3,110 billionaires globally, and the figure
        is projected to rise by about 25% to 3,915 over the next five years, the firm
        said in a report on Thursday.</p>\n<p>Liam Bailey, the estate agent&rsquo;s
        head of research, said wealth among billionaires and millionaires had been
        <em>&ldquo;supercharged&rdquo;</em> by profits in the technology sector, particularly
        artificial intelligence.</p>\n<p><em>&ldquo;The ability to scale a business
        has never been higher,&rdquo;</em> he said. <em>&ldquo;That has fed into the
        ability to make big fortunes quickly, supercharged by tech and AI.&rdquo;</em></p>\n<p>Saudi
        Arabia is expected to see the fastest growth in billionaire numbers, more
        than doubling to 65 by 2031 from 23 in this year, the research found. Poland&rsquo;s
        billionaire population is also forecast to more than double to 29 from 13,
        while Sweden is set to see an 81% increase to 58 from 32.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69df5c112030273cd32e8487.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/638424-russia-economic-growth-commodities-imf/\">IMF
        raises Russia\u2019s growth outlook</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>North America accounts for the
        largest share of global wealth at 37%, followed by Asia-Pacific with nearly
        31% and Europe with just over 25%, the report added.</p>\n<p>Russia also remains
        a major center of billionaire wealth, with Forbes counting 155 billionaires
        in 2026, up from the previous year, and their combined fortunes rising to
        a record of roughly $696 billion, driven largely by gains in commodities and
        metals.</p>\n<p>The number of multimillionaires is also rising rapidly, with
        those worth at least $30 million increasing to 713,626 globally from 551,435
        in 2021 &ndash; an addition of more than 160,000 people in five years, Knight
        Frank said, highlighting the strong pace of wealth creation led by the US
        and driven in part by growth in China and India.</p>\n<p>The outlook comes
        amid widening global inequality, with the World Inequality Report 2026 showing
        that fewer than 60,000 people &ndash; about 0.001% of the world&rsquo;s population
        &ndash; hold three times as much wealth as the bottom half of humanity.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ea261620302712b44f623b.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 23 Apr 2026 14:10:52
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US defends Russia oil sanctions waiver extension</title>\n
        \       <link><![CDATA[https://www.rt.com/business/638942-us-russia-oil-waiver-extension/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638942-us-russia-oil-waiver-extension/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e92bd885f5407a3e76b813.jpg\"
        /> Some of the \u201Cpoorest\u201D countries asked for an extension on Russian
        oil sanctions relief to curb prices, US Treasury chief Scott Bessent said
        <br/><a href=\"https://www.rt.com/business/638942-us-russia-oil-waiver-extension/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The month-long reprieve announced last
        Friday was meant to cool soaring energy prices, the treasury secretary has
        said</strong></p>\n            \n                        \n            <p>The
        US decision to extend sanctions relief for Russian oil was taken to prevent
        crude prices from exploding amid the Iran war and followed pleas from energy-vulnerable
        countries, Treasury Secretary Scott Bessent has said.</p>\n<p>Testifying before
        a Senate appropriations subcommittee on Wednesday, Bessent defended last week&rsquo;s
        U\u2011turn to prolong a general license allowing deliveries of Russian oil
        and petroleum products that were already loaded on tankers. The waiver, which
        runs until May 16, follows an earlier 30\u2011day relaxation that expired
        on April 11.</p>\n<p>Bessent said that during the IMF and World Bank spring
        meetings in Washington he was approached by finance ministers and central
        bank chiefs from <em>&ldquo;more than ten of the most vulnerable and poorest
        countries in terms of energy,&rdquo;</em> who asked the US to extend sanctions
        relief for another month.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e48a2485f5407ce97ae3e6.jpg\"
        alt=\"The oil tanker ANTIGUA I is moored for loading at the oil terminal of
        the Novorossiysk Commercial Sea Port, on December 13, 2025.\" />\n            <figcaption><a
        href=\"https://www.rt.com/news/638694-us-renew-russia-oil-sanctions-waiver/\">US
        reverses on pledge not to renew Russian oil waiver</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Global fuel prices have soared
        since the US\u2011Israeli war on Iran disrupted shipping through the Strait
        of Hormuz, a vital waterway that previously carried around a quarter of the
        world&rsquo;s seaborne oil trade. The disruption has intensified pressure
        on energy markets, sending crude higher and pushing up fuel costs worldwide,
        particularly in countries dependent on Gulf supplies.</p>\n<p>Bessent told
        lawmakers the waiver allowed Treasury to put <em>&ldquo;more than 250 million
        barrels on the water&rdquo;</em> and ease fears over supply. With crude trading
        near $100, he claimed that without the extra Russian barrels <em>&ldquo;they
        might have been at $150,&rdquo;</em> saying the measure was intended to shield
        both US consumers and allies from even steeper fuel costs.</p>\n<p>US gasoline
        prices have soared, putting pressure on households ahead of November&rsquo;s
        midterm elections. The national average exceeded $4 per gallon, up from $2.94
        in late February before the Iran conflict, according to data from the American
        Automobile Association.</p>\n\n            ]]> <![CDATA[\n    <p>\n        <a
        target=\"_blank\" href=\"https://www.rt.com/russia/636410-lavrov-claims-russia-benefit-oil-iran/\">\n
        \           <span>READ MORE: </span>Lavrov responds to claims Russia \u2018benefiting\u2019
        from war on Iran\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Bessent
        rejected claims that Moscow has reaped a multibillion\u2011dollar windfall,
        arguing that Russian oil continues to sell at a discount and that lower global
        prices outweigh any additional volumes Moscow can sell. The extension came
        just days after Bessent had publicly said the administration would not renew
        the license.</p>\n<p>The Financial Times has called Russia <em>&ldquo;the
        biggest winner from the conflict in the Middle East,&rdquo;</em> calculating
        that Moscow is earning up to $150 million a day in extra budget revenues.</p>\n<p>The
        Kremlin has confirmed a <em>&ldquo;modest increase&rdquo;</em> in oil income
        linked to the Middle East conflict but said it is not critical for the Russian
        budget or the wider economy.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e92bd885f5407a3e76b813.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 22 Apr 2026 20:56:43
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU energy bill spikes amid Iran war supply shock \u2013 commissioner</title>\n
        \       <link><![CDATA[https://www.rt.com/business/638932-eu-energy-crisis-iran-war/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638932-eu-energy-crisis-iran-war/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e906f385f54073391b2a08.jpg\"
        /> EU fossil fuel import costs have risen by over $28 billion since the Middle
        East conflict began, Energy Commissioner Dan Jorgensen has said <br/><a href=\"https://www.rt.com/business/638932-eu-energy-crisis-iran-war/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Daily fossil fuel import costs have
        exceeded $587 million since the Middle East escalation, the bloc\u2019s energy
        chief Dan Jorgensen has said</strong></p>\n            \n                        \n
        \           <p>The EU is facing months of uncertainty as its energy crisis
        deepens following the escalation of the Middle East conflict, with the bloc
        now paying far more for fossil fuel imports, Energy Commissioner Dan Jorgensen
        has said.&nbsp;</p>\n<p>The US-Israeli war on Iran has added pressure to global
        energy markets, driving oil prices higher and increasing fuel costs for consumers
        worldwide. The conflict has choked flows through the Strait of Hormuz, a key
        route that handles around 20% of global oil and liquefied natural gas. The
        EU has already been grappling with the fallout from its decision to cut energy
        ties with Russia following the escalation of the Ukraine conflict, alongside
        the costs of its green transition policies. &nbsp;</p>\n<p>Speaking in Brussels
        on Wednesday, Jorgensen said the bloc&rsquo;s fossil fuel import bill had
        risen by more than &euro;24 billion (over $28 billion) since the Middle East
        war began, amounting to <em>&ldquo;over &euro;500 million per day.&rdquo;</em>
        He warned that <em>&ldquo;the coming months will be filled with uncertainties&rdquo;</em>
        and that the true impact of the crisis will be long\u2011term, adding <em>&ldquo;we
        must be prepared for anything.&rdquo;</em>&nbsp;</p>\n<p>In January, the European
        Commission restated its goal of phasing out Russian fossil fuels by 2027.
        Jorgensen told the Financial Times this month that Brussels is <em>&ldquo;preparing
        for the worst\u2011case scenarios&rdquo;</em> in light of the Iran war, including
        possible rationing of jet fuel and diesel, but insisted the EU will not reverse
        its ban on Russian LNG, opting instead for much more expensive alternatives
        from the US <em>&ldquo;and other partners.&rdquo;</em>&nbsp; &nbsp;</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d91e7585f5405be616b1e3.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/business/637980-eu-diesel-shortages-unrest-fuel-crisis/\">What
        is fueling unrest across the EU?</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Brussels&rsquo; refusal to return to cheap Russian energy has drawn
        sharp criticism within the bloc, with Italian Deputy Prime Minister Matteo
        Salvini urging a resumption of imports to prioritize energy security.&nbsp;</p>\n<p>The
        International Energy Agency has warned that the world is facing <em>&ldquo;the
        largest energy crisis&rdquo;</em> and that Europe could run short of jet fuel
        within weeks. Kremlin envoy Kirill Dmitriev has said the EU faces deindustrialization
        under <em>&ldquo;Russophobic politicians&rdquo;</em> and that Western governments
        will eventually be forced to seek renewed access to Russian energy.&nbsp;</p>\n<p>The
        US has extended its temporary waiver on certain Russian oil shipments loaded
        on vessels through May 16 in an effort to stabilize prices. Moscow has signaled
        it is ready to plug any oil supply gaps triggered by the conflict.</p>\n<p></p>\n<p></p>\n<p></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e906f385f54073391b2a08.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 22 Apr 2026 17:41:32
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Tim Cook stepping down as Apple CEO</title>\n        <link><![CDATA[https://www.rt.com/business/638791-apple-ceo-cook-steps-down/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638791-apple-ceo-cook-steps-down/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e72f3b20302740a06ea8c2.jpg\"
        /> Tim Cook is stepping down as Apple CEO after nearly 15 years in the role,
        with hardware chief John Ternus set to succeed him in September <br/><a href=\"https://www.rt.com/business/638791-apple-ceo-cook-steps-down/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Hardware chief John Ternus is set to
        take over on September 1</strong></p>\n            \n                        \n
        \           <p data-start=\"33\" data-end=\"76\"><strong data-start=\"33\"
        data-end=\"40\"></strong>Tim Cook will step down as Apple&rsquo;s chief executive
        on September 1, ending a nearly 15-year run at the helm of the iPhone maker
        and handing over to senior hardware executive John Ternus.</p>\n<p data-start=\"33\"
        data-end=\"76\">Cook took over as CEO in August 2011 after Steve Jobs resigned
        just six weeks before his death, and he presided over a period of huge commercial
        expansion that saw Apple&rsquo;s market value rise from roughly $350 billion
        to around $4 trillion. During his tenure, Apple expanded its wearables and
        services businesses, rolling out products and platforms such as the Apple
        Watch, AirPods, Apple Music, and Apple Pay.</p>\n<p data-start=\"1150\" data-end=\"1474\"><em>&ldquo;It
        has been the greatest privilege of my life to be the CEO of Apple and to have
        been trusted to lead such an extraordinary company,&rdquo;</em> Cook said
        in a press release on Monday. He is set to remain with the company as executive
        chairman to <em>&ldquo;assist with certain aspects,&rdquo;</em> including
        <em>&ldquo;engaging with policymakers around the world.&rdquo;</em></p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2025.11/thumbnail/6929656985f54035f11d439c.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/africa/628605-apple-sued-over-deceptive-claims-dr-congo-minerals/\">Apple
        sued over \u2018deceptive\u2019 claims</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p data-start=\"1476\" data-end=\"1674\">Ternus,
        Apple&rsquo;s senior vice president of hardware engineering, has been with
        the company since 2001 and has overseen development work across major product
        lines, including the iPhone, iPad, and Mac.</p>\n<p data-start=\"1476\" data-end=\"1674\"><em>&ldquo;I
        am profoundly grateful for this opportunity to carry Apple&rsquo;s mission
        forward,&rdquo;&nbsp;</em>Ternus said, promising to <em>&ldquo;lead with the
        values and vision that have come to define this special place for half a century.&rdquo;</em></p>\n<p>The
        leadership transition comes as Apple faces growing pressure to prove it can
        keep pace in AI, an area in which critics and investors have argued that the
        company has moved too slowly compared with its rivals. Several reports suggest
        that Ternus will inherit a business that remains highly profitable but is
        under scrutiny over its AI strategy and future product pipeline.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e72f3b20302740a06ea8c2.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 21 Apr 2026 02:04:10
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Oil jumps after US seizes Iranian ship near Hormuz</title>\n
        \       <link><![CDATA[https://www.rt.com/business/638779-oil-prices-surge-middle-east/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638779-oil-prices-surge-middle-east/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e72d51203027428e6ba038.jpg\"
        /> Oil prices have surged amid renewed Middle East tensions and fears of supply
        disruptions caused by the closure of the Strait of Hormuz <br/><a href=\"https://www.rt.com/business/638779-oil-prices-surge-middle-east/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Supply risks around the Strait of Hormuz
        are pushing crude higher, raising fuel costs and economic pressure worldwide</strong></p>\n
        \           \n                        \n            <p>Oil prices jumped on
        Monday after the US seized an Iranian-flagged cargo ship near the Strait of
        Hormuz, dimming prospects for peace in the war on Iran and raising fresh supply
        concerns.&nbsp;</p>\n<p>Both Brent and West Texas Intermediate jumped more
        than 6%, to above $96 and $88 per barrel, respectively, in the latest swing
        after weeks of volatile trading. The gains followed renewed disruptions to
        shipping through the Strait of Hormuz over the weekend after a brief reopening
        late last week. Tehran has warned the route will remain restricted unless
        the US naval blockade is lifted.&nbsp;</p>\n<p>On Sunday, a US warship fired
        at and seized an Iranian-flagged cargo vessel, the Touska, in the Gulf of
        Oman. According to the US military, the ship was attempting to breach the
        naval blockade and reach Bandar Abbas via the Strait of Hormuz. Tehran condemned
        the move as <em>&ldquo;armed maritime piracy,&rdquo;</em> accusing Washington
        of violating the ceasefire in place since April 8 and warning of retaliation.&nbsp;</p>\n<p>The
        US-Israeli bombing campaign prompted Iran to restrict passage through the
        strait, a conduit for roughly 20% of global oil, for <em>&ldquo;enemy ships,&rdquo;</em>
        snarling supply chains and sending prices higher. Prices had eased earlier
        this month during the first round of US-Iran talks in Islamabad on hopes of
        the strait reopening, before rebounding after the negotiations collapsed.
        &nbsp;</p>\n<p>Analysts say markets are reacting primarily to the threat of
        reduced supply, with traders pricing in further disruptions to Gulf exports.
        Kuwait, a major crude exporters, has reportedly declared force majeure on
        some oil and fuel shipments. &nbsp;</p>\n<p>OPEC+ production limits and higher
        shipping and insurance costs are constraining producers&rsquo; ability to
        replace lost barrels. Industry estimates suggest hundreds of millions of barrels
        are now effectively stranded behind the chokepoint.&nbsp;</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e2144c85f54064e27415d8.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/638553-europe-fuel-crisis/\">Europe
        has \u2018six weeks\u2019 of jet fuel left \u2013 IEA chief\_</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Higher crude
        prices are feeding through petrol and diesel across Europe, the US, and parts
        of Asia. Wholesale gas prices have risen, and heating-oil futures &ndash;
        a proxy for jet fuel &ndash; are also up. The renewed surge in energy bills
        is adding to public frustration.&nbsp;</p>\n<p>The Hormuz disruption has triggered
        ripple effects across the global economy. The International Energy Agency
        has warned of rising market volatility and possible jet fuel shortages in
        Europe within six weeks. Humanitarian organizations have also flagged knock-on
        risks to global food security as fertilizer and agricultural supply chains
        are affected.&nbsp;</p>\n<p>Europe is widely seen as one of the biggest losers
        from the Hormuz blockade due to its heavy reliance on Middle Eastern oil after
        sanctioning Russian supplies. Moscow, by contrast, has benefited from higher
        prices and stronger demand for its crude, with estimates putting the windfall
        at up to $150 million a day.&nbsp;</p>\n\n            ]]> <![CDATA[\n    <p>\n
        \       <a target=\"_blank\" href=\"https://www.rt.com/news/638694-us-renew-russia-oil-sanctions-waiver/\">\n
        \           <span>READ MORE: </span>US reverses on pledge not to renew Russian
        oil waiver\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>The US has
        renewed a sanctions exemption allowing Russian crude and petroleum products
        already loaded onto tankers to be delivered and sold freely, in a bid to help
        temper the price surge. Russia has called for a peaceful resolution of the
        Middle East conflict and said it is ready to plug any oil supply gap to offset
        shortages.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e72d51203027428e6ba038.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 20 Apr 2026 20:53:37
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Supply chains breaking: The hidden bottlenecks threatening
        to bring the global economy to a standstill</title>\n        <link><![CDATA[https://www.rt.com/business/638775-hidden-supply-chains-breaking/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638775-hidden-supply-chains-breaking/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e78aea85f54077d7673e47.jpg\"
        /> Many underappreciated bottlenecks are threatening the global economy, with
        naphtha, diesel, aluminum, sulfur, helium shortages causing havoc <br/><a
        href=\"https://www.rt.com/business/638775-hidden-supply-chains-breaking/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The oil price is just the tip of the
        iceberg that could cause major problems across the globe</strong></p>\n            \n
        \                       \n            <p>The surge in oil prices in light
        of the war on Iran has grabbed most of the headlines. For many observers,
        the severity of the crisis is measurable in the daily changes in the Brent
        ticker. Some&nbsp;analysts&nbsp;have also begun pointing to emerging stress
        in fertilizer markets. But beneath these familiar markers, several less visible
        &ndash; and in some cases more systemic &ndash; signals are now flashing red.</p>\n<p>RT
        takes a look at the ominous signs that don&rsquo;t always show up in the news.&nbsp;</p>\n<h2><strong>Naphtha&nbsp;</strong></h2>\n<p>\u200BNaphtha,
        a feedstock for petrochemicals, is a classic behind-the-scenes actor. Rarely
        in the headlines, naphtha is critical to the production of much modern technology,
        not to mention a whole host of everyday plastics, car parts, medical supplies,
        packaging &ndash; you name it. Naphtha sits at the base of the petrochemical
        supply chain, where it can wreak havoc if it&rsquo;s not in supply.&nbsp;</p>\n<p>So
        what exactly is naphtha? It is a liquid hydrocarbon mixture derived from the
        distillation of crude oil. It is then <em>&ldquo;cracked&rdquo;</em> at extreme
        temperatures to extract ethylene and propylene, which is upstream from a slew
        of chemical processes that produce the high-purity chemicals, solvents, and
        plastics that are used in numerous industries, including as supporting inputs
        in semiconductor manufacturing. Because naphtha is not a core chip material
        input itself, its role is often overlooked.</p>\n<p>Unsurprisingly, naphtha
        generally exhibits a strong positive price correlation with Brent crude. It
        is a refinery product, so crude costs are an important driver of pricing.
        However, its price can diverge meaningfully because it is primarily used in
        petrochemicals and not simply as a fuel. Naphtha supply disruptions have already
        made themselves felt in parts of Asia,&nbsp;even causing shortages of plastic
        bags in South Korea. Incidentally, South Korea has purchased Russian naphtha
        for the first time in four years.</p>\n<p>Several large petrochemical companies,
        such as LG Chem and Lotte Chemical, are having to cut production or shut cracking
        facilities due to feedstock shortages. This has disrupted supplies of plastics
        and packaging, impacting products from consumer goods to medical supplies.&nbsp;</p>\n
        \   <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.04/original/69e64ad2203027533336c257.jpg\"
        \ />\n                    <figcaption>\n                                    Mailiao
        naphtha cracker facilities, Yilan, Taiwan.\n                \n                <span
        class = \"copyright\">\n                       \xA9&nbsp;Getty Images  /   Billy
        H.C. Kwok/Getty Images                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p>For industrial heavyweight
        Japan, for example, the disruption to the flow of naphtha is arguably the
        most pressing economic fallout from the crisis in the Middle East. Japan gets
        around 60% of its naphtha from overseas. The Middle East is responsible for
        over 70% of those imports, according to the Japan Petrochemical Industry Association.</p>\n<p>The
        40% of Japan&rsquo;s naphtha that comes from domestic refineries isn&rsquo;t
        exactly immune to problems in the Middle East &ndash; 90% of the oil these
        refineries use comes from the same region.&nbsp;</p>\n<h2><strong>Diesel&nbsp;</strong></h2>\n<p>Diesel
        is a middle distillate fuel, meaning that it is heavier than gasoline but
        lighter than fuel oil. It is called <em>&ldquo;the fuel of the real economy.&rdquo;</em>
        It powers all the heavy stuff: trucks, ships, construction, mining, agriculture.&nbsp;</p>\n<p>Of
        particular concern is the fact that diesel prices rise faster than gasoline
        in nearly every energy crisis. Because it is a critical heavy-transport fuel
        it has low demand elasticity &ndash; meaning diesel consumers will keep buying
        even at higher prices. Also, it is much harder to ramp up diesel refining
        quickly. Refineries generally operate at high utilization and have inflexible
        configurations, limiting their ability to respond quickly to demand surges.</p>\n<p>Because
        diesel is the fuel for the <em>&ldquo;real economy,&rdquo;</em> price spikes
        can be broadly inflationary. According to BloombergNEF, diesel at $5 per gallon
        in the US could increase prices to consumers by 35%.</p>\n<p>Diesel cost an
        average of $5.61 a gallon nationwide as of last Thursday, according to the
        American Automobile Association. That is just over $2 above the average on
        the same date last year and 63 cents more than a month earlier.</p>\n    <figure>\n
        \       <img src=\"https://mf.b37mrtl.ru/files/2026.04/original/69e64b4a85f540054421eb4c.jpg\"
        \ />\n                    <figcaption>\n                                    A
        driver buys diesel fuel for his truck, April 6, 2026 in Belvidere, Illinois,
        US.\n                \n                <span class = \"copyright\">\n                       \xA9&nbsp;Getty
        Images  /   Scott Olson/Getty Images                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p>Diesel prices have
        also surged across Europe. Analysts are now warning of potential shortages
        of both jet fuel and diesel this summer. These two fuels are often grouped
        together as middle distillates and can to some extent be substituted or blended.</p>\n<h2><strong>Aluminum</strong></h2>\n<p>The
        Iran war has triggered a major crisis in the global aluminum market that could
        reverberate across numerous sectors of the economy.&nbsp;</p>\n<p>Consultancy
        Wood Mackenzie estimates that the global market is staring at a supply deficit
        of up to 4 million metric tons this year, which would be the largest in over
        25 years. JPMorgan has warned that the global aluminum market has entered
        a supply <em>&ldquo;black hole.&rdquo;</em></p>\n<p>Prices are forecast to
        exceed $4,000 per tonne. For comparison, the long-term <em>&ldquo;normal&rdquo;</em>
        range is $1,500-$2,500 per tonne. The majority of aluminum \u200Bproducers
        in the Gulf, which account for around 9% of global \u200Bsupply, have been
        unable to make shipments to world markets. Meanwhile, a missile strike last
        month damaged the Al Taweelah smelter operated by Emirates Global Aluminium.
        Repairs will reportedly take up to a year.&nbsp;</p>\n<p>As smelters run through
        stocks of raw materials, production shutdowns could be forthcoming. But shutting
        down aluminum smelter isn&rsquo;t the same thing as turning off an appliance
        and turning it back on with the flip of a switch. Smelters run around-the-clock
        at extremely high temperatures. If you shut them down, the molten metal solidifies
        and damages the equipment. Restarting them is extremely costly and technically
        challenging and sometimes entails a full rebuild.&nbsp;</p>\n    <figure>\n
        \       <img src=\"https://mf.b37mrtl.ru/files/2026.04/original/69e64bb120302750973c66fe.jpg\"
        \ />\n                    <figcaption>\n                                    Aluminum
        stored at the Port of Rotterdam, Rotterdam, Netherlands.\n                \n
        \               <span class = \"copyright\">\n                       \xA9&nbsp;Getty
        Images  /   Pierre Crom/Getty Images                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p>It is currently Western
        manufacturers taking the brunt of the crisis and partly by the doing of their
        own countries&rsquo; policies. China and Russia are both among the world&rsquo;s
        main sources of aluminum but both have been cut off from Western markets because
        of tariffs and sanctions.&nbsp;</p>\n<h2><strong>Crack spreads</strong></h2>\n<p>The
        gap between what a refiner pays for crude oil and the price at which it sells
        the finished product is called the crack spread &ndash; the word to describe
        the refining process of <em>&ldquo;cracking&rdquo;</em> large hydrocarbon
        molecules into smaller ones (gasoline, diesel, naphtha, etc.)</p>\n<p>A normal
        crack spread is between $10 and $20, although it can vary by product and region.
        What we are seeing now is crack spreads over $50. This means refined fuels
        are becoming more valuable relative to crude oil. This will show up in naphtha
        and diesel (already discussed above) and in gasoline prices at the pump. Crack
        spreads therefore provide a useful indicator of fuel-related cost pressures
        faced by consumers.</p>\n<p>Meanwhile, what we&rsquo;re seeing is a windfall
        for refiners. In crises such as the current one, pricing power shifts to the
        most capacity-constrained stage in the system, where output cannot be easily
        expanded. In this case &ndash; and often in oil markets &ndash; it is the
        refining stage.&nbsp;</p>\n<h2><strong>Helium</strong></h2>\n<p>Helium, a
        byproduct of natural \u200Bgas processing, is a small market that punches
        well above its weight. Helium is essential in the high-tech world. It has
        important uses in chipmaking for which there is no easy substitute.&nbsp;</p>\n<p>Currently,
        the global supply of helium is significantly disrupted and reports of rationing
        are already emerging. The war has thrown a wrench in both the production and
        transportation of helium. Supply chains for high-tech goods are already feeling
        the effects. If dislocations continue, this could start to noticeably interfere
        with production of goods such as electronics, automobiles, and even smartphones.
        &nbsp;</p>\n<p>Helium production is highly concentrated in certain countries.
        Qatar, a large natural gas supplier, produces nearly a third \u200Bof global
        supply, according to the US Geological Survey. However, the Ras Laffan Industrial
        City, the single largest helium production site in the world, sustained damage
        from a missile in early March. The Qatari government estimates that it will
        take up to five years to fully repair the site.</p>\n    <figure>\n        <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/original/69e64cb885f540477b36c13b.jpg\"
        \ />\n                    <figcaption>\n                                    Qatar
        Energy's operating facilities, March 3, 2026, Ras Laffan Industrial City,
        Qatar.\n                \n                <span class = \"copyright\">\n                       \xA9&nbsp;Getty
        Images  /   Getty Images                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p>While shippers of some
        goods have diverted vessels around the Cape of Good Hope, a much longer but
        entirely unencumbered route, this is not as viable for helium, which is transported
        in specialized cryogenic containers. During long trips, the helium inevitably
        heats up and <em>&ldquo;boils off.&rdquo;</em></p>\n<h2><strong>Sulfur</strong></h2>\n<p>The
        disruptions in fertilizer markets have garnered a lot of attention but less
        focus has been on the major feedstock components of fertilizer: sulfur. Called
        the <em>&ldquo;king of chemicals,&rdquo;</em> sulfur is a byproduct of oil
        and gas refining. It&rsquo;s another of the vastly underappreciated inputs
        that keep things running and keep food plentiful across the globe.&nbsp;</p>\n<p>Once
        converted into sulfuric acid, it is used in fertilizers and metal processing,
        as well as in many pharmaceuticals. The Gulf accounts for roughly 45% of global
        supply, which means the disruption is already having knock-on effects in both
        agriculture and metals. Compounding the problem is the fact that sulfuric
        acid isn&rsquo;t easily replaced or immediately substitutable. Another vulnerability
        is that it is not stockpiled heavily, so when flows stop trouble can creep
        up quite quickly. This sends consumers scrambling for expensive spot supply
        &ndash; all of which eventually shows up in food price inflation.&nbsp;</p>\n<p>Sulfur
        prices have moved sharply higher since the war on Iran began, and now countries
        are taking measures to insulate their own economies. T&uuml;rkiye has announced
        a ban on sulfur exports, while India is also reportedly considering export
        restrictions.&nbsp;</p>\n<h2><strong>Looking ahead</strong></h2>\n<p>The global
        economy is as fragile as it is complex. As analyst Zoltan Pozsar says, <em>&ldquo;global
        supply chains work only in peacetime, but not when the world is at war, be
        it a hot war or an economic war.&rdquo;</em> Right now there are both. The
        confluence of multiple failures at key chokepoints could trigger cascades
        of crises that would inflict significant and enduring pain across the economy.
        Nobody thinks much about naphtha or sulfur when the world is humming along.
        But these and many other inputs, fuels and feedstocks are what keep the whole
        show running and their absence quickly becomes a crisis.&nbsp;&nbsp;</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e78aea85f54077d7673e47.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 20 Apr 2026 18:35:31
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>War on Iran leaves $58 billion repair bill across region \u2013
        report</title>\n        <link><![CDATA[https://www.rt.com/business/638519-iran-war-billion-energy-repair/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638519-iran-war-billion-energy-repair/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e0fecb85f54069fd331fee.jpg\"
        /> US-Israel strikes and Tehran\u2019s retaliation are pushing oil and gas
        facility damage costs toward $50 billion, Rystad Energy projects <br/><a href=\"https://www.rt.com/business/638519-iran-war-billion-energy-repair/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>US-Israel strikes and Tehran\u2019s
        retaliation are pushing oil and gas facility damage costs toward $50 billion,
        Rystad Energy projects</strong></p>\n            \n                        \n
        \           <p>The US-Israel war on Iran could push regional repair costs
        in the Middle East to as much as $58 billion, with oil and gas facilities
        alone accounting for up to $50 billion, according to an analysis released
        by energy research firm Rystad.</p>\n<p>However, the report stresses that
        the main constraint is not funding but limited global capacity to supply key
        equipment and engineering services, which could delay repairs for years.</p>\n<p>Rystad&rsquo;s
        estimate marks a sharp increase from the initial $25 billion projection the
        firm issued three weeks ago, reflecting the broader scope of damage before
        the April 8 ceasefire between the US and Iran.</p>\n<p><em>&ldquo;Repair work
        does not create new capacity. It redirects existing capacity, and that redirection
        will be felt in project delays and into inflation far beyond the Middle East,&rdquo;</em>
        Rystad senior analyst Karan Satwani said.</p>\n<p><em>&ldquo;The $58 billion
        bill is the headline, but the knock-on effects on energy investment timelines
        globally may prove just as significant,&rdquo;</em> Satwani highlighted.</p>\n<p>Rystad
        said total repair spending is likely to average around $46 billion, with downstream
        refining and petrochemical assets accounting for the largest share due to
        the scale and complexity of the damage. Industrial, power, and desalination
        facilities could add $3 billion to $8 billion, with recovery timelines diverging
        across assets and countries due to differences in execution capacity and supply
        chain constraints.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b6c4fc85f54056102d9ed4.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/635094-iran-war-could-bring-billions-us-firms/\">Iran
        war could bring billions to US energy firms \u2013 FT</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Iran faces the most extensive
        damage, with costs potentially reaching $19 billion across gas processing,
        refining, and export infrastructure, the company said. Qatar&rsquo;s impact,
        meanwhile, is seen as more concentrated but technically complex, centered
        on the Ras Laffan LNG hub, where repairs may coincide with ongoing expansion
        projects.</p>\n<p>Tehran plans to seek compensation from five Arab states
        &ndash; Bahrain, Jordan, Qatar, the UAE, and Saudi Arabia &ndash; for damage
        from the latest military standoff, Iran&rsquo;s UN envoy Amir Saeid Iravani
        told Tasnim. He said the countries acted as <em>&ldquo;co-participants&rdquo;</em>
        with the US and Israel and breached their obligations toward Iran.</p>\n<p>Last
        week, the Iranian Red Crescent Society reported that 125,630 civilian units
        had been affected by the war, including 100,000 residential homes, some of
        them completely destroyed. It also cited damage to 23,500 commercial properties,
        339 medical facilities, 32 universities, 857 schools, and 20 Red Crescent
        centers.</p>\n<p>IRCS head Pir Hossein Kolivand stressed that around 15 major
        logistical sites, including fuel depots, airports, and civilian aircraft,
        had been hit, highlighting widespread disruption to transport, energy, and
        public services.</p>\n<p></p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69e0fecb85f54069fd331fee.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 16 Apr 2026 17:48:10
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>IMF raises Russia\u2019s growth outlook</title>\n        <link><![CDATA[https://www.rt.com/business/638424-russia-economic-growth-commodities-imf/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638424-russia-economic-growth-commodities-imf/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69df5c112030273cd32e8487.jpg\"
        /> The IMF has raised Russia\u2019s growth forecast on higher commodity prices
        amid the global economic fallout from the Middle East war <br/><a href=\"https://www.rt.com/business/638424-russia-economic-growth-commodities-imf/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The economy is forecast to expand 1.1%
        this year on higher energy prices due to Middle East disruptions</strong></p>\n
        \           \n                        \n            <p>The International Monetary
        Fund (IMF) has raised its growth outlook for Russia, citing higher commodity
        prices, while warning that the Middle East war is weighing on the global economy.&nbsp;</p>\n<p>In
        its latest World Economic Outlook <a href=\"https://www.imf.org/-/media/files/publications/weo/2026/april/english/ch1.pdf\"
        target=\"_blank\" rel=\"noopener noreferrer\">released</a> on Tuesday, the
        IMF said Russia&rsquo;s GDP is now expected to expand by 1.1% in 2026, marking
        an upward revision of 0.3 percentage points compared to its January estimate.
        The adjustment was driven by <em>&ldquo;higher commodity prices,&rdquo;</em>
        the report said, adding <em>&ldquo;the momentum&rdquo;</em> is expected to
        continue into 2027. Inflation is projected at 5.6% this year, down from 8.7%
        in 2025, and easing further to 4.3% in 2027. &nbsp;</p>\n<p>Russia&rsquo;s
        Economic Development Ministry has offered a more optimistic outlook, estimating
        GDP growth at 1.3% in 2026 and 2.8% in 2027.&nbsp;</p>\n<p>The revised IMF
        forecast comes as global energy markets have come under renewed pressure due
        to the US-Israeli war on Iran and Tehran&rsquo;s retaliatory strikes across
        the region. The conflict has effectively choked flows through the Strait of
        Hormuz, a key route accounting for a significant part of global oil and gas
        supply.&nbsp;</p>\n\n            <blockquote class=\"twitter-tweet\"><p lang=\"en\"
        dir=\"ltr\">The now paused war in the Middle East is testing the resilience
        of the global economy. Growth is projected at 3.1% in 2026 &amp; 3.2% in 2027,
        down from 3.4% in 2025. Without the war, global growth would have been revised
        upward. Read more: <a href=\"https://t.co/5xMUE4scWO\">https://t.co/5xMUE4scWO</a>
        <a href=\"https://t.co/4t2XXinozk\">pic.twitter.com/4t2XXinozk</a></p>&mdash;
        IMF (@IMFNews) <a href=\"https://twitter.com/IMFNews/status/2044038484717875451?ref_src=twsrc%5Etfw\">April
        14, 2026</a></blockquote> <script async src=\"https://platform.twitter.com/widgets.js\"
        charset=\"utf-8\"></script>\n    \n\n<p>The IMF warned that disruptions to
        oil supply and the damage to critical energy infrastructure raise the prospect
        of a <em>&ldquo;major energy crisis&rdquo;</em> if hostilities persist. Countries
        heavily dependent on energy imports are particularly <em>&ldquo;exposed,&rdquo;</em>
        it said.&nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d9508120302723da53fcb3.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/637989-iran-war-global-economy/\">Middle
        East war triggering global energy \u2018shock\u2019 \u2013 IMF</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Against this
        backdrop, the fund downgraded its global growth forecast, now expecting the
        world economy to expand by 3.1% in 2026, down from 3.4% previously, before
        rebounding to 3.2% in 2027. It also expects slower growth in the US and a
        weaker dollar.&nbsp;</p>\n<p>The fund has also cut its outlook for the euro
        area, saying the slowdown reflects the <em>&ldquo;negative impact of the Middle
        East conflict.&rdquo;</em> This adds to the <em>&ldquo;lingering effects&rdquo;</em>
        of higher energy prices since the escalation of the Ukraine conflict, <em>&ldquo;dragging
        on manufacturing,&rdquo;</em> alongside pressure from the euro&rsquo;s appreciation,
        the report said.&nbsp;</p>\n<p>IMF Managing Director Kristalina Georgieva
        warned last week that the conflict in the Middle East has delivered a major
        global energy supply <em>&ldquo;shock,&rdquo;</em> saying that world oil output
        has already fallen by 13%, with ripple effects across energy, commodities,
        and fertilizers.</p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69df5c112030273cd32e8487.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 14 Apr 2026 20:44:34
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Russia strikes key energy deal with Asian BRICS partner</title>\n
        \       <link><![CDATA[https://www.rt.com/business/638426-russia-indonesia-brics-oil/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/638426-russia-indonesia-brics-oil/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69de68b185f54072ff4e2b55.jpg\"
        /> Indonesia has agreed to buy crude oil and LPG from Russia as Middle East
        supplies remain uncertain <br/><a href=\"https://www.rt.com/business/638426-russia-indonesia-brics-oil/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Indonesia has agreed to buy crude oil
        and liquefied petroleum gas from Moscow amid global supply shocks</strong></p>\n
        \           \n                        \n            <p>BRICS member Indonesia
        has agreed to purchase crude oil and liquefied petroleum gas (LPG) from Russia,
        citing energy security concerns amid growing global supply disruptions, the
        Energy Ministry in Jakarta has said.</p>\n<p>Indonesia&rsquo;s crude purchases
        from Russia have historically been limited and irregular, with Jakarta sourcing
        roughly a quarter of its oil from the Middle East via the Strait of Hormuz,
        presently under US blockade.</p>\n<p>Russian President Vladimir Putin welcomed
        his Indonesian counterpart Prabowo Subianto for extended talks in the Kremlin
        on Monday and a meeting was held the next day between their respective energy
        ministers, Sergey Tsivilev and Bahlil Lahadalia.</p>\n<p>Indonesia is also
        seeking to expand cooperation with Russia on long-term oil and LPG supplies,
        nuclear energy, and the minerals sector, the ministry said.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69de237a203027435c57584f.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/638398-us-naval-blockade-iran/\">Why
        is Trump making the global energy crisis worse?</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em>&ldquo;We have achieved
        quite good results, allowing us to increase our crude oil reserves. In addition,
        we will also be able to obtain LPG,&rdquo;</em> Bahlil said after the talks
        on Tuesday. LPG is a liquefied mixture of propane and butane widely used for
        cooking, heating, and transport. Representatives of several Russian energy
        companies, including Rosneft, Ruschem, Zarubezhneft, and Lukoil, attended
        the meeting.</p>\n<p>Russian crude could be shipped from Pacific ports in
        the country&rsquo;s Far East, with tankers transiting the South China Sea
        and the Strait of Malacca &ndash; routes already used to supply China and
        other Asian buyers. Russia redirected a significant share of its energy exports
        to Asia following sweeping EU and US sanctions that curtailed its access to
        Western markets.</p>\n\n            ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\"
        href=\"https://www.rt.com/news/638038-queues-caps-and-empty-nets/\">\n            <span>READ
        MORE: </span>Three weeks of fuel, 170 million people: Inside Bangladesh\u2019s
        worsening fuel shortage\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Indonesia
        joined BRICS in 2025, becoming the first Southeast Asian member of the bloc,
        in a move seen as deepening ties with Russia, a founding member, and other
        non-Western economies.</p>\n<p></p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69de68b185f54072ff4e2b55.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 14 Apr 2026 20:00:03
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>What is fueling unrest across the EU?</title>\n        <link><![CDATA[https://www.rt.com/business/637980-eu-diesel-shortages-unrest-fuel-crisis/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637980-eu-diesel-shortages-unrest-fuel-crisis/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d91e7585f5405be616b1e3.jpg\"
        /> Fuel supply disruptions and rising prices linked to the war in the Middle
        East trigger protests and threaten wider economic impact in the EU <br/><a
        href=\"https://www.rt.com/business/637980-eu-diesel-shortages-unrest-fuel-crisis/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The bloc is facing an energy crisis
        due to the Strait of Hormuz disruption, with soaring diesel prices triggering
        protests</strong></p>\n            \n                        \n            <p>The
        EU is sliding into a fuel crisis driven by a global supply shock caused by
        the US-Israeli attack on Iran. It has already triggered protests, early signs
        of shortages, and warnings of the wider economic impact.</p>\n<p>This has
        resulted from the disruption of the Strait of Hormuz, a critical route for
        global energy shipments. Oil prices surged above $120 per barrel during the
        escalation, and while crude fell below the $100 mark after a two-week US-Iran
        ceasefire was announced on April 7, it remains well above the $70 level before
        the war. Prices have remained volatile amid uncertainty over the truce and
        continued disruption to shipping through the strait.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d51a2f2030274a486cbb74.jpg\"
        alt=\"Signs on petrol pumps indicate that oil is out of stock at a gas station
        in Paris, France, April 2026.\" />\n            <figcaption><a href=\"https://www.rt.com/news/637579-france-fuel-shortages-growing/\">French
        facing critical fuel shortages</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Diesel and kerosene have emerged as the central pressure points
        in the crisis. Europe&rsquo;s benchmark diesel and jet fuel prices have risen
        above $200 per barrel equivalent from below $100 in January, according to
        Bloomberg. Jet fuel prices have also surged since the start of the conflict
        in late February, according to industry data cited by multiple outlets.</p>\n<h2>Why
        has diesel become more expensive than gasoline?</h2>\n<p>The European market
        has shifted toward higher diesel consumption following decades of tax policies
        that lowered diesel taxes compared to gasoline.</p>\n<p>The EU&rsquo;s refining
        system produces a different mix of fuels than the market consumes. A barrel
        of crude oil typically yields about 40-50% gasoline, but only around 30&ndash;40%
        diesel and jet fuel combined, with the rest made up of heavier products.</p>\n<p>This
        mismatch has left the bloc structurally short of diesel. The region is a major
        net exporter of gasoline but relies on imports for a significant share of
        its diesel and jet fuel.</p>\n<p>Diesel has traded above gasoline prices at
        the pump in several EU countries.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d7d94a85f540557d21587c.jpg\"
        alt=\"Protesters blockade a motorway in protest of rising fuel prices in Dublin,
        Ireland, April 9, 2026\" />\n            <figcaption><a href=\"https://www.rt.com/news/637864-ireland-army-fuel-protests/\">Ireland
        deploys army to clear fuel protests</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Rising wholesale costs have
        fed through to consumers. Diesel prices at the pump have exceeded &euro;2
        per liter in multiple countries, according to national data and media reports
        &mdash; equivalent to roughly $8.80&ndash;$10.50 per US gallon, compared with
        about $5.60 per gallon in the US. Governments in Italy, Portugal, Slovenia,
        Hungary, Spain, Poland, and Ireland have introduced tax cuts and other measures
        to limit the impact of rising fuel costs.</p>\n<h2>Why are farmers and truckers
        protesting?</h2>\n<p>Rising diesel prices are hitting sectors most dependent
        on the fuel, particularly agriculture and road freight. The EU&rsquo;s transport
        sector is facing a <em>&ldquo;fast-moving diesel shock,&rdquo;</em> according
        to logistics platform Logifie.</p>\n<p>Ireland has become the most visible
        flashpoint of the crisis. Fuel protests have spread nationwide since this
        past Tuesday, led by farmers, truckers and transport workers, disrupting supply
        chains and transport networks, according to local media.</p>\n<p>Blockades
        have strained fuel distribution, with queues forming at petrol stations with
        some running dry amid panic buying. On Thursday, the government called in
        the army to clear the blockades.</p>\n<p>During a protest march in Dublin
        on Friday, demonstrators carried a coffin with <em>&ldquo;RIP Ireland&rdquo;</em>
        written on it.</p>\n\n            <blockquote class=\"twitter-tweet\" data-media-max-width=\"560\"><p
        lang=\"en\" dir=\"ltr\">Fuel protesters now leaving O\u2019Connell Street
        for Kildare Street, carrying a coffin <a href=\"https://t.co/5tbT6wkMNL\">pic.twitter.com/5tbT6wkMNL</a></p>&mdash;
        Nicky Ryan (@NickyRyan_) <a href=\"https://twitter.com/NickyRyan_/status/2042581158135800284?ref_src=twsrc%5Etfw\">April
        10, 2026</a></blockquote> <script async src=\"https://platform.twitter.com/widgets.js\"
        charset=\"utf-8\"></script>\n    \n\n<p></p>\n<h2>What do jet fuel shortages
        mean for summer travel?</h2>\n<p>Airports across Europe could face <em>&ldquo;systemic&rdquo;</em>
        jet fuel shortages within three weeks if the Strait of Hormuz remains closed,
        according to a letter sent by an airport industry group to the European Commission,
        as cited by the Independent.</p>\n<p>According to Corriere della Sera, <em>&ldquo;some
        airports on the continent have been experiencing shortages in jet fuel quantities
        for days without officially reporting it.&rdquo;</em> The outlet cited its
        sources on Friday as saying that <em>&ldquo;it&rsquo;s such a sensitive issue
        that official talk remains tight-lipped,&rdquo;</em> adding that Brussels
        is hoping the truce between the US and Iran will hold.</p>\n\n            ]]>
        <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/news/637969-eu-russian-lng-imports/\">\n
        \           <span>READ MORE: </span>EU quietly ramps up Russian LNG imports
        despite ban plans \u2013 FT\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Ryanair,
        Europe&rsquo;s largest airline by passenger numbers, has started reducing
        flights to popular destinations, with chief executive, Michael O&rsquo;Leary
        warning that the airline will not be able to run its full summer schedule
        if the Strait of Hormuz remains closed.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d91e7585f5405be616b1e3.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 10 Apr 2026 20:24:46
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Middle East war triggering global energy \u2018shock\u2019
        \u2013 IMF</title>\n        <link><![CDATA[https://www.rt.com/business/637989-iran-war-global-economy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637989-iran-war-global-economy/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d9508120302723da53fcb3.jpg\"
        /> Energy supply disruptions caused by the war in the Middle East will have
        a lasting impact on the global economy, the IMF has warned <br/><a href=\"https://www.rt.com/business/637989-iran-war-global-economy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Disruptions to oil and gas supplies
        will leave lasting \u201Cscars\u201D on the world economy, managing director
        Kristalina Georgieva has said</strong></p>\n            \n                        \n
        \           <p>The war in the Middle East has delivered a major global energy
        supply <em>&ldquo;shock&rdquo;</em> that will push up prices further and leave
        the world economy facing weaker growth, the IMF has warned.&nbsp;</p>\n<p>The
        US-Israeli attack on Iran and subsequent Iranian retaliatory strikes across
        the region, including on energy infrastructure, have stressed global markets,
        driving oil prices higher and raising fuel costs. The conflict has effectively
        choked flows through the Strait of Hormuz, a key route that accounts for a
        significant part of global oil and gas supply.&nbsp;</p>\n<p>IMF Managing
        Director Kristalina Georgieva said on Thursday that the turmoil amounts to
        a negative supply shock that is <em>&ldquo;large, global and asymmetric,&rdquo;</em>
        hitting countries differently depending on their reliance on imported fuel.
        &nbsp;</p>\n<p>Global daily oil flows have fallen by about 13% and LNG shipments
        by some 20%, she said, warning that even the IMF&rsquo;s <em>&ldquo;most hopeful
        scenario&rdquo;</em> now involves a <em>&ldquo;downgrade&rdquo;</em> to world
        growth.&nbsp;</p>\n<p><em>&ldquo;Had it not been for this shock, we would
        have been upgrading,&rdquo;</em> Georgieva said, adding that infrastructure
        damage, supply disruptions and loss of confidence will leave lasting <em>&ldquo;scars&rdquo;</em>
        on the global economy.&nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d65b0485f540404b283681.jpg\"
        alt=\"Kirill Dmitriev,\" />\n            <figcaption><a href=\"https://www.rt.com/russia/637705-dmitriev-long-energy-crisis/\">Energy
        crisis will last for months \u2013 Kremlin envoy</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The conflict-related shock is
        already rippling through refineries, transport and food markets, the IMF said,
        citing shortages of diesel and jet fuel that have disrupted trade and tourism,
        and new bottlenecks in moving fertilizer and grain. &nbsp;</p>\n<p>A further
        45 million people have been pushed into food insecurity as a result of the
        escalation, taking the total number facing hunger to more than 360 million
        worldwide, according to the IMF.&nbsp;</p>\n<p>The grim outlook comes as Washington
        and Tehran are expected to hold high-stake peace talks in Pakistan this weekend,
        after they agreed a two-week ceasefire late on Tuesday. Iran says any ceasefire
        must include Lebanon, which has been heavily bombarded by Israel this week.
        The scaled-up attacks, which killed hundreds and wounded more than 1,100,
        have raised concerns that the Iran ceasefire could be derailed.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d9508120302723da53fcb3.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 10 Apr 2026 20:09:05
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>White House warns staff over Iran war bets \u2013 media</title>\n
        \       <link><![CDATA[https://www.rt.com/business/637925-iran-betting-insider-warning-us/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637925-iran-betting-insider-warning-us/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d8e58085f54068125dad49.jpg\"
        /> The warning comes as markets have spiked on several occasions before big
        announcements by President Trump <br/><a href=\"https://www.rt.com/business/637925-iran-betting-insider-warning-us/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The warning comes as markets have spiked
        on several occasions before big announcements by President Trump\_</strong></p>\n
        \           \n                        \n            <p>The White House has
        issued a warning to staff against using insider information on the Iran war
        to trade on financial markets, several media outlets reported on Thursday,
        citing unnamed administration officials.&nbsp;</p>\n<p>Federal employees are
        barred from gambling while on government property, while federal ethics regulations
        prohibiting the use of non-public information for personal gain. Some major
        policy decisions made by US President Donald Trump have, however, been preceded
        by well-timed bets, prompting some experts and politicians to question whether
        information may have leaked in advance.</p>\n<p>The White House Management
        Office reportedly sent a warning email on March 24, a day after Trump ordered
        a five\u2011day pause in planned strikes on Iranian power plants and energy
        infrastructure.</p>\n<p>Multiple news outlets, citing market data, later reported
        that about 15 minutes before the abrupt announcement of a policy shift, futures
        markets saw a surge in trading activity. More than $760 million worth of oil
        futures contracts reportedly changed hands in under two minutes. Several reports
        also said three Polymarket accounts collectively earned over $600,000 after
        correctly anticipating the timing of this week&rsquo;s ceasefire with the
        Islamic Republic.</p>\n<p>There was no evidence of leaks or misuse of insider
        information within the administration, with one official describing the email,
        first reported by the Wall Street Journal, as a timely <em>&ldquo;reminder&rdquo;</em>
        amid discussion of large market trades.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d366c120302714277c38f4.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/637377-polymarket-apologizes-bets-us-pilots-iran/\">Polymarket
        apologizes for allowing bets on US pilots downed in Iran</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The reported
        surge in betting activity has drawn criticism from Trump&rsquo;s political
        opponents. Democratic Senator Richard Blumenthal said prediction markets have
        turned war into a casino-like activity and warned they could enable insider
        trading and leaks of sensitive information. In March, he introduced legislation
        to curb fraud and abuse in fast-growing prediction markets, proposing guardrails
        on platforms such as Kalshi, Polymarket and PredictIt.</p>\n<p>In recent months,
        media reports have pointed to heightened trading around conflict-related events.
        Reuters reported in January that an unknown trader made about $410,000 after
        betting on the removal of Venezuelan President Nicolas Maduro.&nbsp;</p>\n<p>There
        were also reports of users in Israel placing bets on Iranian missile strikes
        on Israeli territory, with some cases involving attempts to influence related
        reporting in order to affect betting outcomes.</p>\n<p>Earlier this month,
        Polymarket apologized after public backlash over allowing bets on whether
        American airmen from a downed US fighter jet would be rescued from Iran.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d8e58085f54068125dad49.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 10 Apr 2026 12:34:40
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Mexico threatens to ditch US gas</title>\n        <link><![CDATA[https://www.rt.com/business/637867-mexico-us-gas-imports-fracking/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637867-mexico-us-gas-imports-fracking/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d7dceb2030270f4302e719.jpg\"
        /> Mexico, the largest importer of US natural gas, is exploring fracking as
        the war in the Middle East fuels global energy price volatility <br/><a href=\"https://www.rt.com/business/637867-mexico-us-gas-imports-fracking/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The country has signaled a shift toward
        domestic fracking as global energy prices soar due to the war in the Middle
        East</strong></p>\n            \n                        \n            <p>Mexico
        is looking to tap unconventional natural gas deposits to boost energy sovereignty,
        President Claudia Sheinbaum has said, as global energy markets reel from the
        shock triggered by the US-Israeli war on Iran.</p>\n<p>The US&rsquo; southern
        neighbor is its biggest importer of natural gas, with the supplies covering
        roughly three-quarters of Mexican demand, while domestic output from conventional
        fields has declined and no longer meets the country&rsquo;s needs.</p>\n<p><em>&ldquo;If
        we continue like this, we&rsquo;re going to import more and more natural gas,&rdquo;</em>
        Sheinbaum said on Wednesday. <em>&ldquo;The other options are what&rsquo;s
        called shale gas, unconventional gas.&rdquo;</em></p>\n<p>Unconventional deposits
        refers to gas trapped in dense rock formations such as shale, which do not
        allow the fuel to flow freely and require more complex extraction techniques,
        including hydraulic fracturing or fracking. Development has so far been limited
        due to environmental concerns, high water usage, regulatory uncertainty, and
        political opposition.</p>\n<p><em>&ldquo;What&rsquo;s the problem with importing?&rdquo;</em>
        Sheinbaum asked rhetorically. <em>&ldquo;Just look at how lots of countries
        in the world are suffering because of what happened in Iran.&rdquo;</em></p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a2c5ba85f540737c72f356.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/633143-living-next-to-superpower/\">Why
        living next to a superpower can never be neutral</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Fuel and energy prices have
        surged since the outbreak of the Iran war in late February, with disruptions
        around the Strait of Hormuz, through which roughly one fifth of global oil
        flows, keeping markets on edge. Oil prices soared to above $100 per barrel
        amid persistent uncertainty over supply routes and fragile ceasefire signals.</p>\n<p>Sheinbaum&rsquo;s
        remarks come amid broader tensions between Mexico City and Washington.</p>\n<p>In
        January, US President Donald Trump said he could order strikes against drug
        cartels on Mexican territory following the abduction of Venezuelan President
        Nicolas Maduro by US commandos over alleged narcotics trafficking.</p>\n<p>Trump
        has also claimed that cartels effectively control Mexico and accused the country
        of <em>&ldquo;flooding&rdquo;</em> the US with drugs and illegal migrants.</p>\n<p>Mexico
        has cooperated on anti-drug efforts but rejects any foreign military presence,
        with Sheinbaum warning any such action would violate national sovereignty.</p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/news/633021-mexico-musk-lawsuit/\">\n
        \           <span>READ MORE: </span>Mexico threatens legal action against
        Musk\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Trump also threatened
        30% tariffs on Mexican imports last year, though they were later lowered through
        negotiations.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d7dceb2030270f4302e719.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 09 Apr 2026 20:20:46
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US energy giants report fallout from Middle East war</title>\n
        \       <link><![CDATA[https://www.rt.com/business/637841-us-exxon-chevron-iran-war-fallout/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637841-us-exxon-chevron-iran-war-fallout/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d7d10085f540505735b47e.jpg\"
        /> US oil giants ExxonMobil and Chevron have reported lower output as the
        Iran conflict has disrupted the energy supply in the Middle East <br/><a href=\"https://www.rt.com/business/637841-us-exxon-chevron-iran-war-fallout/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Exxon and Chevron have both disclosed
        production declines which resulted from the Iran conflict</strong></p>\n            \n
        \                       \n            <p>US energy giants ExxonMobil and Chevron
        have reported lower production and a financial fallout linked to the Iran
        war, citing operational disruptions and market volatility as a result of the
        conflict and restrictions on the Strait of Hormuz regarding shipping linked
        to the West.</p>\n<p>In a filing to US regulators on Wednesday, ExxonMobil
        flagged a potential hit of up to $6.5 billion to earnings, noting that its
        global oil and gas production in the first quarter of 2026 will be about 6%
        lower than in the final quarter of 2025, partly due to attacks on facilities
        in Qatar and the UAE in which it holds stakes. Chevron on Thursday reported
        first\u2011quarter production of 3.8&ndash;3.9 million barrels of oil equivalent
        per day, down from 4.05 million in the previous quarter.</p>\n<p>Exxon, which
        has significant exposure to the Middle East, said the region accounts for
        around 20% of its global output. It added that damage to assets, including
        gas liquefaction facilities in Qatar, <em>&ldquo;will take a prolonged period
        to repair,&rdquo;</em> and that it is unable to estimate when full operations
        will resume.</p>\n<p>The company also said the largest hit to its first-quarter
        earnings, estimated at $3.5 billion to $4.9 billion, is linked to price swings
        caused by the conflict.</p>\n\n            ]]> <![CDATA[\n    <p>\n        <a
        target=\"_blank\" href=\"https://www.rt.com/russia/637705-dmitriev-long-energy-crisis/\">\n
        \           <span>READ MORE: </span>Energy crisis will last for months \u2013
        Kremlin envoy\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>The disclosures
        come as economists warn that a prolonged disruption in the Strait of Hormuz
        and higher energy costs could fuel broader inflation and slow growth, particularly
        in fuel\u2011importing economies. Kremlin envoy Kirill Dmitriev has said global
        energy markets will take months to recover from the shock.</p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d7d10085f540505735b47e.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 09 Apr 2026 17:58:21
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>New AI too dangerous for public release \u2013 Anthropic</title>\n
        \       <link><![CDATA[https://www.rt.com/business/637689-ai-dangerous-public-release-anthropic/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637689-ai-dangerous-public-release-anthropic/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d650692030271ee9400e72.jpg\"
        /> Anthropic formed Project Glasswing with Big Tech partners and is discussing
        capabilities of the new AI Mythos model with Washington <br/><a href=\"https://www.rt.com/business/637689-ai-dangerous-public-release-anthropic/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The startup reportedly formed Project
        Glasswing with Big Tech partners and is discussing the model\u2019s capabilities
        with the US government</strong></p>\n            \n                        \n
        \           <p>US artificial intelligence (AI) startup Anthropic has built
        a new model it claims is too powerful to make publicly available, according
        to the company&rsquo;s executives, as cited by several media outlets.</p>\n<p>The
        firm said on Wednesday that it is discussing the model dubbed Claude Mythos
        Preview and its capabilities with the US government.</p>\n<p>The news comes
        a month after US President Donald Trump banned government agencies from using
        Anthropic&rsquo;s AI for six months, accusing the company of pressuring the
        Pentagon and endangering national security. At the time, the US Department
        of Defense struck a deal with the company&rsquo;s rival, OpenAI, to use its
        tools in classified military systems.</p>\n<p>Internal materials on the unreleased
        Claude Mythos model were inadvertently leaked in February after thousands
        of documents were left in a public data cache.</p>\n<p>Also earlier this month,
        Anthropic accidentally published over 500,000 lines of secret code for its
        Claude AI, including unreleased features and developer notes, calling it <em>&ldquo;human
        error, not a security breach.&rdquo;</em></p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a2e48585f54021e5732be2.jpg\"
        alt=\"Co-founder and CEO of OpenAI Sam Altman\" />\n            <figcaption><a
        href=\"https://www.rt.com/business/633184-openai-strikes-deal-pentagon-anthropic/\">OpenAI
        strikes deal with Pentagon</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Anthropic&rsquo;s new model is <em>&ldquo;extremely autonomous&rdquo;</em>
        and can reason like an advanced security researcher, Logan Graham, head of
        the company&rsquo;s frontier red team, told Axios. He said it can detect tens
        of thousands of vulnerabilities and, unlike previous models, generate the
        corresponding exploits.</p>\n<p>In an interview with the New York Times, Graham
        stressed that the model marks <em>&ldquo;the starting point for what we think
        will be an industry change point, or reckoning, with what needs to happen
        now.&rdquo;</em></p>\n<p>In a Wednesday blog post, Anthropic said the Mythos
        model will be available only to a select group of tech and cybersecurity companies,
        citing concerns over its ability to find and exploit security flaws. The company
        added that it won&rsquo;t be made publicly accessible until safeguards are
        in place to limit its most dangerous capabilities.</p>\n<p>Rather than releasing
        the technology widely, Anthropic plans to provide access through a new industry
        partnership, Project Glasswing. The initiative, which includes over 40 organizations
        such as Apple, Amazon, Microsoft, Google, and NVIDIA, will test the model&rsquo;s
        ability to identify and help fix vulnerabilities in critical software.</p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/news/636952-anthropic-leaks-claude-code/\">\n
        \           <span>READ MORE: </span>AI giant Anthropic suffers strategic code
        hemorrhage\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Anthropic said
        it has given the model to external groups, including US government organizations,
        to assess key risks &ndash; such as cybersecurity, loss of control, CBRN,
        and harmful manipulation &ndash; it has incorporated the findings into its
        overall risk assessment.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d650692030271ee9400e72.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 08 Apr 2026 13:11:51
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>The nightmare oil price nobody\u2019s talking about</title>\n
        \       <link><![CDATA[https://www.rt.com/news/637208-brent-oil-spread-price/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/news/637208-brent-oil-spread-price/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d0217885f54057ca779780.jpg\"
        /> Brent crude futures are lagging behind real-world prices, meaning oil supplies
        are being hit harder by the Iran war than headlines suggest <br/><a href=\"https://www.rt.com/news/637208-brent-oil-spread-price/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Real world oil prices are far higher
        than the figures seen on TV news reports</strong></p>\n            \n                        \n
        \           <p>When the first US and Israeli missiles hit Iran more than a
        month ago, an oil price of $150 per barrel was considered a doomsday prediction.
        But the price of physical Brent crude is already a hair&rsquo;s breadth from
        $150, while the futures price hasn&rsquo;t caught up yet.</p>\n<p>The Brent
        front-month futures price &ndash; which serves as a barometer for 80% of the
        world&rsquo;s crude oil &ndash; has sat above $100 per barrel for several
        weeks. Rising and falling as US President Donald Trump changes the war&rsquo;s
        aims and end date, it closed above $109 on Thursday, already higher than at
        any point since the Ukraine conflict escalated in early 2022.</p>\n<p>But
        to understand just how severe the current crisis is becoming, it&rsquo;s important
        to look at the Dated Brent price. Only widely monitored during times of market
        disruption, this represents the actual on-the-spot price that purchasers are
        paying for Brent cargoes in the North Sea. On Thursday, it reached $141.37,
        a level unseen since the onset of the 2008 financial crisis.</p>\n    <figure>\n
        \       <img src=\"https://mf.b37mrtl.ru/files/2026.04/original/69d02386203027116a0d5194.png\"
        alt=\"A graph by S&amp;P shows dated Brent oil prices passing $141 per barrel,
        April 3, 2026\" />\n                    <figcaption>\n                                    Dated
        Brent oil prices pass $141 per barrel, April 3, 2026\n                \n                <span
        class = \"copyright\">\n                       \xA9&nbsp; S&P                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p></p>\n<p>This speaks
        to a severe supply shortage on the ground as buyers are willing to pay a huge
        premium to get their hands on barrels, not in the near future, but right now.&nbsp;</p>\n<h2>What
        is the significance of the huge spread?</h2>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69cfcc4c85f5402ddc2b6358.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/africa/637182-iran-grantssouth-african-vessels-strait-hormuz-pass/\">South
        African vessels can pass through Strait of Hormuz \u2013 Iran</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>What newspapers
        and broadcasters typically show is the front-month Brent price: bought by
        traders for delivery on a specific date the following month. This is the most
        liquid and widely quoted benchmark. Importantly, pricing reflects future expectations,
        so in this case investors are betting on at least some kind of deescalation
        and denouement in the Persian Gulf.&nbsp;&nbsp;</p>\n<p>The front-month is
        also the domain of speculators who have no intention of ever receiving any
        oil: instead they seek to take advantage of price shifts and exit their positions
        before delivery. The front-month price does of course reflect physical realities
        &ndash; but it&rsquo;s also somewhat financialized.&nbsp;</p>\n<p>The fact
        that actual physical Brent crude is moving at prices $32 higher than the front-month
        indicates that the physical supply of oil is extremely tight. Typically, the
        spread between the front-month contract and Dated Brent is less than $2, although
        in a tight market it can drift somewhat higher. What we are seeing now is
        highly abnormal. This higher Dated Brent price isn&rsquo;t the result of hedge
        funds or momentum traders bidding up the price. This is what is changing hands
        on the ground for real barrels.&nbsp;</p>\n<p>The epicenter of the crisis
        is the Strait of Hormuz. A lot depends on what happens in this chokepoint.
        Less than 40km wide at its narrowest point, just under a third of the world&rsquo;s
        seaborne oil transits the strait on its way from Middle Eastern producers
        to global markets.&nbsp;</p>\n    <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.04/original/69d022962030270e4528febd.png\"
        alt=\"A MarineTraffic map shows shipping backed up on either side of the Strait
        of Hormuz, April 3, 2026\" />\n                    <figcaption>\n                                    Marine
        traffic backed up on either side of the Strait of Hormuz, April 3, 2026\n
        \               \n                <span class = \"copyright\">\n                       \xA9&nbsp;
        MarineTraffic                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p>Once a free international
        waterway, the strait has been turned into a de-facto toll road overseen by
        the Iranian military. Iran&rsquo;s Islamic Revolutionary Guard Corps (IRGC)
        decides which vessels are allowed through, with limited numbers of Chinese,
        Indian, Pakistani, and South African ships making the passage in recent weeks.
        Daily transits have fallen from around 130 before the war, to low single figures
        last month, and around a dozen this week.</p>\n<h2>Why isn&rsquo;t front-month
        Brent trading closer to the spot market?</h2>\n<p>Based on the price difference,
        the Brent futures market is still relatively sanguine about the prospects
        for a resolution. Some analysts, however, believe the market isn&rsquo;t fully
        reckoning with the supply shortage that is now driving spot prices through
        the roof. There is also the typical internet chatter about the futures market
        being manipulated to keep some kind of lid on oil prices. In other words,
        the big spread is garnering a lot of attention.&nbsp;</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69cd41c520302727bc2d66a6.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/636949-trump-iran-announcement/\">Trump
        urges allies to \u2018go to Strait of Hormuz and just take it\u2019</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Meanwhile,
        there is no sign that normal traffic will resume in the Strait of Hormuz anytime
        soon. US President Donald Trump has swung between declaring the passage open,
        telling shipping companies to <em>&ldquo;have courage&rdquo;</em> and sail
        through it regardless, vowing that the US will open it, and telling his allies
        to deal with the closure themselves. The messaging, and Trump&rsquo;s timeline
        for an end to the conflict, changes day by day.</p>\n<p>Looking at other benchmarks,
        there are signs of a deepening crisis. Dubai and Omani oil is now selling
        for well above $150, reflecting the difficulty these Gulf nations have in
        exporting their product, while West Texas Intermediate (WTI) &ndash; priced
        in landlocked Oklahoma &ndash; surpassed Brent by $3 on Thursday. This indicates
        that traders predict further uncertainties with the supply of seaborne Brent,
        and are pivoting toward American crude instead.&nbsp;</p>\n<p>Additionally,
        the WTI crude prompt spread (price difference between the two nearest contracts)
        widened to more than $16 per barrel on Thursday, the largest premium on record.
        This type of widening spread is often due to short-sellers who had bet on
        a price drop (in this case due to a quick end to the war) getting squeezed
        and buying back contracts to close their positions, in turn driving up front-month
        prices.</p>\n<h2>How high will oil go?</h2>\n<p>The vast spread between what
        hedge fund traders see on their Bloomberg terminals and what buyers are paying
        right now is a glaring red flag, suggesting a massive supply crunch. Physical
        oil prices are closing in on the psychological barrier of $150, and analysts
        have readjusted their worst case scenario predictions, with CNN declaring
        on Thursday that should the conflict drag on until June, a front-month price
        of $200 <em>&ldquo;isn&rsquo;t as crazy as it sounds.&rdquo;</em> Left unsaid
        is the fact that at a front-month price of $200, the spot price would almost
        certainly be even higher.</p>\n<p>Zooming out from Brent and WTI, there are
        dozens of different oil prices, representing more than 100 different blends
        of crude, their spot prices, and their varying futures contracts. All are
        higher than they were in February, and for the average person around the world
        the result is the same: the war on Iran has made fuel, food, and basic necessities
        more expensive, and life tougher.</p>\n\n            <blockquote class=\"twitter-tweet\"><p
        lang=\"en\" dir=\"ltr\">Global recession is already inevitable this year,
        with energy-importing countries being hit the hardest.<br><br>This will become
        clear to many by June.</p>&mdash; Kirill Dmitriev (@kadmitriev) <a href=\"https://twitter.com/kadmitriev/status/2039765690693853255?ref_src=twsrc%5Etfw\">April
        2, 2026</a></blockquote> <script async src=\"https://platform.twitter.com/widgets.js\"
        charset=\"utf-8\"></script>\n    \n\n<p><em>&ldquo;Global recession is already
        inevitable this year, with energy-importing countries being hit the hardest,&rdquo;</em>
        Russian presidential envoy Kirill Dmitriev warned on Thursday. <em>&ldquo;This
        will become clear to many by June.&rdquo;</em></p>\n<p><strong><br /><br /><br
        /><br /></strong></p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69d0217885f54057ca779780.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 03 Apr 2026 20:41:07
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU members forced to pay billions for von der Leyen\u2019s
        Covid deal</title>\n        <link><![CDATA[https://www.rt.com/business/637095-eu-countries-pay-covid-deal/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637095-eu-countries-pay-covid-deal/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69cebd072030271e6d1ba571.jpg\"
        /> Poland and Romania must fulfill their obligations under an EU deal and
        buy $2.2 billion worth of Covid-19 vaccines, a court has ruled <br/><a href=\"https://www.rt.com/business/637095-eu-countries-pay-covid-deal/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>A Belgian court has ordered Poland
        and Romania to buy $2.2 billion worth of Covid-19 vaccines the do not need
        from Pfizer and BioNTech</strong></p>\n            \n                        \n
        \           <p>Poland and Romania have to fulfill their obligations under
        an EU deal and buy &euro;1.9 billion ($2.2 billion) worth of unneeded Covid-19
        vaccines from Pfizer and BioNTech, a Belgian court has ruled.</p>\n<p>The
        case is linked to the agreements struck by Brussels at the height of the pandemic.
        European Commission President Ursula von der Leyen has faced criticism over
        her role in the controversial deals.</p>\n<p>At the time, the commission advocated
        collectively purchasing billions of shots and distributing them among EU member
        states struggling to contain Covid-19. It ended up signing multibillion-euro
        deals with vaccine manufacturers in 2020 and 2021.</p>\n<p>Poland refused
        to comply with its part of the contract in 2022, pointing to an improving
        situation with Covid and potential abuse of its dominant position by Pfizer.
        Romania followed suit soon thereafter. The US pharma giant filed a lawsuit
        against both nations in 2023.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2025.12/thumbnail/693167c985f5401be25a5053.jpg\"
        alt=\"RT composite.\" />\n            <figcaption><a href=\"https://www.rt.com/news/628918-eu-corruption-scandal-leyen-jeopardy/\">EU
        corruption scandal could take down von der Leyen \u2013 Politico</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The Brussels
        court rejected the defendants&rsquo; arguments in its verdict and ruled that
        the decrease in the infection rate did not justify the <em>&ldquo;modification&rdquo;</em>
        of contractual obligations.</p>\n<p>Under the ruling, Poland would have to
        buy Pfizer vaccines worth &euro;1.3 billion while Romania would have to purchase
        shots worth &euro;600 million.</p>\n<p>Warsaw said it would <em>&ldquo;pursue
        all legal remedies available to it to amend this ruling and defend its interests.&rdquo;</em>
        Bucharest stated that the requested sum amounts to <em>&ldquo;the equivalent
        of \u2060a ... regional hospital in Romania&rdquo;</em> and also vowed to
        appeal the decision.</p>\n<p>The controversial EU vaccine deal led to the
        so-called Pfizergate scandal, in which the European Commission and von der
        Leyen personally were accused of concealing details of negotiations with Pfizer
        and AstraZeneca.</p>\n<p>Von der Leyen was particularly criticized for her
        refusal to disclose or preserve key text messages she supposedly exchanged
        with Pfizer CEO Albert Bourla. The issue even prompted a no-confidence motion
        in the EU Parliament last year, which she ultimately survived.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69cebd072030271e6d1ba571.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 02 Apr 2026 19:19:59
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Panic buying drains French gas stations</title>\n        <link><![CDATA[https://www.rt.com/business/637079-france-fuel-shortage/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637079-france-fuel-shortage/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ce788820302727271964e5.jpg\"
        /> France is facing a fuel crunch after price caps and panic buying sparked
        shortages at hundreds of TotalEnergies filling stations <br/><a href=\"https://www.rt.com/business/637079-france-fuel-shortage/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Hundreds of sites have run dry across
        the country after price caps triggered a surge in demand amid Middle East
        war disruptions</strong></p>\n            \n                        \n            <p></p>\n<p>Fuel
        shortages have spread across France after drivers rushed to fill their tanks
        following the introduction of price caps, straining supplies at hundreds of
        stations, according to the Energy Ministry and media reports.</p>\n<p>Around
        900 stations have run out of at least one type of fuel, including around 700
        operated by energy major TotalEnergies, the Energy Ministry said on Wednesday,
        blaming logistical issues rather than a national supply shortage.</p>\n<p>Other
        estimates suggest that up to 1,600 sites may have experienced temporary shortages
        amid surging fuel prices linked to the Middle East conflict. Diesel prices
        in France reached record highs of around &euro;2.25 ($2.45) per liter.</p>\n<p>The
        US-Israeli war against Iran has triggered a global energy shock, sending oil
        prices surging and pushing fuel costs higher for consumers worldwide. The
        conflict has effectively choked flows through the Strait of Hormuz, a key
        artery for around a fifth of global oil.</p>\n<p>On Tuesday, TotalEnergies
        extended its cap on gasoline and diesel prices at stations across mainland
        France until April 7, as demand surged following the measure. The company
        said traffic across its network increased sharply since mid-March, warning
        of <em>&ldquo;localized supply tensions,&rdquo;</em> particularly for diesel.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ccf8d0203027764e215959.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/636940-uk-energy-shock-imf/\">UK
        facing worst economic shock in decades \u2013 IMF</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>French government spokeswoman
        Maud Bregeon told TF1 TV that less than 10% of stations were affected.</p>\n<p>She
        said, <em>&ldquo;there is no risk of a supply shortage at this time,&rdquo;</em>
        adding that France still holds around 100 million barrels in strategic reserves.
        <em>&ldquo;We still have some leeway and will respond as necessary to occasional
        supply difficulties.&rdquo;</em></p>\n<p>Rising energy costs are feeding into
        the broader economy. French inflation accelerated to 1.9% in March, the fastest
        since August 2024, with energy prices jumping 7.3% after more than a year
        of decreases, data from statistics office Insee shows.</p>\n<p>Shell CEO Wael
        Sawan warned last week that Europe could face fuel shortages as damage to
        Gulf energy facilities from the Iran war disrupts supplies, with jet fuel
        already affected and diesel likely next, followed by gasoline ahead of the
        summer driving season.</p>\n<p>The crisis has also revived debate in the EU
        over energy sourcing. Before 2022, Russia supplied around a quarter of the
        bloc&rsquo;s oil imports, but the EU has since sharply reduced purchases and
        plans a full phase-out by 2027.</p>\n<p></p>\n<p></p>\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ce788820302727271964e5.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 02 Apr 2026 15:48:31
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Europeans must pay more for medicine \u2013 German pharma giant</title>\n
        \       <link><![CDATA[https://www.rt.com/business/637076-bayer-warning-eu-pay-more-drugs/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/637076-bayer-warning-eu-pay-more-drugs/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ce78d285f5405d1d150353.jpg\"
        /> German pharma giant Bayer says European drugmakers must raise prices for
        new medicines to offset US pressure to cut costs for Americans <br/><a href=\"https://www.rt.com/business/637076-bayer-warning-eu-pay-more-drugs/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Profits have fallen since US President
        Donald Trump pushed to lower prices for Americans</strong></p>\n            \n
        \                       \n            <p>German pharma giant Bayer has warned
        that European drugmakers must raise prices on new medicines in Europe to maintain
        profits amid US pressure to lower drug costs for Americans.</p>\n<p>Last year,
        US President Donald Trump issued an executive order to force big pharma to
        benchmark key medicines sold in the US against prices in other countries,
        citing unfair pricing gaps. As of March, 16 major drugmakers have struck deals
        with Washington to cut prices in the US market in exchange for three years
        of tariff relief.</p>\n<p>Though Bayer was not among the companies, the head
        of its pharmaceuticals division, Stefan Oelrich, told Bloomberg on Wednesday
        that the company is preparing for a new pricing system and is in talks with
        governments in Europe, Japan, and other wealthy nations to push for higher
        prices on new medicines to offset discounts for US consumers.</p>\n<p><em>&ldquo;In
        Europe, we need to raise the price level for new product launches,&rdquo;</em>
        Oelrich told Bloomberg. <em>&ldquo;Otherwise, as an industry &ndash; and this
        naturally applies to us as well &ndash; we&rsquo;ll be faced with additional
        discounts in the US that wouldn&rsquo;t allow us to recoup our total expenses.&rdquo;</em></p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69cd44da85f540439c6e1dc5.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/russia/636979-russia-tests-groundbreaking-cancer-treatment/\">Russia
        tests groundbreaking cancer treatment</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>He made similar remarks to the
        Financial Times, warning that Europeans will have to pay more for medicines
        if the region is to remain an attractive market for new drugs. He previously
        warned that linking US prices to European levels could force companies to
        choose between markets, as launching in lower-priced Europe now risks undermining
        US revenues.</p>\n<p>New drug launches in Europe have dropped by around 35%
        over the past ten months since Trump&rsquo;s order, Reuters reported on Wednesday,
        citing GlobalData. Some companies have even withdrawn products from Europe.
        Amgen pulled cholesterol drug Repatha from Denmark. Indivior withdrew anti-addiction
        drugs Subutex and Suboxone from Sweden and other markets.</p>\n\n            ]]>
        <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/business/631170-us-drug-prices-europe/\">\n
        \           <span>READ MORE: </span>US big pharma sector poised to hike prices
        in Europe \u2013 FT\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Oelrich&rsquo;s
        warning comes amid a broader US-EU trade rift since Trump&rsquo;s return to
        the White House, culminating in a trade deal last year that was widely seen
        in Europe as humiliating. The agreement caps tariffs on most EU goods entering
        the US at 15%, while tariffs on some American imports are eliminated. The
        bloc also agreed to invest $600 billion in the US and purchase $750 billion
        worth of American energy.</p>\n<p></p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ce78d285f5405d1d150353.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 02 Apr 2026 15:45:29
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>UK facing worst economic shock in decades \u2013 IMF</title>\n
        \       <link><![CDATA[https://www.rt.com/business/636940-uk-energy-shock-imf/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/636940-uk-energy-shock-imf/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ccf8d0203027764e215959.jpg\"
        /> The UK faces one of the largest economic shocks in years from the Middle
        East conflict, the IMF has warned <br/><a href=\"https://www.rt.com/business/636940-uk-energy-shock-imf/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>British households are facing renewed
        pressure on living standards as fuel costs surge, the organization has warned</strong></p>\n
        \           \n                        \n            <p>The UK is facing one
        of the largest economic shocks of any country from the Middle East conflict,
        the International Monetary Fund (IMF) has warned, saying it is <em>&ldquo;especially
        exposed&rdquo;</em> to surging energy prices due to its heavy reliance on
        gas-fired power.</p>\n<p>Energy importers across Europe are taking the hardest
        hit after prices surged in the wake of US- Israeli strikes on Iran in late
        February and subsequent retaliatory attacks across the region. The crisis
        has effectively shut the Strait of Hormuz &ndash; a key shipping route that
        carries about a fifth of global oil supply &ndash; choking off flows and driving
        up fuel and input costs.</p>\n<p>In a blogpost by senior IMF officials including
        chief economist Pierre-Olivier Gourinchas earlier this week, the Fund said
        heavily indebted governments would have little room to cushion the blow, leaving
        households and businesses more exposed. It added the Middle East war&rsquo;s
        impact would be <em>&ldquo;both global and highly uneven,&rdquo;</em> with
        some countries, including the UK, facing a renewed squeeze on living standards.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b8489985f5405f450f66bd.jpg\"
        alt=\"FILE PHOTO: Closed-down small businesses at Elephant and Castle, London,
        UK, February 28, 2026.\" />\n            <figcaption><a href=\"https://www.rt.com/business/635251-iran-conflict-uk-layoffs-telegraph/\">Iran
        war could cost over 100,000 Brits their jobs \u2013 Telegraph</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The UK and
        Italy are among the most exposed, with rising energy bills set to drive up
        living costs, the IMF said, while France and Spain are relatively shielded
        due to greater reliance on nuclear and renewable energy.</p>\n<p>UK Prime
        Minister Keir Starmer on Monday urged the public to <em>&ldquo;act as normal,&rdquo;</em>
        insisting that fuel supplies remain secure.</p>\n<p>Economists warn that the
        British economy is now in a far weaker position than four years ago, when
        the EU and UK began to phase out affordable Russian gas and oil over the Ukraine
        conflict.</p>\n<p>Former Bank of England deputy governor Howard Davies said
        this week the UK could be heading towards an energy crisis comparable to the
        turmoil of the 1970s, when oil prices quadrupled after the 1973 Arab-Israeli
        war as Arab producers imposed an embargo on Western nations. He warned that
        Middle East supply could remain constrained, keeping prices elevated &ndash;
        if not as high as $150 a barrel, then well above the roughly $60 seen before
        the current crisis.</p>\n<p>UK natural gas prices have more than doubled since
        December, while Brent crude &ndash; near $60 before the conflict &ndash; briefly
        topped $116 earlier this week before easing to about $100 a barrel on Wednesday.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.04/thumbnail/69ccf8d0203027764e215959.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 01 Apr 2026 11:12:35
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US court rules against Pentagon in killer AI dispute</title>\n
        \       <link><![CDATA[https://www.rt.com/business/636431-anthropic-pentagon-lawsuit/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/636431-anthropic-pentagon-lawsuit/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c69d7a85f540462830839e.jpg\"
        /> A US judge has blocked the Pentagon\u2019s contract ban with Anthropic
        after the AI company refused to allow military use of its technology <br/><a
        href=\"https://www.rt.com/business/636431-anthropic-pentagon-lawsuit/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The Department of War had ordered contractors
        to drop Anthropic after it refused to allow military use of its technology</strong></p>\n
        \           \n                        \n            <p>A US federal judge
        has blocked a Pentagon order designating Anthropic a national security risk,
        saying US officials likely broke the law and retaliated against the AI company
        over its public comments on how its technology should be used.</p>\n<p>Anthropic,
        a leading developer of large language models, has been locked in a dispute
        with the Department of War over military use of its Claude system, with defense
        officials pushing to allow the technology for <em>&ldquo;all lawful uses.&rdquo;</em></p>\n<p>The
        company resisted, citing concerns that it could be used for mass domestic
        surveillance or fully autonomous weapons. The Pentagon ended talks, imposed
        the designation, and ordered contractors to stop using Claude.</p>\n<p>On
        Thursday, US District Judge Rita Lin also blocked an order to cut all government
        contracts with Anthropic, calling it a <em>&ldquo;classic&rdquo;</em> First
        Amendment retaliation.</p>\n<p><em>&rdquo;Nothing in the governing statute
        supports the Orwellian notion that an American company may be branded a potential
        adversary&hellip; for expressing disagreement with the government,&rdquo;</em>
        Lin wrote, noting that the designation is typically reserved for <em>&ldquo;foreign
        intelligence agencies, terrorists, and other hostile actors.&rdquo;</em></p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c1577185f5402aca4bbd3e.jpg\"
        alt=\"FILE PHOTO. Pokemon GO app.\" />\n            <figcaption><a href=\"https://www.rt.com/news/635939-pokemon-go-world-map/\">Gotta
        map \u2018em all: AI company uses Pokemon GO player data to chart the world</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Anthropic
        sued the administration of US President Donald Trump on Monday, calling the
        move <em>&ldquo;unprecedented and unlawful&rdquo;</em> and alleging retaliation
        for its criticism of government policy.</p>\n<p><em>&rdquo;The Constitution
        does not allow the government to wield its enormous power to punish a company
        for its protected speech,&rdquo;</em> the company stated in its lawsuit.</p>\n<p>Last
        month Trump ordered all US federal agencies, including the Pentagon, to stop
        using Anthropic&rsquo;s technology, granting the military a six-month phase-out
        period for systems already in use.</p>\n<p>Secretary of War Pete Hegseth accused
        the company of <em>&ldquo;arrogance and betrayal,&rdquo;</em> saying the Pentagon
        would shift to a <em>&ldquo;more patriotic&rdquo;</em> alternative. The department
        has since struck a deal with OpenAI, whose CEO, Sam Altman, said it includes
        safeguards against mass domestic surveillance and requires human oversight
        in the use of force.</p>\n<p>Anthropic warned that the actions have unsettled
        customers, including those without federal ties, and could cost the company
        billions in future revenue. Some agencies, including the Department of Health
        and Human Services and the General Services Administration, have reportedly
        already removed its products.</p>\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c69d7a85f540462830839e.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 27 Mar 2026 16:11:48
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Europe to face fuel shortage \u2013 Shell CEO</title>\n        <link><![CDATA[https://www.rt.com/business/636194-europe-fuel-shortages-iran-war/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/636194-europe-fuel-shortages-iran-war/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c52a7d2030275a884cdda9.jpg\"
        /> European diesel and gasoline supplies could be affected next month due
        to the Iran war, Shell CEO Wael Sawan has warned <br/><a href=\"https://www.rt.com/business/636194-europe-fuel-shortages-iran-war/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The Iran war is set to hit diesel and
        gasoline supplies starting next month, Wael Sawan has warned</strong></p>\n
        \           \n                        \n            <p>European countries
        could face fuel shortages as soon as next month as a result of the US-Israeli
        war on Iran, Shell CEO Wael Sawan has warned.</p>\n<p>Major energy facilities
        in the Gulf have been damaged in the conflict, while maritime traffic through
        the Strait of Hormuz, a key waterway that handles about 20% of global oil
        flows, has nearly halted.</p>\n<p>The war has already affected supplies of
        jet fuel, Sawan said on Tuesday, as cited by Reuters. Diesel is set to be
        next, followed by gasoline at the start of the summer driving season, he added.</p>\n<p><em>&ldquo;South
        Asia was first to get that brunt. That&rsquo;s moved to Southeast Asia, Northeast
        Asia and then more so into Europe as we get into April,&rdquo;</em> Sawan
        said at an energy conference in Houston.</p>\n<p>Sri Lanka, Bangladesh, and
        Pakistan have reduced working hours and introduced fuel rationing. Japan and
        South Korea have released oil from strategic reserves.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c3a71285f54037457bbaea.jpg\"
        alt=\"File photo: A Boeing 787 aircraft belonging to the Biman Bangladesh
        Airlines prepares to take off at the Hazrat Shahjalal International Airport
        in Dhaka.\" />\n            <figcaption><a href=\"https://www.rt.com/news/636137-bangladesh-hikes-jet-fuel-prices/\">Bangladesh
        hikes jet fuel prices by 80%</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Europe is less reliant on Gulf supplies than Asia. It imports about
        a quarter of its crude, in addition to certain petroleum products, from North
        Africa. Alternative sources include the US, Norway, and West Africa. However,
        supply remains tight and fierce competition from Asian buyers for cargoes
        is driving prices higher.</p>\n<p>The crisis has revived discussions in the
        EU about returning to Russian supply. Before 2022, Russia accounted for roughly
        a quarter of the bloc&rsquo;s oil imports. Since then, the EU has sharply
        reduced the imports and is planning a full phase-out of all Russian oil by
        2027.</p>\n<p>The only major remaining route, the Druzhba pipeline via Ukraine,
        has been disrupted since late January. Hungary and Slovakia have accused Kiev
        of halting flows for political reasons.</p>\n\n            ]]> <![CDATA[\n
        \   <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/russia/636162-russian-energy-trade-priority/\">\n
        \           <span>READ MORE: </span>Moscow announces \u2018neighbors first\u2019
        energy policy: Who is likely to get Russian oil and gas?\n        </a>\n    </p>\n]]>\n<![CDATA[\n
        \   \n\n<p>The situation has led to some politicians calling for a reassessment
        of energy sanctions on Moscow to ease supply pressures and curb rising costs.
        The European Commission, however, has ruled out any return to Russian energy.
        Commission President Ursula von der Leyen warned earlier this month that doing
        so would be a <em>&ldquo;strategic blunder.&rdquo;</em></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c52a7d2030275a884cdda9.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 25 Mar 2026 18:49:39
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Russian oil at premium over Middle East war \u2013 Bloomberg</title>\n
        \       <link><![CDATA[https://www.rt.com/business/636171-india-russian-oil-purchases/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/636171-india-russian-oil-purchases/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c400b485f54049c5647adf.jpg\"
        /> Indian refiners have reportedly boosted Russian oil purchases, paying above
        Brent price as the Middle East war disrupts supplies <br/><a href=\"https://www.rt.com/business/636171-india-russian-oil-purchases/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Indian refiners have reportedly payed
        above benchmark prices for about 60 million barrels for April delivery</strong></p>\n
        \           \n                        \n            <p>Indian refiners have
        sharply increased purchases of Russian oil for delivery next month, paying
        above global benchmark prices, Bloomberg reports.</p>\n<p>The US-Israeli war
        against Iran has virtually halted shipping traffic through the Strait of Hormuz,
        which carries around a fifth of the world&rsquo;s daily oil supply, triggering
        a surge in oil and gas prices and increasing demand for Russian oil.</p>\n<p>Companies
        in the world&rsquo;s third-largest oil-importing nation have struck deals
        for around 60 million barrels of Russian crude for April, people familiar
        with the matter told the outlet on Wednesday. The cargoes were reportedly
        bought at premiums of $5 to $15 a barrel above Brent, a marked shift from
        the steep discounts that characterized Russian sales to India before the conflict.</p>\n<p>The
        April volume is more than double the level of India&rsquo;s purchases of Russian
        oil seen in February, according to Kpler. The buying spree followed a US sanctions
        waiver that allowed India to take Russian oil already loaded on tankers before
        March 5.&nbsp;</p>\n<p>The 30-day measure, announced by Washington earlier
        this month to ease shortages caused by the conflict, was later expanded to
        cover other countries and updated to include cargoes that were at sea before
        March 12. India&rsquo;s imports of Russian oil have since soared, according
        to data from S&amp;P Global Commodities at Sea.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b01e7a2030272ac05c1d81.jpg\"
        alt=\"File photo of the Mangalore Refinery and Petrochemicals Limited (MRPL)
        refinery.\" />\n            <figcaption><a href=\"https://www.rt.com/india/634380-india-buys-30-million-barrels/\">India
        buys 30 million barrels of Russian oil after US \u2018waiver\u2019 \u2013
        Bloomberg</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>India has become a key market for Russian oil since 2022; it bought
        almost 2 million barrels a day in 2024.&nbsp;</p>\n<p>The country scaled back
        purchases late last year under pressure from Washington, turning instead to
        Saudi Arabia and Iraq. Much of this Middle Eastern oil subsequently became
        trapped in the Persian Gulf after the outbreak of the Iran war, squeezing
        availability and pushing Brent crude prices to as high as $120 a barrel this
        month.</p>\n<p>India imports 85% of its oil and nearly half of its natural
        gas. Around half of its crude oil and LNG shipments are <a href=\"https://www.rt.com/news/635656-safe-corridor-hormuz-iran-oil/\"
        target=\"_blank\" rel=\"noopener noreferrer\">routed</a> through the Strait
        of Hormuz.</p>\n<p>Officials in New Delhi expect the US waiver to be extended
        as long as disruptions through the strait persist, Bloomberg&rsquo;s sources
        said.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c400b485f54049c5647adf.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 25 Mar 2026 16:47:28
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU shelves Russian oil ban as Iran war rattles energy markets</title>\n
        \       <link><![CDATA[https://www.rt.com/business/636061-eu-russian-oil-ban-proposal/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/636061-eu-russian-oil-ban-proposal/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c2f31285f5403d4e2c1a8f.jpg\"
        /> The EU has reportedly delayed plans for a complete ban on Russian oil imports
        amid the turmoil in global energy markets <br/><a href=\"https://www.rt.com/business/636061-eu-russian-oil-ban-proposal/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The proposal, due to be unveiled in
        mid\u2011April, was reportedly dropped from the agenda because of \u201Ccurrent
        geopolitical developments\u201D</strong></p>\n            \n                        \n
        \           <p>The EU has put plans on hold for a complete ban on Russian
        oil imports, news outlets have reported. The move comes amid renewed turbulence
        in energy markets driven by the war in the Middle East.&nbsp;</p>\n<p>The
        draft law, part of the REPowerEU roadmap to phase out Russian fossil fuels
        by 2027, had been tentatively scheduled for April 15 but has now been removed
        from the European Commission&rsquo;s published work calendar, Euronews and
        Reuters reported on Tuesday. &nbsp;</p>\n<p>An unnamed EU official was quoted
        as saying the delay was because of <em>&ldquo;current geopolitical developments.&rdquo;</em>
        Commission energy spokesperson Anna\u2011Kaisa Itkonen said she had <em>&ldquo;no
        new date to give.&rdquo;</em>&nbsp;&nbsp;</p>\n<p>Coordinated US\u2011Israeli
        strikes on Iran and subsequent Iranian retaliatory attacks across the region
        have led to the effective closure of the Strait of Hormuz to Western shipping,
        triggering a rally in oil and gas prices. Benchmark Brent has climbed to around
        $120 per barrel. The chokepoint normally carries around a fifth of the world&rsquo;s
        daily oil supply. The IEA has warned that disruptions could potentially last
        months or years. &nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af393c2030277012619377.jpg\"
        alt=\"An oil tanker is moored at the Sheskharis complex in Novorossiysk, Russia,
        October 11, 2022\" />\n            <figcaption><a href=\"https://www.rt.com/russia/634301-russia-iran-oil-prices/\">Oil
        shock update: Will the US-Israeli war on Iran make Russia richer?</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The EU was
        already grappling with the fallout from its decision to cut energy ties with
        Russia following the escalation of the Ukraine conflict, as well as the costs
        of its green transition policies. Consumers across the bloc have since faced
        higher fuel and power bills, adding to broader cost\u2011of\u2011living pressures.&nbsp;</p>\n<p>The
        price rally has prompted Washington to ease sanctions on Russian oil. Some
        European leaders have begun hinting at a rethink of their own. The <em>&ldquo;oil
        blockade&rdquo;</em> of the Druzhba pipeline by Ukraine, which had halted
        Russian supplies to heavily dependent Hungary and Slovakia, has exacerbated
        tensions within the bloc.&nbsp;</p>\n<p>The EU&rsquo;s energy policies have
        repeatedly come under fire. Slovak Prime Minister Robert Fico has described
        the REPowerEU scheme as <em>&ldquo;suicide.&rdquo;</em> Hungarian Foreign
        Minister Peter Szijjarto has warned that unless the bloc lifts sanctions on
        Russian energy, it will <em>&ldquo;deal an extremely deep blow to the European
        economy.&rdquo;</em>&nbsp;</p>\n\n            ]]> <![CDATA[\n    <p>\n        <a
        target=\"_blank\" href=\"https://www.rt.com/news/635565-eu-energy-tsunami-dmitriev/\">\n
        \           <span>READ MORE: </span>EU faces energy price \u2018tsunami\u2019
        \u2013 Putin envoy\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Russian
        officials say the latest turmoil exposes deeper flaws in EU policy. Rosatom
        chief Alexey Likhachev told RT that the Iran war has revealed <em>&ldquo;decades&rdquo;</em>
        of mistaken decisions and an <em>&ldquo;oversimplified&rdquo;</em> approach
        to the energy transition. Kremlin envoy Kirill Dmitriev has warned of an <em>&ldquo;oil
        and gas price tsunami&rdquo;</em> for the EU after it rejected Russian supplies.</p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c2f31285f5403d4e2c1a8f.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 24 Mar 2026 20:36:49
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US threatening EU energy supply to push through trade deal</title>\n
        \       <link><![CDATA[https://www.rt.com/business/636081-us-eu-energy-trade-deal/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/636081-us-eu-energy-trade-deal/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c2e4ce85f5403cd80b81e2.jpg\"
        /> The EU could lose \u201Cfavorable\u201D access to American gas if it amends
        a trade deal with Washington, the US envoy to the bloc has warned <br/><a
        href=\"https://www.rt.com/business/636081-us-eu-energy-trade-deal/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Brussels could lose \u201Cfavorable\u201D
        access to American gas if it fails to \u201Cgo forward\u201D with the agreement,
        Washington\u2019s envoy has warned</strong></p>\n            \n                        \n
        \           <p>The US ambassador to the EU has urged Brussels to ratify the
        previously signed trade deal with Washington or risk losing <em>&ldquo;favorable&rdquo;</em>
        access to US energy.</p>\n<p>Under the deal reached last summer, the bloc
        agreed to a baseline tariff of 15% for all EU goods entering the US, while
        slashing its own tariffs on US industrial goods and some agricultural products
        to zero. The EU also agreed to buy $750 billion worth of US energy by 2028.
        The European Parliament is scheduled to vote on ratifying this week.</p>\n<p><em>&ldquo;I
        don&rsquo;t know what will happen with respect to energy if they don&rsquo;t
        go forward with the agreement,&rdquo;</em> Andrew Puzder told the Financial
        Times on Monday. Washington will still do business with the bloc <em>&ldquo;but
        just the terms may not be as favorable,&rdquo;</em> according to the envoy.</p>\n<p>He
        cautioned that, if the EU is <em>&ldquo;going to survive economically, they
        need energy, and we can supply it.&rdquo;</em>&nbsp;The US will still want
        to <em>&ldquo;be encouraged to do that,&rdquo;</em> he added.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69bc5d9a85f5407bb20dbe72.jpg\"
        alt=\"Kirill Dmitriev. \xA9 Sefa Karacan/Anadolu via Getty Images)\" />\n
        \           <figcaption><a href=\"https://www.rt.com/news/635565-eu-energy-tsunami-dmitriev/\">EU
        faces energy price \u2018tsunami\u2019 \u2013 Putin envoy</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The conflict
        in the Middle East, triggered by the US-Israeli attack on Iran, has led to
        energy price hikes globally.</p>\n<p>The bloc has been struggling to meet
        its energy needs following its decision to ditch Russian energy. Major EU
        economies like Germany, which were previously reliant on Russian energy, have
        become heavily dependent on US imports. The German Environmental Aid Association
        (DUH) reported in January that 96% of the nation&rsquo;s LNG imports in 2025
        came from the US.</p>\n<p>Some EU politicians have called for the decision
        to ditch Russian energy to be reviewed, but the European Commission maintains
        that it will continue to pursue the full phase-out of Russian fossil fuels
        by 2027.</p>\n<p>Kremlin envoy Kirill Dmitriev warned last week that the bloc
        could face an energy price <em>&ldquo;tsunami&rdquo;</em> as a result of Brussels&rsquo;
        <em>&ldquo;stubborn strategic stupidity.&rdquo;</em> He added that Russia
        has shifted it focus elsewhere, and the EU could end up being <em>&ldquo;at
        the end of the queue&rdquo;</em> of Russian energy buyers.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c2e4ce85f5403cd80b81e2.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 24 Mar 2026 19:30:41
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU push for AI sovereignty could lead to \u2018disaster\u2019
        \u2013 Siemens boss</title>\n        <link><![CDATA[https://www.rt.com/business/636011-eu-ai-sovereignty-disaster-siemens/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/636011-eu-ai-sovereignty-disaster-siemens/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c2a46d85f5402ee32f3ded.jpg\"
        /> The EU risks falling behind on innovation by cutting reliance on US technology
        too quickly, Siemens CEO Roland Busch warns <br/><a href=\"https://www.rt.com/business/636011-eu-ai-sovereignty-disaster-siemens/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Cutting reliance on US technology too
        fast could impede innovation, Roland Busch has warned</strong></p>\n            \n
        \                       \n            <p>The EU&rsquo;s focus on breaking
        its AI reliance on the US in favor of digital sovereignty could lead to &lsquo;disaster&rsquo;
        for the bloc, Siemens CEO Roland Busch has told the Financial Times.</p>\n<p>The
        European Commission plans to present a tech sovereignty package at the end
        of May aimed at developing cloud infrastructure and the AI sector. Brussels
        wants to reduce the bloc&rsquo;s reliance on US digital solutions and services
        amid the tensions with Washington which have arisen since President Donald
        Trump&rsquo;s return to office.</p>\n<p>In an interview published on Tuesday,
        Bosch says the EU should instead use existing tools to boost economic growth
        while building its own AI infrastructure.</p>\n<p><em>&ldquo;You should not
        throttle your innovation speed for the sake of creating sovereignty,&rdquo;</em>
        Busch said. <em>&ldquo;This would be a disaster.&rdquo;</em></p>\n<p>The executive
        highlighted that the bloc risked being left further behind in the race to
        develop powerful AI tools if it did not simplify its regulations. Busch warned
        that delaying AI deployment in Europe due to security concerns or excessive
        regulation would slow growth, calling the approach <em>&ldquo;miscalibrated&rdquo;</em>
        compared to that of the US. As a result, he said, the US economy is a <em>&ldquo;fast-flowing
        river&rdquo;</em> embracing the technology, while Europe&rsquo;s tech ecosystem
        resembles <em>&ldquo;standing water.&rdquo;</em></p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/69778510203027144434be94.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/631531-france-us-video-conferencing-services/\">France
        to ditch American video conferencing services</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The European Parliament adopted
        a resolution on technological sovereignty and digital infrastructure in late
        January, calling for preference for European products in public procurement
        and proposing support for local cloud providers.</p>\n<p>In recent years,
        the EU has also passed laws regulating the digital and AI sectors, including
        the AI Act, the Digital Markets Act, and the Digital Services Act. Brussels
        has expanded its oversight of data transfers, cloud competition, and semiconductor
        production through initiatives such as the European Chips Act.</p>\n<p>US
        officials have repeatedly raised concerns that the EU&rsquo;s digital and
        AI rules could disadvantage American companies. The Office of the US Trade
        Representative has warned that discriminatory measures under existing laws
        could trigger retaliatory measures, including fees or restrictions on European
        services, and expressed unease about the AI Act&rsquo;s enforceability outside
        Europe.</p>\n<p></p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c2a46d85f5402ee32f3ded.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 24 Mar 2026 15:13:36
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU energy crisis caused by policy mistakes \u2013 Rosatom chief</title>\n
        \       <link><![CDATA[https://www.rt.com/business/635904-eu-energy-crisis-rosatom-likhachev/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/635904-eu-energy-crisis-rosatom-likhachev/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c162e620302708ac75302e.jpg\"
        /> The EU energy crisis is a result of \u201Cdecades\u201D of policy mistakes
        like transition from nuclear power, Alexey Likhachev has told RT <br/><a href=\"https://www.rt.com/business/635904-eu-energy-crisis-rosatom-likhachev/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The Iran war has exposed \u201Cdecades\u201D
        of flawed decisions in the sector and transition missteps, Alexey Likhachev
        has told RT</strong></p>\n            \n                        \n            <p>The
        EU&rsquo;s repeated errors and its oversimplified view of energy transition
        are to blame for the energy crisis currently affecting the bloc, the head
        of Russia&rsquo;s state nuclear corporation Rosatom has told RT in an exclusive
        interview aired on Monday.</p>\n<p>Rosatom Director General Alexey Likhachev
        spoke with RT as angry EU consumers face higher fuel and energy costs, as
        well as broader increases in the cost of living amid the fallout from the
        US-Israeli attacks on Iran. The war has resulted in disruptions to traffic
        through the key Strait of Hormuz energy shipping lane and strikes on oil and
        gas infrastructure across the region.</p>\n<p>According to Likhachev, the
        conflict has exposed deeper flaws in EU energy policymaking. <em>&ldquo;The
        energy crisis in Europe did not take shape over just a few years but over
        decades,&rdquo;</em> he said, blaming it on <em>&ldquo;a series of consistent
        mistakes, sometimes a crude and simplistic understanding of energy transition
        and environmentally friendly energy.&rdquo;</em></p>\n<p>He argued that an
        <em>&ldquo;unjustified rejection&rdquo;</em> of gas and restrictions on nuclear
        power have led to the current crisis.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c1467285f540149149a531.jpg\"
        alt=\"Kirill Dmitriev\" />\n            <figcaption><a href=\"https://www.rt.com/news/635913-eu-russian-energy-dmitriev/\">EU
        \u2018at end of queue\u2019 for Russian energy \u2013 Putin envoy</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The EU has
        moved to reduce its reliance on Russian natural gas since 2022, gradually
        phasing out supplies and resolving to cut all imports by 2027. Instead, it
        accelerated a shift to alternative energy sources and increasingly turned
        to other suppliers, including liquefied natural gas from global markets.</p>\n<p>Several
        EU countries have imposed restrictions on nuclear energy. It has been banned
        in Austria and Denmark for decades, while Germany, the bloc&rsquo;s largest
        economy, phased out nuclear power completely in April 2023. Belgium and Spain
        have introduced phase-out policies or limits on reactor lifetimes. At the
        same time, other EU states, such as France, Slovakia, Hungary, Bulgaria, and
        Finland, continue to rely heavily on nuclear energy for electricity generation.
        Rosatom currently cooperates with Hungary on nuclear energy projects.</p>\n<p>A
        solution to the crisis is a return to nuclear power, the head of Rosatom insists.
        Watch the full interview with Alexey Likhachev here.</p>\n\n    <iframe\n
        \       width=\"560\"\n        height=\"315\"\n        src=\"https://mf.b37mrtl.ru/files/2026.03/69c1142c2030274e976e45af.mp4\"
        frameborder=\"0\"\n    ></iframe>\n\n\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c162e620302708ac75302e.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 23 Mar 2026 16:49:30
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>OnlyFans billionaire owner dies</title>\n        <link><![CDATA[https://www.rt.com/news/635947-onlyfans-owner-radvinsky-dies/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/news/635947-onlyfans-owner-radvinsky-dies/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c165f885f54070067362c9.jpg\"
        /> OnlyFans owner, Ukrainian-born Leonid Radvinsky, has died of cancer aged
        43 <br/><a href=\"https://www.rt.com/news/635947-onlyfans-owner-radvinsky-dies/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Ukrainian-born Leonid Radvinsky has
        died of cancer, the adult content site said in a statement</strong></p>\n
        \           \n                        \n            <p>Leonid Radvinsky, the
        Ukrainian-born billionaire owner of the adult content site OnlyFans, has died
        at the age of 43 after a long battle with cancer, according to multiple media
        reports.</p>\n<p>Radvinsky <em>&ldquo;passed away peacefully&rdquo;</em> following
        a prolonged illness, Bloomberg cited an emailed statement from the London-based
        company as saying on Monday. His illness had not been publicly disclosed.</p>\n<p>According
        to Forbes, Radvinsky&rsquo;s net worth stood at $4.7 billion as of Monday.
        OnlyFans reported $1.4 billion in revenue in 2024, with users spending a record
        $7.2 billion on the platform. Radvinsky paid himself $1.8 billion in dividends
        between 2021 and early 2025.</p>\n<p>In his early years, Radvinsky ran websites
        advertising access to <em>&ldquo;hacked&rdquo;</em> passwords to porn sites,
        which generated revenue via referrals and clicks. In 2004 he was sued by Microsoft
        over alleged spam emails, although the case was ultimately dismissed.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2025.12/thumbnail/693171b585f5402b235b29bc.jpg\"
        alt=\"RT composite.\" />\n            <figcaption><a href=\"https://www.rt.com/news/628924-pornhub-owner-lukoil-acquisition/\">Ex-Pornhub
        owner looking to buy Russian oil giant\u2019s Western assets \u2013 Reuters</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p>In
        2022, OnlyFans was accused of sabotaging social media accounts of adult entertainers
        working for rival platforms by placing their content in a terrorism database.</p>\n<p>More
        recently, leaked internal documents from the American Israel Public Affairs
        Committee (AIPAC), a pro-Israel lobbying group, reported by independent investigative
        news outlet The Lever, Radvinsky and his wife were listed as having pledged
        $11 million to the organization in 2023 &ndash; a sum that would make him
        a major donor &ndash; although he denied making the donation.</p>\n<p>Born
        into a Jewish family in the Ukrainian city of Odessa in 1982, Radvinsky emigrated
        to the United States as a child.</p>\n<p>He bought a majority stake in OnlyFans&rsquo;
        parent company in 2018. The platform gained prominence by hosting explicit
        content largely restricted on mainstream social media. Its popularity surged
        during the pandemic, as many adult performers and sex workers moved online
        in search of alternative income streams.</p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/russia/627475-ukrainian-porn-millions-tax-revenue/\">\n
        \           <span>READ MORE: </span>Ukrainian porn ban costing Kiev millions
        in tax revenues \u2013 MP\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Debates
        around the platform have played out in Ukraine. Last year, a senior lawmaker
        said Kiev was missing out on around one billion hryvnas ($24 million) annually
        in tax revenue due to the country&rsquo;s ban on pornography, despite thousands
        of Ukrainian OnlyFans creators generating an estimated $120 million in 2023.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69c165f885f54070067362c9.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 23 Mar 2026 16:27:06
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU nation planning \u2018fuel tourism\u2019 crackdown\_\_</title>\n
        \       <link><![CDATA[https://www.rt.com/business/635403-slovakia-diesel-price-hike/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/635403-slovakia-diesel-price-hike/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69baa16f85f540453b5c6dcb.jpg\"
        /> Slovakia could hike diesel prices for foreign drivers amid a global oil
        market squeeze, Prime Minister Robert Fico has said\n\n\_ <br/><a href=\"https://www.rt.com/business/635403-slovakia-diesel-price-hike/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Slovakia is mulling the move after
        drivers from border regions left \u201Cgas stations literally dried up,\u201D
        Prime Minister Robert Fico has said</strong></p>\n            \n                        \n
        \           <p>Slovakia could hike diesel prices for foreign drivers or limit
        the amount of fuel they can buy to curb fuel tourism, according to local media
        reports.</p>\n<p>Prime Minister Robert Fico announced the plan on Tuesday
        amid a global oil market squeeze driven by the war in the Middle East and
        a halt to Russian oil flows through the Druzhba pipeline.</p>\n<p>Fico and
        Economy Minister Denisa Sakova described the situation as critical after talks
        with Bratislava refinery Slovnaft, citing a 20% shortfall in global markets
        and increasing difficulty in securing tanker deliveries as buyers in Asia
        outbid local suppliers.</p>\n<p>Fico said representatives from Slovnaft, part
        of Hungary&rsquo;s MOL Group, told the government that cheaper diesel in northern
        districts along the Polish border sparked increased purchases by foreign drivers.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b91dfe85f5405f590679ac.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/russia/635284-hungary-ukraine-cancel-talks-druzhba/\">Hungary
        accuses Ukraine of blocking delegation from visiting vital oil pipeline\_</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Drivers that
        buy fuel in the regions bordering Poland and Austria have left <em>&ldquo;gas
        stations literally dried up,&rdquo;</em> Fico warned, adding that the government
        is ready to intervene if prices spike.</p>\n<p>The government is reportedly
        considering dual pricing with cheaper fuel for Slovak drivers and higher costs
        for foreigners, requiring vehicle registration documents. Limits on fuel taken
        outside standard tanks are also under discussion to curb informal exports.</p>\n<p>Fico
        attributed the supply crunch to the US-Israel war against Iran, which has
        triggered the closure of the Strait of Hormuz. The key waterway typically
        handles 20% of the world&rsquo;s seaborne crude, tightening global oil markets.</p>\n<p>The
        prime minister also accused Ukrainian leader Vladimir Zelensky of deliberately
        harming Slovakia&rsquo;s interests by suspending Russian oil via the Druzhba
        pipeline. Kiev is preventing vital oil from reaching Hungary and Slovakia
        through the pipeline, which runs through Ukraine, claiming it was damaged
        by Russian strikes &ndash; which Moscow denies.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b9baf985f540368211e663.jpg\"
        alt=\"Vladimir Zelensky.\" />\n            <figcaption><a href=\"https://www.rt.com/news/635351-ukraine-oil-eu-pipeline/\">How
        Zelensky\u2019s \u2018oil blockade\u2019 against EU states backfired on Ukraine</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Fico said
        the Druzhba pipeline remains intact and accused Ukraine of exploiting the
        situation for political gain. <em>&ldquo;Only a fool could switch off Druzhba,&rdquo;</em>
        he added. Earlier this year, Hungary and Slovakia halted diesel supplies to
        Ukraine in response to Kiev&rsquo;s refusal to restart Russian oil shipments
        through the pipeline.</p>\n<p>EU-level efforts to resolve the dispute have
        stalled, according to the Slovak economy minister, as Kiev continues to block
        international inspections and has rejected Czech-led mediation to assess the
        pipeline&rsquo;s condition.</p>\n<p>European Commission President Ursula von
        der Leyen said Ukraine has accepted the EU&rsquo;s offer to repair the Druzhba
        pipeline, with EU experts arriving in Kiev this week to inspect the damaged
        section on Wednesday and assess the repairs needed.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69baa16f85f540453b5c6dcb.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 18 Mar 2026 13:21:58
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU will \u2018inevitably beg for more Russian gas\u2019 \u2013
        Putin envoy</title>\n        <link><![CDATA[https://www.rt.com/business/635302-dmitirev-eu-begging-russia-gas/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/635302-dmitirev-eu-begging-russia-gas/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b937c42030275b975328c8.jpg\"
        /> EU gas prices will grow by 100% more than previously projected, meaning
        the bloc will \u201Cinevitably beg\u201D for Russian gas, Kirill Dmitriev
        says <br/><a href=\"https://www.rt.com/business/635302-dmitirev-eu-begging-russia-gas/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Gas prices in the region will surge
        by 100% more than previously projected, Kirill Dmitriev has said</strong></p>\n
        \           \n                        \n            <p>Gas prices across the
        EU are set to rise by at least 100% more than previously forecast, Kremlin
        envoy Kirill Dmitriev has said, as bloc officials continue to push member
        states to shun Russian energy.</p>\n<p>Dmitriev&rsquo;s remarks come as the
        escalating Middle East crisis triggered by the unprovoked US-Israeli attack
        on Iran has sent global oil and gas prices soaring.</p>\n<p>At the same time,
        the EU has continued to struggle with the consequences of its move to sever
        energy ties with Russia over the Ukraine conflict, as well as its controversial
        green energy policies.</p>\n<p><em>&ldquo;We forecast at least 100% higher
        [gas prices in the EU] than previously projected, as Europe takes time to
        inevitably beg for more Russian gas,&rdquo;</em> Kremlin investment envoy
        Kirill Dmitriev said on Tuesday on X, commenting on projections by Bloomberg.</p>\n<p>On
        Monday, the news agency cited a report from HSBC as saying that natural gas
        prices in the region are expected to be 40% higher than previously projected
        for 2026 and remain elevated through the next year.</p>\n<p>Energy markets
        have faced renewed volatility following the launch of the US-Israeli war on
        Iran and the ensuing disruption to global shipping through the Strait of Hormuz
        &ndash; a key artery for global supplies of oil and liquified natural gas
        (LNG). Traffic through the strait has reportedly dropped by 80%. Crude oil
        and European wholesale gas prices have moved sharply higher, piling further
        pressure on energy-intensive industries and sparking concerns about the EU&rsquo;s
        energy security.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a8757185f5404e025da096.jpg\"
        alt=\"Russian President Vladimir Putin chairs a meeting with members of the
        government via videoconference at the Kremlin in Moscow.\" />\n            <figcaption><a
        href=\"https://www.rt.com/russia/633804-russia-exit-european-gas-putin/\">Russia
        could end gas supplies to EU immediately \u2013\_Putin</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Bloomberg
        noted that the region is especially vulnerable to LNG supply disruptions,
        with storage levels roughly 15% below the five-year average following a cold
        winter.</p>\n<p>The surge in gas prices projected by HSBC sharply contrasts
        with US natural gas futures, which have remained largely stable, Bloomberg
        reported. Ample stockpiles and LNG export terminals operating near full capacity
        have reportedly insulated the world&rsquo;s largest gas exporter from global
        supply shocks.</p>\n<p>The latest developments in the energy sector have prompted
        some EU politicians to step up calls to reconsider sanctions on Russia, after
        Russian President Vladimir Putin warned that Moscow could halt gas supplies
        to the bloc ahead of Brussels&rsquo; planned 2027 ban.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b937c42030275b975328c8.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 17 Mar 2026 12:44:08
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Iran war could cost over 100,000 Brits their jobs \u2013 Telegraph</title>\n
        \       <link><![CDATA[https://www.rt.com/business/635251-iran-conflict-uk-layoffs-telegraph/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/635251-iran-conflict-uk-layoffs-telegraph/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b8489985f5405f450f66bd.jpg\"
        /> High oil prices resulting from the US-Israeli war on Iran could cost over
        100,000 jobs in the UK, the Telegraph has reported <br/><a href=\"https://www.rt.com/business/635251-iran-conflict-uk-layoffs-telegraph/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Soaring energy prices could force companies
        to axe workers, the newspaper has reported</strong></p>\n            \n                        \n
        \           <p>More than 100,000 Britons are at risk of losing their jobs
        due to market turmoil in the wake of the US-Israeli attack on Iran, The Telegraph
        reported on Monday.</p>\n<p>Oil prices have jumped to over $100 per barrel
        amid supply disruptions brought on by the conflict, up from around $70 last
        month.</p>\n<p>James Smith, from investment bank ING, has warned that if the
        conflict continues, employers will offset higher energy costs by axing their
        workforce or suspending hiring, according to the newspaper.</p>\n<p><em>&ldquo;It
        depends how long energy prices stay high. If we&rsquo;re in a scenario where
        the disruption lasts three months or so,&rdquo;</em> unemployment could <em>&ldquo;be
        pushing above 5.5%,&rdquo;</em> he added.</p>\n<p>Currently, 5.2% of the British
        population is unemployed, a high unseen since the Covid pandemic, according
        to <a href=\"https://www.ons.gov.uk/employmentandlabourmarket/peoplenotinwork/unemployment/timeseries/mgsx/lms\"
        target=\"_blank\" rel=\"noopener noreferrer\">government data</a>.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b8289420302757dd116732.jpg\"
        alt=\"A crude oil tanker docks in Mumbai after arriving via the Strait of
        Hormuz on March 11, 2026.\" />\n            <figcaption><a href=\"https://www.rt.com/business/635239-hormuz-war-risk-premiums-spike/\">Hormuz
        war risk premiums spike \u2013 Euronews</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em>&ldquo;With UK industrial
        energy costs among the highest in the developed world, any sustained increase
        in oil and gas prices could quickly push up input costs, squeezing margins
        and limiting investment,&rdquo;</em> according to Fhaheen Khan, senior economist
        at industry body Make UK.</p>\n<p>He told the outlet that domestic demand
        in British manufacturing has now <em>&ldquo;collapsed,&rdquo;</em> despite
        the industry seeing some growth since the start of the year.</p>\n<p>Mizuho
        Bank&rsquo;s Jordan Rochester warned that the UK economy is now in a far weaker
        position than four years ago, when the EU and UK began to phase out affordable
        Russian gas and oil over the Ukraine conflict. UK unemployment rates stood
        at 3.8% that year.</p>\n\n            ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\"
        href=\"https://www.rt.com/news/634873-iran-war-fertilizer-shortage/\">\n            <span>READ
        MORE: </span>Global chokepoint: How the US-Israeli war on Iran could starve
        millions\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Recent polls
        show that most Britons fear that the Iran conflict will further damage the
        UK economy.</p>\n<p>According to a <a href=\"https://yougov.com/en-gb/articles/54322-what-impact-do-britons-think-the-us-iran-conflict-will-have\"
        target=\"_blank\" rel=\"noopener noreferrer\">YouGov poll published Monday</a>,
        more than three quarters of respondents think that the hostilities in the
        Middle East will have a negative impact on the UK and global economies in
        the longer term. Some 64% believe that the conflict will hit their household
        finances.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b8489985f5405f450f66bd.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 16 Mar 2026 21:00:04
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Hormuz war risk premiums spike \u2013 Euronews</title>\n        <link><![CDATA[https://www.rt.com/business/635239-hormuz-war-risk-premiums-spike/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/635239-hormuz-war-risk-premiums-spike/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b8289420302757dd116732.jpg\"
        /> The US-Israeli war with Iran has made the Strait of Hormuz the world\u2019s
        most expensive waterway, according to Euronews <br/><a href=\"https://www.rt.com/business/635239-hormuz-war-risk-premiums-spike/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>War risk premiums for a single tanker
        voyage have reportedly seen a 15- to 30-fold increase</strong></p>\n            \n
        \                       \n            <p>The US-Israeli war with Iran has
        made the Strait of Hormuz the world&rsquo;s most expensive waterway for shipping,
        as it has triggered a massive surge in war risk insurance premiums, according
        to Euronews.</p>\n<p>Before the US-Israeli war on Iran, the Strait of Hormuz
        handled roughly 20% of the world&rsquo;s seaborne crude oil. Now, Iranian
        retaliatory attacks on tankers, and Western insurers and shipping firms pulling
        back, have brought maritime traffic to a virtual halt.</p>\n<p>Before the
        crisis, war risk insurance for a Gulf tanker was 0.02-0.05% of its value.
        Since February 28, premiums have soared to 0.5-1% or more, according to Euronews.</p>\n<p>War
        risk premiums for a single voyage have jumped from roughly $40,000 to between
        $600,000 and $1.2 million for a typical tanker, the outlet wrote on Monday.
        At least 16 vessels have been hit since the conflict began, it noted.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af393c2030277012619377.jpg\"
        alt=\"An oil tanker is moored at the Sheskharis complex in Novorossiysk, Russia,
        October 11, 2022\" />\n            <figcaption><a href=\"https://www.rt.com/russia/634301-russia-iran-oil-prices/\">Oil
        shock update: Will the US-Israeli war on Iran make Russia richer?</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Consumers
        will feel the knock-on effects of the surge at the pump or supermarket within
        weeks, it added.</p>\n<p>The US has pledged naval escorts through the Strait,
        with US President Donald Trump urging oil-receiving nations to help secure
        the waterway.</p>\n<p>However, even with naval escorts, companies will continue
        treating the waterway as a high-risk operating environment, Christopher Long,
        who works for a maritime security company called Neptune P2P Group, told Euronews.</p>\n<p>Iran,
        meanwhile, insists that the Strait of Hormuz remains open for friendly or
        authorized ships. Talks with Iran are the most <em>&ldquo;effective way&rdquo;</em>
        to restart transit, Indian Foreign Minister S. Jaishankar said on Sunday,
        citing negotiations between New Delhi and Tehran that allowed two Indian-flagged
        gas tankers to pass through the strait as an example of diplomatic solutions.</p>\n<p>Russia,
        a major crude oil exporter, is not a participant in the conflict and does
        not depend on the Strait of Hormuz to bring its oil to market. Its Urals blend
        reaches India via the Baltic and Black Seas, then through the Suez Canal and
        Red Sea &ndash; completely bypassing the Persian Gulf chokepoint.<br />While
        Russia and India have partnered with Iran to develop the International North-South
        Transport Corridor (INSTC) as an alternative route, its current use for significant
        crude oil shipments is minimal.</p>\n\n            ]]> <![CDATA[\n    <p>\n
        \       <a target=\"_blank\" href=\"https://www.rt.com/news/635198-iran-war-interceptor-missiles/\">\n
        \           <span>READ MORE: </span>Dwindling stockpiles and soaring costs:
        US allies struggle to contain Iranian attacks\n        </a>\n    </p>\n]]>\n<![CDATA[\n
        \   \n\n<p>The US has issued a waiver on Russian oil and petroleum products
        currently at sea, valid until April 11. India and several other countries
        immediately announced plans to purchase Russian crude under the exemption.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b8289420302757dd116732.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 16 Mar 2026 16:07:24
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Iran war could bring billions to US energy firms \u2013 FT</title>\n
        \       <link><![CDATA[https://www.rt.com/business/635094-iran-war-could-bring-billions-us-firms/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/635094-iran-war-could-bring-billions-us-firms/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b6c4fc85f54056102d9ed4.jpg\"
        /> US oil companies could gain $63 billion as the war in the Middle East pushes
        crude prices higher, the FT has reported <br/><a href=\"https://www.rt.com/business/635094-iran-war-could-bring-billions-us-firms/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>American companies will be among biggest
        beneficiaries if crude prices average $100 per barrel this year</strong></p>\n
        \           \n                        \n            <p>The United States could
        be one of the biggest beneficiaries of the global rise in energy prices which
        has resulted from the US-Israeli war against Iran, the Financial Times (FT)
        has reported, citing estimates provided by the investment bank Jefferies.</p>\n<p>Oil
        prices have already surged past $100 per barrel due to the fallout from the
        ongoing war in the Middle East. If they remain elevated this year, American
        companies will receive a $63.4 billion boost from oil production, according
        to the energy research company Rystad.</p>\n<p>Brent crude, the international
        benchmark, rose by more than 30 percent last Sunday, at one point topping
        $119 per barrel, as fears grew of a prolonged disruption to global energy
        supplies.</p>\n<p>US President Donald Trump used the opportunity to pivot
        from a focus on keeping energy prices low to painting high oil prices as a
        positive. <em>&ldquo;The United States is the largest Oil Producer in the
        World, by far, so when oil prices go up, we make a lot of money,&rdquo;</em>
        he said in a Truth Social post on Thursday.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b69e7085f5404508402b5d.jpg\"
        alt=\"FILE PHOTO: Satellite view of Iran&#039;s Kharg Island in the Persian
        Gulf.\" />\n            <figcaption><a href=\"https://www.rt.com/news/635086-iran-us-kharg-island/\">Military
        sites and 90% of crude oil trade: Why this Iranian island struck by the US
        is so important</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>The about-face came as Trump&rsquo;s team faced challenges in presenting
        a coherent plan for reopening the vital Strait of Hormuz for US ships. The
        Iranian authorities claim that the Strait of Hormuz is closed to US and Israeli
        ships, despite not being physically sealed with a permanent barrier.</p>\n<p>According
        to The Guardian, however, more than 1,000 cargo ships, mainly oil and gas
        tankers, have been blocked from transiting the strait. If it remains closed
        until the end of the month, some analysts reckon crude could surge to $150
        or even $200 per barrel, The Economist wrote earlier this week.</p>\n<p>Rising
        oil prices put pressure on the US economy, as prices for gasoline and diesel
        fuel, as well as for many goods and services, have increased in the country,
        The Wall Street Journal stressed. However, the US, being a major oil producer
        itself, could provide the economy with protection from the worst consequences,
        the newspaper noted.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b6c4fc85f54056102d9ed4.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Sun, 15 Mar 2026 16:15:08
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US-Israeli war on Iran wipes billions off Gulf energy revenues
        \u2013 FT</title>\n        <link><![CDATA[https://www.rt.com/business/634790-gulf-states-billion-losses-oil/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634790-gulf-states-billion-losses-oil/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b417c3203027242d7554aa.jpg\"
        /> Gulf states have reportedly lost billions as escalating tensions in the
        region cut off several US allies from the Strait of Hormuz <br/><a href=\"https://www.rt.com/business/634790-gulf-states-billion-losses-oil/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The Middle East escalation has cut
        off a number of American allies from the vital Strait of Hormuz</strong></p>\n
        \           \n                        \n            <p>Oil producers in the
        Gulf region have lost an estimated $15.1 billion in energy revenues since
        the launch of the US-Israeli strikes on Iran, the Financial Times reported
        on Friday, citing estimates by analytics firm Kpler.</p>\n<p>The US and Israel
        conducted coordinated strikes on the Islamic Republic in late February, triggering
        Iranian retaliatory attacks across the region. The escalating crisis effectively
        shut down the Strait of Hormuz &ndash; a critical route that handles roughly
        one-fifth of the world&rsquo;s daily oil and gas supply &ndash; as Tehran
        barred ships from non-friendly nations, sending global crude prices soaring
        nearly 50% to $120 per barrel.</p>\n<p>The Strait of Hormuz is estimated to
        carry around $1.2\u202Fbillion worth of crude oil, refined products, and liquefied
        natural gas (LNG) daily, based on average prices and volumes recorded last
        year. According to Florian Gruenberger of Kpler, as cited by the FT, current
        flows through the waterway are <em>&ldquo;negligible&rdquo;</em> compared
        with prewar levels.</p>\n<p>Among the halted shipments, crude oil reportedly
        represents the largest share, accounting for 71% of the total value. At least
        $10.7\u202Fbillion worth of crude, refined oil products, and LNG cargoes remain
        stranded inside the maritime route, according to Kpler.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b3e09c85f54034c069f704.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/634741-russian-oil-us-sanction-lifted/\">US
        eases Russian oil sanctions</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Saudi Arabia, the world&rsquo;s second biggest oil producer, has
        reportedly been hardest hit, missing out on $4.5\u202Fbillion in energy revenues
        since the start of the conflict, while Iraq, which relies on oil production
        for 90% of government revenues, is said to be among the most exposed. Other
        major producers in the region, including the UAE, Kuwait, and Bahrain, have
        also faced significant losses.</p>\n<p>Gulf oil producers, including Saudi
        Arabia, Iraq, the UAE, Kuwait, and Bahrain, have deferred $13.3\u202Fbillion
        in sales and tax revenue due to disruptions in oil shipments, according to
        UK-based consultancy Wood Mackenzie, as cited by the FT.</p>\n<p>On Friday,
        US President Donald Trump told Fox News that American forces would escort
        vessels through the Strait of Hormuz if necessary. Last week, Trump urged
        tanker crews sailing through the vital waterway to <em>&ldquo;show some guts.&rdquo;</em></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b417c3203027242d7554aa.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 13 Mar 2026 14:20:43
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US eases Russian oil sanctions</title>\n        <link><![CDATA[https://www.rt.com/business/634741-russian-oil-us-sanction-lifted/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634741-russian-oil-us-sanction-lifted/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b3e09c85f54034c069f704.jpg\"
        /> The US has temporarily suspended a Russian oil ban to cool energy markets
        as crude prices continue to soar after US-Israel attacks on Iran <br/><a href=\"https://www.rt.com/business/634741-russian-oil-us-sanction-lifted/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The temporary measure is expected to
        cool global energy markets as crude prices continue to soar after US-Israeli
        attacks on Iran</strong></p>\n            \n                        \n            <p>The
        US has eased sanctions to allow countries to purchase Russian oil and petroleum
        products already loaded on vessels at sea, according to Treasury Secretary
        Scott Bessent. The move comes as escalating Middle East tensions triggered
        by the US-Israeli war on Iran have sent global oil prices soaring.</p>\n<p>The
        US and Israel launched coordinated strikes on Iran on February 28, prompting
        Iranian retaliatory attacks across the region. The crisis has led to the de
        facto closure of the Strait of Hormuz &ndash; which carries roughly one-fifth
        of the world&rsquo;s daily oil supply &ndash; as Iran effectively blocks transit
        for ships from non-friendly nations, sending oil prices surging nearly 50%
        to almost $120 per barrel.</p>\n<p><em>&ldquo;To increase the global reach
        of existing supply, US Treasury is providing a temporary authorization to
        permit countries to purchase Russian oil currently stranded at sea,&rdquo;</em>
        Bessent said on Thursday in a post on X, stating that the move would stabilize
        energy markets and curb oil prices.</p>\n<p>The waiver relates to exports
        of Russian oil loaded onto vessels prior to March 12 and is set to last 30
        days.</p>\n<p>Earlier in the day, US Energy Secretary Chris Wright had stated
        that broader restrictions on Russian oil would not be lifted, stressing that
        Washington was not planning to change its sanctions policy toward Moscow.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b28a4285f5402bfd683012.jpg\"
        alt=\"Kirill Dmitriev and Steve Witkoff\" />\n            <figcaption><a href=\"https://www.rt.com/russia/634621-russia-us-talks-iran-oil-crisis/\">Russian
        and US envoys discuss Iran oil crisis</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Commenting on the easing of
        restrictions, Kremlin spokesman Dmitry Peskov said the move is aimed at stabilizing
        the global energy market, adding that in this respect, the interests of Moscow
        and Washington align.</p>\n<p>Last week, Bessent claimed the US had given
        India <em>&ldquo;permission&rdquo;</em> to buy Russian crude <em>&ldquo;to
        ease the temporary gap of oil around the world,&rdquo;</em> having announced
        plans to <em>&ldquo;unsanction other Russian oil&rdquo;</em> to further boost
        supply.</p>\n<p>India, which alongside China emerged as a key buyer of Russian
        crude after sanctions were imposed following the escalation of the Ukraine
        conflict in 2022, has never confirmed it would adhere to the restrictions,
        although the US has claimed otherwise.</p>\n<p>Moscow likewise said it had
        no information suggesting that India has put Russian crude imports on hold.
        The Kremlin has condemned the US-Israeli strikes on Iran as a <em>&ldquo;premeditated
        and unprovoked act of aggression&rdquo;</em> with no justification.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b3e09c85f54034c069f704.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 13 Mar 2026 10:15:36
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Porsche profits crash after costly EV strategy U-turn</title>\n
        \       <link><![CDATA[https://www.rt.com/business/634514-porsche-profits-electric-vehicles/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634514-porsche-profits-electric-vehicles/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b19f5185f540221e7ca693.jpg\"
        /> German luxury carmaker Porsche AG has reported a dramatic drop in profits
        after overhauling its product strategy <br/><a href=\"https://www.rt.com/business/634514-porsche-profits-electric-vehicles/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The automaker\u2019s operating profits
        plunged nearly 93% after scrapping an all-electric vehicle program</strong></p>\n
        \           \n                        \n            <p>German luxury carmaker
        Porsche AG has reported a sharp drop in operating profits following a costly
        pivot away from its long-term EV strategy amid mounting challenges facing
        the EU&rsquo;s auto sector.</p>\n<p>The automaker booked extraordinary expenses
        totaling about &euro;3.9 billion ($4.5 billion) in 2025, which on paper slashed
        its group operating profits by nearly 93%, from &euro;5.6 billion to just
        &euro;413 million, according to the company&rsquo;s investor conference presentation
        released on Wednesday. Battery-related activities cost roughly &euro;700 million,
        with US tariffs taking a similar toll.</p>\n<p>Porsche &ndash; until recently
        the world&rsquo;s most profitable car company by margin &ndash; had been developing
        a new all-electric vehicle platform intended to underpin its models over the
        next decade. After years of investment, the company has now abandoned the
        project, returning to combustion-engine models and plug-in hybrids.</p>\n<p><em>&ldquo;The
        global challenges and the company&rsquo;s realignment impacted earnings in
        2025,&rdquo;</em> Chief Financial Officer Jochen Breckner said, adding that
        the <em>&ldquo;recalibration measures will continue to have one-off effects
        on earnings in the high three-digit million euros range.&rdquo;</em></p>\n<p>The
        damage has rippled through parent company Volkswagen Group, which reported
        a sharp drop in net profit. It announced plans to cut 50,000 jobs in Germany
        by 2030, citing rising energy costs and trade pressures. Porsche faces around
        3,900 job cuts.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b041fd85f540294a1f07d1.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/634370-germany-job-cuts-energy-crisis/\">Volkswagen
        to slash 50,000 jobs in Germany</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Porsche said it is <em>&ldquo;again anticipating very challenging
        market conditions,&rdquo;</em> noting that in China, the luxury segment remains
        under pressure, and intense price competition continues to have an impact.
        The automaker expects geopolitical uncertainties and the US tariff policy
        to remain in place. It said the potential effects of recent developments in
        the Middle East have not been factored in.</p>\n<p>Germany&rsquo;s automotive
        sector has been grappling with a growing number of challenges, including surging
        energy costs, weaker demand, intensifying competition from Chinese manufacturers,
        and trade tensions with Washington.</p>\n<p>The EU energy crisis &ndash; sparked
        by the bloc&rsquo;s drastic reduction of Russian oil and gas imports following
        the escalation of the Ukraine conflict in 2022 &ndash; has further hurt manufacturers.
        Energy markets have also been impacted by the US-Israeli bombing of Iran and
        disruptions in the Strait of Hormuz, a key artery for global oil and LNG shipments.</p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>\n<p></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b19f5185f540221e7ca693.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 11 Mar 2026 17:19:49
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US borrowed $1 trillion in five months</title>\n        <link><![CDATA[https://www.rt.com/business/634519-us-federal-debt-balloons/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634519-us-federal-debt-balloons/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b17bd485f540282f70041c.jpg\"
        /> The US federal budget deficit has increased by $1 trillion since last October,
        the Congressional Budget Office has estimated <br/><a href=\"https://www.rt.com/business/634519-us-federal-debt-balloons/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Over $430 billion has been spent to
        service the debt, which is approaching $39 trillion, the Congressional Budget
        Office states</strong></p>\n            \n                        \n            <p>The
        US government has borrowed some $1 trillion in the five months since October,
        adding to the ballooning federal deficit, the Congressional Budget Office
        (CBO) has reported.</p>\n<p>The estimates have come amid media reports claiming
        that the US military burned through $5.6 billion worth of munitions during
        the first two days of its assault on Iran.</p>\n<p>On Monday, the CBO released
        its <a href=\"https://www.cbo.gov/system/files/2026-03/61978-MBR.pdf\" target=\"_blank\"
        rel=\"noopener noreferrer\">monthly budget review</a>, according to which
        the US government&rsquo;s debt grew by $308 billion in February alone. Among
        the factors contributing to the trend are higher interest payments to service
        public debt, as well as increased government spending, including by the US
        Department of War.</p>\n<p>In just five months, the Treasury forked out a
        total of $433 billion to service public debt, which is now nearing $38.9 trillion.</p>\n<p>Maya
        MacGuineas, president of the Committee for a Responsible Federal Budget (CRFB),
        a bipartisan fiscal watchdog, has warned that <em>&ldquo;this cannot be sustainable.&rdquo;</em>
        She called on policymakers to reduce deficits, proposing a 3% deficit-to-GDP
        ratio as an initial target.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a85ba785f5404b9e03f8dd.jpg\"
        alt=\"RT composite.\" />\n            <figcaption><a href=\"https://www.rt.com/business/633789-americas-achilles-heel-in-iran-war/\">This
        could prove to be America\u2019s Achilles\u2019 heel in the Iran war</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>In its latest
        report, the think-tank claimed that the US <em>&ldquo;is almost certain to
        enter the next shock more indebted than we have ever been before.&rdquo;</em></p>\n<p>Meanwhile,
        on Tuesday, the Washington Post, citing anonymous officials, reported that
        the US military fired $5.6 billion worth of munitions during the first two
        days of its strikes on Iran alone. According to the newspaper, the administration
        of President Donald Trump is expected to send Congress a supplemental defense
        budget request in the coming days, which could reportedly run as high as $50
        billion.</p>\n<p>Democratic lawmakers have increasingly voiced concerns over
        an apparent lack of clear objectives in Trump&rsquo;s military campaign against
        Iran as the president has been sending out mixed messages on the matter.</p>\n<p>Last
        week, Politico claimed that the Pentagon was expecting the conflict to last
        for at least another 100 days, or even through September, a stark contrast
        to Trump&rsquo;s original four-week timeline.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b17bd485f540282f70041c.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 11 Mar 2026 16:12:19
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Japanese auto parts makers eye Russian aluminum \u2013 Bloomberg</title>\n
        \       <link><![CDATA[https://www.rt.com/business/634480-japan-rusal-supply-talks/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634480-japan-rusal-supply-talks/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b16e4d20302722555bf78d.jpg\"
        /> The escalating war in the Middle East has disrupted the aluminum trade,
        pushing Japanese auto parts makers into talks with Russia\u2019s Rusal <br/><a
        href=\"https://www.rt.com/business/634480-japan-rusal-supply-talks/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The Asian nation voluntarily stopped
        buying Russian product following the 2022 escalation of the Ukraine conflict\n\n\_</strong></p>\n
        \           \n                        \n            <p></p>\n<p>Japanese auto
        parts makers have entered into talks with Russian aluminum giant Rusal as
        disruptions from the escalating Middle East conflict squeeze supplies, Bloomberg
        has reported, citing sources familiar with the matter.</p>\n<p>Although Rusal&rsquo;s
        aluminum is not subject to Western sanctions, Japanese firms voluntarily halted
        purchases in 2022 after the escalation of the Ukraine conflict, contracting
        Gulf producers instead.</p>\n<p>Negotiations to buy primary foundry alloy,
        used in automotive parts such as wheels, engine blocks, and cylinder heads,
        have been underway for about a week, the outlet said on Tuesday, noting that
        some deals could be finalized soon.</p>\n<p><em>&ldquo;We cannot comment officially,&rdquo;</em>
        a Rusal representative told Forbes Russia.</p>\n<p>Over the past four years,
        Rusal has shifted its focus to Asia as European clients, once responsible
        for about half of its demand, scaled back purchases. EU quotas on Russian
        aluminum, introduced in 2025, further reduced its sales to the bloc. South
        Korea is among the destinations taking in Russian aluminum, with annual volumes
        this year estimated at just under 500,000 tons.&nbsp;</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b041fd85f540294a1f07d1.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/634370-germany-job-cuts-energy-crisis/\">Volkswagen
        to slash 50,000 jobs in Germany</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>A few South Korean auto parts makers are also reportedly in talks
        with Rusal, Bloomberg said, reflecting the wider impact of Persian Gulf disruptions
        on commodities markets, with the region accounting for around 10% of global
        aluminum output. Japanese producers are said to be seeking long-term contracts
        with the Russian company to secure urgently needed supplies.&nbsp;</p>\n<p>The
        war, started by US-Israeli strikes on Iran in late February, has disrupted
        shipments through the Strait of Hormuz, affecting energy and bulk materials.
        Aluminium Bahrain has declared a force majeure, while Emirates Global Aluminium
        has delayed some shipments. Both companies are key exporters of the product
        to Japan and South Korea.</p>\n<p>Some suppliers to Japan have suspended shipments
        to sell at higher prices. Last week, Rio Tinto paused negotiations with Japanese
        buyers for second-quarter primary aluminum and withdrew an initial $250 per
        ton premium offer.</p>\n<p>Aluminum prices hit a nearly four\u2011year high
        in March, with LME three\u2011month futures trading around $3,426.50 a ton
        on Wednesday amid supply concerns tied to Middle East disruptions.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b16e4d20302722555bf78d.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 11 Mar 2026 13:34:05
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>New billionaire class emerges in Russia</title>\n        <link><![CDATA[https://www.rt.com/business/634406-forbes-russia-agro-billionaires/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634406-forbes-russia-agro-billionaires/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b05b1885f5407c631a371c.jpg\"
        /> Forbes has recorded seven newcomers from the agriculture and food industry
        among Russia\u2019s 155 billionaires in its latest world ranking <br/><a href=\"https://www.rt.com/business/634406-forbes-russia-agro-billionaires/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Half of the Russians to join the list
        of the world\u2019s richest made their money in food production</strong></p>\n
        \           \n                        \n            <p>Russia has added 14
        new dollar billionaires in the past year, seven of whom made their fortunes
        in agriculture and food production, according to the 2026 Forbes World&rsquo;s
        Billionaires List.</p>\n<p>The annual ranking, published on Tuesday, shows
        a record 155 Russian nationals on the list despite sweeping Western sanctions
        imposed since the escalation of the Ukraine conflict in 2022. Their combined
        wealth stands at $696.5 billion, another all-time high.</p>\n<p>But the composition
        of Russia&rsquo;s ultra-rich is shifting. Traditional fortunes in energy and
        metals, long the backbone of Russian wealth, now share space with a rising
        class of &lsquo;agro-billionaires&rsquo; who have capitalized on Russia&rsquo;s
        growing self-sufficiency in food and expanded exports to markets in Asia,
        Africa, and the Middle East.</p>\n<p>Among the newcomers from the food industry
        is Aleksandr Tkachev, worth $1.8 billion, co-founder and controlling shareholder
        of Agrocomplex, one of Russia&rsquo;s largest food and agriculture producers.
        Tkachev served as Russia&rsquo;s agriculture minister from 2015 to 2018. Another
        newcomer is Vadim Vikulov, worth $1.5 billion, who controls Aston, a Russian
        agricultural exporter and major player in grain and vegetable oil.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af060e85f540150936c358.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/business/634294-russia-china-gas-pipelines/\">China
        prioritizes Russian gas amid Middle East conflict \u2013 media</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Vadim Moshkovich,
        worth $2.9 billion, is the wealthiest among them and a consistent presence
        on the list. He controls Rusagro, one of Russia&rsquo;s largest pork and sugar
        producers. Moshkovich resigned from the company&rsquo;s board in 2022 after
        being hit with personal sanctions by the EU.</p>\n<p>The other new additions
        to the 2026 list come from fertilizer and coal businesses, energy sector,
        pharmaceutical industry, and real estate.</p>\n<p>The list&rsquo;s top ranks
        remain dominated by traditional industrialists. Alexey Mordashov, the steel
        and gold magnate, leads Russian billionaires for the first time with $37 billion,
        followed by Vladimir Potanin of Norilsk Nickel with $29.7 billion and Vagit
        Alekperov, the former Lukoil chief, with $29.5 billion.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b05b1885f5407c631a371c.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 10 Mar 2026 19:44:58
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Volkswagen to slash 50,000 jobs in Germany</title>\n        <link><![CDATA[https://www.rt.com/business/634370-germany-job-cuts-energy-crisis/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634370-germany-job-cuts-energy-crisis/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b041fd85f540294a1f07d1.jpg\"
        /> Volkswagen has said it will cut 50,000 jobs in Germany by 2030 amid plunging
        profits, high energy costs and US tariffs <br/><a href=\"https://www.rt.com/business/634370-germany-job-cuts-energy-crisis/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The auto giant\u2019s profits fell
        by almost half in 2025</strong></p>\n            \n                        \n
        \           <p>The EU&rsquo;s largest automaker, Volkswagen (VW), has announced
        that it will cut about 50,000 jobs in Germany, citing plunging profits, soaring
        energy costs and mounting trade pressures.&nbsp;</p>\n<p>In its annual report
        on Tuesday, VW said that net income nearly halved in 2025, falling to &euro;6.9
        billion (over $8 billion), its weakest result since the 2016 diesel scandal,
        while revenues slipped to just under &euro;322 billion.</p>\n<p>VW will <em>&ldquo;systematically
        reduce our costs&rdquo;</em> in the coming years, executives said, confirming
        that tens of thousands of positions will be slashed across the group&rsquo;s
        German operations by 2030 on top of previously announced headcount reductions.
        In 2024, the company reached a deal with unions to avoid involuntary redundancies
        and plant closures at production sites in Germany. <br /><em></em></p>\n<p><em>&ldquo;The
        year 2025 was characterized by geopolitical tensions, tariffs, and intense
        competition,&rdquo;</em> VW&rsquo;s chief financial officer Arno Antlitz said,
        adding that 50,000 jobs would be cut by 2030 and that further cost-cutting
        measures could follow in order to make the automaker more competitive.</p>\n<p>Germany&rsquo;s
        automotive sector has been struggling amid surging energy prices, sluggish
        demand in Europe, rising competition from Chinese manufacturers, US tariffs,
        and a slower than expected transition to electric vehicles. Following the
        escalation of the Ukraine conflict in 2022, the EU drastically reduced imports
        of Russian oil and gas, forcing member states to switch to more expensive
        alternatives. The resulting energy crisis has fueled concerns about the health
        of the bloc&rsquo;s largest manufacturing economy and the risk of a further
        downturn.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2025.10/thumbnail/68fe570185f5406754563076.jpg\"
        alt=\"German Chancellor Friedrich Merz.\" />\n            <figcaption><a href=\"https://www.rt.com/news/626988-germany-deindustrialization-ww2-defeat/\">Germany
        is doing to itself what even its defeat in WWII couldn\u2019t</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Energy markets
        have faced renewed volatility in recent days following the US-Israeli bombing
        of Iran and the disruptions to global shipping through the Strait of Hormuz,
        a key artery for global oil and LNG supplies. Traffic through the straight
        has reportedly dropped by 80% over the past week. Crude oil and European wholesale
        gas prices have moved sharply higher, adding further pressure on energy-intensive
        industries and sparking concerns about the bloc&rsquo;s energy security.</p>\n<p>The
        situation has prompted some EU politicians to step up calls to reconsider
        Russia sanctions after President Vladimir Putin warned that Moscow could halt
        gas supplies ahead of a Brussels&rsquo; planned 2027 ban.</p>\n<p>The European
        Commission is reportedly discussing possible emergency measures to shield
        manufacturers from surging electricity costs, including a review of national
        energy taxes, grid charges and carbon-pricing mechanisms.</p>\n<p></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69b041fd85f540294a1f07d1.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 10 Mar 2026 16:41:00
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>China prioritizes Russian gas amid Middle East conflict \u2013
        media</title>\n        <link><![CDATA[https://www.rt.com/business/634294-russia-china-gas-pipelines/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634294-russia-china-gas-pipelines/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af060e85f540150936c358.jpg\"
        /> China has signaled its intention to secure more natural gas from Russia
        in the draft version of its development blueprint for 2026\u20132030 <br/><a
        href=\"https://www.rt.com/business/634294-russia-china-gas-pipelines/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Beijing\u2019s latest development strategy
        envisions accelerated work on a major gas pipeline project with Moscow</strong></p>\n
        \           \n                        \n            <p data-start=\"256\"
        data-end=\"327\"><strong data-start=\"256\" data-end=\"263\"></strong>China
        has signaled a major push to secure more natural gas from Russia, referencing
        two new pipelines in the draft of its latest five-year plan. The move comes
        as conflict in the Middle East threatens LNG shipments transiting the Strait
        of Hormuz, a key energy chokepoint.</p>\n<p data-start=\"881\" data-end=\"1209\">The
        draft version of China&rsquo;s development blueprint for 2026&ndash;2030,
        submitted to the National People&rsquo;s Congress last week, notes that Beijing
        would <em>&ldquo;advance preparatory work&rdquo;</em> on the <em>&ldquo;central
        route of the China-Russia natural gas pipeline,&rdquo;</em> the South China
        Morning Post (SCMP) reported on Monday.</p>\n<p data-start=\"1211\" data-end=\"1351\">The
        draft did not name the specific project, but market observers interpreted
        the comments as referring to the Power of Siberia 2 pipeline, and&nbsp;suggested
        that, given the developments in the Middle East,&nbsp;its construction could
        be accelerated.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2025.09/thumbnail/68b739a8203027788f500b9e.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/russia/623976-power-siberia-gas-china/\">Did
        you notice the EU just lost its gas lifeline? Here\u2019s what you should
        know</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p data-start=\"1353\" data-end=\"1685\">In September, Russia and
        China signed a legally binding memorandum to construct the pipeline after
        nearly a decade of talks. The agreement was announced during President Vladimir
        Putin&rsquo;s visit to Beijing. The pipeline is designed to deliver up to
        50 billion cubic meters annually from western Siberia to northern China via
        Mongolia.</p>\n<p data-start=\"1800\" data-end=\"2043\">Russia already delivers
        natural gas to China via the Power of Siberia pipeline, which began operations
        in 2019 and reached full operational capacity in December 2024. Moscow has
        also become Beijing&rsquo;s second-largest source of LNG, behind Qatar.</p>\n<p
        data-start=\"2045\" data-end=\"2359\">Middle Eastern supplies have been disrupted
        over the past week by the escalating conflict triggered by US-Israeli strikes
        on Iran. China sources around 18% of its LNG from Qatar and up to 5% from
        the UAE, with cargoes typically routed through the Strait of Hormuz, a waterway
        now largely paralyzed by the fighting.</p>\n    <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.03/original/69af672885f54019370c5234.jpeg\"
        \ />\n            </figure>\n\n<p data-start=\"2361\" data-end=\"2726\">The
        draft also mentions the <em>&ldquo;China-Russia Far East Natural Gas Pipeline,&rdquo;</em>
        according to Tencent News. Built by Russia&rsquo;s Gazprom and China&rsquo;s
        CNPC, the pipeline runs from the town of Dalnerechensk, some five kilometers
        from the Chinese border, and has an annual capacity of 12 billion cubic meters.
        It is fully constructed and is set to go operational in January 2027.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af393c2030277012619377.jpg\"
        alt=\"An oil tanker is moored at the Sheskharis complex in Novorossiysk, Russia,
        October 11, 2022\" />\n            <figcaption><a href=\"https://www.rt.com/russia/634301-russia-iran-oil-prices/\">Oil
        shock update: Will the US-Israeli war on Iran make Russia richer?</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p data-start=\"2728\"
        data-end=\"3164\">Russian President Vladimir Putin warned last week that Moscow
        could halt gas supplies to the EU ahead of a planned 2027 ban and redirect
        them to <em>&ldquo;reliable&rdquo;</em> partners. Deputy Prime Minister Aleksandr
        Novak later confirmed that Russia would reroute some LNG from Europe to Asia-Pacific
        markets, including China. The remarks prompted concern over European energy
        security and calls from politicians to roll back sanctions on Russian energy.</p>\n<p
        data-start=\"3166\" data-end=\"3600\">Despite sweeping Western restrictions,
        China has deepened energy trade with Russia. Beijing and Moscow declared a
        <em>&ldquo;no-limits&rdquo;</em> partnership in 2022. In a phone call with
        Xi Jinping last month, Putin highlighted bilateral trade exceeding $200 billion
        annually and Russia&rsquo;s role as a leading energy supplier to China. Xi,
        for his part, pledged to deepen energy cooperation at the China-Russia Energy
        Business Forum in Beijing in November.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af060e85f540150936c358.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 10 Mar 2026 00:32:57
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Germany reports industrial production decline</title>\n        <link><![CDATA[https://www.rt.com/business/634312-germany-industrial-output-decline/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634312-germany-industrial-output-decline/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af59c62030277229355b3a.jpg\"
        /> German industries are showing no signs of recovery as of early 2026, according
        to the Federal Statistical Office (Destatis) <br/><a href=\"https://www.rt.com/business/634312-germany-industrial-output-decline/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The statistics have yet to account
        for the impact of the US-Israeli war against Iran</strong></p>\n            \n
        \                       \n            <p><strong></strong>German industries
        are showing no signs of recovery as of early 2026, with production output
        declining even before the US and Israel launched their attack on Iran, according
        to the Federal Statistical Office (Destatis).</p>\n<p>The nation&rsquo;s industrial
        output fell by 0.5% in January in comparison to December, according to a report
        published on Monday. The year-on-year decline was even bigger at 1.2%, the
        data shows.</p>\n<p>The decline particularly affected the energy-intensive
        industrial branches, Destatis said. The agency named metal product fabrication,
        pharmaceutics, and computer, electronic, and optical product manufacturing
        among the most affected fields, where the month-on-month drop in output was
        7-12%.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/69666f2185f540116a2c8628.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/news/630922-german-business-alarm-record-bankruptcy/\">German
        businesses sound alarm over record bankruptcies</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The statistics have yet to account
        for the fallout from the latest escalation in the Middle East. The US-Israeli
        strikes on Iran, which triggered retaliation, significantly raised the risks
        for vessels passing through the Strait of Hormuz. Brent prices peaked at almost
        $120 per barrel on Monday. EU natural gas prices have nearly doubled since
        before the attack.</p>\n<p>High energy prices have been cited by German media
        and officials as a key factor behind the economic slowdown that has affected
        the EU&rsquo;s largest economy in recent years.</p>\n<p>Germany, which had
        relied on Russia for 55% of its natural gas, took a heavy blow after the country
        took part in the Western sanctions on Russia following the escalation of the
        Ukraine conflict in 2022.</p>\n<p>Russian oil giant Rosneft&rsquo;s operations
        also accounted for around 12% of the nation&rsquo;s total oil-processing capacity,
        according to Bloomberg.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af393c2030277012619377.jpg\"
        alt=\"An oil tanker is moored at the Sheskharis complex in Novorossiysk, Russia,
        October 11, 2022\" />\n            <figcaption><a href=\"https://www.rt.com/russia/634301-russia-iran-oil-prices/\">Oil
        shock update: Will the US-Israeli war on Iran make Russia richer?</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Bild reported
        in October 2025 that electricity and gas rose by 14% and 74% respectively
        from 2022 to 2025. The decision to abandon cheap Russian energy imports played
        a major role in slowing down the economy, which contracted in 2023 and 2024
        &ndash; the first back-to-back annual drop since the early 2000s.</p>\n<p>The
        Federal Employment Agency warned in December about an unemployment crisis
        linked to the struggling economy. Its head, Andrea Nahles, said even well-qualified
        workers are no longer fully shielded from unemployment. In January, the German
        Chamber of Commerce and Industry named high energy costs as one of the key
        factors behind what it called an alarmingly high number of bankruptcies.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69af59c62030277229355b3a.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 09 Mar 2026 23:37:49
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Hungary urges EU to lift Russian oil ban</title>\n        <link><![CDATA[https://www.rt.com/business/634257-hungary-lift-russian-oil-sanctions/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634257-hungary-lift-russian-oil-sanctions/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69aee08f85f5400fcd112e4f.jpg\"
        /> Hungarian FM Peter Szijjarto says the EU should drop the sanctions on Russian
        oil to protect Europeans amid the Middle East crisis <br/><a href=\"https://www.rt.com/business/634257-hungary-lift-russian-oil-sanctions/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Brussels should protect the interests
        of Europeans, not ideology, as the Middle East crisis escalates, Peter Szijjarto
        says</strong></p>\n            \n                        \n            <p>Hungarian
        Foreign Minister Peter Szijjarto has urged the EU to lift its ban on Russian
        oil and gas imports, as escalating Middle East tensions and attacks involving
        Iran have sent global oil prices soaring.</p>\n<p>The latest US-Israeli attacks
        against Iran have sharply increased risks for vessels in the Strait of Hormuz,
        the route for around 20% of global oil. Traffic has reportedly dropped by
        80% after several tankers were hit, pushing crude above $100 and prompting
        expectations of emergency energy measures from the EU and other major economies.</p>\n<p><em>&ldquo;The
        EU should immediately lift its ban on Russian oil and gas imports,&rdquo;</em>
        Szijjarto said on Monday in a post on X. <em>&ldquo;With the war in the Middle
        East escalating and the Strait of Hormuz closed, a major share of global energy
        supply is now at risk.&rdquo;</em></p>\n<p><em>&ldquo;If Brussels keeps the
        sanctions in place, it will cause serious harm to European people and the
        European economy,&rdquo;</em> he added, arguing that <em>&ldquo;the focus
        should be on protecting the interests of Europeans, not ideology.&rdquo;</em></p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/business/634079-us-unsanctions-russian-oil-iran/\">\n
        \           <span>READ MORE: </span>US eases Russian oil restrictions amid
        Iran crisis\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>The remarks
        come days after US Treasury Secretary Scott Bessent announced the easing of
        sanctions on some Russian oil to stabilize the markets amid the Middle East
        escalation, adding that further steps to lower prices are being considered.</p>\n<p>Earlier
        in the day, Hungarian Prime Minister Viktor Orban said he had written to European
        Commission President Ursula von der Leyen, urging the EU to lift the sanctions
        on Russian energy, and warning that the <em>&ldquo;oil blockade&rdquo;</em>
        by Ukrainian leader Vladimir Zelensky threatens Hungary, Slovakia, and the
        entire EU.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69ad737285f54008eb3918c0.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/russia/634160-wagging-putin-eu-ukraine-relationship/\">\u2018Wagging
        the dog\u2019: Putin mocks EU-Ukraine relationship</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em>&ldquo;Because of the Ukrainian
        oil blockade and the war in the Middle East, oil prices have also begun to
        rise sharply in Hungary,&rdquo;</em> the news outlet Index cited Orban as
        saying after a meeting of the Defense and Energy Security Council.</p>\n<p>Kiev
        halted Russian oil supplies to Hungary and Slovakia via the Druzhba pipeline,
        saying it was damaged by Russian strikes &ndash; a claim that Moscow rejects.
        Budapest and Bratislava accuse Ukraine of blackmail and say Brussels has sided
        with Kiev over the two EU states.</p>\n<p>On Sunday, Russian President Vladimir
        Putin said EU-Ukraine relations can be described as <em>&ldquo;the tail wagging
        the dog,&rdquo;</em> stressing that Kiev&rsquo;s <em>&ldquo;dangerous and
        aggressive&rdquo;</em> stance could further undermine the energy security
        of EU member states.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69aee08f85f5400fcd112e4f.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 09 Mar 2026 15:04:39
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US eases Russian oil restrictions amid Iran crisis</title>\n
        \       <link><![CDATA[https://www.rt.com/business/634079-us-unsanctions-russian-oil-iran/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634079-us-unsanctions-russian-oil-iran/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69ac03cb20302745d7575309.jpg\"
        /> The US issued a 30-day sanctions waiver on Russian oil and petroleum products
        currently at sea as prices surge amid the Iran war <br/><a href=\"https://www.rt.com/business/634079-us-unsanctions-russian-oil-iran/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Several countries are reportedly already
        considering purchases after Washington issued a 30-day waiver</strong></p>\n
        \           \n                        \n            <p>The United States has
        issued a 30-day waiver on Russian oil and petroleum products currently at
        sea, in the face of a developing global energy crisis spurred by the Iran
        war initiated by the US and Israel.</p>\n<p>Several countries have already
        announced plans to purchase Russian crude following the move by Washington.</p>\n<p>The
        US and Israel launched joint air strikes on Iran late last month, triggering
        retaliatory attacks targeting American military facilities across the Middle
        East. The escalation has disrupted shipping through the Strait of Hormuz,
        a vital energy chokepoint through which about one-fifth of global oil and
        LNG supplies pass.</p>\n<p>Oil prices have surged, as the strait has remained
        effectively closed for most through-traffic. Brent crude has climbed about
        30% to above $100 per barrel.</p>\n<p>On Thursday, US Treasury Secretary Scott
        Bessent announced that Washington would temporarily lift restrictions on purchases
        of Russian crude that was loaded onto vessels before March 12. The waiver,
        valid until April 11, will affect an estimated 100-124 million barrels of
        oil, according to media reports.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a8757185f5404e025da096.jpg\"
        alt=\"Russian President Vladimir Putin chairs a meeting with members of the
        government via videoconference at the Kremlin in Moscow.\" />\n            <figcaption><a
        href=\"https://www.rt.com/russia/633804-russia-exit-european-gas-putin/\">Russia
        could end gas supplies to EU immediately \u2013\_Putin</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Oil prices
        dropped slightly following the announcement and several countries immediately
        announced plans to purchase Russian crude.</p>\n<p>Thailand, which currently
        imports 50% of its oil from the Persian Gulf, described the sanctions reprieve
        as <em>&ldquo;good news&rdquo;</em> and said it would begin talking to Moscow
        in an effort to diversify energy sources.</p>\n<p>Japan, which imported 94%
        of its oil from the Middle East last year, also said it would consider buying
        from Russia after the announcement.</p>\n<p>The Kremlin welcomed the US move
        but warned that it would not be enough to stabilize the market. Spokesman
        Dmitry Peskov said the situation <em>&ldquo;risks turning into a broader crisis
        in the global energy sector,&rdquo;</em> arguing that <em>&ldquo;there is
        no way for the market to stabilize without significant volumes of Russian
        oil.&rdquo;</em>&nbsp;</p>\n<p>According to Axios, the waiver was announced
        despite objections from key European allies. During a virtual G7 leaders&rsquo;
        call on Wednesday, German Chancellor Friedrich Merz, British Prime Minister
        Keir Starmer, and French President Emmanuel Macron reportedly urged US President
        Donald Trump not to ease sanctions.</p>\n<p>Merz on Friday blasted the decision
        as <em>&ldquo;wrong,&rdquo;</em> insisting that <em>&ldquo;there is currently
        a problem with prices, but not with supply.&rdquo;</em> The UK has also ruled
        out following Washington&rsquo;s lead, with Energy Minister Michael Shanks
        telling the BBC that London will not ease its own restrictions. Norwegian
        Prime Minister Jonas Gahr Store likewise said the sanctions should not be
        relaxed.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69ab0a1e2030271f82794886.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/business/634030-oil-price-rising-middle-east/\">Oil
        price surges to highest since 2023</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Bessent previously said the waiver applied to India alone, <em>&ldquo;to
        ease the temporary gap of oil around the world,&rdquo;</em> but that Washington
        could also <em>&ldquo;unsanction other Russian oil&rdquo;</em> to further
        boost supply. <em>&ldquo;We&rsquo;re going to keep a cadence of announcing
        measures to bring relief to the market during this conflict,&rdquo;</em> he
        added.</p>\n<p>India and China became the main buyers of Russian crude after
        the US and EU imposed sanctions on Moscow over the escalation of the Ukraine
        conflict in 2022.</p>\n<p>Washington has long urged New Delhi to halt the
        imports. US Ambassador to India Sergio Gor said last month that the White
        House was using trade talks to push the country to buy Venezuelan oil instead.</p>\n<p>US
        President Donald Trump claimed that New Delhi <em>&ldquo;agreed to stop&rdquo;</em>
        deliveries from Moscow. India, however, never confirmed such a commitment.</p>\n<p>Moscow
        likewise said it had no information suggesting that India had put Russian
        crude imports on hold. The Kremlin has condemned the US-Israeli strikes on
        Iran as a <em>&ldquo;premeditated and unprovoked act of aggression&rdquo;</em>
        with no justification.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69ac03cb20302745d7575309.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Sat, 07 Mar 2026 12:48:36
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Oil price surges to highest since 2023</title>\n        <link><![CDATA[https://www.rt.com/business/634030-oil-price-rising-middle-east/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/634030-oil-price-rising-middle-east/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69ab0a1e2030271f82794886.jpg\"
        /> Crude oil prices hit a two-and-a-half year high on Friday amid supply disruptions
        in the Middle East due to the US-Israeli war against Iran <br/><a href=\"https://www.rt.com/business/634030-oil-price-rising-middle-east/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The escalating US-Israeli war against
        Iran is disrupting energy supplies from the Middle East</strong></p>\n            \n
        \                       \n            <p>Oil prices hit a two-and-a-half year
        high on Friday as the escalating US-Israeli war against Iran disrupts energy
        supplies from the Middle East to global markets.</p>\n<p>Global benchmark
        Brent crude futures were up over 8% to over $92 a barrel, while US West Texas
        Intermediate (WTI) rose over 11% to over $90, both highest since September
        2023.</p>\n<p>Commercial traffic through the Strait of Hormuz, a critical
        waterway between Iran and Oman that carries about one-fifth of the world&rsquo;s
        oil exports, has come to a near-complete halt, according to Bloomberg.</p>\n<p>Iraq,
        the region&rsquo;s second-largest producer, has had to cut output due to an
        inability to export. Kuwait has reportedly begun cutting production at some
        oil fields after running out of storage. Iran&rsquo;s own oil exports have
        effectively ceased.</p>\n<p>Goldman Sachs warned oil could top $100 a barrel
        if the disruption continues. Qatar&rsquo;s energy minister warned that oil
        could hit $150.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69aab2fe85f54054950517a1.jpg\"
        alt=\"FILE PHOTO of a Russian oil ship.\" />\n            <figcaption><a href=\"https://www.rt.com/india/633963-us-grants-india-30-day/\">US
        grants India 30-day waiver to import Russian oil</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Russian President Vladimir Putin
        said the shipping disruptions could open opportunities for Russia to expand
        energy exports. <em>&ldquo;Against this backdrop, we can look for new buyers
        who have lost supplies that previously moved through the strait,&rdquo;</em>
        he said, suggesting Moscow could redirect oil and gas shipments to alternative
        markets to replace Gulf flows.</p>\n<p>Meanwhile, the US has granted India,
        a leading crude importer, a 30-day waiver to purchase Russian oil. The move
        is aimed at ensuring stability in the global oil market, according to US Treasury
        Secretary Scott Bessent.</p>\n<p>Several EU politicians have stepped up calls
        to roll back Russia sanctions. In Germany, Sahra Wagenknecht, leader of the
        BSW party, has called for resuming imports of Russian oil to ease prices,
        while Alice Weidel, co-chair of the AfD, has urged an end to a one-sided reliance
        on the US and the Middle East for LNG.</p>\n\n            ]]> <![CDATA[\n
        \   <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/africa/633744-us-israel-iran-oil-gulf-of-guinea/\">\n
        \           <span>READ MORE: </span>The Middle East is on fire. Will this
        gulf become another oil haven?\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Hungarian
        Prime Minister Viktor Orban, Slovak Prime Minister Robert Fico, and Italian
        Deputy Prime Minister Matteo Salvini have repeatedly condemned the bloc&rsquo;s
        sanctions on Moscow, saying they hurt the EU&rsquo;s economy.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69ab0a1e2030271f82794886.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 06 Mar 2026 18:27:56
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Putin warning fuels calls in EU to drop sanctions</title>\n
        \       <link><![CDATA[https://www.rt.com/business/633876-russian-gas-warning-putin-eu/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633876-russian-gas-warning-putin-eu/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a9c36120302729467e9095.jpg\"
        /> EU politicians are raising the alarm over losing Russian oil and gas supplies
        amid the escalating conflict in the Middle East <br/><a href=\"https://www.rt.com/business/633876-russian-gas-warning-putin-eu/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Losing Russian gas supplies amid the
        escalating conflict in the Middle East has raised concerns over the bloc\u2019s
        energy security</strong></p>\n            \n                        \n            <p>EU
        politicians are stepping up calls to roll back Russia sanctions after President
        Vladimir Putin warned that Moscow could halt gas supplies ahead of a planned
        2027 ban. It has raised concerns over the bloc&rsquo;s energy security amid
        the escalating conflict in the Middle East.</p>\n<p>Hungarian Prime Minister
        Viktor Orban, Slovak Prime Minister Robert Fico, and Italian Deputy Prime
        Minister Matteo Salvini have repeatedly condemned the sanctions, saying they
        hurt the EU&rsquo;s economy.</p>\n<p>In Germany, Sahra Wagenknecht, leader
        of the BSW party, has called for resuming imports of Russian oil to ease prices,
        while Alice Weidel, co-chair of the AfD, has urged an end to a one-sided reliance
        on the US and the Middle East for LNG.</p>\n<p>Florian Philippot, the leader
        of France&rsquo;s Patriots party shared a video of Putin&rsquo;s remarks on
        X on Thursday. The French politician blasted the bloc&rsquo;s Russia sanctions
        as <em>&ldquo;idiotic&rdquo;</em> and <em>&ldquo;ruinous&rdquo;</em> for Europeans
        and insisted they amount to collective self-harm.</p>\n<p>European gas prices
        hit a three-year high this week after the US-Israeli campaign against Iran
        and Tehran&rsquo;s retaliatory strikes across the Middle East disrupted crude
        and LNG shipments through the Strait of Hormuz, a critical maritime choke
        point. This caused Qatar, the world&rsquo;s second-largest LNG exporter, to
        halt production.</p>\n\n            <blockquote class=\"twitter-tweet\"><p
        lang=\"fr\" dir=\"ltr\">\xAB Peut-\xEAtre serait-il plus avantageux pour nous
        d\u2019arr\xEAter la livraison du march\xE9 europ\xE9en d\xE8s maintenant
        ! \xBB (cf vid\xE9o \u2935\uFE0F)<br><br>En pleine crise \xE9nerg\xE9tique
        li\xE9e \xE0 la guerre en Iran, Poutine pi\xE8ge l\u2019UE en \xE9voquant
        un arr\xEAt imm\xE9diat des livraisons de gaz avant m\xEAme que l\u2019UE
        d\xE9gaine !\u2026 <a href=\"https://t.co/ZdE8Zk8FDJ\">pic.twitter.com/ZdE8Zk8FDJ</a></p>&mdash;
        Florian Philippot (@f_philippot) <a href=\"https://twitter.com/f_philippot/status/2029462315033088145?ref_src=twsrc%5Etfw\">March
        5, 2026</a></blockquote> <script async src=\"https://platform.twitter.com/widgets.js\"
        charset=\"utf-8\"></script>\n    \n\n<p>The EU gets between 5% and 15% of
        its total gas supplies from Middle Eastern sources, primarily Qatar. The US
        is currently the bloc&rsquo;s dominant LNG supplier with a 60% share.</p>\n<p>Last
        month, the EU agreed to ban all gas imports from Russia, once the bloc&rsquo;s
        largest supplier, by late 2027. The measure was designed to be approved by
        a <em>&ldquo;reinforced majority&rdquo;</em> of countries using trade and
        energy laws, rather than as a sanctions measure requiring unanimous approval.
        It came despite opposition from Hungary and Slovakia.</p>\n\n            ]]>
        <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/russia/633804-russia-exit-european-gas-putin/\">\n
        \           <span>READ MORE: </span>Russia could end gas supplies to EU immediately
        \u2013\_Putin\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Putin said
        this week that Moscow may pull out of the EU gas market and redirect supplies
        to <em>&ldquo;reliable&rdquo;</em> partners without waiting for Brussels&rsquo;
        planned phase out of Russian imports to take effect. The energy crisis in
        the bloc is the result of its <em>&ldquo;misguided policies&rdquo;</em> over
        many years, he stated.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a9c36120302729467e9095.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 05 Mar 2026 18:01:18
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US to exempt Russian oil giant\u2019s German units from sanctions
        \u2013 Bloomberg</title>\n        <link><![CDATA[https://www.rt.com/business/633803-rosneft-germany-us-indefinite-exemption/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633803-rosneft-germany-us-indefinite-exemption/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a86ea085f5403a4d6a8b74.jpg\"
        /> The US will reportedly exempt Rosneft\u2019s German unit from sanctions
        indefinitely, securing refining operations amid the Middle East conflict <br/><a
        href=\"https://www.rt.com/business/633803-rosneft-germany-us-indefinite-exemption/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Berlin is reportedly seeking to secure
        domestic refining operations as the Middle East conflict rattles global energy
        markets</strong></p>\n            \n                        \n            <p>The
        US will exempt the German subsidiary of Russia&rsquo;s state-owned oil giant
        Rosneft from sanctions indefinitely, Bloomberg has reported, citing sources.</p>\n<p>The
        arrangement, expected to be officially announced on Friday, would ensure continuing
        refining operations in Germany as the escalating Middle East conflict has
        triggered fears of disruptions to oil and gas supplies, the outlet wrote on
        Wednesday.</p>\n<p>Rosneft Deutschland holds stakes in three German refineries
        that have been under state administration, known as a trusteeship, since the
        escalation of the Ukraine conflict in 2022 and ensuing sanctions. The facilities
        account for roughly 13% of the EU country&rsquo;s refining capacity.</p>\n<p>Trusteeship
        means that while Rosneft maintains ownership, the German subsidiaries are
        effectively <em>&ldquo;decoupled&rdquo;</em> from the parent company&rsquo;s
        sanctioned status and are able to function.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a8324185f5404b9e03f8c1.jpg\"
        alt=\"Kirill Dmitriev\" />\n            <figcaption><a href=\"https://www.rt.com/russia/633761-dmitriev-eu-energy-decisions/\">Moscow
        slams EU\u2019s \u2018disastrous\u2019 energy decisions</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>In October,
        the US targeted Rosneft with sanctions, barring American firms and financial
        institutions from dealing with it and its subsidiaries. A temporary license
        was issued, giving Germany until April 29 to either sell the assets or nationalize
        them. Berlin has faced difficulty finding a buyer and has been reluctant to
        nationalize for fear of retaliation from Moscow and costly legal battles.
        Rosneft has condemned the trusteeship as <em>&ldquo;unlawful&rdquo;</em> and
        a violation of market principles.</p>\n<p>The management of the largest refinery,
        PCK Schwedt, which supplies roughly 90% of the fuel to the city of Berlin,
        reportedly sent a private letter to the German government in January warning
        that the sanctions were <em>&ldquo;already choking day-to-day operations&rdquo;</em>
        and threatening to cause fuel shortages for the capital.</p>\n<p>The indefinite
        exemption expected this week would provide the legal certainty that banks,
        insurers, and suppliers will deal with Rosneft Deutschland.</p>\n\n            ]]>
        <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/news/633639-energy-markets-reaction/\">\n
        \           <span>READ MORE: </span>How energy markets have responded to the
        Middle East war\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>The need
        for stable refining capacity is particularly acute now. In the Middle East,
        Iran has been retaliating against US and Israeli strikes with missile and
        drone attacks, including on regional oil facilities. Shipping through the
        Strait of Hormuz, a waterway between Iran and Oman that carries roughly 20%
        of the world&rsquo;s oil exports, has largely ground to a halt, raising fears
        of global supply disruptions.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a86ea085f5403a4d6a8b74.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 04 Mar 2026 20:21:57
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>This could prove to be America\u2019s Achilles\u2019 heel in
        the Iran war</title>\n        <link><![CDATA[https://www.rt.com/business/633789-americas-achilles-heel-in-iran-war/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633789-americas-achilles-heel-in-iran-war/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a85ba785f5404b9e03f8dd.jpg\"
        /> Missile shortages, rising Treasury yields, and a financialized economy
        may limit America\u2019s options <br/><a href=\"https://www.rt.com/business/633789-americas-achilles-heel-in-iran-war/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>In a strange way, markets could come
        to be a surrogate institutional check on a country that otherwise doesn\u2019t
        know restraint</strong></p>\n            \n                        \n            <p>The
        missiles are again flying and a thick fog of war has descended over the Middle
        East. US President Donald Trump has said it might take four to five weeks
        or longer to achieve America&rsquo;s objectives, whatever those are. During
        a hot war, that&rsquo;s an eternity in the world of mercurial financial markets.&nbsp;</p>\n<p>So
        far, however, markets have been remarkably sanguine, perhaps, as the excellent
        Yves Smith <a href=\"https://www.nakedcapitalism.com/2026/03/iran-war-israel-air-defenses-crumbling-us-base-attacks-continue-as-markets-set-for-wile-e-coyote-moment.html\">posits</a>,
        because <em>&ldquo;bigotry and Western narrative control were able to shore
        up the idea that this would be a short conflict and that Iran would return
        to the negotiating table after the US broke its legs, or better yet fall quickly
        into civil unrest, making regime change or balkanization possible.&rdquo;</em></p>\n<h2>Energy
        markets are the first port of call</h2>\n<p>Will the relative resilience of
        markets last? Everyone is of course watching the Strait of Hormuz, and more
        generally, oil prices. In these types of crises, it&rsquo;s the oil price
        that other asset classes take their cues from.&nbsp;</p>\n<p>Iran has threatened
        any vessel that passes through, while Trump has offered to insure said vessels
        <em>&ldquo;at a reasonable price&rdquo;</em> with a US Navy escort to boot.
        Oil prices have drifted higher but the movements have so far been disciplined
        &ndash; much more so than many expected. A long disruption is not being priced
        in. It certainly helps that the US is the largest crude producer in the world
        and (usually) the third largest exporter. This means that any blockade chokes
        Asia and Europe first, whereas America has a buffer &ndash; one, I might add,
        it didn&rsquo;t have in previous conflagrations.&nbsp;</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a8179e2030276825137991.jpg\"
        alt=\"RT composite.\" />\n            <figcaption><a href=\"https://www.rt.com/news/633749-iran-lessons-for-moscow/\">Iran
        under fire: Lessons Moscow cannot ignore</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Perhaps more worrying is the
        situation with natural gas. Europe&rsquo;s natural gas prices jumped by about
        30% in the wake of an attack on QatarEnergy LNG processing units. There is
        no easy solution here. Qatar supplies 20% of the world&rsquo;s LNG; if that
        supply disappears, an already tight market will see prices explode. Norway&rsquo;s
        energy minister has already <a href=\"https://www.rt.com/business/633663-middle-east-war-energy-eu-russia/\">hinted</a>
        that Europe might, tail between legs, come back to Russian energy.&nbsp;</p>\n<p>War
        is always disruptive, and when that war is in the Middle East, energy markets
        come into sharp focus. We have seen this on many occasions. It is indeed an
        acute pressure point for the US &ndash; and the world &ndash; and has been
        for decades. Right now, markets are basically trading headline to headline.
        But even in these head-swirling times, it pays to step back from the noise
        and flashing headlines and look at things a little more structurally.&nbsp;</p>\n<h2><strong>The
        cost of financialization&nbsp;</strong></h2>\n<p>One of the defining features
        of&nbsp;fading hegemons is that they often harbor fatal weaknesses that can
        be concealed for a long time. In the case of the US, the erosion of industrial
        capacity and related financialization of the economy may prove to be just
        that weakness. The former long ago caused the US to become overly reliant
        on pricey, high-tech weapons at the expense of the quantity needed for a protracted
        engagement &ndash; not to mention the dependency on supply chains from China
        for the defense industry.&nbsp;</p>\n<p>Trump claims to have nearly <em>&ldquo;unlimited&rdquo;</em>
        ammunition stocks thanks to cutting Ukraine off. But many <a href=\"https://www.aljazeera.com/news/2026/3/3/could-the-us-run-low-on-weapons-for-its-assault-on-iran\">believe</a>
        that if high-intensity strikes go on much longer, US stocks of certain critical
        missiles will start to run low. The US <a href=\"https://www.19fortyfive.com/2026/03/the-iran-war-means-the-u-s-navy-faces-a-tomahawk-missile-shortage-if-china-invades-taiwan/\">reportedly
        used</a> about five years&rsquo; worth of Tomahawk missile production in the
        first three days of the war, and Patriot interceptors are known to be running
        low. It seems to be a race as to whether Iranian missile launchers can be
        destroyed faster than the American stockpile of interceptors depletes.</p>\n<p>But
        the financial side is no less important, even apart from shock moves in oil
        prices. As the US economy de-industrialized, it became increasingly financialized.
        This has many far-ranging implications, but one of them is that a large portion
        of national income is now tied to financial asset prices. A drop in asset
        prices thus reverberates far and wide and triggers numerous knock-on effects.
        An example of this is that even the US tax base is highly dependent on asset
        prices.&nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a5e43220302741e66e3038.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/633532-iran-could-decide-ukraines-fate/\">The
        Iran war could have unexpected consequences in Ukraine</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The so-called
        &lsquo;everything bubble&rsquo; of 2021 &ndash; when a wide range of asset
        classes saw record valuations &ndash; led to a large increase in tax receipts
        the following year (+21% year-on-year) when taxes on the income generated
        on these gains came due. However, when the Fed hiked interest rates in 2022,
        financial markets responded very negatively and asset prices went down. Sure
        enough, the following year tax receipts declined, and the federal deficit
        went sharply higher.</p>\n<p>Notice the very troubling negative feedback loop:
        higher interest rates suppress asset prices, thus leading to a lower tax intake
        by the government, while also entailing a higher debt-servicing expense. So
        a drop in asset prices forces the government to spend more to service its
        debt while at that exact moment decreasing the amount it collects in taxes.
        The result? More Treasury issuance, of course, and at higher interest rates.
        The moral of the story here is that longer-term the US cannot fiscally survive
        a massive decrease in financial asset prices.&nbsp;</p>\n<p>Also keep in mind
        that roughly half of American households now have direct exposure to equity
        markets through retirement accounts, mutual funds, or brokerage holdings.
        In previous eras, the health of the stock market was largely the concern of
        Wall Street. Today, it is entangled with the security of the middle class.&nbsp;</p>\n<p>This
        all might seem distant and abstract in the midst of a war. Next year&rsquo;s
        tax receipts or the state of Americans&rsquo; 401(k) plans are the last thing
        on anybody&rsquo;s mind in Washington today. But these are real structural
        constraints that have to be reckoned with. So far stock markets have only
        mildly drifted lower, but with no panic selling. If the selling picks up,
        watch how quickly it becomes a major headline.&nbsp;</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a6ee6e85f54034ea1f3145.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/633639-energy-markets-reaction/\">How
        energy markets have responded to the Middle East war</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<h2>The power of a simple yield</h2>\n<p>Even
        more sensitive than stocks is the US Treasury (UST) market, which is the true
        plumbing of the financial system. Higher UST yields tighten financial conditions
        everywhere, all at once. In a heavily indebted and leveraged system such as
        the US, rapid moves in this market are extremely dangerous. This is where
        the constraints start to be measured in hours. A very telling &ndash; albeit
        underreported &ndash; instance of this tremendous sensitivity to Treasury
        market dysfunction came last year.&nbsp;</p>\n<p>On April 2, Trump introduced
        his so-called Liberation Day tariffs, slapping an across-the-board 10% tariff
        on all imported foreign goods and larger <em>&ldquo;reciprocal tariffs&rdquo;</em>
        on the imports of dozens of countries that Trump claimed had <em>&ldquo;cheated&rdquo;</em>
        the US.&nbsp;</p>\n<p><em>&ldquo;This is one of the most important days, in
        my opinion, in American history,&rdquo;</em> Trump proclaimed with his usual
        bluster in a speech on the White House lawn announcing the measures. The world
        watched with a mix of incredulousness, awe, and dread. It was a grand gesture,
        a reassertion of US power.&nbsp;</p>\n<p>Stock markets plunged immediately
        but Trump and his team weren&rsquo;t deterred. On Sunday evening, April 6,
        Trump talked tough, saying <em>&ldquo;I don&rsquo;t want anything to go down,
        but sometimes you have to take medicine to fix something.&rdquo;</em></p>\n<p>Alas,
        the medicine would prove too bitter. At first, the big drop in stocks pushed
        investors scurrying into bonds and UST yields proceeded to actually fall (meaning
        prices rose) and reached 3.96% on Friday, April 4. So far, so good.</p>\n<p>On
        Monday, however, UST yields engineered a U-turn and started moving higher
        as the true implications of the radical tariffs started to dawn. The following
        day saw more of the same. By Tuesday afternoon, the 10y yield was approaching
        4.30%. On Wednesday, the very day the tariffs were supposed to take effect,
        the 10y added another 10 basis points to 4.40%, putting the three-day gain
        at around 50 basis points.&nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a2fa1585f54022ab77fb98.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/633219-americans-killing-dying-for-israel/\">Why
        are Americans killing and dying for Israel, again?</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Trump had seen enough. Or maybe
        he got a tap on the shoulder from some big players who were soon facing margin
        calls. Regardless, like an MMA fighter who taps out almost immediately after
        being put in a subtle chokehold to the bewilderment of the crowd, it only
        took a couple of days of disorderly market action for Trump to capitulate
        and cancel or postpone most of the tariffs in what can only be called a humiliating
        retreat. It was a telling moment for those who understood what had happened.</p>\n<p>Indeed,
        nothing makes regulators and politicians more nervous than dysfunction in
        the UST market, which can get out of control very quickly and suddenly cause
        markets to seize up. The US has shown repeatedly that it will intervene forcefully
        at the mere sight of UST market dysfunction. This is truly one of the Achilles&rsquo;
        heels of the US.&nbsp;</p>\n<h2>Where&nbsp;we are headed</h2>\n<p>There has
        so far been no sign of disorderly UST activity, but that doesn&rsquo;t mean
        things are all clear. During times of chaos and uncertainty in the world,
        the US usually sees an inflow of money seeking a safe haven. Quite perversely,
        this happens even when the US is the cause of the trouble. To some extent,
        this has held true now: the dollar rallied sharply following the strikes on
        Iran.</p>\n<p>Nevertheless, UST yields have been creeping higher on fears
        of the inflationary effect of a more protracted war. Investors are thus caught
        between the normal safe-haven appeal of the dollar and fears of a surge in
        inflation that would hammer USTs (i.e. drive yields higher, prices lower).&nbsp;</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a713f12030277b3d689ae6.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/633658-russia-key-iran-war/\">Is
        Russia the key to ending the Iran war?</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>This movement hasn&rsquo;t been
        sharp enough to garner much attention, but the 10y is over the 4% mark as
        of this writing. Like old sailors who by&nbsp;a sixth sense can feel trouble
        in the breeze, some analysts&nbsp;wonder if something more disruptive might
        be brewing. Any definitive shift toward the inflationary case &ndash; such
        as major disruptions in energy flows &ndash; would likely push yields significantly
        higher. This would force the administration into the crucible of risking a
        major financial crisis to keep the war going.&nbsp;</p>\n<p>The US has long
        benefitted from the perception that it can blot out the sun with planes and
        missiles. Deterrence, once credibly established, can be maintained with smoke
        and mirrors &ndash; until, that is, somebody is willing to pay to see your
        cards. Until now, nobody has really called Washington&rsquo;s bluff, although
        the Ukraine war has provided strong hints of this soft underbelly. Whether
        this will be the conflict that lays bare the deep fundamental weakness remains
        to be seen, but if markets start to think it is, things will move very quickly.
        &nbsp;</p>\n<p>The US and Israel are certainly acting with impunity, and there
        no longer seem to be any institutional checks on the ambitions of those prosecuting
        this war. But in a strange way, markets could come to be a surrogate institutional
        check.&nbsp;A country that can&rsquo;t withstand a 50 basis-point move in
        its bond yields is by definition restricted.</p>\n<p>The precariously balanced
        edifice of American power depends on a tenuous financial equilibrium existing
        within a highly indebted and financialized economy. War is inherently destabilizing.
        The longer this goes on, the more that equilibrium will be tested.&nbsp;</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a85ba785f5404b9e03f8dd.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 04 Mar 2026 17:58:13
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Iran war may push EU towards Russian gas \u2013 key supplier</title>\n
        \       <link><![CDATA[https://www.rt.com/business/633663-middle-east-war-energy-eu-russia/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633663-middle-east-war-energy-eu-russia/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a7202d2030271b890e717f.jpg\"
        /> An energy supply shortfall due to the Iran war could revive the EU debate
        on gas imports from Russia, the Norwegian energy minister has said <br/><a
        href=\"https://www.rt.com/business/633663-middle-east-war-energy-eu-russia/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>A Middle East supply shock could revive
        the debate on imports from Moscow, the Norwegian energy minister has said</strong></p>\n
        \           \n                        \n            <p>The conflict in the
        Middle East may force the EU to scrap its plans to abandon Russian natural
        gas next year, Norway&rsquo;s energy minister, Terje Aasland, has reportedly
        suggested.</p>\n<p>European gas prices have jumped 75% this week hitting a
        three-year high, according to trading data. The spike comes in light of the
        US-Israeli campaign against Iran and Tehran&rsquo;s retaliatory strikes across
        the Middle East.</p>\n<p>The attacks forced tankers carrying liquefied natural
        gas (LNG) to largely stop transiting the Strait of Hormuz and caused the world&rsquo;s
        second-largest LNG exporter Qatar to halt production on Monday.</p>\n<p><em>&ldquo;With
        the geopolitical situation we see now, I believe the debate [about resuming
        Russian gas imports] will be revived,&rdquo;</em> Aasland said during a press
        conference in Oslo on Tuesday, as cited by Reuters.</p>\n<p>He noted that
        Norway, the EU&rsquo;s largest supplier of pipeline gas, is already <em>&ldquo;producing
        at full capacity.&rdquo;</em> There&rsquo;s no additional output to be found,
        he stated, as cited by Bloomberg.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a6ee6e85f54034ea1f3145.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/633639-energy-markets-reaction/\">How
        energy markets have responded to the Middle East war</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The EU gets between 5% and 15%
        of its total gas supplies from Middle Eastern sources, primarily Qatar. The
        US is the dominant LNG supplier with a 60% share.</p>\n<p>Last month, the
        EU agreed to ban all gas imports from Russia, once the bloc&rsquo;s largest
        supplier, by late 2027. The measure was designed to be approved by a <em>&ldquo;reinforced
        majority&rdquo;</em> of countries using trade and energy laws, rather than
        as a sanctions measure requiring unanimous approval.</p>\n<p>The bloc has
        already faced repeated jumps in energy costs since it scaled back Russian
        oil and gas imports following the escalation of the Ukraine conflict in 2022.
        Landlocked members Hungary and Slovakia have contested the measure, threatening
        to challenge the ban in court.</p>\n<p>Goldman Sachs estimates that a month-long
        halt to shipping through the Strait of Hormuz could send European gas prices
        up by as much as 130% from current levels, putting renewed pressure on households
        and industry.</p>\n<p>US President Donald Trump has indicated that military
        operations against Iran could continue for several weeks.</p>\n\n            ]]>
        <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/news/633489-oil-tanker-attacked-oman/\">\n
        \           <span>READ MORE: </span>Oil tanker attacked off coast of US ally
        (VIDEO)\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Russia has consistently
        maintained that it remains a reliable energy supplier despite Western sanctions
        and has accused the US of striving to control the global energy market.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a7202d2030271b890e717f.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 03 Mar 2026 21:00:52
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Gas prices spike amid fears of Middle East supply shock</title>\n
        \       <link><![CDATA[https://www.rt.com/business/633496-gas-prices-spike-middle-east/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633496-gas-prices-spike-middle-east/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a594422030270c7b017046.jpg\"
        /> European gas prices have skyrocketed as traders fear the escalation in
        the Middle East could hit shipments via the Strait of Hormuz <br/><a href=\"https://www.rt.com/business/633496-gas-prices-spike-middle-east/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>European benchmarks have leapt over
        50% as fighting increases shipping risks through the crucial Strait of Hormuz</strong></p>\n
        \           \n                        \n            <p>Gas markets around
        the world were rattled on Monday, with benchmark European natural gas prices
        rising sharply and broader energy markets on edge after Middle East tensions
        increased the risk to supplies via the critical Strait of Hormuz.</p>\n<p>European
        benchmark gas futures surged by around 50% &ndash; their biggest single day
        move since March 2022 &ndash; after LNG tankers largely stopped transiting
        the Strait of Hormuz, the narrow waterway between Iran and Oman that carries
        about a fifth of global oil and gas shipments, over the weekend.</p>\n<p>The
        spike was compounded by a drone strike on QatarEnergy&rsquo;s major LNG complex
        at Ras Laffan, which forced production to be halted.</p>\n<p>Crude markets
        also rallied, with Brent futures climbing to multi-month highs as the escalation
        further constrained energy flows from the region.</p>\n<p>Across the Gulf,
        other energy sites have also been hit or temporarily shut, with producers
        suspending parts of their operations as a precaution. Saudi Arabia has reportedly
        paused activity at its Ras Tanura refinery following the attacks. With pipeline
        alternatives limited and shipping routes through the area stalling, traders
        are now pricing in the risk that supply lines could remain disrupted for an
        extended period.</p>\n\n            <blockquote class=\"twitter-tweet\"><p
        lang=\"en\" dir=\"ltr\">\u26A0\uFE0FBREAKING:<br><br>*EUROPEAN GAS PRICES
        SOAR 50% ON QATAR ENERGY HALT <a href=\"https://t.co/VTmErE26Xd\">pic.twitter.com/VTmErE26Xd</a></p>&mdash;
        Investing.com (@Investingcom) <a href=\"https://twitter.com/Investingcom/status/2028456925805887919?ref_src=twsrc%5Etfw\">March
        2, 2026</a></blockquote> <script async src=\"https://platform.twitter.com/widgets.js\"
        charset=\"utf-8\"></script>\n    \n\n<p>Analysts warn that the turmoil could
        amount to the most serious shock to gas markets since the 2022 energy crisis.
        The EU is seen as particularly exposed. The bloc has already faced repeated
        jumps in energy costs since it scaled back Russian oil and gas imports following
        the escalation of the Ukraine conflict. Moving away from relatively cheap
        Russian pipeline gas has forced the bloc to lean more heavily on LNG deliveries,
        especially from the US. Now, with the heating season ending but storage sites
        less full than usual, the region requires substantial LNG imports over the
        summer to rebuild inventories ahead of next winter.</p>\n<p>The rally comes
        as US President Donald Trump has indicated that military operations against
        Iran could continue for several weeks, while a number of major maritime insurers
        are preparing to stop covering war risks for ships entering the Persian Gulf.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a56f6620302774342b6808.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/633454-oil-prices-us-israeli-iran/\">Oil
        prices spike over US-Israeli strikes on Iran</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Military strikes launched by
        the US and Israel against Iran on Saturday have shown no sign of easing. The
        intense attacks have reportedly killed Iranian Supreme Leader Ayatollah Ali
        Khamenei and other senior officials, including the head of the Islamic Revolutionary
        Guard Corps, while Tehran has responded with airstrikes against Israel and
        several Gulf states hosting US military assets. In a further sign of regional
        escalation, Lebanon&rsquo;s Hezbollah has entered the fray with cross\u2011border
        attacks on Israeli military positions, prompting retaliatory airstrikes on
        the group&rsquo;s infrastructure and command sites.</p>\n<p>Analysts, including
        Goldman Sachs, estimate that a month\u2011long halt to shipping through the
        Strait of Hormuz could send European gas prices up by as much as 130% from
        current levels, putting renewed pressure on households and industry.</p>\n<p>Kirill
        Dmitriev, Russia&rsquo;s presidential envoy and head of the country&rsquo;s
        sovereign wealth fund, argued that the latest price jump highlights the cost
        of Europe&rsquo;s decision to move away from Russian fuel. In a social\u2011media
        <a href=\"https://x.com/kadmitriev/status/2028432832343703795\" target=\"_blank\"
        rel=\"noopener noreferrer\">post</a>, he said EU gas prices <em>&ldquo;could
        more than double soon&rdquo;</em> and claimed that the bloc&rsquo;s <em>&ldquo;strategic
        blunder of avoiding cheap and reliable Russian gas is backfiring.&rdquo;</em></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a594422030270c7b017046.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 02 Mar 2026 13:19:12
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Oil prices spike over US-Israeli strikes on Iran</title>\n
        \       <link><![CDATA[https://www.rt.com/business/633454-oil-prices-us-israeli-iran/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633454-oil-prices-us-israeli-iran/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a56f6620302774342b6808.jpg\"
        /> Oil prices briefly surged to an eight-month high as US-Israel attacks on
        Iran plunged the Middle East into renewed conflict <br/><a href=\"https://www.rt.com/business/633454-oil-prices-us-israeli-iran/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Brent crude briefly surged to a 14-month
        high as the attacks plunged the Middle East into renewed conflict</strong></p>\n
        \           \n                        \n            <p>Global oil prices jumped
        by as much as 13% on Monday after intense US-Israeli strikes on Iran triggered
        major concerns about global economic disruption. Tanker traffic through the
        Strait of Hormuz has already been heavily impacted as attacks continue across
        the Middle East.</p>\n<p>The Strait of Hormuz, the narrow waterway between
        Iran and Oman, carries about 20% of global oil and gas supplies. Although
        Iranian authorities say it remains open to tankers, news reports indicate
        shipping is largely paused due to strike risks.</p>\n<p>Brent crude jumped
        to $82 per barrel on the ICE exchange on Monday, marking a 14-month high amid
        the latest developments surrounding the passage, but has since retreated to
        around $79.5.</p>\n<p>The UK Maritime Trade Operations Centre (UKMTO) said
        on Sunday that two ships were attacked in the Strait of Hormuz, while Oman&rsquo;s
        Maritime Security Center reported a US-sanctioned tanker was struck off its
        coast earlier in the day.</p>\n<p>Reuters reported on Sunday that at least
        150 tankers, including crude and LNG vessels, were anchored in Gulf waters
        outside the Strait of Hormuz, with dozens more stationary beyond the chokepoint.
        The Financial Times, citing brokers, said insurers warned shipowners they
        would cancel policies and raise coverage costs for vessels transiting the
        Gulf and the Strait.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a44e9585f5402254779f20.jpg\"
        alt=\"An airport screen displays canceled flights amid regional airspace closures
        following escalating tensions involving Iran, Israel, and the US, New Delhi,
        India, March 1, 2026.\" />\n            <figcaption><a href=\"https://www.rt.com/news/633328-iran-airspace-chaos-stranded/\">Middle
        East travel chaos leaves hundreds of thousands stranded (VIDEOS)</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Traffic through
        the Strait of Hormuz has dropped 38-50%, according to economist Yegor Susin.
        He estimated potential oil losses at 200-300 million barrels if the disruption
        lasts four weeks, likely pushing prices temporarily to $80-120 per barrel.</p>\n<p>Military
        strikes launched by the US and Israel against Iran on Saturday morning have
        showed no sign of lessening. US President Donald Trump suggested on Sunday
        that the conflict could last for <em>&ldquo;four to five weeks,&rdquo;</em>
        stating that attacks will continue until American objectives are met.</p>\n<p>The
        intense attacks have killed Iranian Supreme Leader Ayatollah Ali Khamenei
        and other top officials, including the head of the Iranian Revolutionary Guard
        Corps. Tehran has responded with airstrikes against Israel and several Gulf
        states hosting US military assets.</p>\n<p>In a further sign of regional escalation,
        Hezbollah has entered the fray by launching a series of cross-border attacks
        against Israeli military positions, prompting retaliatory airstrikes targeting
        the Lebanese armed group&rsquo;s infrastructure and command sites.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.03/thumbnail/69a56f6620302774342b6808.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 02 Mar 2026 11:17:59
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>OpenAI strikes deal with Pentagon</title>\n        <link><![CDATA[https://www.rt.com/business/633184-openai-strikes-deal-pentagon-anthropic/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633184-openai-strikes-deal-pentagon-anthropic/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a2e48585f54021e5732be2.jpg\"
        /> OpenAI CEO Sam Altman announced a US government deal and voiced support
        for rival Anthropic after Trump cut ties <br/><a href=\"https://www.rt.com/business/633184-openai-strikes-deal-pentagon-anthropic/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>CEO Sam Altman has meanwhile voiced
        support for rival Anthropic after Washington stopped working with the company</strong></p>\n
        \           \n                        \n            <p>ChatGPT owner OpenAI
        has signed a deal with the Pentagon for its AI tools to be used in the military&rsquo;s
        classified systems, CEO Sam Altman announced on Friday. The agreement reportedly
        includes guardrails similar to those that rival Anthropic had previously requested.</p>\n<p>The
        announcement came hours after US President Donald Trump ordered federal agencies
        to halt the use of AI systems developed by Anthropic, citing concerns over
        military deployment and the company&rsquo;s attempts to impose conditions
        on the Pentagon.</p>\n<p>Altman highlighted that the Pentagon had <em>&ldquo;displayed
        a deep respect for safety and a desire to partner to achieve the best possible
        outcome.&rdquo;</em> He added that two core safety principles &ndash; prohibitions
        on domestic mass surveillance and human responsibility for the use of force,
        including autonomous weapon systems &ndash; are reflected in the agreement.
        The company will also deploy technical safeguards and full-disk encryption
        to ensure AI models function securely, but only on cloud networks, he added.</p>\n<p>The
        OpenAI CEO called on the Pentagon to extend these terms to all AI companies,
        urging Washington to move away from taking legal action.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a2168c20302742900dfebe.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/633146-trump-anthropic-ai-pentagon/\">Trump
        blacklists Anthropic over AI clash with Pentagon</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Previously, the Pentagon had
        relied on Anthropic&rsquo;s Claude model in classified networks. However,
        Anthropic later refused to grant full access to its AI systems without guarantees
        that the technology would not be used for domestic surveillance or fully autonomous
        weapons targeting without human oversight.&nbsp;</p>\n<p>Pentagon officials
        saw this as an attempt by the company to dictate terms beyond a normal business
        partnership. Deputy Defense Secretary Emil Michael criticized Anthropic CEO
        Dario Amodei for trying to exert undue control over military operations, escalating
        tensions Bloomberg reported earlier this week.</p>\n<p>After banning government
        agencies from using Anthropic&rsquo;s AI developments for six months, Trump
        accused the company of trying to pressure the Pentagon into complying with
        its conditions and of putting national security at risk.</p>\n<p><em>&ldquo;We
        don&rsquo;t need them, we don&rsquo;t want them, and we will no longer deal
        with them,&rdquo;</em> he wrote on Truth Social.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a2e48585f54021e5732be2.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Sat, 28 Feb 2026 13:37:39
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Meta and Google strike AI chip deal \u2013 media</title>\n
        \       <link><![CDATA[https://www.rt.com/business/633115-google-meta-ai-chips/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633115-google-meta-ai-chips/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a1b0ab2030270b1167b9a5.jpg\"
        /> Google and Meta have reportedly reached a multibillion-dollar agreement
        involving artificial intelligence chips <br/><a href=\"https://www.rt.com/business/633115-google-meta-ai-chips/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Big Tech firms are facing scrutiny
        over market dominance in artificial intelligence</strong></p>\n            \n
        \                       \n            <p>Facebook owner Meta has signed a
        multibillion-dollar agreement to rent artificial intelligence chips from Google
        to support the development of new AI models, tech news outlet The Information
        reported on Thursday, citing a person involved in the talks.</p>\n<p>Big Tech
        firms are facing increasing regulatory pressure amid massive investments in
        AI. The US authorities have pushed for safeguards tied to national security
        and responsible deployment of the technology. At the same time, European regulators
        are tightening rules on transparency, safety, and market dominance, encouraging
        firms to rely more on partnerships and shared infrastructure.</p>\n<p>In addition
        to the chip-rental arrangement, The Information said Meta is also in discussions
        to directly purchase Google&rsquo;s Tensor Processing Units (TPUs) for its
        own data centers, potentially beginning next year, although the outcome of
        the talks remains uncertain.</p>\n<p>Meta has already pursued multiple chip
        and infrastructure agreements amid growing AI ambitions. Earlier this year,
        the California-based company secured major AI chip agreements with semiconductor
        maker AMD and expanded its use of Nvidia hardware to diversify access to advanced
        processors and reduce dependence on a single supplier.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/699dbf0285f540569234a191.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/632979-canada-openai-school-shooting/\">Canada
        wants answers from OpenAI after school massacre</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>As part of its expansion strategy,
        Meta began construction of a new data center in Lebanon, Indiana, earlier
        this month, with total investment expected to exceed $10 billion, underscoring
        the company&rsquo;s long-term commitment to AI infrastructure.</p>\n<p>Similar
        collaborations have emerged across the sector. Last year, Microsoft deepened
        cooperation with cloud and chip providers Anthropic and Nvidia to deepen its
        role in building AI infrastructure with multiple partners. At the same time,
        Amazon Web Services expanded compute agreements with AI developers to provide
        access to large Graphics Processing Unit clusters.</p>\n<p>Governments meanwhile
        are advancing formal oversight frameworks. The US has introduced executive
        measures requiring safety testing and reporting for advanced AI systems. The
        EU has adopted sweeping legislation imposing risk-based rules and compliance
        obligations on AI developers &ndash; steps that analysts say are reshaping
        how Big Tech builds and deploys AI technologies.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a1b0ab2030270b1167b9a5.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 27 Feb 2026 15:14:56
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>IMF issues national debt warning to US</title>\n        <link><![CDATA[https://www.rt.com/business/633065-imf-us-debt-warning/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/633065-imf-us-debt-warning/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a01e19203027039552302b.jpg\"
        /> US national debt will surge to 140% of GDP by 2031, the IMF has warned,
        urging Washington to slash its fiscal deficit\n\n\_ <br/><a href=\"https://www.rt.com/business/633065-imf-us-debt-warning/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The nation\u2019s $38 trillion debt
        presents a growing risk to the global economy, the experts have warned</strong></p>\n
        \           \n                        \n            <p></p>\n<p>US national
        debt will surge to 140% of GDP within five years, the International Monetary
        Fund (IMF) has warned, urging Washington to slash its fiscal deficit to rein
        in outsized trade and current account gaps. &nbsp;</p>\n<p>The US national
        debt has swelled to more than $38 trillion, and the fiscal shortfall is deepening,
        data shows. It represents a $2.25 trillion increase over the past year, with
        debt projected to hit $39 trillion by April. The federal budget deficit rose
        from roughly $1.4 trillion in fiscal year 2022 to about $1.8 trillion last
        year, according to the IMF&rsquo;s latest figures. &nbsp;</p>\n<p>Speaking
        to reporters on Wednesday after the fund&rsquo;s annual review of American
        economic policies, IMF chief Kristalina Georgieva said that <em>&ldquo;the
        current account deficit is too big, to make it very simple for the audience.&rdquo;</em>
        She said that the problem is recognized by the US administration. &nbsp;</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698a0cab85f540757a75509e.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/632208-china-us-treasury-holdings/\">China
        calls on banks to limit exposure to US debt \u2013 Bloomberg</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The IMF&rsquo;s
        latest Article IV review projects US public debt will reach 140% of GDP by
        2031 under current policies, while rising short\u2011term debt and a climbing
        debt\u2011to\u2011GDP ratio pose growing risks to both US and global stability.
        The fund said Washington needs a clear fiscal consolidation plan to put debt
        on a sustainable downward path. &nbsp;</p>\n<p>It also urged the US to work
        constructively with its partners <em>&ldquo;to address concerns over unfair
        trade practices and agree on a coordinated reduction in trade restrictions
        and industrial policy distortions that have negative cross-border effects.&rdquo;</em>&nbsp;
        &nbsp;</p>\n<p><em>&ldquo;Where trade and investment measures (including tariffs
        and export controls) are put in place for national security reasons, such
        policies should be applied narrowly,&rdquo;</em> the IMF said. &nbsp;</p>\n<p>US
        economic growth will remain resilient at 2.4% in 2026, while inflation will
        not return to the Federal Reserve&rsquo;s 2% target until early 2027 amid
        uncertainty over the inflation and growth outlook, data shows. &nbsp;</p>\n<p>The
        IMF&rsquo;s report was drafted before the Supreme Court struck down many of
        US President Donald Trump&rsquo;s tariffs and it said it would assess the
        ruling&rsquo;s impact.&nbsp; &nbsp;</p>\n<p>US public debt, issued to cover
        budget deficits and fund programs like healthcare, defense, and infrastructure,
        is widely seen as a safe global asset. Its interest rates set benchmarks for
        other markets and help attract foreign capital. But rising debt can push up
        borrowing costs and inflation, threatening economic stability at home and
        abroad.</p>\n<p>&nbsp;</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69a01e19203027039552302b.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 26 Feb 2026 10:23:00
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Trump slams black Netflix board member as \u2018racist\u2019</title>\n
        \       <link><![CDATA[https://www.rt.com/business/632965-trump-netflix-racist-rice/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632965-trump-netflix-racist-rice/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/699dabfd85f540581d3bbfc2.jpg\"
        /> US President Donald Trump has called former White House staffer and Netflix
        board member Susan Rice \u201Cracist,\u201D demanding she be fired <br/><a
        href=\"https://www.rt.com/business/632965-trump-netflix-racist-rice/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Obama\u2019s former national security
        advisor Susan Rice has reportedly threatened companies loyal to the president</strong></p>\n
        \           \n                        \n            <p>US President Donald
        Trump has branded former White House staffer and Netflix board member Susan
        Rice <em>&ldquo;racist&rdquo;</em> over her reported threats to companies
        that support the president. He has demanded the streaming service fire her
        <em>&ldquo;immediately.&rdquo;</em></p>\n<p>Rice, who is black and a vocal
        Trump critic, served in senior roles under three Democratic administrations,
        including as national security advisor and UN ambassador under Obama. She
        rejoined Netflix&rsquo;s board in 2023 after working for the Biden administration.</p>\n<p>Trump&rsquo;s
        outburst followed a post by right-wing influencer Laura Loomer highlighting
        Rice&rsquo;s remarks on a podcast last week that warned <em>&ldquo;entities&rdquo;</em>
        that <em>&ldquo;take a knee&rdquo;</em> to Trump to expect to be <em>&ldquo;held
        accountable&rdquo;</em> if Democrats return to power.</p>\n<p><em>&ldquo;Netflix
        should fire racist, Trump Deranged Susan Rice, immediately, or pay the consequences,&rdquo;</em>
        Trump responded on Truth Social on Sunday, calling Rice a <em>&ldquo;political
        hack&rdquo;</em> with <em>&ldquo;no talent or skills.&rdquo;</em></p>\n\n
        \           <blockquote class=\"twitter-tweet\"><p lang=\"en\" dir=\"ltr\">Netflix
        <a href=\"https://twitter.com/netflix?ref_src=twsrc%5Etfw\">@netflix</a> Board
        Member Susan Rice <a href=\"https://twitter.com/AmbassadorRice?ref_src=twsrc%5Etfw\">@AmbassadorRice</a>
        says corporations who took a &quot;knee to Trump&quot; will face an &quot;accountability
        agenda&quot; from elected Democrats if they win the midterms in 2026 and the
        2028 Presidential election. <br><br>Does Netflix stand by their Board Member\u2026
        <a href=\"https://t.co/FmL458ugHm\">https://t.co/FmL458ugHm</a> <a href=\"https://t.co/CkjhDXWX0s\">pic.twitter.com/CkjhDXWX0s</a></p>&mdash;
        Laura Loomer (@LauraLoomer) <a href=\"https://twitter.com/LauraLoomer/status/2025252727580692717?ref_src=twsrc%5Etfw\">February
        21, 2026</a></blockquote> <script async src=\"https://platform.twitter.com/widgets.js\"
        charset=\"utf-8\"></script>\n    \n\n<p>Trump has repeatedly called himself
        the <em>&ldquo;least racist person,&rdquo;</em> despite long-running accusations
        over his rhetoric.</p>\n<p>Trump&rsquo;s post comes days after his official
        account posted a video about the 2020 election that ended with an AI-altered
        clip of Barack and Michelle Obama&rsquo;s faces superimposed on apes dancing
        to &lsquo;The Lion Sleeps Tonight&rsquo;. The video drew widespread condemnation,
        including from some Republicans. The White House called the backlash <em>&ldquo;fake
        outrage,&rdquo;</em> but removed the clip, blaming a staffer. Trump distanced
        himself and refused to apologize, saying, <em>&ldquo;No, I didn&rsquo;t make
        a mistake,&rdquo;</em> and claiming he had not seen the post.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6986c02585f5403d202899fb.jpg\"
        alt=\"US President Donald Trump and former President Barack Obama at Trump\u2019s
        inauguration in Washington, DC, January 20, 2017.\" />\n            <figcaption><a
        href=\"https://www.rt.com/news/632138-trump-obama-monkey-video/\">Trump refuses
        to apologize for Obama monkey meme</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Some analysts say Trump&rsquo;s post urging Netflix to fire Rice
        was an attempt to interfere in the firm&rsquo;s bid to acquire Warner Bros.
        Discovery (WBD). Critics have noted that Paramount Skydance &ndash; whose
        CEO David Ellison is the son of Trump donor Larry Ellison &ndash; has mounted
        a hostile bid for WBD.</p>\n<p>Netflix CEO Ted Sarandos dismissed Trump&rsquo;s
        demand to fire Rice. <em>&ldquo;He likes to do a lot of things on social media&hellip;
        This is a business deal. It&rsquo;s not a political deal,&rdquo;</em> Sarandos
        told BBC Radio 4, adding the merger is being handled by US and global regulators.</p>\n<p></p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/699dabfd85f540581d3bbfc2.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 24 Feb 2026 16:37:53
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Trump company to build Australia\u2019s tallest skyscraper</title>\n
        \       <link><![CDATA[https://www.rt.com/business/632980-trump-australia-tallest-tower/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632980-trump-australia-tallest-tower/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/699dbaa82030275fc866bc07.jpg\"
        /> The Trump Organization has signed a deal to build a 91-story skyscraper
        on Australia\u2019s Gold Coast, a plan that has divided locals <br/><a href=\"https://www.rt.com/business/632980-trump-australia-tallest-tower/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The project for a 91-story building
        on the Gold Coast has divided locals</strong></p>\n            \n                        \n
        \           <p>A company owned by US President Donald Trump has announced
        plans to build Australia&rsquo;s tallest skyscraper.</p>\n<p>The project by
        the Trump Organization and local developer Altus Property Group is for a 91-story
        luxury tower on Queensland&rsquo;s Gold Coast. It will include a six-star
        hotel, 270 apartments, shops, a beach club and a swimming pool, both companies
        confirmed in separate statements on Monday.</p>\n<p>The plan has received
        mixed reactions from locals. <br /><em></em></p>\n<p><em>&ldquo;Anything Trump,
        I think, is terrible,&rdquo;</em> one local resident told 7NEWS. <em>&ldquo;He&rsquo;s
        a strange individual, but he&rsquo;s got plenty of dough. He knows where to
        put it,&rdquo;</em> said another.</p>\n<p>Two rival petitions have emerged
        on Change.org. One is against the project, claiming the Trump brand sends
        <em>&ldquo;the wrong message about who we are as a community.&rdquo;</em>
        A counter-petition frames the tower as an economic necessity that will transform
        the area into a <em>&ldquo;thriving hub of activity and opportunity.&rdquo;</em>&nbsp;</p>\n
        \   <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.02/original/699dbb3285f540586d553020.jpg\"
        \ />\n                    <figcaption>\n                                    An
        aerial view of Australia's Gold Coast looking north to Surfers Paradise.\n
        \               \n                <span class = \"copyright\">\n                       \xA9&nbsp;
        BeyondImages                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p></p>\n<p>The site for
        the proposed development has sat vacant for more than a decade after a resort
        built there in 1971 was demolished in 2013 due to <em>&ldquo;concrete cancer.&rdquo;</em>
        Multiple towers were approved in the years since but never built. The site
        now contains only basement construction work from an abandoned 2016 project
        and has been described by a local petition as an eyesore slowly <em>&ldquo;rotting
        away.&rdquo;</em>&nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/699d88f22030272dac033e28.jpg\"
        alt=\"US Secretary of War Pete Hegseth, Louisville, Colorado, February 23,
        2026.\" />\n            <figcaption><a href=\"https://www.rt.com/news/632960-hegseth-aliens-real-order/\">\u2018We\u2019ll
        soon learn if aliens are real\u2019 \u2013 Pentagon chief</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>David Young,
        the chief executive of Altus Property Group, has been declared bankrupt twice.
        In 1991, brewing company Castlemaine Perkins bankrupted him over his pubs
        and nightclubs business. He declared himself bankrupt again in 2010 after
        his property business failed during the Global Financial Crisis.</p>\n<p>The
        project has yet to receive formal approval from the Gold Coast City Council.
        Even if built, the tower&rsquo;s status as Australia&rsquo;s tallest may be
        temporary. Altus has announced plans for a 101-story, 393-meter tower in nearby
        Southport that would exceed the height of the proposed Trump project.</p>\n<p>Trump
        Organization properties include hotels in New York, Las Vegas, Scotland, as
        well as Saudi Arabia, UAE, and Oman.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/699dbaa82030275fc866bc07.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 24 Feb 2026 15:02:05
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Is an energy war brewing between Ukraine and EU states? (VIDEO)</title>\n
        \       <link><![CDATA[https://www.rt.com/business/632785-energy-war-ukraine-hungary-slovakia/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632785-energy-war-ukraine-hungary-slovakia/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69973860203027501c015e01.jpg\"
        /> What\u2019s behind the warning by Hungary and Slovakia that they could
        cut energy supplies to Ukraine after it halted Russian oil transit? <br/><a
        href=\"https://www.rt.com/business/632785-energy-war-ukraine-hungary-slovakia/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>While Hungary and Slovakia are being
        cast as thorns in Kiev\u2019s side, they are also key energy suppliers to
        Ukraine</strong></p>\n            \n                        \n            <p>Hungary
        and Slovakia have warned they could cut off electricity and other energy supplies
        to Ukraine in response to Kiev halting the transit of Russian oil through
        the Druzhba pipeline.</p>\n<p>Hungarian Prime Minister Viktor Orban and Slovak
        leader Robert Fico have slammed the Ukrainian blockade as <em>&ldquo;political
        blackmail.&rdquo;</em></p>\n<p>On Wednesday, the two EU countries halted diesel
        supplies to Kiev, stating shipments will not resume until it restores Russian
        crude transit.</p>\n<h2>Why are Slovakia and Hungary warning Ukraine?</h2>\n<p>Ukraine
        has blocked the transit of Russian oil to Slovakia and Hungary via the Druzhba
        pipeline since late January. Kiev claims Russia damaged the infrastructure;
        Moscow denies this and has accused Ukraine of using energy to blackmail key
        partners.</p>\n<p>Budapest and Bratislava also insist the pipeline is in working
        order and have accused Kiev of seeking revenge for the two countries&rsquo;
        opposition to possible Ukrainian membership of the EU, the bloc&rsquo;s ongoing
        cash lifeline, and Slovakia&rsquo;s refusal to provide military aid to Kiev.
        Both landlocked nations say they cannot fully meet their energy needs without
        Russian crude.</p>\n\n    <iframe\n        width=\"560\"\n        height=\"315\"\n
        \       src=\"https://mf.b37mrtl.ru/files/2026.02/69971cf720302720580586f5.mp4\"
        frameborder=\"0\"\n    ></iframe>\n\n\n<h2>How dependent is Ukraine on energy
        supplies from Hungary and Slovakia?</h2>\n<p>While Ukraine&rsquo;s dependence
        on diesel fuel from the two EU countries is moderate, standing at 11% of total
        imports last month, Kiev is far more reliant on the two nations for electricity
        and natural gas.</p>\n<p>According to Ukrainian consultancy ExPro, so far
        this month Hungary has supplied 50% of Ukraine&rsquo;s electricity and Slovakia
        18%. Throughout 2025, Hungary consistently delivered the largest share, ranging
        from 35% to 50% of monthly supply. Slovakia&rsquo;s share peaked at 30% last
        February.</p>\n<p>In November, Vitaly Zaychenko, the head of grid operator
        Ukrenergo, described Slovakia as <em>&ldquo;one of the best markets in Europe
        for purchasing electricity,&rdquo;</em> noting the country&rsquo;s abundant
        nuclear generation.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69958bd4203027250c6e1209.jpg\"
        alt=\"FILE PHOTO: An employee inspects on a cracking tower at an oil refinery
        in Szazhalombatta, Hungary.\_\" />\n            <figcaption><a href=\"https://www.rt.com/russia/632710-hungary-ukraine-druzhba-oil/\">EU
        urges Ukraine to \u2018repair\u2019 Russian oil pipeline</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Slovakia&rsquo;s
        nuclear plants were built during the Czechoslovak era using Soviet reactor
        designs, and Russia's Rosatom has been the exclusive fuel supplier for all
        operational reactors. A contract extension signed in 2019 ensures fuel supply
        through 2026, with a possible extension to 2030.</p>\n<p>Ukraine&rsquo;s reliance
        on natural gas is just as pronounced. On Wednesday, Budapest threatened to
        cut off supplies of natural gas. Last year, gas through Hungary covered 45.5%
        of Ukraine&rsquo;s gas needs, while Slovakia delivered 20.5%, according to
        ExPro data. Poland was another major supplier.</p>\n<h2>Can Hungary and Slovakia
        unplug Ukraine?</h2>\n<p>Despite the threats to cut electricity, Hungary and
        Slovakia cannot do so unilaterally. Ukraine is a party to the Energy Community
        Treaty, and its grid is integrated into ENTSO-E, the network of Europe&rsquo;s
        electricity grid operators. As members of the same synchronized grid, they
        are bound by EU regulations that explicitly prevent unilaterally halting cross-border
        power flows.</p>\n<p>Experts note, however, that Budapest and Bratislava could
        apply coordinated political pressure and attempt to limit electricity supplies
        in response to the pipeline disruption.</p>\n<p>The legal situation regarding
        natural gas is different: EU regulations contain no explicit prohibition on
        halting gas supplies to a non-member state such as Ukraine.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6996c5f885f5407d1308b962.jpg\"
        alt=\"Hungarian Prime Minister Viktor Orban talking during a press conference.\"
        />\n            <figcaption><a href=\"https://www.rt.com/news/632761-hungary-orban-ukraine-oil/\">Hungary
        won\u2019t bow to Ukrainian \u2018blackmail\u2019 \u2013 Orban</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p></p>\n<h2>Why
        would Ukraine target Hungary and Slovakia?</h2>\n<p>The energy dispute is
        unfolding against a backdrop of long-standing friction between the two EU
        members and Kiev.</p>\n<p>Hungarian Prime Minister Orban has long opposed
        Ukraine&rsquo;s push to join the EU, warning that admitting Kiev would drag
        the bloc into direct conflict with Russia. He has also refused to send weapons
        or approve military aid, calling instead for diplomacy to reach a peace deal
        between Ukraine and Russia. Ukraine&rsquo;s Vladimir Zelensky has engaged
        in a public war of words with Orban, and has used increasingly derogatory
        language to refer to the Hungarian leader.</p>\n<p>Slovak leader Fico has
        similarly refused military aid to Ukraine and pledged to oppose any seizure
        of Russian assets frozen by Brussels after the escalation of the conflict
        in February 2022. In 2024, he survived an assassination attempt by an activist
        who targeted him for his refusal to follow NATO and EU policy on Ukraine.</p>\n<h2>How
        critical is a stable electricity supply for Ukraine?</h2>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6992f1fc20302737537654b6.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/russia/632597-demilitarization-through-deindustrialization-strikes/\">Back
        to the 19th century: Why is Russia targeting Ukraine\u2019s energy grid?</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Ukraine&rsquo;s
        energy infrastructure is disintegrating under pressure from Russian attacks,
        while Kiev&rsquo;s forces suffer frontline losses and Western air defense
        systems are eliminated. A stable energy supply remains critical for the country,
        as its military and defense industry depend on reliable power to sustain operations.</p>\n<p>In
        recent weeks, Russia has intensified drone and missile strikes on Ukraine&rsquo;s
        power grid, leading to large-scale power outages.</p>\n<p>Moscow says the
        attacks are aimed at undercutting weapons production and are in retaliation
        for Ukrainian strikes on Russian civilian infrastructure.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69973860203027501c015e01.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 19 Feb 2026 17:45:07
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Coca Cola bottler sued over female-only event</title>\n        <link><![CDATA[https://www.rt.com/business/632787-coca-cola-male-discrimination-lawsuit/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632787-coca-cola-male-discrimination-lawsuit/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/699722312030271c416677cd.jpg\"
        /> A Coca-Cola bottler that organized an employee event that excluded men
        has been accused of sexism by a US civil rights agency <br/><a href=\"https://www.rt.com/business/632787-coca-cola-male-discrimination-lawsuit/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The company organized an employee networking
        function that excluded men, a US civil rights agency has claimed</strong></p>\n
        \           \n                        \n            <p></p>\n<p></p>\n<p>A
        Coca-Cola distributor is facing sex discrimination allegations following a
        corporate networking event that excluded men, the US Equal Employment Opportunity
        Commission (EEOC) has announced. <br /><br />The case marks the agency&rsquo;s
        first lawsuit over workplace diversity-focused programs since President Donald
        Trump took office, and the first one to claim that events of the kind are
        unlawful. <br /><br />In the lawsuit filed on Tuesday, the regulator stated
        that Coca-Cola Beverages Northeast violated federal law when it hosted a two-day
        women-only event for about 250 employees at a casino in Connecticut in September
        2024. <br /><br /><em>&ldquo;Coca-Cola Northeast privately invited female
        employees and then excused the female employees, who attended the event from
        their normal work duties on September 10 and 11, 2024, and paid them their
        normal salary or wages without requiring them to use vacation or other paid
        time off,&rdquo;</em> the suit reads, highlighting that the company did not
        invite any male employees to the event. <br /><br />Coca-Cola Northeast, which
        is owned by Japanese Kirin Holdings, has not commented on the lawsuit. Coca-Cola
        multinational is not a defendant in the case.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/69840c6d85f540736e1d7e33.jpg\"
        alt=\"Nike sneakers worn by a basketball player, Detroit, Michigan, February
        3, 2026.\" />\n            <figcaption><a href=\"https://www.rt.com/news/632013-nike-dei-anti-white-probe/\">Nike
        investigated over anti-white discrimination claims</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p></p>\n<p>Shortly after assuming
        office in early 2025, Trump signed several executive orders aimed at eliminating
        diversity, equity ,and inclusion (DEI) initiatives, describing them as <em>&ldquo;radical,&rdquo;</em>
        within the federal government, its contractors, and grantees. <br /><br />Many
        companies, including Walt Disney, JPMorgan Chase, Amazon, and Google, have
        faced similar criticisms and legal challenges and since scaled back or entirely
        abandoned their DEI programs. <br /><br />Earlier this month, the EEOC launched
        an investigation into whether sportswear giant Nike discriminated against
        white employees.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/699722312030271c416677cd.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 19 Feb 2026 15:59:01
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU prices killing competitiveness \u2013 industry leaders</title>\n
        \       <link><![CDATA[https://www.rt.com/business/632382-eu-energy-carbon-killing-competitiveness/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632382-eu-energy-carbon-killing-competitiveness/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698e0cdc2030272475198381.jpg\"
        /> EU industry associations have urged Brussels to cut energy prices and carbon
        costs to protect the bloc\u2019s competitiveness <br/><a href=\"https://www.rt.com/business/632382-eu-energy-carbon-killing-competitiveness/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Energy and carbon costs must go down
        \u201Ctoday,\u201D over 1,300 executives have told Brussels</strong></p>\n
        \           \n                        \n            <p>More than 1,300 European
        industry organizations have urged Brussels to lower energy prices and carbon
        costs to save the bloc&rsquo;s competitiveness.</p>\n<p>The plea came on Wednesday
        as Belgium hosts two days of high-level talks dedicated to industrial revival.</p>\n<p><em>&ldquo;Bring
        energy and carbon costs down. The costs of energy in Europe are simply too
        high to compete and are not only driven by commodity prices but also by regulatory
        charges,&rdquo;</em> reads the <a href=\"https://antwerp-declaration.eu/the-antwerp-call-to-alden-biesen\"
        target=\"_blank\" rel=\"noopener noreferrer\">declaration</a>.</p>\n<p>Multiple
        media outlets have quoted industry executives calling for electricity prices
        to return to pre-2021 levels of &euro;44 ($52) per MWh from the current &euro;80-100
        range.</p>\n<p>European Commission President Ursula von der Leyen told the
        European Industry Summit on Wednesday that the bloc was <em>&ldquo;well-positioned
        to lower costs,&rdquo;</em> citing planned improvements to the electric grid
        and expansion of offshore wind power projects.</p>\n<p>The industry argues,
        however, that revamping the grid will take time, with the declaration urging
        the change <em>&ldquo;today.&rdquo;</em></p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698c907c203027449d188907.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/632318-greece-malta-oppose-eu-oil-sanctions/\">Two
        maritime powers oppose EU bid to sink Russian oil trade \u2013 media</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em>&ldquo;The
        chemical industry does not have 10 years left,&rdquo;</em> Peter Huntsman,
        CEO of chemicals producer Huntsman, told Politico.</p>\n<p>European energy
        prices have spiked since the EU introduced sanctions on major supplier Russia
        over the Ukraine conflict. Brussels has pursued a strategy of weaning itself
        off Russian energy through replacing cheaper pipeline gas with more expensive
        US LNG and accelerating a shift to renewable energy.</p>\n<p>Russian presidential
        envoy Kirill Dmitriev has argued that <em>&ldquo;Europe will lose the competitiveness
        battle and will never catch up with the world without Russia.&rdquo;</em></p>\n<p>Carbon
        pricing is central to the competitiveness battle. EU industry executives point
        out that carbon costs elsewhere are far lower than within the bloc. The EU
        Emissions Trading System currently charges the industry approximately &euro;80
        per tonne of carbon, compared to China&rsquo;s ETS at around &euro;9 per tonne
        and South Korea&rsquo;s at &euro;7 per tonne.</p>\n\n            ]]> <![CDATA[\n
        \   <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/business/632329-macron-eu-russian-energy/\">\n
        \           <span>READ MORE: </span>Russian energy cut key to EU economic
        woes \u2013 Macron\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Since
        2023, more than 20 major chemical plants have closed across Europe, affecting
        30,000 jobs, according to trade union IndustriALL. Chemical investments in
        the bloc collapsed by more than 80% in 2025, industry data shows. German chemical
        giant BASF, meanwhile, has made its largest-ever investment in China. Its
        &euro;8.7 billion plant began partial production in December.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698e0cdc2030272475198381.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 12 Feb 2026 21:04:15
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>US claims Peru risking sovereignty in megaport dispute with
        China</title>\n        <link><![CDATA[https://www.rt.com/business/632379-us-claims-peru-risking-sovereignty-china/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632379-us-claims-peru-risking-sovereignty-china/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698e0d50203027194c0418bf.jpg\"
        /> The US has warned Peru may lose sovereignty over the Chinese-operated Chancay
        port after a court ruling <br/><a href=\"https://www.rt.com/business/632379-us-claims-peru-risking-sovereignty-china/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Washington has sought to push Chinese
        competition out of Latin America and assert dominance in the Western Hemisphere</strong></p>\n
        \           \n                        \n            <p>Peru could lose its
        sovereignty to China over Chinese ownership of a major port in the South American
        country, the US has claimed.</p>\n<p>The State Department&rsquo;s Bureau of
        Western Hemisphere Affairs issued the warning after a Peruvian court temporarily
        restricted state regulator Ositran from supervising the Chancay port, which
        is owned by China.</p>\n<p>The administration of US President Donald Trump
        has been trying to assert dominance over the Western Hemisphere, where China
        has long built influence through loans and trade.</p>\n<p>The Bureau said
        on X on Wednesday that it was <em>&ldquo;concerned&rdquo;</em> the port was
        under <em>&ldquo;predatory Chinese&rdquo;</em> ownership.</p>\n<p><em>&ldquo;Cheap
        Chinese money costs sovereignty,&rdquo;</em> it warned.</p>\n<p>Beijing on
        Thursday strongly rejected the US' <em>&ldquo;false accusation and disinformation.&rdquo;</em></p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698dbb412030272b8b11625e.jpg\"
        alt=\"Chinese electric vehicles await export at the dock near the Beijing-Hangzhou
        Grand Canal, Zhejiang province, China.\" />\n            <figcaption><a href=\"https://www.rt.com/business/632355-us-china-evs-canada-mexico/\">Trump
        urged to drag Mexico and Canada into Chinese trade war \u2013 Reuters</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Chancay is
        Peru&rsquo;s fourth-largest port, owned and operated by a local subsidiary
        of China&rsquo;s Cosco, which acquired a 60% stake for $1.3 billion in 2019.
        The facility is a private port for public use, not a state concession. Beijing
        has been Lima&rsquo;s top trading partner for more than a decade.</p>\n<p>Cosco
        filed a constitutional complaint arguing Ositran overstepped by charging a
        fee meant for state concessions. A judge sided with the Chinese firm.</p>\n<p>Cosco
        has stated the ruling <em>&ldquo;in no way involves aspects of sovereignty.&rdquo;</em>&nbsp;</p>\n<p>Washington&rsquo;s
        warning follows a pattern of US efforts to push China out of Latin America.
        The US National Security Strategy calls for preventing non-Western <em>&ldquo;competitors&rdquo;</em>
        from owning or controlling key assets in the Western Hemisphere.</p>\n<p>Critics
        have accused Washington of applying economic and military pressure while simultaneously
        lecturing regional governments on sovereignty.</p>\n<p>In January, American
        special forces invaded Venezuela and captured President Nicolas Maduro. The
        US maintains sanctions on Caracas that forbid state oil company PDVSA from
        dealing with Chinese and Russian firms.</p>\n\n            ]]> <![CDATA[\n
        \   <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/business/632320-venezuela-oil-export-israel-us/\">\n
        \           <span>READ MORE: </span>Venezuela renews oil shipments to Israel
        \u2013 Bloomberg\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Last
        year, Trump claimed that China was <em>&ldquo;operating the Panama Canal,&rdquo;</em>
        threatening to <em>&ldquo;take it back.&rdquo;</em> Hong Kong-based CK Hutchison
        operated two ports at the canal&rsquo;s entrances, not the waterway itself.
        Following the threats, the firm agreed to sell its 90% stake in the ports
        to a US consortium. The sale remains pending after Panama&rsquo;s Supreme
        Court annulled the concessions two weeks ago.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698e0d50203027194c0418bf.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 12 Feb 2026 18:01:13
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Trump urged to drag Mexico and Canada into Chinese trade war
        \u2013 Reuters</title>\n        <link><![CDATA[https://www.rt.com/business/632355-us-china-evs-canada-mexico/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632355-us-china-evs-canada-mexico/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698dbb412030272b8b11625e.jpg\"
        /> The US could force Mexico and Canada to back the broader economic fight
        with China, according to five senators <br/><a href=\"https://www.rt.com/business/632355-us-china-evs-canada-mexico/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Washington should force the neighboring
        countries to turn their backs on Beijing, a group of US senators has said</strong></p>\n
        \           \n                        \n            <p>Five Democratic senators
        have urged US President Donald Trump to use free trade agreement talks with
        Canada and Mexico to crack down on their import of Chinese electric vehicles
        (EV), Reuters reported Wednesday, citing a letter to the US Trade Representative&rsquo;s
        Office.</p>\n<p>For years, the US and China have been locked in a large-scale
        trade war, in which the two nations have repeatedly slapped increasingly harsher
        tariffs on each other. The sides have exchanged accusations of unfair trade
        practices and economic sabotage. Amid the fight, Chinese EVs have been effectively
        blocked from the US market by steep tariffs and regulatory restrictions.</p>\n<p>According
        to the document seen by Reuters, senators have called on the Trump administration
        to use the review of the United States-Mexico-Canada Agreement (USMCA) to
        address concerns about Chinese EVs being imported by the neighboring states.</p>\n<p><em>&ldquo;USMCA
        must also be strengthened to meet the threats posed by Chinese competition,
        particularly Chinese cars,&rdquo;</em> the letter reportedly reads. <em>&ldquo;The
        economic and national security risks of Chinese vehicles entering the North
        American market are no longer a future threat &ndash; they are here today.&rdquo;</em></p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/696b8e4c85f54009d043812a.jpg\"
        alt=\"Chinese President Xi Jinping and Canadian Prime Minister Mark Carney
        meeting at the Great Hall of the People in Beijing.\" />\n            <figcaption><a
        href=\"https://www.rt.com/news/631082-canada-china-us-trump/\">China \u2018more
        predictable\u2019 than US \u2013 Canadian PM</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Last month, Trump dismissed
        the USMCA, which replaced the North American Free Trade Agreement in 2020
        and was negotiated during Trump&rsquo;s first term as president, as <em>&ldquo;irrelevant.&rdquo;</em>
        Under the terms of the deal, it is up for review this year to decide whether
        it will be left to expire or another one will be worked out.</p>\n<p>During
        his latest visit to Beijing, Canadian Prime Minister Mark Carney secured a
        preliminary trade deal with China that includes provisions on electric vehicles.
        Under the agreement, Canada allowed up to 49,000 Chinese-made EVs into its
        market at a reduced tariff rate of 6.1%, down from the previous 100%.</p>\n<p>In
        exchange, China agreed to lower tariffs on key Canadian exports such as canola
        seed and other agricultural products.</p>\n<p>The White House has already
        taken a series of drastic steps to keep Chinese EVs out of the US market.
        The previous presidential administration raised import tariffs on them from
        25% to 100%. The executive orders issued by Trump shortly after taking office
        in January 2025 brought the total effective US import tariff to 127.5%.</p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/news/631444-trump-china-eat-up-canada/\">\n
        \           <span>READ MORE: </span>China will \u2018eat up\u2019 Canada \u2013
        Trump\n        </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Beijing has accused
        Washington of violating WTO rules and applying <em>&ldquo;double standards,&rdquo;</em>
        criticizing the tariffs on Chinese exports and other regulatory measures as
        unfair and harmful to global economic cooperation. China has vowed to <em>&ldquo;fight
        to the end&rdquo;</em> in the ongoing trade war with the US.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698dbb412030272b8b11625e.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 12 Feb 2026 12:21:03
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Russian energy cut key to EU economic woes \u2013 Macron</title>\n
        \       <link><![CDATA[https://www.rt.com/business/632329-macron-eu-russian-energy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632329-macron-eu-russian-energy/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698d82032030276a602dd731.jpg\"
        /> French President Emmanuel Macron has said the EU is in \u201Cemergency
        mode\u201D due to soaring energy costs after losing Russian supply <br/><a
        href=\"https://www.rt.com/business/632329-macron-eu-russian-energy/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The bloc has been grappling with surging
        costs since moving from cheap Russian gas to growing reliance on American
        LNG</strong></p>\n            \n                        \n            <p>The
        EU has entered <em>&ldquo;emergency mode&rdquo;</em> over soaring energy costs
        after cutting back on Russian pipeline gas supplies and becoming increasingly
        dependent on the US, French President Emmanuel Macron has warned.</p>\n<p>The
        bloc has seen a surge in energy prices since scaling back Russian oil and
        gas imports after the escalation of the Ukraine conflict in 2022. Moving away
        from relatively cheap Russian pipeline gas has forced it to rely more heavily
        on energy supplies from the US.</p>\n<p>Speaking at the European Industry
        Summit in Belgium on Wednesday, Macron said that the EU remains dangerously
        exposed to energy shortages and market volatility. He explained that a combination
        of high costs, disrupted supply chains, and growing dependence on external
        partners signals that economic challenges are likely to persist.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6985c11720302759aa281a0b.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/632093-brussels-dependency-energy-russia/\">Brussels\u2019
        dependency dilemma: The EU is a victim of its own energy arrogance</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em>&ldquo;In
        fact, cheap Russian energy came to an end in 2022. And there&rsquo;s no going
        back,&rdquo;</em> Macron stated, adding, <em>&ldquo;We haven&rsquo;t really
        sorted out this issue up to now.&rdquo;</em></p>\n<p>Before the Ukraine conflict,
        the EU imported 45% of its gas from Russia &ndash; its largest foreign supplier
        since the end of the Cold War. Western sanctions and sabotage of key infrastructure
        have slashed Russian gas deliveries, although purchases of Russian LNG by
        EU countries remain significant. New legislation passed last month requires
        member states to stop all Russian energy imports by the end of 2027, further
        increasing what Macron described as the bloc&rsquo;s <em>&ldquo;dangerous&rdquo;</em>
        exposure to supply risks.</p>\n<p>The French president also warned that pressure
        from Washington is compounding the EU&rsquo;s economic strain, saying the
        bloc is <em>&ldquo;clearly in emergency mode&rdquo;</em> as the US approach
        becomes <em>&ldquo;more and more confrontational.&rdquo;</em></p>\n<p>US President
        Donald Trump has used energy as leverage in trade talks, with the EU agreeing
        last July to buy $750 billion of American energy by 2028 to avoid higher tariffs.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698988ad2030272f226a569a.jpg\"
        alt=\"FILE PHOTO: A gas compressor station facility of the TurkStream pipeline
        in Russia\u2019s Krasnodar region.\" />\n            <figcaption><a href=\"https://www.rt.com/news/632193-us-brics-lavrov-energy/\">US
        wants total control over global energy supply routes \u2013 Lavrov</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em><em>&ldquo;</em>The
        fact that the United States is slapping tariffs and cohesion mechanisms on
        our economy is a game changer,&rdquo;</em> Macron said. <em>&ldquo;It&rsquo;s
        not a temporary shock, it&rsquo;s clearly a structural turning point.&rdquo;</em></p>\n<p>Macron
        added that the EU can no longer rely on China as a key export market, warning
        that surging Chinese shipments to the bloc have reversed long-standing trade
        balances.</p>\n<p>Industry leaders have urged Brussels to <em>&ldquo;take
        urgent measures,&rdquo;</em> warning that the EU <em>&ldquo;is losing industrial
        capacity at a speed we have never seen before.&rdquo;</em></p>\n<p>Moscow
        has said Western nations are hurting their own economies by choosing costlier
        and less reliable alternatives.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698d82032030276a602dd731.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 11 Feb 2026 20:39:33
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Russian MP calls out \u2018idiots\u2019 and \u2018scoundrels\u2019
        for throttling Telegram</title>\n        <link><![CDATA[https://www.rt.com/business/632328-russian-mp-idiots-throttling-telegram/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632328-russian-mp-idiots-throttling-telegram/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698cdf2085f5407ad429df02.png\"
        /> Senior Russian lawmaker Sergey Mironov has slammed officials in the country
        for restricting the Telegram messenger <br/><a href=\"https://www.rt.com/business/632328-russian-mp-idiots-throttling-telegram/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Russia\u2019s media watchdog has confirmed
        restricting the popular social media app, citing its non-compliance with the
        law</strong></p>\n            \n                        \n            <p>A
        senior Russian lawmaker slammed officials who restricted Telegram in the country
        as <em>&ldquo;idiots&rdquo;</em> and <em>&ldquo;scoundrels&rdquo;</em> on
        Wednesday. Sergey Mironov said Russian soldiers on the battlefield need the
        messenger to talk to their loved ones.</p>\n<p>Users across Russia reported
        crippling issues with the messenger&rsquo;s video and photo sending functionality
        over the weekend. On Tuesday, Russian media watchdog Roskomnadzor confirmed
        that it took action against Telegram for not complying with Russian laws.</p>\n<p>Mironov,
        who heads the party &lsquo;A Just Russia&rsquo; in parliament, argued that
        the slowdown is affecting Russian soldiers and volunteers who bring supplies
        to the front lines.</p>\n<p><em>&ldquo;These guys are shedding blood, and
        this is their only way to communicate with their families and friends. What
        are you doing, idiots?&rdquo;</em> he said in a video address published on
        his Telegram channel on Wednesday. <em>&ldquo;Those who are doing this are
        scoundrels.&rdquo;</em></p>\n<p>He argued that Russia was shooting itself
        in the foot with the slowdown.</p>\n<blockquote>\n<p>If Telegram&rsquo;s owner
        doesn&rsquo;t comply with Russian law, that&rsquo;s no reason to deprive Russian
        citizens of modern and accessible means of communication, nor is it a reason
        to undermine Russia&rsquo;s defense capability or economy. Punish those responsible!</p>\n</blockquote>\n<p>Earlier
        in the day, Kremlin spokesman Dmitry Peskov noted that Moscow is in contact
        with the firm&rsquo;s representatives, but stressed that further action would
        be taken if it did not begin following the law.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698c747e2030272f8308c363.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/russia/632304-russia-telegram-slow-down/\">Kremlin
        confirms Telegram slowdown</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>Russian authorities have long accused Telegram and WhatsApp of
        systematically refusing to cooperate with local law enforcement on fraud and
        terrorism. Ukrainian intelligence services have frequently leveraged the messengers
        to defraud, blackmail, and recruit Russian nationals into committing <a href=\"https://www.rt.com/russia/629582-teenage-russian-girl-ukraine-bomb-polt/\">sabotage
        missions</a>, sometimes unknowingly becoming suicide bombers, they argue.</p>\n<p>Telegram
        CEO Pavel Durov has expressed dissatisfaction with the app slowdown, but did
        not address his company&rsquo;s non-compliance with Russian law and made no
        offers to remedy the situation.</p>\n<p>Russian officials have increasingly
        urged citizens to move to the new domestically developed MAX messenger as
        a secure alternative to foreign-based apps to help fight online fraud. Mironov
        has argued that people should be allowed to choose their preferred platform.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698cdf2085f5407ad429df02.png\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 11 Feb 2026 20:07:35
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Venezuela renews oil shipments to Israel \u2013 Bloomberg</title>\n
        \       <link><![CDATA[https://www.rt.com/business/632320-venezuela-oil-export-israel-us/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632320-venezuela-oil-export-israel-us/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698c9d8d85f540790e6092af.jpg\"
        /> Israel has reportedly received a crude shipment from Venezuela after the
        US imposed a blockade on the country and kidnapped its president <br/><a href=\"https://www.rt.com/business/632320-venezuela-oil-export-israel-us/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>West Jerusalem has reportedly received
        its first shipment from the South American country since the US imposed a
        blockade</strong></p>\n            \n                        \n            <p>Israel
        has received its first crude oil shipment from Venezuela since the US imposed
        a blockade on the Latin American country and abducted its president, Bloomberg
        reported on Tuesday, citing people with knowledge of the deal.</p>\n<p>The
        US launched a military operation to kidnap Venezuelan President Nicolas Maduro
        in early January, and now claims to have seized control of the country&rsquo;s
        oil exports.</p>\n<p>At least seven tankers deemed to have violated US sanctions
        have been seized since then, including a Russian flagged tanker in the mid-Atlantic,
        and Washington has banned Venezuelan oil producers from doing business with
        Russia and China.</p>\n<p>Sources speaking on condition of anonymity told
        the news agency that the oil is being transported to Bazan Group, Israel&rsquo;s
        largest crude processor. The shipment is reportedly the first of its kind
        since mid-2020, when Israel received about 470,000 barrels, according to data
        tracked by Kpler.</p>\n<p>Venezuelan Information Minister Miguel Perez Pirela
        in a post on X on Wednesday referred to the report of the shipment as <em>&ldquo;FAKE!&rdquo;</em></p>\n<p>The
        reported shipment comes as part of Washington&rsquo;s efforts to reroute flows
        of Venezuelan oil towards new international buyers. Earlier this week, Reuters
        cited trade sources as saying that India&rsquo;s two state refiners purchased
        two million barrels of Venezuelan crude for delivery in the second half of
        April. Last week, the agency reported, citing shipping schedules, that two
        million barrels of crude from the South American country had been sent to
        refineries owned by oil producer Repsol in Spain.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/697b59e085f54068921e403b.jpg\"
        alt=\"FILE PHOTO. Venezuelan oil tankers.\" />\n            <figcaption><a
        href=\"https://www.rt.com/news/631706-us-venezuela-return-tanker/\">US returning
        seized Venezuelan oil tanker \u2013 Reuters</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>At the same time, China, once
        a top importer of Venezuelan oil, has reportedly turned to Iranian heavy crude
        to replace shipments that stopped due to the US blockade.</p>\n<p>China has
        condemned US actions against Venezuela, saying the use of force and interruption
        of oil shipments violated international law and the country&rsquo;s sovereignty.</p>\n<p>Earlier
        this year, US President Donald Trump said Washington plans to <em>&ldquo;control
        Venezuela&rsquo;s oil resources indefinitely.&rdquo;</em></p>\n<p>Russian
        Foreign Minister Sergey Lavrov said earlier this week that the US is trying
        to take control of all international energy supply routes in an attempt to
        attain global economic dominance.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698c9d8d85f540790e6092af.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 11 Feb 2026 17:55:45
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>American auto giant reports record losses</title>\n        <link><![CDATA[https://www.rt.com/business/632306-ford-record-losses/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632306-ford-record-losses/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698c7b2b85f54070d363c2ae.jpg\"
        /> US automaker Ford posted an $8.2 billion net loss for 2025, citing electric
        vehicle struggles, tariffs, and supply-chain disruptions <br/><a href=\"https://www.rt.com/business/632306-ford-record-losses/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Ford posted an $8.2 billion net loss
        for 2025, citing electric vehicle struggles, tariffs, and supply-chain disruptions</strong></p>\n
        \           \n                        \n            <p>Ford Motor Company
        has reported that its electric vehicle division posted a $4.8 billion loss
        in 2025, warning it will continue losing money for at least two more years.
        Broader business strains pushed the US automaker to an $11.1 billion fourth\u2011quarter
        net loss.</p>\n<p>The Michigan-based auto giant reported a full-year net loss
        of $8.2 billion for 2025, following a $19.5 billion EV-related writedown in
        December, even as it expects overall profitability to rebound in its broader
        business this year.</p>\n<p><em>&ldquo;We are now targeting break-even around
        2029,&rdquo;</em> Ford&rsquo;s chief financial officer, Sherry House, said
        on Tuesday during a conference call to discuss the company&rsquo;s financial
        results.</p>\n<p>The car maker&rsquo;s adjusted fourth-quarter profit fell
        to $1 billion in 2025, down $1.1 billion from a year earlier, as tariffs and
        supply-chain issues hit the automaker.</p>\n<p>Two factory fires at Ford&rsquo;s
        key aluminum supplier and an unexpected $900 million in tariffs &ndash; after
        the administration of US President Donald Trump limited a relief program&rsquo;s
        retroactive period to November instead of May &ndash; pushed total tariff
        costs for the year to $2 billion. Ford expects similar charges in 2026, House
        explained.</p>\n<p>The aluminum plant near Oswego, New York, which suffered
        two major fires last year, is now expected to be fully operational only between
        May and September &ndash; a delay that has weighed on Ford&rsquo;s results
        more than anticipated.</p>\n<p>Gains in traditional vehicles and commercial
        operations helped cushion the blow from the EV division&rsquo;s loss.</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/697cd9cf2030270f702bb91d.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/631765-germany-unemployment-highest-decade/\">German
        unemployment highest in over a decade</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The company said it expects
        adjusted profits of $8 billion to $10 billion in 2026, powered by strong US
        sales of pickup trucks and SUVs.</p>\n<p>The automaker&rsquo;s electric <em>&ldquo;Model
        e&rdquo;</em> division, however, is forecast to continue generating losses
        of up to $4.5 billion for the third straight year.</p>\n<p>US automakers are
        scrambling to catch up with cheaper, faster Chinese EV rivals. Ford spun off
        its electric division from its Michigan base to speed up design and production,
        but even as it focuses on the EV pickup, the company wrote down $19.5 billion
        after scrapping earlier programs.</p>\n<p>General Motors and Stellantis face
        similar hits, with $7.6 billion and $26.5 billion in EV-related charges, underscoring
        the challenge of competing with Chinese manufacturers that bring new models
        to market in roughly half the time.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698c7b2b85f54070d363c2ae.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 11 Feb 2026 13:10:22
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Britons working harder for less \u2013 report</title>\n        <link><![CDATA[https://www.rt.com/business/632273-uk-families-lower-living-standards/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632273-uk-families-lower-living-standards/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698b6a2f2030274a22132a1a.jpg\"
        /> Stagnant wage growth condemns British families to flatlining living standards
        amid the cost-of-living crisis, a think tank has found <br/><a href=\"https://www.rt.com/business/632273-uk-families-lower-living-standards/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Stagnant wage growth is condemning
        lower-income families to flatlining living standards, a think tank has found</strong></p>\n
        \           \n                        \n            <p>British families will
        not see their living standards improve significantly within their own lifetimes
        due to a historic collapse in income growth, a new report has found.</p>\n<p>Living
        standards for lower-income families in the UK have grown by just 0.5% a year
        over the past two decades despite rising employment, think-tank the Resolution
        Foundation <a href=\"https://www.resolutionfoundation.org/publications/living-standards-outlook-2026/\"
        target=\"_blank\" rel=\"noopener noreferrer\">reported</a> on Monday.</p>\n<p>The
        figure suggests that at this rate, it would take 137 years for their incomes
        to double. That timeframe stands in stark contrast to the 40-year period prior
        to 2004-05, when incomes doubled at an annual growth rate of 1.8%, the report
        noted.</p>\n<p>The report partially blames the current pressures on the Ukraine
        conflict, which triggered a global energy crisis that impacted the UK through
        its energy links with the EU.</p>\n<p>The bloc, along with the UK, has sanctioned
        affordable Russian energy, pressing ahead with plans to abandon it completely.
        The report notes that household energy costs remain nearly 60% higher and
        food prices almost 40% higher than pre-conflict levels.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/697a390885f5400ef60b74e9.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/631648-uk-households-poverty-deepens/\">Extreme
        poverty rate shoots up in UK \u2013 study</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The root cause of the stagnation,
        meanwhile, is a collapse in pay growth for workers, compounded by severe cuts
        to social security benefits. The authors suggest that the fundamental link
        between effort and reward has been broken.</p>\n<p><em>&ldquo;Families in
        the lower half of the income distribution have been working harder&hellip;
        yet they have not reaped the rewards in the form of markedly higher living
        standards growth,&rdquo;</em> the report states.</p>\n<p>Despite this, the
        authors insist people must work more, specifically disabled people and parents.
        They also argue that businesses and workers must become more efficient to
        generate the higher wages needed to improve living standards.</p>\n<p>The
        report calls on the government to revive national productivity, reform the
        tax and benefits system, and take direct action to ease cost-of-living pressures.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698b6a2f2030274a22132a1a.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 10 Feb 2026 18:28:30
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Russia exports record crude to China\_ \_</title>\n        <link><![CDATA[https://www.rt.com/business/632243-china-crude-imports-surge/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632243-china-crude-imports-surge/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698b32772030273dad7fdb76.jpg\"
        /> China\u2019s energy imports from Russia rose more than fourfold and are
        set to rise further, the head of the Trade Policy Institute has told RT <br/><a
        href=\"https://www.rt.com/business/632243-china-crude-imports-surge/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Moscow has outpaced Saudi Arabia as
        Chinese demand drives record imports, trading data has shown</strong></p>\n
        \           \n                        \n            <p>Russia&rsquo;s seaborne
        crude shipments to China hit a record 1.86 million barrels per day (bpd) in
        January, up 46% year-on-year amid falling Indian imports and rising US pressure
        on New Delhi to curb Russian oil purchases.</p>\n<p>In response to Western
        sanctions, Russia has rerouted most of its energy exports to Asia, particularly
        to India and China. Moscow&rsquo;s energy exports to China are expected to
        keep rising, driven by strong demand, Aleksandr Daniltsev, Director of the
        Trade Policy Institute at the National Research University Higher School of
        Economics (HSE), told RT on Tuesday.</p>\n<p>US President Donald Trump has
        repeatedly threatened secondary sanctions and tariffs on countries purchasing
        Russian energy. Last week, he removed a 25% tariff on India, saying that it
        has agreed to stop receiving Russian oil.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698988ad2030272f226a569a.jpg\"
        alt=\"FILE PHOTO: A gas compressor station facility of the TurkStream pipeline
        in Russia\u2019s Krasnodar region.\" />\n            <figcaption><a href=\"https://www.rt.com/news/632193-us-brics-lavrov-energy/\">US
        wants total control over global energy supply routes \u2013 Lavrov</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p><em>&ldquo;Physical
        volumes are increasing steadily,&rdquo;</em> Daniltsev said, noting that price
        trends will affect the value of imports. He added that China&rsquo;s diversification
        of energy sources and development of low-carbon technologies could limit Russian
        growth, but <em>&ldquo;the overall trend will remain upward,&rdquo;</em> he
        said.</p>\n<p>The shift pushed Moscow past Saudi Arabia to become China&rsquo;s
        top crude supplier for the month. Russia&rsquo;s seaborne shipments were 46%
        higher than Saudi Arabia&rsquo;s roughly 1.2 million bpd in January, despite
        Riyadh&rsquo;s long-standing role as China&rsquo;s main seaborne supplier,
        data from energy analytics firm Kpler showed.</p>\n<p>Over the past decade,
        China&rsquo;s total energy imports more than doubled, while imports from Russia
        rose more than fourfold, Daniltsev stated.</p>\n<p>Middle East developments
        could also boost Russia&rsquo;s role, according to Daniltsev. <em>&ldquo;If
        tensions escalate, for example with Iran, a key supplier to China, Russia&rsquo;s
        importance could increase further,&rdquo;</em> he said.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6980ac1d2030272f2d2b3f17.jpg\"
        alt=\"FILE PHOTO.\" />\n            <figcaption><a href=\"https://www.rt.com/business/631862-eu-gas-reserves-plunge/\">EU
        gas reserves plunge to lowest level since 2022 \u2013 FT</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The rise
        in Russian supplies follows weaker Indian and Turkish demand amid sanctions
        and trade pressures. China is also reportedly ramping up its imports of Urals
        crude, a major Russian export grade, to levels not seen since mid-2023.</p>\n<p>Deepening
        energy ties between Moscow and Beijing are reshaping the Asian oil trade,
        experts say. Despite Western sanctions, Russia is exporting record volumes
        to its largest buyer, while China is securing discounted supply with limited
        additional risk, traders said. Russian Foreign Minister Sergey Lavrov said
        on Monday that with the US creating <em>&ldquo;artificial barriers&rdquo;</em>
        to trade and energy, BRICS nations need to look for new, secure ways to advance
        financial, economic, and infrastructure projects.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698b32772030273dad7fdb76.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Tue, 10 Feb 2026 13:33:22
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU needs to wean itself off Visa and Mastercard \u2013 banking
        chief</title>\n        <link><![CDATA[https://www.rt.com/business/632227-eu-needs-visa-mastercard-alternative/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632227-eu-needs-visa-mastercard-alternative/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698a242785f540696f153af5.jpg\"
        /> The head of an EU bank consortium has urged the bloc to reduce its dependence
        on US payment systems Visa and Mastercard <br/><a href=\"https://www.rt.com/business/632227-eu-needs-visa-mastercard-alternative/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The bloc must find alternatives to
        US payment systems as relations with Washington sour, Martina Weimert has
        urged</strong></p>\n            \n                        \n            <p>The
        EU needs to <em>&ldquo;urgently&rdquo;</em> reduce its dependence on US payment
        systems Visa and Mastercard, the head of the bloc&rsquo;s leading bank consortium,
        Martina Weimert, has urged.</p>\n<p>The dominance of US tech solutions and
        services has increasingly become a concern in the EU over the past year as
        tensions between Brussels and Washington have risen since President Donald
        Trump returned to office.</p>\n<p>Weimert, chief executive of the European
        Payments Initiative (EPI), which is made up of 16 European banks and financial
        services companies, cautioned that the bloc is <em>&ldquo;highly dependent
        on international [payment] solutions,&rdquo;</em> as quoted by Financial Times
        on Monday.</p>\n<p><em>&ldquo;We have nice national assets like domestic [payment]
        card schemes... but we don&rsquo;t have anything cross-border,&rdquo;</em>
        she said, adding that <em>&ldquo;we need action urgently.&rdquo;</em></p>\n<p>Commenting
        on the &lsquo;digital euro&rsquo; promoted by the European Central Bank (ECB)
        and expected to be launched in 2029, Weimert said that <em>&ldquo;we are a
        little bit out of time.&rdquo;</em></p>\n<p>According to ECB data cited by
        FT, Visa and Mastercard accounted for nearly two-thirds of card transactions
        in the Eurozone in 2022.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698a0cab85f540757a75509e.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/632208-china-us-treasury-holdings/\">China
        calls on banks to limit exposure to US debt \u2013 Bloomberg</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Last month,
        Miguel De Bruycker, director of the Centre for Cybersecurity Belgium (CCB),
        warned that the EU has <em>&ldquo;lost the internet&rdquo;</em> and is unable
        to fully store data in the bloc, given US tech companies&rsquo; dominance
        over key digital infrastructure and online services.</p>\n<p>In an effort
        to reduce dependence on US tech, the French government said last month that
        it intended to phase out American videoconferencing services, such as Teams
        and Zoom, within a year and replace them with domestically developed apps.</p>\n<p>In
        August, Germany&rsquo;s Federal Ministry for Digital Affairs said that it
        planned to increase the use of European solutions and open-source software
        in government operations in lieu of Microsoft software.</p>\n<p>Last year,
        the EU also slapped hefty fines on several US tech giants, including Meta,
        X, and Google, accusing them of violating the bloc&rsquo;s antitrust laws,
        as well as regulations on data-driven advertising and content-moderation.</p>\n<p>Trump
        blasted Brussels&rsquo; decisions as <em>&ldquo;unfair&rdquo;</em> and <em>&ldquo;discriminatory,&rdquo;</em>
        threatening the EU with tariffs.</p>]]>\n        </content:encoded>\n        <enclosure
        url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698a242785f540696f153af5.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Mon, 09 Feb 2026 20:27:57
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>EU targets \u2018addictive\u2019 TikTok</title>\n        <link><![CDATA[https://www.rt.com/business/632106-eu-tiktok-addictive-design/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632106-eu-tiktok-addictive-design/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6989f5c485f5406f1a5859fb.jpg\"
        /> European Commission has threatened TikTok with fines over features like
        infinite scroll and autoplay, calling the design addictive <br/><a href=\"https://www.rt.com/business/632106-eu-tiktok-addictive-design/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The app\u2019s features such as infinite
        scroll and autoplay push users into \u201Cautopilot\u201D mode, regulators
        have claimed</strong></p>\n            \n                        \n            <p>The
        European Commission (EC) has accused social media platform TikTok of an <em>&ldquo;addictive
        design&rdquo;</em> in its app and threatened the company with massive fines
        over features regulators claim encourage compulsive use.</p>\n<p>In a statement
        on Friday, the EC said TikTok&rsquo;s features, including infinite scroll
        and autoplay, keep users engaged for prolonged periods, shifting the brain
        into an <em>&ldquo;autopilot mode.&rdquo;</em>&nbsp;<br /><em></em></p>\n<p><em>&ldquo;TikTok
        did not adequately assess how these addictive features could harm the physical
        and mental wellbeing of its users, including minors and vulnerable adults,&rdquo;</em>
        the statement reads.</p>\n<p>Under the EU&rsquo;s Digital Services Act, which
        enforces platform accountability and content moderation, TikTok could face
        fines of up to 6% of its global turnover for serious breaches. The Chinese-owned
        platform, which has more than one billion users worldwide, could post around
        $35 billion in revenue this year, according to estimates from the World Advertising
        Research Centre.</p>\n<p>TikTok rejected the commission&rsquo;s findings,
        calling them <em>&ldquo;a categorically false and entirely meritless depiction&rdquo;</em>
        of its platform.</p>\n<p>The platform is also under a separate EC investigation
        launched in December 2024 over alleged foreign interference in Romania&rsquo;s
        presidential elections. The country&rsquo;s Constitutional Court annulled
        the first round vote after intelligence services alleged anti-establishment
        candidate Calin Georgescu&rsquo;s lead stemmed from foreign meddling via TikTok
        &ndash; a claim the company rejected.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698377bb203027259c732452.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/631980-us-eu-censorship/\">The
        US has accused the EU of censorship: Here\u2019s how the bloc\u2019s consensus
        machine works\_</a></figcaption>\n        </figure>\n    </blockquote>\n]]>\n<![CDATA[\n
        \   \n\n<p>This week, a US House Judiciary Committee <a href=\"https://judiciary.house.gov/sites/evo-subsites/republicans-judiciary.house.gov/files/2026-02/THE-FOREIGN-CENSORSHIP-THREAT-PART-II-2-3-26.pdf\"
        target=\"_blank\" rel=\"noopener noreferrer\">report</a> described the EC&rsquo;s
        actions as <em>&ldquo;the most aggressive censorship&rdquo;</em> in recent
        years. The report said the allegations were part of a broader decade-long
        effort by the Commission to pressure social media platforms to curb content
        in the name of <em>&ldquo;hate speech&rdquo;</em> and <em>&ldquo;disinformation.&rdquo;</em>&nbsp;</p>\n<p>The
        EU&rsquo;s crackdown on Big Tech has drawn criticism from the US government,
        which has threatened tariffs in response. Last year, the EC fined Elon Musk&rsquo;s
        X &euro;120 million ($140 million) over a <em>&ldquo;deceptive&rdquo;</em>
        verification badge and advert restrictions. Musk has called the EU a <em>&ldquo;bureaucratic
        monster&rdquo;</em> which <em>&ldquo;should be abolished.&rdquo;</em>&nbsp;</p>\n<p>Several
        European countries, including France, Australia, Germany, and the UK, are
        moving to limit social media access for younger teenagers amid concerns over
        their impact.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6989f5c485f5406f1a5859fb.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 06 Feb 2026 19:46:28
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>This is how the energy economy actually works \u2013 and why
        the EU can\u2019t grasp it</title>\n        <link><![CDATA[https://www.rt.com/business/632095-eus-war-on-physical-reality/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632095-eus-war-on-physical-reality/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6985d4312030276a644966fc.jpg\"
        /> Obsessed with tinkering with policy to lower prices, Europe doesn\u2019t
        consider the system-level costs of more expensive energy <br/><a href=\"https://www.rt.com/business/632095-eus-war-on-physical-reality/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Obsessed with tinkering with policy
        to lower prices, Europe doesn\u2019t consider the system-level costs of transitioning
        to more expensive energy</strong></p>\n            \n                        \n
        \           <p>Across the European Union, factories are closing or quietly
        scaling back production. Chemical plants, steel mills, fertilizer producers
        &ndash; the most energy-intensive segments of the economy &ndash; are either
        relocating abroad or shutting down altogether.&nbsp;</p>\n<p>This is no temporary
        setback. Europe has not emerged from the energy crisis of 2022 and it won&rsquo;t
        anytime soon. What is most alarming about this predicament is that Europe&rsquo;s
        leadership is unable to grasp what is happening to it.</p>\n<p>Policymakers
        are not oblivious to the loss of competitiveness but their approach to confronting
        the problem is lodged in a misguided paradigm.&nbsp;They want to bring energy
        prices down but give little thought to system-level costs. Beholden to an
        abiding faith in the power of policy to overcome physical constraints, they
        simply redistribute the burden of a declining energy surplus through an elaborate
        display of policy legerdemain.&nbsp;</p>\n<p>What Europe suffers from most
        of all is a profound, civilization-level energy illiteracy, which we will
        set out to explore.&nbsp;</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/69738a22203027568e2fdfdf.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/631426-gold-know-why-monetary-system-broken/\">The
        monetary system is broken and gold knows why</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<h2><strong>A slow-motion self-sabotage</strong></h2>\n<p>Slovak
        Prime Minister Robert Fico recently called the EU&rsquo;s plan to completely
        phase out imports of Russian gas by next November <em>&ldquo;energy suicide.&rdquo;</em>
        It&rsquo;s remarkable that Europe has learned nothing from the past four years
        and is charging full steam ahead down the same path. It&rsquo;s also particularly
        fitting that this suicide is so eagerly undertaken under the misguided notion
        of countering an external adversary. The historian Arnold Toynbee said that
        with few exceptions civilizations are not killed but commit suicide.&nbsp;</p>\n<p>But
        no civilization chooses the road to perdition on purpose, and Europe remains
        to this day mostly content with its rejection of Russian gas, while continuing
        to place its hopes in the green energy transition even as it unravels before
        our eyes.&nbsp;</p>\n<p>It should come as no surprise that the period of peak
        optimism in the energy transition &ndash; culminating in the Green New Deal
        (2019) &ndash; coincided perfectly with the peak of Russian gas supplies to
        Europe (2018-19). The ability of Germany, for example, to heavily subsidize
        its renewables industry over the past two decades was predicated on the energy
        surplus derived from availing itself of cheap Russian gas. In other words,
        the prosperity required to dabble in renewables was squarely a function of
        powering industry with cheap energy.&nbsp;</p>\n    <figure>\n        <img
        src=\"https://mf.b37mrtl.ru/files/2026.02/original/6985dec9203027167078e3b6.jpg\"
        \ />\n                    <figcaption>\n                                    EU
        Commission President Ursula von der Leyen talks to the media in Brussels.
        February 1, 2023.\n                \n                <span class = \"copyright\">\n
        \                      \xA9&nbsp; Thierry Monasse/Getty Images                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p></p>\n<h2><strong>When
        you have a Brussels-sized hammer, everything within reach is a nail</strong></h2>\n<p>The
        Spanish philosopher Jose Ortega y Gasset distinguished between <em>&ldquo;ideas&rdquo;</em>
        and <em>&ldquo;beliefs.&rdquo;</em> Ideas lie closer to the surface: we adopt
        them, debate them, apply them, and discard them as needed. Beliefs, by contrast,
        are deeper and less examined. They inhabit the dimly lit subterranean realms
        of our being. We do not so much have them as inhabit them, and they quietly
        shape the framework within which all our ideas are formed.</p>\n<p>In Europe&rsquo;s
        case, chief among these beliefs is an unwavering faith in the ability of administrative
        ingenuity to overcome physical limits. If only the right policy mix can be
        found, the right subsidies provided, the right collaboration undertaken, the
        right regulations enacted, then all can be set aright&nbsp;&ndash; the physical
        reality be damned. Europe debates policy (the ideas) but rarely the underlying
        assumptions (beliefs).</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6985c11720302759aa281a0b.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/news/632093-brussels-dependency-energy-russia/\">Brussels\u2019
        dependency dilemma: The EU is a victim of its own energy arrogance</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>A corollary
        belief is that the decisive levers of economic life lie not in physical realities
        or system-level costs but exclusively in the realm of prices. Much modern
        economic theory, practically regardless of school, coalesced during a time
        in which the energy component of economic activity was hidden &ndash; not
        because it was insignificant but because the energy cost of energy was low
        enough to not cause distortions.&nbsp;</p>\n<p>It is exactly these assumptions
        that have underpinned Europe&rsquo;s thinking about energy in recent decades.
        They informed the thinking that plunged Europe into the crisis in the first
        place and then shaped the response.&nbsp;</p>\n<p>In 2022, wholesale prices
        skyrocketed to more than &euro;300 per megawatt hour (MWh), roughly ten times
        the historical average. What followed was the deployment of&nbsp;a vast administrative
        apparatus not to lower energy costs but to redistribute them. Price caps were
        introduced on household electricity and gas, while regulated tariffs were
        frozen. Governments also imposed windfall taxes on utilities and oil and gas
        producers. Direct subsidies were provided to compensate utilities and suppliers
        for losses created by those caps.</p>\n<p>Then came the LNG scramble. Floating
        LNG terminals were built, along with new pipeline interconnections. Long-term
        LNG contracts were concluded at significantly higher costs. LNG delivers lower
        net energy than pipeline gas, while liquefaction, transport, and regasification
        are energy-intensive processes. The switch to LNG has already cost the EU
        tens of billions of euros upfront and that doesn't even count the higher cost
        of the gas itself. Given that much of the infrastructure buildout is funded
        through debt and public guarantees, and recovered through network charges,
        the bill for this bonanza will be paid over the course of decades.&nbsp;</p>\n<p><strong><em></em></strong>The
        emergency measures were of course improvised and implemented ad hoc, but they
        emerged entirely from the beliefs discussed above. Four year later, the shock
        phase may have ended &ndash; wholesale prices did later fall significantly
        &ndash; but the crisis continues, and the playbook for confronting it is fundamentally
        the same. Europe&rsquo;s energy is now structurally more expensive, yet rather
        than&nbsp;deal with this problem head on, policymakers continue to tinker
        with the settings.&nbsp;</p>\n    <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.02/original/6985df1585f5401c176a8d07.jpg\"
        \ />\n                    <figcaption>\n                                    An
        LNG tanker anchored at a terminal.\n                \n                <span
        class = \"copyright\">\n                       \xA9&nbsp; Getty Images/Suphanat
        Khumsap                                                        </span>\n            </figcaption>\n
        \           </figure>\n\n<p>For example, Germany has proposed direct relief
        for its moribund industry by introducing a subsidized <em>&ldquo;industrial
        electricity price&rdquo;</em> this year. At the EU level, Germany is also
        advocating that companies be allowed to combine multiple electricity price-support
        mechanisms, arguing that subsidies must be stacked. Italy has adopted a scheme
        allowing industrial consumers to access electricity at a fixed price well
        below recent national averages in exchange for commitments linked to renewable
        energy. This is really only the tip of the iceberg.&nbsp;</p>\n<p>This sophisticated
        game of whack-a-mole does not lower system-level energy costs; it merely redistributes
        them. The modern financial system and sprawling administrative bureaucracies
        such as the EU are exceptionally good at doing exactly that, namely obscuring
        physical reality by shifting costs across time and redistributing losses.
        Prices tell us what energy costs in financial terms, but not what it costs
        at the level of the system, or the opportunity cost of diverting more economic
        resources to obtain the same amount of more expensive energy.&nbsp;</p>\n\n
        \           ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read more</strong></span>\n
        \       <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6980bfdf85f5405a322a73f9.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/russia/631867-pipelines-and-power-russia-ukraine/\">The
        Ukraine knot: How gas transit tied up Russia, Europe, and Kiev in one conflict</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>In a system
        where financial capital is fungible, the real cost need not appear in the
        prices of oil or gas themselves but can surface elsewhere. US shale is a perfect
        example. Wellhead costs today may look respectable, but they obscure the mountain
        of debt and infrastructure required, not to mention all the distortions caused
        by artificially low interest rates, to get there.&nbsp;</p>\n<p>This dispersion
        is a feature of the system, but it is also precisely what policymakers seek.
        Their goal is to suppress the cost of the marginal unit (lower wholesale prices
        or lower end-user prices) while allowing the real cost to dissolve into complexity,
        where it becomes unmeasurable and politically safer.&nbsp;</p>\n<h2><strong>It
        takes energy to obtain energy, money is just along for the ride&nbsp;</strong></h2>\n<p>If
        price signals are incomplete or distorted, and monetary costs are distributed
        throughout the system and can be manipulated or obscured, then not only do
        we have no idea what the true cost of energy is, we lack a way to conceptualize
        it at all. Even if we could arrive at a dollar figure, what would that number
        actually mean?</p>\n<p>The alternative is to conceive of energy not in monetary
        terms but in energy terms. This sounds reasonable enough, but it already represents
        a significant paradigm shift. It moves the discussion out of the realm of
        paper claims &ndash; money and debt, which can be shuffled endlessly and conjured
        out of nothing &ndash; and into the realm of the physical.&nbsp;</p>\n<p>We
        all understand that it takes energy to obtain energy. Drilling an oil well,
        extracting the oil, transporting it, refining it, and storing it are all energy-intensive
        processes. Energy is expended to obtain energy.</p>\n<p>A process that uses
        one joule of energy to obtain one joule of energy produces no economic surplus.
        But the energy consumed in that process is not always easy to trace. It may
        be pulled from the future through debt, or distributed through a complex system
        of cost-bearing. What matters is that no amount of financial engineering can
        change the underlying energy balance. Either surplus energy is produced, or
        it is not.</p>\n    <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.02/original/6985dd992030276a577b19d5.jpg\"
        \ />\n                    <figcaption>\n                                    Drone
        view of an oil or gas drill fracking rig pad.\n                \n                <span
        class = \"copyright\">\n                       \xA9&nbsp; Getty Images/Joey
        Ingelhart                                                        </span>\n
        \           </figcaption>\n            </figure>\n\n<p>When energy becomes
        more expensive, we are accustomed to looking for the difference only in prices.
        But to conceptualize the true extent of the problem, we have to look beyond
        prices.</p>\n<p>The real question is what Europe must now expend more of,
        for example, to obtain LNG from the US instead of pipeline gas from Russia.
        The answer is: more economic resources, masquerading as mere&nbsp;money, have
        to be diverted. But here we mean&nbsp;economic resources, not financial resources
        (which would put us back into the world of paper claims). We&rsquo;re talking
        about real output &ndash; or the capacity for it. That capacity, in turn,
        is ultimately a function of applied energy and is constrained by how much
        surplus energy is available. Germany&rsquo;s deindustrialization points unmistakably
        in this direction.&nbsp;</p>\n<p>At a system level, when obtaining energy
        absorbs a rising share of surplus energy, less remains for everything else.
        The real cost of energy is therefore measured in energy itself. The relevant
        concept is ECoE (energy cost of energy), a metric used by energy-focused <a
        href=\"https://surplusenergyeconomics.wordpress.com/\" target=\"_blank\" rel=\"noopener
        noreferrer\">analysts</a> precisely because it captures something real even
        if it cannot be calculated. More expensive energy means that more energy must
        be diverted merely to secure the same amount as before.&nbsp;</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2025.11/thumbnail/691f428a2030274ddb4476f0.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/627903-china-won-green-energy-war/\">China
        has already won the green energy war</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>But there is no single balance
        sheet where you see &lsquo;more energy used to get energy&rsquo;. Remember
        that when energy becomes more expensive in real terms, the system does not
        absorb that cost at a single point. So instead of a clear signal &lsquo;we
        pay this much more for energy&rsquo;, you get: &lsquo;everything else works
        slightly worse&rsquo;. Who in Europe today would dispute the categorization
        that everything is a bit worse (although there are many other reasons for
        this too)?</p>\n<h2><strong>How Europe obsesses over prices and thinks little
        of system-level costs</strong></h2>\n<p>Bloomberg remarked in an <a href=\"https://www.bloomberg.com/news/articles/2025-12-19/return-of-cheaper-natural-gas-hasn-t-solved-europe-s-industrial-crisis\"
        target=\"_blank\" rel=\"noopener noreferrer\">article</a> from December 2025
        that the return of cheaper gas (compared with crisis levels) had not solved
        Europe&rsquo;s energy crisis. It framed the issue as prices&nbsp;being almost
        back to normal but competitiveness still declining. The headline fact &ndash;
        gas prices in Europe had fallen to around &euro;27/MWh &ndash; looks like
        vindication of the monetary framing. Prices have <em>&ldquo;normalized.&rdquo;</em>
        But normalized relative to what physical reality?</p>\n<p>The article slips
        in a mention of a very revealing fact: European consumption is about 20% lower
        than pre-2022 levels. This is nothing more than demand destruction masquerading
        as stability.&nbsp;Europe&rsquo;s marginal supply is now LNG, not pipeline
        gas, and LNG is structurally more energy-intensive. Meanwhile,&nbsp;costs
        have been socialized, capital has been written off, and, most tellingly, demand
        has been destroyed.&nbsp;</p>\n<p>So rather than a return to normal, system-level
        surplus energy is collapsing, which leads to industry restructuring, relocating,
        or simply contracting. Demand falls accordingly. Prices then come down because
        the energy-intensive parts of the economy are gone. And of course this is
        a classic example of closing the barn door after the horse escapes. Prices
        might have come down but industry isn&rsquo;t coming back.&nbsp;</p>\n<p>The
        monetary system did exactly what it&rsquo;s good at, but it still couldn&rsquo;t
        fix the underlying problem. Giants such as BASF, Dow, and Thyssenkrupp are
        not threatening to leave, but are already gone or half-gone.&nbsp;</p>\n<p>What
        Bloomberg treats as a conundrum (maybe prices haven&rsquo;t fallen enough
        or policy adjustments haven&rsquo;t yet <em>&ldquo;worked&rdquo;</em>) is
        really just the outcome of declining surplus energy. The article treats competitiveness
        as the ultimate frame, whereas competitiveness itself is actually just downstream
        of energy surplus. From a surplus-energy perspective, Europe isn&rsquo;t losing
        because it has chosen the wrong incentives or failed to fine-tune prices,
        but because its energy system now absorbs a larger share of economic output
        just to sustain itself.&nbsp;</p>\n    <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.02/original/6985dcb52030277b662dd274.jpg\"
        \ />\n                    <figcaption>\n                                    RT
        based on Bloomberg\n                \n                <span class = \"copyright\">\n
        \                     \xA9&nbsp;RT                                                           </span>\n
        \           </figcaption>\n            </figure>\n\n<p>For a further look
        into Europe&rsquo;s assumptions in action, it is worth examining a <a href=\"https://www.bruegel.org/policy-brief/decarbonising-competitiveness-four-ways-reduce-european-energy-prices\"
        target=\"_blank\" rel=\"noopener noreferrer\">policy brief</a> issued in late
        2024 by the prestigious economic think tank Bruegel. The document, though
        dry and technical, is fascinating because it maps almost perfectly onto the
        flawed energy paradigm described above.&nbsp;</p>\n<p>The argument the brief
        advances is straightforward: the extreme electricity prices of 2022 were an
        aberration, and as renewables expand and gas recedes from the mix, electricity
        prices in Europe should fall. At the center of the analysis is a simple and
        rarely examined premise: falling wholesale prices are evidence that the system
        itself is becoming cheaper. This premise underpins much of the thinking around
        the green energy transition.&nbsp;</p>\n<p>Yet the brief itself carefully
        &ndash; and entirely unwittingly &ndash; documents the mechanisms that sever
        prices from system-level costs. It explicitly notes that as renewables expand,
        gas use declines and marginal generation costs fall, while the fixed-cost
        share of the system rises. So even if marginal costs fall, total obligations
        do not.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n        <span><strong>Read
        more</strong></span>\n        <figure>\n            <img src=\"https://mf.b37mrtl.ru/files/2025.10/thumbnail/68ff5c5720302757e45a5a7f.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/africa/627003-israel-egypt-gas-deal/\">Netanyahu\u2019s
        trap: Here\u2019s how Israel made a Palestinian ally dependent upon it</a></figcaption>\n
        \       </figure>\n    </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The paper
        is also candid that the cost of supporting renewables will be <em>&ldquo;mediated
        through the state and recovered from consumer bills through levies and charges.&rdquo;</em>
        These costs do not disappear but are simply removed from headline prices.
        Likewise, the brief emphasizes that network costs (grid expansion, cross-border
        interconnectors, offshore wind integration, smart meters) are inflationary.
        These are capital-intensive, energy-intensive, maintenance-heavy, and sit
        entirely outside the wholesale price.&nbsp;</p>\n<p>The brief further acknowledges,
        almost in passing, extensive cost redistribution: price caps, consumer shielding,
        industrial subsidies, cross-subsidization, and fiscal intervention to smooth
        outcomes. Of course, once prices are mediated at this scale, they no longer
        convey scarcity, and affordability ceases to reflect cost. Yet, despite all
        of this &ndash; and here the blind spot is clearest &ndash; the brief continues
        to speak as though <em>&ldquo;prices coming down&rdquo;</em> is still a meaningful
        indicator of underlying improvement. This contradiction runs through the analysis.&nbsp;</p>\n<p>Notably,
        the author never clearly states that overall system-level costs will decline.
        He does not demonstrate it and shows little interest in doing so. The analysis
        is profoundly blind to the question of surplus energy.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2025.12/thumbnail/6931688b85f5401d7941bb62.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/india/628898-beyond-barrels-india-and-russia/\">Beyond
        barrels: India and Russia build a new energy playbook</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>As Thomas Kuhn observed, a paradigm
        does not merely shape answers but determines which questions may remember
        to be asked. The prevailing paradigm permits only two: will prices come down,
        and how will the costs be shared? The more relevant question&nbsp;&ndash;
        largely excluded&nbsp;&ndash; is how much of Europe&rsquo;s economic capacity
        must now be devoted to securing energy.</p>\n<h2><strong>A civilizational
        marker&nbsp;</strong></h2>\n<p>The proliferation of subsidies, price caps,
        regulations, and credit lines does not make energy cheaper. It does not turn
        a less efficient energy source into a more efficient one. It merely redistributes
        claims on surplus energy or delays recognition of its decline. Running through
        the Bruegel document is a quiet, unspoken belief that Europe can design its
        way out of material disadvantage and overcome any constraint.</p>\n<p>This
        belief in the power of sufficiently sophisticated administration is the sacral
        core &ndash; such as there is one &ndash; of the European Union. This confidence
        dovetails neatly with a belief that economic problems are really just monetary
        problems.</p>\n<p>But, as we have demonstrated, the economy is not merely
        a monetary system in which physical constraints can be banished by the royal
        touch of policy. There is no amount of shuffling around of financial claims
        and no clever configuration of policies that will overcome the cold, hard
        laws of thermodynamics.&nbsp;</p>\n    <figure>\n        <img src=\"https://mf.b37mrtl.ru/files/2026.02/original/6985dce885f54031d64ca285.jpg\"
        \ />\n                    <figcaption>\n                                    RT
        based on Penn State University\n                \n                <span class
        = \"copyright\">\n                      \xA9&nbsp;RT                                                           </span>\n
        \           </figcaption>\n            </figure>\n\n<p>That the economy is
        ultimately an energy system would be painfully obvious were it not a civilizational
        blind spot. For those in doubt, plot world population and total energy consumption
        on the same time axis from the Neolithic Revolution onward and see if the
        two curves can be distinguished. Population growth is an energy phenomenon
        before it is an economic one. Energy is foundational; finance is derivative.</p>\n<p>Vaclav
        Smil, in his seminal work &lsquo;Energy and Civilization&rsquo;, argues that
        every historically successful energy transition delivered net advantages in
        energy density and system-level productivity. It is precisely this system-level
        productivity that Europe fails to confront. Doing so would require acknowledging
        hard constraints and, by extension, the impotence of the high priests of Brussels
        in the face of them.&nbsp;</p>\n<p>Far from solving any of these problems,
        Europe's sprawling administrative state is itself devouring ever more amounts
        of surplus energy. Joseph Tainter, well known for his treatise &lsquo;The
        Collapse of Complex Societies&rsquo;, warned about the declining marginal
        returns of rising complexity and of taking short-term gains at the price of
        long-term fragility. In Europe&rsquo;s case, the complexity of the solutions
        is astounding but even the short-term gains are pretty paltry.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6985d4312030276a644966fc.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 06 Feb 2026 15:56:51
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Big Tech stocks plummet on record AI spending</title>\n        <link><![CDATA[https://www.rt.com/business/632111-big-tech-stocks-plummet-on/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632111-big-tech-stocks-plummet-on/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698603e385f5401c6429a59b.jpg\"
        /> US tech stocks slumped on Friday as Amazon, Microsoft, Google, and Meta
        announced $660 billion in AI spending <br/><a href=\"https://www.rt.com/business/632111-big-tech-stocks-plummet-on/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Skyrocketing AI infrastructure outlays
        have raised investor concerns over future returns and the potential for a
        bubble</strong></p>\n            \n                        \n            <p>US
        technology stocks tumbled sharply after Amazon, Microsoft, Google, and Meta
        announced plans to spend a combined $660 billion on artificial intelligence
        in 2026. Investors worried the companies&rsquo; capital expenditures could
        outpace the technology&rsquo;s earnings potential. <br />&nbsp;<br />Amazon,
        Google, and Microsoft have lost a combined $900 billion in market value since
        reporting quarterly results last week. The companies&rsquo; spending plans
        exceed the GDP of Israel and overshadow strong growth in the companies&rsquo;
        cloud businesses. <br /><em></em></p>\n<p><em></em><em>&ldquo;AI bubble fears
        are settling back in,&rdquo;</em> Brent Thill, an analyst at Jefferies, told
        the Financial Times on Friday. <em>&ldquo;Investors are in a mini timeout
        around tech, and nothing the companies say fundamentally matters.&rdquo;</em>&nbsp;<br
        />&nbsp;<br />Amazon shares fell 7.8% in premarket trading on Friday after
        the company said its 2026 capital spending would reach about $200 billion,
        $50 billion more than expected. The shares later stabilized. CEO Andy Jassy
        said the funds were needed to expand AI, robotics, chips, and satellite projects.
        <br />&nbsp;<br />Alphabet said it plans to nearly double its capital expenditures
        next year, with much of the increase going to cloud and AI projects, putting
        pressure on its stock despite posting over $400 billion in revenue in 2025.
        Microsoft shares fell 18% after reporting large data center spending and disclosing
        that 45% of its $625 billion book of future cloud contracts is tied to OpenAI.
        Meta initially rose on AI-driven advertising growth but later fell amid wider
        tech weakness. <br />&nbsp;<br />Apple, which has kept AI infrastructure spending
        low, gained 7.5% after reporting record quarterly revenue of $144 billion.
        Its capital expenditure fell 17% in the fourth quarter to $2.4 billion.</p>\n<p>Markets
        were also unsettled after confirmation that OpenAI&rsquo;s $100 billion investment
        and infrastructure deal with Nvidia did not proceed.</p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.01/thumbnail/6968f67c20302729f74f0be9.jpg\"
        alt=\"RT\" />\n            <figcaption><a href=\"https://www.rt.com/business/631006-ai-boom-bubble/\">AI
        boom fuels fears of an industry bubble (RT VIDEO)</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The spike in AI spending has
        raised concerns about a potential financial bubble. OpenAI has secured computing
        agreements with Nvidia, AMD, and Oracle worth over $1 trillion. Nvidia alone
        completed more than 100 AI-related venture deals in 2024. Analysts warn that
        much of the investment flows within a small group of closely linked companies,
        creating what they describe as circular financing that inflates market values
        beyond the industry&rsquo;s actual profits. <br />&nbsp;<br />According to
        a recent PwC survey, most CEOs say their companies have not yet seen financial
        returns from AI, with only 12% reporting both higher revenue and lower costs.</p>]]>\n
        \       </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698603e385f5401c6429a59b.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 06 Feb 2026 15:14:35
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Davos chief probed over alleged Epstein ties \u2013 media</title>\n
        \       <link><![CDATA[https://www.rt.com/business/632088-davos-ceo-probed-epstein-ties/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632088-davos-ceo-probed-epstein-ties/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6985bb4c2030276f2800c042.jpg\"
        /> WEF CEO Borge Brende reportedly requested the probe himself over his Epstein
        ties after revelations of business dinners, emails, and texts <br/><a href=\"https://www.rt.com/business/632088-davos-ceo-probed-epstein-ties/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>Borge Brende reportedly requested the
        investigation himself following revelations about business dinners and email
        and text exchanges</strong></p>\n            \n                        \n
        \           <p>The World Economic Forum has launched an investigation into
        Borge Brende, the Davos Forum&rsquo;s CEO, to clarify his relations with disgraced
        US financier Jeffrey Epstein, several news outlets reported on Thursday, citing
        the organization.</p>\n<p>The US Justice Department published the final tranche
        of documents related to convicted sex offender Epstein, including his personal
        emails, last week. Spanning over 3 million pages, 2,000 videos, and 180,000
        images, the trove has renewed scrutiny of Epstein&rsquo;s connections to political,
        business, and tech figures.</p>\n<p>Many of those named in the files were
        regulars at the annual forum in Davos, highlighting the fact that Epstein&rsquo;s
        network overlapped with some of the world&rsquo;s most influential circles.
        Among them were former Israeli Prime Minister Ehud Barak, former US Treasury
        Secretary Larry Summers, tech leaders Elon Musk, Reid Hoffman, and Peter Thiel,
        as well as Bill Gates, former US President Bill Clinton, entrepreneur Richard
        Branson, and banking figures such as Ariane de Rothschild.</p>\n<p>The board
        of the Geneva-based World Economic Forum (WEF) said it decided to initiate
        an independent review of Brende&rsquo;s ties to the notorious financier, citing
        revelations about <em>&ldquo;three business dinners&rdquo;</em> the CEO attended
        with Epstein, as well as email and text exchanges.</p>\n<p><em>&ldquo;This
        decision underscores the Forum&rsquo;s commitment to transparency and maintaining
        its integrity,&rdquo;</em> the WEF said, as cited by Bloomberg, stressing
        that Brende <em>&ldquo;fully supports, and cooperates with, this review, having
        indeed requested it himself.&rdquo;</em></p>\n\n            ]]><![CDATA[\n
        \   <blockquote>\n        <span><strong>Read more</strong></span>\n        <figure>\n
        \           <img src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6985b384203027653b055122.jpg\"
        alt=\"Thorbjorn Jagland at an event in Strasbourg, France, November 16, 2016.\"
        />\n            <figcaption><a href=\"https://www.rt.com/news/632082-jagland-epsteinties-probe/\">Ex-Norwegian
        PM investigated over alleged Epstein corruption</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>Brende, who has led the WEF
        since 2017, will retain his position but will not be involved in the review
        process, the organization said. He claimed, as cited by the news agency, that
        he <em>&ldquo;was completely unaware of Epstein&rsquo;s past and criminal
        activities,&rdquo;</em> and would have declined the invitations otherwise.</p>\n<p><em>&ldquo;I
        recognize that I could have conducted a more thorough investigation into Epstein&rsquo;s
        history, and I regret not doing so,&rdquo;</em> Brende stated.</p>\n<p>Epstein,
        who pleaded guilty in 2008 to soliciting prostitution and was sentenced to
        18 months in prison for raping a minor, was arrested again in 2019 on charges
        of human trafficking and exploiting victims for prostitution. He died in his
        jail cell ahead of his trial.</p>\n<p>The DOJ has gradually released materials
        related to the Epstein case under the Epstein Files Transparency Act, signed
        into law by US President Donald Trump.</p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6985bb4c2030276f2800c042.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Fri, 06 Feb 2026 10:17:35
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Bitcoin Trump-era gains wiped out</title>\n        <link><![CDATA[https://www.rt.com/business/632078-bitcoin-trump-gains-gone/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/632078-bitcoin-trump-gains-gone/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698500fc203027284a5bdee0.jpg\"
        /> Bitcoin has plummeted to below $63,000 on Thursday, losing all of its gains
        since US President Donald Trump assumed office <br/><a href=\"https://www.rt.com/business/632078-bitcoin-trump-gains-gone/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The cryptocurrency has lost nearly
        40% of its value since the US president assumed office last January</strong></p>\n
        \           \n                        \n            <p>Bitcoin has plummeted
        to below $63,000 on Thursday, wiping out all the gains it made since crypto-friendly
        US President Donald Trump entered office last year.</p>\n<p>The cryptocurrency
        fell as much as 14% over the course of the day to $62,576, its lowest price
        since September 2024.</p>\n<p>The nosedive erased nearly half of the token&rsquo;s
        value since its all-time record of more than $120,000 last October, which
        was widely attributed to Trump&rsquo;s policies and promises to establish
        the US as the <em>&ldquo;crypto-capital of the world.&rdquo;</em></p>\n<p>Recent
        geopolitical tensions have made investors more hesitant and risk-averse, sending
        crypto markets crashing, according to Bloomberg.</p>\n<p><em>&ldquo;As Bitcoin
        continues its slide below the psychological barrier of $70,000, it&rsquo;s
        clear the crypto market is now in full capitulation mode,&rdquo;</em> the
        Investing.com portal cited Coin Bureau founder Nic Puckrin as saying on Thursday.</p>\n<p><em>&ldquo;If
        previous cycles are anything to go by, this is no longer a short-term correction,
        but rather a transition... and these typically take months, not weeks.&rdquo;</em></p>\n\n
        \           ]]> <![CDATA[\n    <p>\n        <a target=\"_blank\" href=\"https://www.rt.com/business/621810-trump-firm-bitcoin-acquisition/\">\n
        \           <span>READ MORE: </span>Trump Media invests $2 billion in Bitcoin\n
        \       </a>\n    </p>\n]]>\n<![CDATA[\n    \n\n<p>Smaller cryptocurrencies
        followed the Bitcoin plunge, with coins like Ethereum, BNB, and Solana falling
        more than 13% over the course of the day.</p>\n<p>The total crypto market
        capitalization has fallen around 12% to $2.18 trillion, according to CoinMarketCap
        data.</p>]]>\n        </content:encoded>\n        <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/698500fc203027284a5bdee0.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Thu, 05 Feb 2026 21:08:33
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n    <item>\n
        \       <title>Russian businessman\u2019s remains found on British base in
        Cyprus</title>\n        <link><![CDATA[https://www.rt.com/business/631975-ceo-uralkali-baumgartner-dead-cyprus/?utm_source=rss&utm_medium=rss&utm_campaign=RSS]]></link>\n
        \       <guid>https://www.rt.com/business/631975-ceo-uralkali-baumgartner-dead-cyprus/</guid>\n
        \       <description>\n            <![CDATA[<img alt=\"Preview\" align=\"left\"
        style=\"margin-right: 10px;\" src=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6983615d85f540217263b575.jpg\"
        /> Former Uralkali CEO Vladislav Baumgertner was found dead at a British military
        base in Cyprus after going missing in early January <br/><a href=\"https://www.rt.com/business/631975-ceo-uralkali-baumgartner-dead-cyprus/?utm_source=rss&utm_medium=rss&utm_campaign=RSS\">Read
        Full Article at RT.com</a>]]>\n        </description>\n        <content:encoded><![CDATA[\n
        \                           <p><strong>The former CEO of potash giant Uralkali,
        Vladislav Baumgertner, went missing in early January</strong></p>\n            \n
        \                       \n            <p>The remains discovered on a UK military
        base in southern Cyprus earlier this year have been identified belonging to
        Vladislav Baumgertner, the former head of Russian potash giant Uralkali, TASS
        reported on Wednesday.</p>\n<p>The businessman&rsquo;s body was identified
        through DNA analysis, British military police told the outlet.</p>\n<p><em>&ldquo;We
        have no information about the cause of death,&rdquo;</em> a police spokesperson
        said. <em>&ldquo;This means that the cause has not yet been determined.&rdquo;</em></p>\n<p>Baumgertner
        went missing in early January in the Limassol area. A week later, police found
        a body in a gorge on the territory of a British base. At the time, the authorities
        said it was impossible to identify the remains immediately due to advanced
        decomposition.</p>\n<p>The businessman made international headlines in 2013
        when he was arrested at Minsk airport in Belarus while travelling for talks
        with Belarusian officials.</p>\n\n            ]]><![CDATA[\n    <blockquote>\n
        \       <span><strong>Read more</strong></span>\n        <figure>\n            <img
        src=\"https://mf.b37mrtl.ru/files/news/21/3b/80/00/20.n.jpg\" alt=\"Uralkali
        General Director Vladislav Baumgertner.(RIA Novosti / Ekaterina Chesnokova)\"
        />\n            <figcaption><a href=\"https://www.rt.com/business/uralkali-baumgertner-extradite-russia-120/\">Fertilizer
        feud nears end as 'potash hostage' back to Russia</a></figcaption>\n        </figure>\n
        \   </blockquote>\n]]>\n<![CDATA[\n    \n\n<p>The arrest followed the collapse
        of cooperation between Russia&rsquo;s Uralkali and the Belarusian state-owned
        producer Belaruskali, a dispute that became known as the <em>&ldquo;potash
        war.&rdquo;</em></p>\n<p>He was charged with abuse of power for withdrawing
        Uralkali from a joint venture with Belaruskali, allegedly costing the Belarusian
        company about $100 million in damages. Baumgertner was held under house arrest
        in Minsk for three months before being extradited to Russia. The charges were
        dropped in 2015.</p>\n<p>His body will reportedly be transported from Cyprus
        to Moscow, where the funeral will take place.</p>\n<p></p>]]>\n        </content:encoded>\n
        \       <enclosure url=\"https://mf.b37mrtl.ru/files/2026.02/thumbnail/6983615d85f540217263b575.jpg\"
        type=\"image/jpeg\" length=\"123\"/>        <pubDate>Wed, 04 Feb 2026 16:54:12
        +0000</pubDate>\n        <dc:creator>RT</dc:creator>\n    </item>\n\n\n    </channel>\n</rss>\n"
