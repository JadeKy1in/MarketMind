        markets experienced a significant downturn, with the STOXX 600 index sliding
        due to escalating energy inflation fears stemming from the U.S.-Iran tensions.
        \ Rising costs are impacting consumer and producer prices, prompting expectations
        of interest rate hikes.  Economically sensitive sectors and defence stocks
        bore the brunt of the sell-off, despite some positive corporate news.]]> </description><link>https://economictimes.indiatimes.com/markets/us-stocks/news/european-shares-log-weekly-losses-on-iran-war-linked-inflation-woes/articleshow/131131868.cms</link><enclosure
