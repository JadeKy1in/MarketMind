        soldiers after protest against Pence visit]]></title>    <link>http://www.xinhuanet.com/english/world/2018-01/24/c_136919909.htm</link><description><![CDATA[<img
        \ src=\"../titlepic/13691/136919909_1516756058941_title0h.jpg\" width=\"100\"
        height=\"100\"       alt=\"Palestinians clash with Israeli soldiers after
        protest against Pence visit\"  />Palestinian protesters hurl stones at Israeli
        soldiers during clashes after a protest against the visit of U.S. Vice President
        Mike Pence in Jerusalem, in the West Bank city of Hebron, on Jan. 23, 2018.]]></description><category>xinhuanet</category><author></author><pubDate>2018-01-24</pubDate></item><item><title><![CDATA[U.S.
        failure to appoint Australian ambassador \"diplomatic insult\": former deputy
        PM]]></title>    <link>http://www.xinhuanet.com/english/2018-01/03/c_136868968.htm</link><description><![CDATA[Former
        Australian Deputy Prime Minister Tim Fischer has accused the U.S. of hitting
        Australia with a \"diplomatic insult.\"]]></description><category>xinhuanet</category><author></author><pubDate>2018-01-03</pubDate></item><item><title><![CDATA[Speaker
        of Hungarian Parliament addresses in Budapest]]></title>    <link>http://www.xinhuanet.com/english/2017-10/28/c_136711043.htm</link><description><![CDATA[<img
        \ src=\"../titlepic/13671/136711043_1509146684624_title0h.jpg\" width=\"100\"
        height=\"100\"       alt=\"Speaker of Hungarian Parliament addresses in Budapest\"
        \ />Laszlo Kover (1st L), Speaker of the Hungarian Parliament, speaks at a
        conference of the parliament speakers of the Western Balkans in Budapest,
        Hungary on Oct. 27, 2017.]]></description><category>xinhuanet</category><author></author><pubDate>2017-10-28</pubDate></item><item><title><![CDATA[Typhoon
        Lan lashes central Japan, killing 2 and disrupting transport systems]]></title>
        \   <link>http://www.xinhuanet.com/english/2017-10/23/c_136699146.htm</link><description><![CDATA[Two
        people were killed and transportation systems and businesses severely disrupted
        as Typhoon Lan lashed central Japan's Pacific coast after making landfall
        early Monday.]]></description><category>xinhuanet</category><author></author><pubDate>2017-10-23</pubDate></item><item><title><![CDATA[Spotlight:
        U.S. decision to withdraw from UNESCO triggers calls for multilateralism]]></title>
        \   <link>http://www.xinhuanet.com/english/2017-10/13/c_136677613.htm</link><description><![CDATA[The
        U.S. decision to withdraw from UNESCO, the UN cultural agency, has triggered
        worldwide calls for supporting multilateralism amid world challenges.]]></description><category>xinhuanet</category><author></author><pubDate>2017-10-13</pubDate></item><item><title><![CDATA[U.S.
        nuke-powered submarine makes port call in S. Korea]]></title>    <link>http://www.xinhuanet.com/english/2017-10/13/c_136677591.htm</link><description><![CDATA[A
        U.S. nuclear-powered submarine on Friday made a port call at a city in southeast
        South Korea, Yonhap news agency reported Friday.]]></description><category>xinhuanet</category><author></author><pubDate>2017-10-13</pubDate></item><item><title><![CDATA[S.Korean
        court extends detention of ex-president Park over corruption charges]]></title>
        \   <link>http://www.xinhuanet.com/english/2017-10/13/c_136677533.htm</link><description><![CDATA[A
        South Korean court on Friday decided to extend the detention of impeached
        President Park Geun-hye who has been in custody and stood trial over corruption
        charges including bribery.]]></description><category>xinhuanet</category><author></author><pubDate>2017-10-13</pubDate></item><item><title><![CDATA[Spotlight:
        What's behind abrupt U.S. withdrawal from UNESCO?]]></title>    <link>http://www.xinhuanet.com/english/2017-10/13/c_136677360.htm</link><description><![CDATA[The
        world has long been used to U.S. President Donald Trump taking a stance against
        multilateralism. Still, the sudden U.S. announcement Thursday to retreat from
        UNESCO -- the United Nations Educational, Scientific and Cultural Organization
        -- raised eyebrows worldwide.]]></description><category>xinhuanet</category><author></author><pubDate>2017-10-13</pubDate></item><item><title><![CDATA[UN
        roots for enhanced data collection to fix food security crises in Africa]]></title>
        \   <link>http://www.xinhuanet.com/english/2017-09/18/c_136618940.htm</link><description><![CDATA[The
        United Nations Food and Agriculture Organization (FAO) will avail financial
        resources and technical expertise to help African countries collect data on
        agriculture that is key to addressing food security crises in the continent,
        an official said on Monday.]]></description><category>xinhuanet</category><author></author><pubDate>2017-09-18</pubDate></item><item><title><![CDATA[Egypt-U.S.
        joint drill Bright Star simulates real battles]]></title>    <link>http://www.xinhuanet.com/english/2017-09/18/c_136618525.htm</link><description><![CDATA[Conditions
        similar to real battles were created in the Egyptian-U.S. joint drill \"Bright
        Star 2017,\" which are being conducted at Egypt's Mohamed Naguib Military
        Base and will last until Sept. 20, local media reported on Monday.]]></description><category>xinhuanet</category><author></author><pubDate>2017-09-18</pubDate></item><item><title><![CDATA[Cambodia
        arrests Laotian man with 5 kg of illicit drugs]]></title>    <link>http://www.xinhuanet.com/english/2017-07/22/c_136464696.htm</link><description><![CDATA[Cambodian
        police arrested a Laotian man on Saturday for allegedly smuggling nearly 5
        kilos of crystal methamphetamine from Laos into Cambodia, an anti-drug police
        officer said.]]></description><category>xinhuanet</category><author></author><pubDate>2017-07-22</pubDate></item><item><title><![CDATA[MPs
        say Brexit referendum led to public mistrust in government]]></title>    <link>http://www.xinhuanet.com/english/2017-04/12/c_136203242.htm</link><description><![CDATA[Actions
        by the British government during the European Union referendum led to public
        mistrust, a committee of MPs said Wednesday in a parliamentary report.]]></description><category>xinhuanet</category><author></author><pubDate>2017-04-12</pubDate></item><item><title><![CDATA[<a
        href='http://news.xinhuanet.com/english/2017-03/31/c_136171921.htm' target='_blank'>S.
        Korea's ex-president Park arrested following impeachment over corruption scandal</a>]]></title>
        \   <link>http://news.xinhuanet.com/english/2017-03/31/c_136171921.htm</link><description><![CDATA[<img
        \ src=\"../titlepic/112072/1120729675_1490922420928_title0h.jpg\" width=\"100\"
        height=\"100\"       alt=\"S. Korea's ex-president Park arrested following
        impeachment over corruption scandal\"  />Former President Park Geun-hye of
        South Korea was arrested early Friday as a Seoul court approved the request
        from prosecutors following her impeachment earlier this month over a corruption
        scandal embroiling her.]]></description><category>xinhuanet</category><author></author><pubDate>2017-03-31</pubDate></item><item><title><![CDATA[<a
        href='http://news.xinhuanet.com/english/photo/2017-03/30/c_136171338.htm'
        target='_blank'>Manila Int'l Auto Show kicks off</a>]]></title>    <link>http://news.xinhuanet.com/english/photo/2017-03/30/c_136171338.htm</link><description><![CDATA[<img
        \ src=\"../titlepic/112072/1120727883_1490881041390_title0h.jpg\" width=\"100\"
        height=\"100\"       alt=\"Manila Int'l Auto Show kicks off\"  />Visitors
        attend the Manila International Auto Show at the World Trade Center in Pasay
        City, the Philippines.]]></description><category>xinhuanet</category><author></author><pubDate>2017-03-30</pubDate></item><item><title><![CDATA[<a
        href='http://news.xinhuanet.com/english/2017-03/30/c_136171630.htm' target='_blank'>Malaysia
        says to release body of Kim Jong Nam to DPRK</a>]]></title>    <link>http://news.xinhuanet.com/english/2017-03/30/c_136171630.htm</link><description><![CDATA[Malaysia
        will release the body of Kim Jong Nam to the Democratic People's Republic
        of Korea (DPRK) and allow its nationals to leave, after the nine stranded
        Malaysian citizens in DPRK were freed, Malaysian Prime Minister Najib Razak
        said in a statement on Thursday.]]></description><category>xinhuanet</category><author></author><pubDate>2017-03-30</pubDate></item><item><title><![CDATA[<a
        href='http://news.xinhuanet.com/english/2017-03/30/c_136171360.htm' target='_blank'>S.Korean
        court ends longest-ever hearing on warrant to arrest ex-president Park</a>]]></title>
        \   <link>http://news.xinhuanet.com/english/2017-03/30/c_136171360.htm</link><description><![CDATA[A
        South Korean court on Thursday ended the longest-ever hearing here on a warrant
        to arrest former President Park Geun-hye, who was impeached earlier this month.]]></description><category>xinhuanet</category><author></author><pubDate>2017-03-30</pubDate></item><item><title><![CDATA[<a
        href='http://news.xinhuanet.com/english/2017-03/30/c_136171240.htm' target='_blank'>Federal
        judge in Hawaii extends order blocking Trump's travel ban</a>]]></title>    <link>http://news.xinhuanet.com/english/2017-03/30/c_136171240.htm</link><description><![CDATA[A
