        Americans. With his removal, ISIS\u2019s global operation is greatly diminished.
        Thank you to the Government of Nigeria for your partnership on this operation.
        GOD BLESS AMERICA! President DONALD J. TRUMP]]></title>\n                <link>https://trumpstruth.org/statuses/38466</link>\n
