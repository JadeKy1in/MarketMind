        one-week low as dollar, yields climb, Middle East tensions stoke inflation]]>
        </title><description><![CDATA[Gold prices have fallen to a one-week low. This
        decline is driven by rising U.S. Treasury yields and a stronger dollar. Inflation
        fears from the Middle East conflict are also pushing interest rate hike expectations.
        Other precious metals like silver, platinum, and palladium have also seen
        significant drops. Investors are reacting to these market shifts.]]> </description><link>https://economictimes.indiatimes.com/markets/commodities/news/gold-at-over-one-week-low-as-dollar-yields-climb-middle-east-tensions-stoke-inflation/articleshow/131131844.cms</link><enclosure
