        Hercules aircraft to bring food to blockaded Bolivian cities]]></title>\r\n
        \     <link><![CDATA[https://en.mercopress.com/2026/05/16/paz-thanks-milei-for-sending-hercules-aircraft-to-bring-food-to-blockaded-bolivian-cities?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/16/paz-thanks-milei-for-sending-hercules-aircraft-to-bring-food-to-blockaded-bolivian-cities?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110143/100x80/saludo.jpg\"
        alt=\"&#147;My deepest gratitude to President Milei for the invaluable support
        extended to Bolivia with the dispatch of the Hercules aircraft for humanitarian
        assistance tasks,&#148; Paz wrote\" width=\"100\" height=\"80\" style=\"float:left;margin:0
        12px 6px 0;border:1px solid #333\" />\r\n\t         Bolivian President Rodrigo
        Paz on Friday thanked his Argentine counterpart, Javier Milei, for sending
        two C-130 Hercules military aircraft to reinforce the airlift aimed at supplying
        food and basic goods to the cities of La Paz and El Alto, affected by ten
        consecutive days of road blockades by peasant unions from the highlands. The
        regional gesture comes during one of the most critical weeks of the centrist
        leader's six-month tenure, against a backdrop of shortages and growing political
        tension with sectors aligned with former president Evo Morales.</p>]]></description>\r\n
        \     <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110143/100x80/saludo.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Politics, Argentina,
        Latin America]]></category>\r\n      <pubDate>Sat, 16 May 2026 04:16:00 GMT</pubDate>\r\n
        \   </item>    \r\n    <item>\r\n      <title><![CDATA[Trump claims he will
        engineer a \"turnaround\" in Cuba and pull it away from China and Russia]]></title>\r\n
        \     <link><![CDATA[https://en.mercopress.com/2026/05/16/trump-claims-he-will-engineer-a-turnaround-in-cuba-and-pull-it-away-from-china-and-russia?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/16/trump-claims-he-will-engineer-a-turnaround-in-cuba-and-pull-it-away-from-china-and-russia?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110147/100x80/cubadj.jpg\"
        alt=\"&#147;I think we are going to turn it around,&#148; Trump replied when
        asked about the possibility of Cuba leaning toward the United States\" width=\"100\"
        height=\"80\" style=\"float:left;margin:0 12px 6px 0;border:1px solid #333\"
        />\r\n\t         US President Donald Trump on Friday said his administration
        will bring the Cuban government to align with Washington and pull away from
        the orbit of China and Russia, in his first public comments on the island
        since the unprecedented visit by CIA Director John Ratcliffe to Havana on
        Thursday. The remarks, delivered during an interview with journalist Bret
        Baier on Fox News, come in a week marked by contradictory US gestures toward
        the Cuban regime: the humanitarian offer of USD 100 million accepted by Havana,
        the judicial pressure on former president Ra\xFAl Castro, and the opening
        of a direct channel between US and Cuban intelligence services.</p>]]></description>\r\n
        \     <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110147/100x80/cubadj.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Politics, Latin
        America, United States]]></category>\r\n      <pubDate>Sat, 16 May 2026 03:45:00
        GMT</pubDate>\r\n    </item>    \r\n    <item>\r\n      <title><![CDATA[Venezuela
        and World Bank agree to define technical cooperation areas after seven-year
        pause]]></title>\r\n      <link><![CDATA[https://en.mercopress.com/2026/05/16/venezuela-and-world-bank-agree-to-define-technical-cooperation-areas-after-seven-year-pause?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/16/venezuela-and-world-bank-agree-to-define-technical-cooperation-areas-after-seven-year-pause?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110145/100x80/dlec.jpg\"
        alt=\"According to the official communiqu&eacute; released after the meeting,
        both sides &#147;agreed to continue working jointly to define the concrete
        areas of technical collaboration&#148;\" width=\"100\" height=\"80\" style=\"float:left;margin:0
        12px 6px 0;border:1px solid #333\" />\r\n\t         The Venezuelan government
        and the World Bank agreed on Friday in Caracas to work jointly on identifying
        concrete areas of technical cooperation, in the first high-level encounter
        between the two parties since the resumption of relations announced last month,
        which ended a seven-year pause in institutional contacts. The meeting was
        led by acting President Delcy Rodr\xEDguez, who received at the Miraflores
        Palace the World Bank's Vice President for Latin America and the Caribbean,
        Susana Cordeiro Guerra.</p>]]></description>\r\n      <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110145/100x80/dlec.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Politics, Venezuela]]></category>\r\n
        \     <pubDate>Sat, 16 May 2026 03:25:00 GMT</pubDate>\r\n    </item>    \r\n
        \   <item>\r\n      <title><![CDATA[Trump closes China visit without substantial
        agreements but with Xi's offer on Strait of Hormuz]]></title>\r\n      <link><![CDATA[https://en.mercopress.com/2026/05/16/trump-closes-china-visit-without-substantial-agreements-but-with-xi-s-offer-on-strait-of-hormuz?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/16/trump-closes-china-visit-without-substantial-agreements-but-with-xi-s-offer-on-strait-of-hormuz?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110141/100x80/dt.jpg\"
        alt=\"Xi described the visit as &#147;historic&#148; and &#147;emblematic&#148;
        and said the two leaders had set a new course based on a &#147;constructive
        relationship of strategic stability between China and the US&#148;\" width=\"100\"
        height=\"80\" style=\"float:left;margin:0 12px 6px 0;border:1px solid #333\"
        />\r\n\t         US President Donald Trump on Friday concluded his state visit
        to China of less than 48 hours without substantial announcements on the main
        points of the bilateral agenda, although he described the encounter as \"very
        successful\" and \"unforgettable\" and said he had reached \"fantastic\" trade
        deals whose details were not disclosed. The final day of the trip, held at
        Zhongnanhai, the residence of the Chinese Communist Party leadership, produced
        as its most visible outcome an offer by Chinese President Xi Jinping to help
        reopen the Strait of Hormuz, closed by Iran since the start of the war in
        late February.</p>]]></description>\r\n      <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110141/100x80/dt.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Politics, International,
        United States]]></category>\r\n      <pubDate>Sat, 16 May 2026 03:12:00 GMT</pubDate>\r\n
        \   </item>    \r\n    <item>\r\n      <title><![CDATA[Chilean former president
        defends \"people-centered\" multilateralism in Montevideo against authoritarian
        projects]]></title>\r\n      <link><![CDATA[https://en.mercopress.com/2026/05/15/chilean-former-president-defends-people-centered-multilateralism-in-montevideo-against-authoritarian-projects?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/15/chilean-former-president-defends-people-centered-multilateralism-in-montevideo-against-authoritarian-projects?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110139/100x80/orsi.jpg\"
        alt=\"Bachelet linked the regional democratic erosion to the &#147;profound
        disconnect between institutions and people&#148;\" width=\"100\" height=\"80\"
        style=\"float:left;margin:0 12px 6px 0;border:1px solid #333\" />\r\n\t         Former
        Chilean President Michelle Bachelet, currently a candidate for the United
        Nations Secretary General, defended on Thursday in Montevideo the need for
        \"a more representative, inclusive, and people-centered multilateralism\"
        in the face of advancing \"authoritarian projects\" in the international order,
        during the keynote of the seminar \"Geopolitics, Multilateralism, and Risks
        to Gender-Parity Democracy in the New International Order.\" The event, organized
        by IDEA Internacional, is taking place at Uruguay's Legislative Palace as
        part of the Latin American Women in Politics Meeting, which brings together
        regional political leaders until Friday.</p>]]></description>\r\n      <enclosure
        url=\"https://en.mercopress.com/data/cache/noticias/110139/100x80/orsi.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Politics, Uruguay,
        Chile]]></category>\r\n      <pubDate>Fri, 15 May 2026 13:27:00 GMT</pubDate>\r\n
        \   </item>    \r\n    <item>\r\n      <title><![CDATA[Washington considers
        prosecuting Ra\xFAl Castro over 1996 shootdown of civilian planes]]></title>\r\n
        \     <link><![CDATA[https://en.mercopress.com/2026/05/15/washington-considers-prosecuting-raul-castro-over-1996-shootdown-of-civilian-planes?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/15/washington-considers-prosecuting-raul-castro-over-1996-shootdown-of-civilian-planes?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110137/100x80/raul.jpg\"
        alt=\"The incident that would underpin the indictment took place on 24 February
        1996\" width=\"100\" height=\"80\" style=\"float:left;margin:0 12px 6px 0;border:1px
        solid #333\" />\r\n\t         The US government is weighing a federal indictment
        against former Cuban president Ra\xFAl Castro over the 1996 downing of two
        civilian aircraft operated by the humanitarian organization Brothers to the
        Rescue, the CBS network and the Reuters news agency reported on Thursday,
        citing official sources. The potential charges, which still require grand
        jury approval, emerge on a day marked by escalating tensions between Washington
        and Havana and by a confidential visit to the Cuban capital by CIA Director
        John Ratcliffe.</p>]]></description>\r\n      <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110137/100x80/raul.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Politics, Latin
        America, United States]]></category>\r\n      <pubDate>Fri, 15 May 2026 05:08:00
        GMT</pubDate>\r\n    </item>    \r\n    <item>\r\n      <title><![CDATA[Falklands,
        artists film on local talent and works]]></title>\r\n      <link><![CDATA[https://en.mercopress.com/2026/05/15/falklands-artists-film-on-local-talent-and-works?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/15/falklands-artists-film-on-local-talent-and-works?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110131/100x80/on.jpg\"
        alt=\"\" width=\"100\" height=\"80\" style=\"float:left;margin:0 12px 6px
        0;border:1px solid #333\" />\r\n\t         Watch our new short film exploring
        arts and culture in the Falkland Islands. Released alongside the latest exhibition
        by celebrated Ceramicist and Islander Graham Bound, the film features local
        artists sharing their work and speaking about how the Falklands insp them.</p>]]></description>\r\n
        \     <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110131/100x80/on.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Politics, Falkland
        Islands, Entertainment]]></category>\r\n      <pubDate>Fri, 15 May 2026 03:43:00
        GMT</pubDate>\r\n    </item>    \r\n    <item>\r\n      <title><![CDATA[Uruguay:
        Orsi's disapproval climbs to 48% as approval falls to 27% in his first year
        in office]]></title>\r\n      <link><![CDATA[https://en.mercopress.com/2026/05/15/uruguay-orsi-s-disapproval-climbs-to-48-as-approval-falls-to-27-in-his-first-year-in-office?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/15/uruguay-orsi-s-disapproval-climbs-to-48-as-approval-falls-to-27-in-his-first-year-in-office?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110135/100x80/921710.jpg\"
        alt=\"The net balance between disapproval and approval widened from -7 points
        in February to -21 points by the end of April, a gap more than double the
        one recorded at the start of the year\" width=\"100\" height=\"80\" style=\"float:left;margin:0
        12px 6px 0;border:1px solid #333\" />\r\n\t         Uruguayan President Yamand\xFA
        Orsi's administration recorded a significant deterioration in public approval
        as the government marked its first year in office, according to the latest
        survey by the polling firm Equipos released on Thursday on the Subrayado newscast.
        The president's disapproval rose to 48%, up from 40% in February, while approval
        fell from 33% to 27% over the same period. Intermediate assessments held roughly
        steady at around 23%, and 2% of respondents declined to answer.</p>]]></description>\r\n
        \     <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110135/100x80/921710.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Politics, Uruguay]]></category>\r\n
        \     <pubDate>Fri, 15 May 2026 03:05:00 GMT</pubDate>\r\n    </item>    \r\n
        \   <item>\r\n      <title><![CDATA[Cuba accepts USD 100 million in US humanitarian
        aid amid energy collapse]]></title>\r\n      <link><![CDATA[https://en.mercopress.com/2026/05/15/cuba-accepts-usd-100-million-in-us-humanitarian-aid-amid-energy-collapse?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/15/cuba-accepts-usd-100-million-in-us-humanitarian-aid-amid-energy-collapse?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110133/100x80/cuba.jpg\"
        alt=\"The US energy blockade has aggravated the structural crisis the island
        has been dragging since the capture of Nicol&aacute;s Maduro and the resulting
        interruption of the Venezuelan supply\" width=\"100\" height=\"80\" style=\"float:left;margin:0
        12px 6px 0;border:1px solid #333\" />\r\n\t         The Cuban government on
        Thursday accepted the United States' offer of USD 100 million in humanitarian
        aid for food, fuel, and medicines, in a significant political shift after
        weeks of public rejection and hours after authorities on the island acknowledged
        the complete exhaustion of their fuel reserves. The aid will be channeled
        through the Catholic Church, according to the official statement issued by
        President Miguel D\xEDaz-Canel, who only the day before had described the
        US offer as \"inconsequential and paradoxical.\"</p>]]></description>\r\n
        \     <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110133/100x80/cuba.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Energy & Oil, Politics,
        Latin America, United States]]></category>\r\n      <pubDate>Fri, 15 May 2026
        02:58:00 GMT</pubDate>\r\n    </item>    \r\n    <item>\r\n      <title><![CDATA[UK
        \u2018Zero Net\u2019 Miliband\u2019s policy questioned as a threat to British
        security, \u2018China dominates all the green technology\u2019]]></title>\r\n
        \     <link><![CDATA[https://en.mercopress.com/2026/05/14/uk-zero-net-miliband-s-policy-questioned-as-a-threat-to-british-security-china-dominates-all-the-green-technology?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></link>\r\n
        \     <guid><![CDATA[https://en.mercopress.com/2026/05/14/uk-zero-net-miliband-s-policy-questioned-as-a-threat-to-british-security-china-dominates-all-the-green-technology?utm_source=feed&utm_medium=rss&utm_content=main&utm_campaign=rss]]></guid>\r\n
        \     <description><![CDATA[<p>\r\n\t   \t      <img src=\"https://en.mercopress.com/data/cache/noticias/110130/100x80/ed-miliband.jpg\"
        alt=\"Ed Miliband has been accused of handing Beijing a &ldquo;kill switch&rdquo;
        over the UK economy after claiming that green energy will end reliance on
        Vladimir Putin&rsquo;s Russia&nbsp;\" width=\"100\" height=\"80\" style=\"float:left;margin:0
        12px 6px 0;border:1px solid #333\" />\r\n\t         The UK Secretary of State
        for Energy Security and Net Zero Ed Miliband has been accused of handing Beijing
        a \u201Ckill switch\u201D over the British economy, after claiming that green
        energy will end the UK's reliance on Vladimir Putin\u2019s Russia for its
        fuel needs.</p>]]></description>\r\n      <enclosure url=\"https://en.mercopress.com/data/cache/noticias/110130/100x80/ed-miliband.jpg\"
        length=\"0\" type=\"image/jpg\" />      <category><![CDATA[Energy & Oil, Environment,
        Politics, International]]></category>\r\n      <pubDate>Thu, 14 May 2026 16:52:00
        GMT</pubDate>\r\n    </item>    \r\n\r\n  </channel>\r\n</rss>\r\n"
