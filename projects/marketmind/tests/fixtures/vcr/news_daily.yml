        width=\"4095\"/>\n    </item>\n    <item>\n      <author>Lawrence Chung</author>\n
        \     <dc:creator>Lawrence Chung</dc:creator>\n      <description>Taiwan will
        send its top trade negotiator to next week\u2019s Asia-Pacific Economic Cooperation
        (Apec) ministerial meeting in mainland China \u2013 a rare occurrence since
        the two sides cut off official communication in 2016.\nAnalysts said the move
        suggested both sides were still trying to preserve a workable status quo within
        the regional forum despite worsening cross-strait tensions.\nThe Apec trade
        ministers\u2019 meeting will be held in Suzhou, a city in Jiangsu province,
        between May 22 and 23. Yang Jen-ni,...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/politics/article/3353762/how-taiwans-apec-attendance-could-test-beijings-cross-strait-pragmatism?utm_source=rss_feed</guid>\n
