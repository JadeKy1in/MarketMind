        \   <item>\n      <title>What is GKN Aerospace, the Company Whose California
        Plant Is at Risk of Exploding?</title>\n      <link>https://www.nytimes.com/2026/05/22/us/what-is-gkn-aerospace.html</link>\n
        \     <guid isPermaLink=\"true\">https://www.nytimes.com/2026/05/22/us/what-is-gkn-aerospace.html</guid>\n
        \     <atom:link href=\"https://www.nytimes.com/2026/05/22/us/what-is-gkn-aerospace.html\"
        rel=\"standout\"></atom:link>\n      <description>A chemical leak occurred
        at one of the company\u2019s manufacturing plants in California, raising concerns
        about an explosion.</description>\n      <dc:creator>Pooja Salhotra and Niraj
        Chokshi</dc:creator>\n      <pubDate>Sat, 23 May 2026 01:32:47 +0000</pubDate>\n
