        width=\"4095\"/>\n    </item>\n    <item>\n      <author>Chao Kong</author>\n
        \     <dc:creator>Chao Kong</dc:creator>\n      <description>Cryptic statements
        from two Chinese defence companies suggest that a long-distance shooting record
        may have been broken yet again.\nThe first hint came on April 28, when Chongqing
        Changjiang Electric Appliances Industries Group, one of China\u2019s biggest
        ammunition manufacturers, announced that an unspecified product had \u201Csuccessfully
        refreshed the world record for similar products\u201D during a \u201Cspecialised
        test\u201D.\nThe next day, Hunan Huanan OptoElectronic Group \u2013 a military
        optics supplier \u2013 said in a...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/science/article/3353726/have-chinese-defence-firms-broken-sniper-rifle-range-record-again?utm_source=rss_feed</guid>\n
