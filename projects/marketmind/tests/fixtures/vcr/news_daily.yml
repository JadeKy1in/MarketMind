        Island Rail Road workers walk on the picket line outside of Penn Station on
        the first day of their strike in New York on May 16.]]></media:description></media:content></item><item><title><![CDATA[Wall
        Street Week | Dalio's Warning, AI Arms Race, China Powers Ahead, NYC Tax Standoff
        ]]></title><description><![CDATA[This week, Ray Dalio explains why markets
        shrug off wars and why this time might be different. And, why are AI executives
        warning about the dangers of systems they are simultaneously racing to build?
        \ Plus, China\u2019s massive investments in energy infrastructure are increasingly
        shaping the global competition for artificial intelligence leadership and
        industrial power. Later, can New York remain attractive to businesses and
        young workers while raising taxes to close a growing budget shortfall? (Source:
        Bloomberg)]]></description><link>https://www.bloomberg.com/news/videos/2026-05-16/wall-street-week-dalio-s-warning-nyc-tax-standoff-video</link><guid
