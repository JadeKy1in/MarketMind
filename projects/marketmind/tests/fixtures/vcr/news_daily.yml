        Selloff Threatens to Knock AI Stock Frenzy Off Course]]></title><description><![CDATA[Investors
        are fervently chasing the hot rally in tech and AI stocks while widely acknowledging
        that rising yields threaten to knock equities off course.]]></description><link>https://www.bloomberg.com/news/articles/2026-05-16/bond-selloff-threatens-to-knock-ai-stock-frenzy-off-course</link><guid
