        Dalio, founder of Bridgewater Associates LP, during a Bloomberg Television
        interview during the World Economic Forum (WEF) in Davos, Switzerland, on
        Thursday, Jan. 22, 2026. The annual Davos gathering of political leaders,
        top executives and celebrities runs from Jan. 19-23. Photographer: Chris J.
        Ratcliffe/Bloomberg]]></media:description></media:content></item><item><title><![CDATA[Trump
        Calls China Trip \"Historic Moment\"]]></title><description><![CDATA[Tensions
        between the US and China have deepened since the last time a US president
        traveled to Beijing for a summit, in 2017. President Trump\u2019s return to
        China, in a swirl of dinners and festivities, generated positive optics for
        host and guest alike, but brought less apparent progress on some of the biggest
        bilateral sticking points, from tariffs and trade to US arms sales to Taiwan.
        Bloomberg News Chief North Asia Correspondent Stephen Engle and White House
        Correspondent Courtney Subramanian joined Christina Ruffini and David Gura
