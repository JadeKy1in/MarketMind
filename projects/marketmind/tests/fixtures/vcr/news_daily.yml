        16 May 2026 11:40:26 +0530</pubDate></item><item><title><![CDATA[Global bonds
        battered as flaring inflation spooks investors]]> </title><description><![CDATA[Global
        bond markets are experiencing significant interest rate hikes, driven by escalating
        energy prices from the Iran conflict and persistent inflation. This is impacting
        everything from homebuying to corporate borrowing, with benchmark U.S. Treasury
        yields reaching yearly highs. Investors are now anticipating further rate
        increases from central banks worldwide, a stark shift from earlier expectations
        of cuts.]]> </description><link>https://economictimes.indiatimes.com/markets/bonds/global-bonds-battered-as-flaring-inflation-spooks-investors/articleshow/131131944.cms</link><enclosure
