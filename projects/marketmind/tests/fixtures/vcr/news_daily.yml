        \ <channel>\n    <title>Oilprice.com</title>\n    <link>https://oilprice.com/rss/main</link>\n
        \   <description>The latest news and headlines</description>\n    <pubDate>Sat,
        16 May 2026 10:25:45 -0500</pubDate>\n    <atom:link href=\"https://oilprice.com/rss/main\"
        rel=\"self\" type=\"application/rss+xml\" />\n    <item>\n      <title>The
        Fertilizer Shock That Could Trigger a Global Food Crisis</title>\n      <link>https://oilprice.com/Energy/Energy-General/The-Fertilizer-Shock-That-Could-Trigger-a-Global-Food-Crisis.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44377</guid>\n      <description>Following
        the United States-Israeli attack on Iran and the ongoing war, trade has been
        severely disrupted between Asia and Europe. According to the International
        Energy Agency (IEA), the world is currently facing the worst oil disruption
        in history. The energy shortages felt over the last two and a half months
        have had a knock-on effect on other sectors, particularly on the fertiliser
        industry, leaving farmers around the globe without the inputs they need for
        their crops to grow, which could lead to severe food shortages in the months
        ahead.\_\u2026</description>\n      <pubDate>Sat, 16 May 2026 10:00:00 -0500</pubDate>\n
        \     <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Felicity
        Bradstock</dc:creator>\n    </item>\n    <item>\n      <title>China Spent
        More on Clean Energy Than the Rest of the World Combined</title>\n      <link>https://oilprice.com/Energy/Energy-General/China-Spent-More-on-Clean-Energy-Than-the-Rest-of-the-World-Combined.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44382</guid>\n      <description>China
        has been outspending the rest of the world on clean energy for years now,
        and new data shows that the investment is paying off in spades. Beijing\u2019s
        lead in the global clean energy race is wider than ever, according to new
        figures from the research firm Atlas Public Policy. While gains in clean energy
        by the world\u2019s biggest greenhouse gas emitter are good news for the entire
        planet, the increasing concentration of global clean energy supply chains
        in the hands of just one nation \u2013 and an authoritarian nation at that
        \u2013\u2026</description>\n      <pubDate>Fri, 15 May 2026 17:00:00 -0500</pubDate>\n
        \     <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Haley
        Zaremba</dc:creator>\n    </item>\n    <item>\n      <title>Canada Clears
        Path for West Coast Oil Pipeline Build</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/Canada-Clears-Path-for-West-Coast-Oil-Pipeline-Build.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44385</guid>\n      <description>The
        Canadian government and Alberta have reached a carbon pricing deal that could
        finally move a long-discussed West Coast oil pipeline from perpetual Canadian
        debate into actual construction, with a start date now penciled in as early
        as September 2027. For Canada, this is meaningful progress. Prime Minister
        Mark Carney and Alberta Premier Danielle Smith announced the agreement Friday,
        building on a November memorandum that laid out conditions for federal support
        of a crude pipeline capable of moving roughly 1 million barrels per day to
        the Pacific\u2026</description>\n      <pubDate>Fri, 15 May 2026 13:30:00
        -0500</pubDate>\n      <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n
        \     <dc:creator>Julianne Geiger</dc:creator>\n    </item>\n    <item>\n
        \     <title>Goldman Adds SMRs to Nuclear Model, Sees 17% Upside in Uranium
        Demand</title>\n      <link>https://oilprice.com/Alternative-Energy/Nuclear-Power/Goldman-Adds-SMRs-to-Nuclear-Model-Sees-17-Upside-in-Uranium-Demand.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44381</guid>\n      <description>Goldman\u2019s
        latest edition of Nuclear Nuggets: Global Reactor Tracker reinforces that
        the buildout of the cleanest and most reliable form of so-called \u201Cgreen\u201D
        energy, nuclear power, continues to gain momentum. The theme we first laid
        out in December 2020 continues to broaden, with buildouts accelerating across
        both large-scale and small modular reactors, even as the growing risk of a
        massive uranium supply deficit emerges. Focusing on the latest North American
        reactor progress and announcements: 4/16/2026 \u2013 Canada \u2013\u2026</description>\n
        \     <pubDate>Fri, 15 May 2026 13:00:00 -0500</pubDate>\n      <lastmod>Sat,
        16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>OilPrice.com</dc:creator>\n
        \   </item>\n    <item>\n      <title>Trump Administration Pledges SPR Refill
        With Bonus Oil Barrels</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/Trump-Administration-Pledges-SPR-Refill-With-Bonus-Oil-Barrels.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44384</guid>\n      <description>The
        Trump administration will put back into the Strategic Petroleum Reserve whatever
        oil it takes out\u2014and then some\u2014during the current emergency drawdown
        period, Energy Secretary Chris Wright said at an event on Friday. The plan,
        according to Wright, is to add 1.2 barrels to the SPR for every barrel it
        takes now. \u201CWe\u2019ll leave it fuller than when we started,\u201D he
        said, stopping short of detailing the plan for how that would work. The SPR
        currently sits around 384 million barrels, according to the latest EIA data,
        after\u2026</description>\n      <pubDate>Fri, 15 May 2026 12:30:00 -0500</pubDate>\n
        \     <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Julianne
        Geiger</dc:creator>\n    </item>\n    <item>\n      <title>US Oil Rig Count
        Jumps amid Rising Crude Prices</title>\n      <link>https://oilprice.com/Energy/Crude-Oil/US-Oil-Rig-Count-Jumps-amid-Rising-Crude-Prices.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44385</guid>\n      <description>The
        total number of active drilling rigs for oil and gas in the United States
        rose this week, according to new data that Baker Hughes published on Friday,
        bringing the total rig count in the US to 551, \_down 25 from this same time
        last year. The number of active oil rigs rose by 5 to 415 during the latest
        reporting period, according to the data. This is 50 below this same time last
        year. The number of gas rigs fell by 1. Gas rigs now sit at 128, which is
        20 more than this time last year. The miscellaneous rig count fell by 1, to
        8. The latest\u2026</description>\n      <pubDate>Fri, 15 May 2026 12:10:00
        -0500</pubDate>\n      <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n
        \     <dc:creator>Julianne Geiger</dc:creator>\n    </item>\n    <item>\n
        \     <title>Vaca Muerta Emerges as Top Alternative to Middle East Oil Supply
        Risk</title>\n      <link>https://oilprice.com/Energy/Energy-General/Vaca-Muerta-Emerges-as-Top-Alternative-to-Middle-East-Oil-Supply-Risk.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44375</guid>\n      <description>As
        the Middle East conflict exposes the fragility of global supply chains built
        around the Strait of Hormuz, energy companies and importing nations alike
        are reassessing where the next generation of reliable barrels will come from.
        The Vaca Muerta Shale sits at the top of that shortlist, with Argentina throwing
        open 15 new exploration blocks in the play to international and domestic energy
        companies \u2014 the largest bid round since 2016 and more than double the
        six blocks offered in the previous provincial auction. Vaca Muerta is the
        largest\u2026</description>\n      <pubDate>Fri, 15 May 2026 11:00:00 -0500</pubDate>\n
        \     <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>OilPrice.com</dc:creator>\n
        \   </item>\n    <item>\n      <title>Xi-Trump Summit Disappoints as Oil Bulls
        Regain Momentum</title>\n      <link>https://oilprice.com/Energy/Energy-General/Xi-Trump-Summit-Disappoints-as-Oil-Bulls-Regain-Momentum.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44384</guid>\n      <description>Oil
        prices surged $7 this week as Iran tensions, Hormuz risks, and weak signals
        from the Xi-Trump summit overshadow bearish OPEC and IEA demand forecasts.
        Friday, May 15, 2026 In a week that started off with both OPEC and the IEA
        slashing their demand forecasts for 2026, oil prices are set for a hefty $7
        per barrel week-on-week gain. The much-anticipated Xi-Trump summit in Beijing
        provided little hope for any short-term market normalization, turning out
        to be quite thin on commodity-relevant substance. Iran has added fuel to the
        oil market\u2019s\u2026</description>\n      <pubDate>Fri, 15 May 2026 10:41:37
        -0500</pubDate>\n      <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n
        \     <dc:creator>Tom Kool</dc:creator>\n    </item>\n    <item>\n      <title>Pakistan
        Uses Diplomacy to Secure LNG Supply from Hormuz</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/Pakistan-Uses-Diplomacy-to-Secure-LNG-Supply-from-Hormuz.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44382</guid>\n      <description>Pakistan
        has negotiated the passage of vessels laden with Qatari LNG out of the Strait
        of Hormuz in a diplomatic feat that no other energy buyer has managed so far
        in the Iran war. Pakistan, which was the mediator of the U.S.-Iran talks and
        is passing messages from one to the other, appears to have used well its close
        ties with both Qatar and Iran to negotiate the successful imports of two tankers
        with Qatari LNG. Pakistan has relied on Qatar&#039;s term LNG supply for years,
        but the war in the Middle East has led to the shutdown of Qatari LNG production\u2026</description>\n
        \     <pubDate>Fri, 15 May 2026 10:30:00 -0500</pubDate>\n      <lastmod>Sat,
        16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Charles Kennedy</dc:creator>\n
        \   </item>\n    <item>\n      <title>BP Weighs Egyptian Gas Asset Sale in
        Restructuring Drive</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/BP-Weighs-Egyptian-Gas-Asset-Sale-in-Restructuring-Drive.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44381</guid>\n      <description>Amid
        a new company restructuring, BP is weighing a potential sale of some of its
        natural gas assets in Egypt, Reuters reported on Friday, citing multiple sources
        familiar with the plans. The UK oil and gas supermajor has not taken any final
        decision on a potential sale, while a spokesperson for BP told Reuters the
        group doesn\u2019t comment on market speculation. BP has been operating in
        Egypt for more than 60 years, investing over $35 billion in the North African
        country during these six decades. BP and the partnerships it has with other
        companies\u2026</description>\n      <pubDate>Fri, 15 May 2026 09:30:00 -0500</pubDate>\n
        \     <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Michael
        Kern</dc:creator>\n    </item>\n    <item>\n      <title>UK Moves to Ban New
        North Sea Oil and Gas Licences Permanently</title>\n      <link>https://oilprice.com/Energy/Energy-General/UK-Moves-to-Ban-New-North-Sea-Oil-and-Gas-Licences-Permanently.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44374</guid>\n      <description>The
        government will make it illegal to grant new oil and gas licences in the North
        Sea, the King said at the state opening of Parliament, in a sign ministers
        are refusing to buckle in the face of a barrage of criticism that the policy
        is depriving the UK of billions of pounds in tax receipts without helping
        the environment. As part of an Energy Independence Bill announced in the King\u2019s
        Speech, the government will bake into law its pre-election pledge not to explore
        new oil and gas fields in a bid to \u201Ctake control of our energy security\u201D.\u2026</description>\n
        \     <pubDate>Fri, 15 May 2026 09:00:00 -0500</pubDate>\n      <lastmod>Sat,
        16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>OilPrice.com</dc:creator>\n
        \   </item>\n    <item>\n      <title>India&#039;s Trade Deficit Jumps as
        Energy Import Prices Soar</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/Indias-Trade-Deficit-Jumps-as-Energy-Import-Prices-Soar.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44377</guid>\n      <description>India&#039;s
        trade deficit widened in April by more than analysts had expected as the surge
        in oil and gas prices hiked the Indian energy import bill. Trade deficit jumped
        to $28.38 billion last month, according to data from the Ministry of Commerce
        and Industry published on Friday. The trade gap in April widened by $8 billion
        compared to the $20.6 billion deficit in March, and was higher than economists
        had expected at about $26 billion. India&#039;s total exports grew by 13.8%
        in April from a year earlier to hit $43.56 billion, the data showed. However,\u2026</description>\n
        \     <pubDate>Fri, 15 May 2026 08:30:00 -0500</pubDate>\n      <lastmod>Sat,
        16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Charles Kennedy</dc:creator>\n
        \   </item>\n    <item>\n      <title>India Signs LPG and Strategic Oil Reserves
        Deal with UAE</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/India-Signs-LPG-and-Strategic-Oil-Reserves-Deal-with-UAE.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44375</guid>\n      <description>India
        on Friday signed a strategic agreement with the United Arab Emirates to receive
        liquefied petroleum gas from the UAE, as well as a Memorandum of Understanding
        (MoU) on strategic petroleum reserves. India, which uses LPG as its the main
        cooking fuel and has felt shortages since the Iran war choked supplies at
        the Strait of Hormuz, seeks to boost its supply agreements. Indian Prime Minister
        Narendra Modi signed the LPG supply deal and the strategic reserves pact during
        a quick two-hour visit to the UAE today, as India scrambles to ease energy\u2026</description>\n
        \     <pubDate>Fri, 15 May 2026 07:30:00 -0500</pubDate>\n      <lastmod>Sat,
        16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Tsvetana Paraskova</dc:creator>\n
        \   </item>\n    <item>\n      <title>Oil Prices Surge as Hormuz Shutdown
        Keeps Supply Fears Alive</title>\n      <link>https://oilprice.com/Energy/Energy-General/Oil-Prices-Surge-as-Hormuz-Shutdown-Keeps-Supply-Fears-Alive.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44373</guid>\n      <description>Crude
        oil prices rallied hard this week as traders focused on the growing supply
        threat tied to the U.S.-Iran conflict. July WTI crude oil futures settled
        Thursday at $97.91, gaining $6.79, or 7.45%, for the week. Prices traded in
        a wide range between $92.84 and $99.09 as the market reacted to war headlines,
        tighter inventories, and inflation concerns. The biggest driver remained the
        shutdown of the Strait of Hormuz, a key shipping route for global crude exports.
        Crude Oil News Today: Strait of Hormuz Shutdown Keeps Supply Fears Elevated
        The war\u2026</description>\n      <pubDate>Fri, 15 May 2026 06:30:00 -0500</pubDate>\n
        \     <lastmod>Sat, 16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Editorial
        Dept</dc:creator>\n    </item>\n    <item>\n      <title>Netanyahu\u2019s
        Coalition Fractures as Israel Edges Toward Early Elections</title>\n      <link>https://oilprice.com/Energy/Energy-General/Netanyahus-Coalition-Fractures-as-Israel-Edges-Toward-Early-Elections.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44372</guid>\n      <description>Politics,
        Geopolitics &amp; Conflict Thursday was the first day of the Trump-Xi summit,
        which most of the world is awaiting with bated breath as some indication of
        a Chinese-supported end to the U.S.-Iran conflict and a reopening of Hormuz.
        It will not be that simple, of course, and as we mentioned last week, Iran
        is not China\u2019s priority. It\u2019s all going to come down to Taiwan and
        Trump\u2019s response to that. Beijing made that very clear ahead of the talks
        after condemning the Trump administration\u2019s $11B arms package for Taiwan.\u2026</description>\n
        \     <pubDate>Fri, 15 May 2026 06:30:00 -0500</pubDate>\n      <lastmod>Sat,
        16 May 2026 10:25:45 -0500</lastmod>\n      <dc:creator>Editorial Dept</dc:creator>\n
        \   </item>\n  </channel>\n</rss>\n"
