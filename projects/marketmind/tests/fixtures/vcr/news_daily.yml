        \                           </item>\n                    <item>\n                <title><![CDATA[If
        you\u2019d like to see the construction of the Reflecting Pool located between
        the Washington Monument and the Lincoln Memorial, and look at the beginning
        of what will be the final sparkling blue surface, go check it out, now! Obama
        and Biden, they say, spent over 100 Million Dollars, with years under construction,
        and it never worked \u2014 It leaked like a sieve, looked terrible, was closed
        most of the time, and was a complete disaster. They ultimately gave up on
        the project, declaring that it was impossible to fix! Then along came \u201CTRUMP!\u201D
        Doug Burgum and his team, at the Department of Interior, are doing an excellent
        job on a very complex, but solvable, problem. When it is complete, there will
        be no leakage, which there was since its 1922 construction, and it will SPARKLE
        magnificently as the water is put in, and begins to rise. A very tricky and
        difficult construction job will yield a beautiful result! President DONALD
        J. TRUMP]]></title>\n                <link>https://trumpstruth.org/statuses/38434</link>\n
        \               <description><![CDATA[<p>If you\u2019d like to see the construction
        of the Reflecting Pool located between the Washington Monument and the Lincoln
        Memorial, and look at the beginning of what will be the final sparkling blue
        surface, go check it out, now! Obama and Biden, they say, spent over 100 Million
        Dollars, with years under construction, and it never worked \u2014 It leaked
        like a sieve, looked terrible, was closed most of the time, and was a complete
        disaster. They ultimately gave up on the project, declaring that it was impossible
        to fix! Then along came \u201CTRUMP!\u201D Doug Burgum and his team, at the
