        16 May 2026 10:33:26 +0530</pubDate></item><item><title><![CDATA[Oil prices
        climb more than 3% on fears of new US-Iran combat]]> </title><description><![CDATA[Oil
        prices surged over 3% as U.S. President Trump and Iran's foreign minister
        exchanged confrontational remarks, diminishing hopes for a deal to end ship
