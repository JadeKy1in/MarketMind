        \     <enclosure length=\"1040\" type=\"image/jpeg\" url=\"https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/05/15/1ba990d5-c4d6-47e9-8949-f52e1ae8b62c_2093ac7c.jpg?itok=UO7b83a1&amp;v=1778839955\"/>\n
