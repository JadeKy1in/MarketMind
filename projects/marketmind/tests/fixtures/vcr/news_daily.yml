        \     <media:content height=\"2649\" medium=\"image\" type=\"image/jpeg\"
        url=\"https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/05/14/c5f36d81-2660-4430-bdaa-87930d38ad0d_0c9da373.jpg?itok=gFuQlNSt&amp;v=1778746768\"
        width=\"3840\"/>\n    </item>\n    <item>\n      <author>Ling Xin</author>\n
        \     <dc:creator>Ling Xin</dc:creator>\n      <description>A stray Falcon
        9 rocket part is on course to slam into the moon in August.\nThe expected
        impact poses no immediate danger, experts say, but warn that it highlights
        a critical lack of rules for managing debris as lunar activity by the US,
        China and private companies ramps up.\nMeasuring 13.8 metres (45 feet) long
        and 3.7 metres wide, the SpaceX Falcon 9 rocket\u2019s upper stage has been
        drifting through Earth-moon space since it launched a US commercial lander
        and a Japanese lander in January last...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/science/article/3353555/looming-us-rocket-debris-crash-unlikely-hit-chinese-moon-landers-experts?utm_source=rss_feed</guid>\n
        \     <link>https://www.scmp.com/news/china/science/article/3353555/looming-us-rocket-debris-crash-unlikely-hit-chinese-moon-landers-experts?utm_source=rss_feed</link>\n
        \     <pubDate>Thu, 14 May 2026 09:00:06 +0000</pubDate>\n      <title>Looming
        US rocket debris crash unlikely to hit Chinese moon landers: experts</title>\n
        \     <enclosure length=\"4095\" type=\"image/jpeg\" url=\"https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/05/14/6e56d0a0-714d-4e54-92a3-5eea0ef77c17_df33e8c2.jpg?itok=CQcqHxxR&amp;v=1778748793\"/>\n
        \     <media:content height=\"3134\" medium=\"image\" type=\"image/jpeg\"
        url=\"https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/05/14/6e56d0a0-714d-4e54-92a3-5eea0ef77c17_df33e8c2.jpg?itok=CQcqHxxR&amp;v=1778748793\"
        width=\"4095\"/>\n    </item>\n    <item>\n      <author>Fan Chen</author>\n
        \     <dc:creator>Fan Chen</dc:creator>\n      <description>US President Donald
        Trump\u2019s second son Eric, who oversees the family business empire, met
        the top Chinese leader as he accompanied his father on a state visit to Beijing.\nEric
        and his wife Lara posed for photos with Chinese President Xi Jinping before
        they attended a state banquet on Thursday evening. The younger Trump and the
        Chinese leader were also seen chatting during a visit to the Temple of Heaven
        in the afternoon.\nThe executive vice-president of his father\u2019s businesses,
        Eric oversees...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/diplomacy/article/3353541/eric-and-lara-trump-new-us-first-family-faces-making-trip-china?utm_source=rss_feed</guid>\n
        \     <link>https://www.scmp.com/news/china/diplomacy/article/3353541/eric-and-lara-trump-new-us-first-family-faces-making-trip-china?utm_source=rss_feed</link>\n
        \     <pubDate>Thu, 14 May 2026 08:01:10 +0000</pubDate>\n      <title>Eric
        and Lara Trump \u2013 the new US first family faces making the trip to China</title>\n
        \     <enclosure length=\"4095\" type=\"image/jpeg\" url=\"https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/05/14/14984f98-98cc-44c9-8a61-98f9cd7e4bfb_507d46f8.jpg?itok=iBE3uYPr&amp;v=1778745669\"/>\n
        \     <media:content height=\"2841\" medium=\"image\" type=\"image/jpeg\"
        url=\"https://cdn.i-scmp.com/sites/default/files/styles/1280x720/public/d8/images/canvas/2026/05/14/14984f98-98cc-44c9-8a61-98f9cd7e4bfb_507d46f8.jpg?itok=iBE3uYPr&amp;v=1778745669\"
        width=\"4095\"/>\n    </item>\n    <item>\n      <author>Dewey Sim</author>\n
        \     <dc:creator>Dewey Sim</dc:creator>\n      <description>The US-China
        summit is \u201Cextremely important\u201D to arrest the downward spiral of
        relations between the two countries, according to Li Cheng, a leading Chinese
        academic.\nBut a summit would not be enough to change the overall structure
        of ties, which had been fraught for years, Li said on Thursday as US President
        Donald Trump began the first full day of his state visit to Beijing \u2013
        the first by an American leader since 2017.\nThe two presidents began the
        day with two hours of talks at the Great Hall...</description>\n      <guid
        isPermaLink=\"true\">https://www.scmp.com/news/china/diplomacy/article/3353515/china-us-summit-remarkable-it-enough-change-relations?utm_source=rss_feed</guid>\n
        \     <link>https://www.scmp.com/news/china/diplomacy/article/3353515/china-us-summit-remarkable-it-enough-change-relations?utm_source=rss_feed</link>\n
        \     <pubDate>Thu, 14 May 2026 05:59:23 +0000</pubDate>\n      <title>China-US
        summit \u2018remarkable\u2019 but is it enough to change relations?</title>\n
