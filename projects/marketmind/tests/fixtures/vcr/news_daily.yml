        width=\"4095\"/>\n    </item>\n    <item>\n      <author>Chow Chung-yan</author>\n
        \     <dc:creator>Chow Chung-yan</dc:creator>\n      <description>It is hard
        not to be impressed by the sheer energy Donald Trump displayed during his
        whirlwind visit to Beijing.\nWithin just 43 hours, the 79-year-old president
        held two meetings with Chinese President Xi Jinping, inspected troops, attended
        a state banquet and walked around the Temple of Heaven in sweltering heat
        \u2013 not to mention making his characteristic social media postings in the
        wee hours of the morning.\nShowing no signs of jet lag, Trump seemed to be
        in high spirits, glad-handing everyone...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/diplomacy/article/3353808/how-trumps-china-visit-may-hint-2-eyes-world-are-learning-live-together?utm_source=rss_feed</guid>\n
