        \ <description>As ships reroute around Africa to avoid Middle East conflict
        zones, piracy off Somalia is back. The resurgence is driving up insurance,
        transit times and security costs, putting new pressure on global supply chains.</description>\n
        \ <dc:date>2026-05-11T09:19:00Z</dc:date>\n  <dc:subject>Business</dc:subject>\n
