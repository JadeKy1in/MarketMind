        conflicts amid stalled US-Iran peace talks and China\u2019s appeal for more
        countries to join its new mediation body.\nAccording to Cui Jianchun, commissioner
        of China\u2019s Ministry of Foreign Affairs in Hong Kong, mediation ensures
        \u201Cto the greatest extent\u201D the autonomy of disputing parties and its
        \u201Cunique charm\u201D is the high respect given to the will of the parties.\nCui
        made the remarks at a summit in Hong...</description>\n      <guid isPermaLink=\"true\">https://www.scmp.com/news/china/diplomacy/article/3353806/chinas-new-mediation-body-gaining-steam-western-brokers-influence-wanes?utm_source=rss_feed</guid>\n
