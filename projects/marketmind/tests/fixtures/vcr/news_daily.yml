        order blocking the implementation of President Donald Trump's revised travel
        ban while the lawsuit continues.]]></description><category>xinhuanet</category><author></author><pubDate>2017-03-30</pubDate></item><item><title><![CDATA[<a
        href='http://news.xinhuanet.com/english/2017-03/30/c_136171059.htm' target='_blank'>DPRK
        slams U.S. for orchestrating efforts to tighten financial sanctions against
        \nPyongyang</a>]]></title>    <link>http://news.xinhuanet.com/english/2017-03/30/c_136171059.htm</link><description><![CDATA[The
        Democratic People's Republic of Korea (DPRK) has slammed the United States
        for orchestrating efforts to tighten financial sanctions against Pyongyang.]]></description><category>xinhuanet</category><author></author><pubDate>2017-03-30</pubDate></item><item><title><![CDATA[<a
        href='http://news.xinhuanet.com/english/2017-03/30/c_136171628.htm' target='_blank'>Kiev
        says ready for new truce with rebels in eastern Ukraine</a>]]></title>    <link>http://news.xinhuanet.com/english/2017-03/30/c_136171628.htm</link><description><![CDATA[The
        Ukrainian Defense Ministry said on Thursday it stands ready for a new truce
