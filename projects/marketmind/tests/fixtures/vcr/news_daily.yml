        move targets foreign reserves and the rupee's value. However, India's strong
        cultural demand for gold may limit effectiveness. Higher duties could also
        boost illegal gold imports. Investors should consider gold as a long-term
        hedge.]]> </description><link>https://economictimes.indiatimes.com/markets/commodities/news/indias-gold-import-duty-hike-a-double-edged-sword/articleshow/131133111.cms</link><enclosure
