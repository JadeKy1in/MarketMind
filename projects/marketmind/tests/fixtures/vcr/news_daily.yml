        width=\"4000\"/>\n    </item>\n    <item>\n      <author>Alyssa Chen</author>\n
        \     <dc:creator>Alyssa Chen</dc:creator>\n      <description>Both the United
        States and China appear keen to present this week\u2019s talks between their
        respective presidents in Beijing as a \u201Chistoric\u201D and groundbreaking
        occasion.\nThe way they have tried to frame the interactions between Donald
        Trump and Xi Jinping revealed both sides\u2019 eagerness to emphasise the
        importance of the occasion.\nThe messaging began with one of the choices of
        venue for their talks: the secluded leadership compound in Zhongnanhai in
        the heart of Beijing, rather than the Diaoyutai...</description>\n      <guid
        isPermaLink=\"true\">https://www.scmp.com/news/china/diplomacy/article/3353827/how-china-and-us-felt-weight-history-behind-trump-and-xis-meeting-beijing?utm_source=rss_feed</guid>\n
