        width=\"731\"/>\n    </item>\n    <item>\n      <author>Shi Jiangtao,Laura
        Zhou</author>\n      <dc:creator>Shi Jiangtao,Laura Zhou</dc:creator>\n      <description>Russian
        President Vladimir Putin will travel to the Chinese capital next week to reinforce
        the Sino-Russian \u201Ccomprehensive strategic partnership\u201D, just days
        after a tentative US-China reset.\nBeijing and Moscow announced on Saturday
        that Putin would visit from May 19 to 20, confirming an earlier report by
        the South China Morning Post.\n\u201CAt the invitation of President Xi Jinping,
        Russian President Vladimir Putin will pay a state visit to China from May
        19 to 20,\u201D state news agency Xinhua reported,...</description>\n      <guid
        isPermaLink=\"true\">https://www.scmp.com/news/china/diplomacy/article/3353816/after-china-us-reset-putin-heads-beijing-sino-russian-strategic-refresh?utm_source=rss_feed</guid>\n
