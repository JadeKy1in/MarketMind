        \     <guid isPermaLink=\"true\">https://www.nytimes.com/2026/05/19/business/google-seach-bar-ai-gemini.html</guid>\n
        \     <atom:link href=\"https://www.nytimes.com/2026/05/19/business/google-seach-bar-ai-gemini.html\"
        rel=\"standout\"></atom:link>\n      <description>Using a new Gemini A.I.
        model, the tech giant is overhauling its search box dimensions to answer longer
        queries, adding a video-generation tool and simplifying online shopping.</description>\n
        \     <dc:creator>Tripp Mickle, Kate Conger and Brian X. Chen</dc:creator>\n
        \     <pubDate>Tue, 19 May 2026 18:34:36 +0000</pubDate>\n      <category
        domain=\"http://www.nytimes.com/namespaces/keywords/nyt_org\">Google Inc</category>\n
