        SK Hynix Inc. 12-layer HBM3E memory chip, center, on a LPDDR5X CAMM2 memory
        module arranged at the company's office in Seongnam, South Korea, on Tuesday,
        April 22, 2025. SK Hynix is scheduled to release earnings on April 24.]]></media:description></media:content></item><item><title><![CDATA[Tech
        Chiefs Accompany Trump on China Trip]]></title><description><![CDATA[President
        Trump arrived in Beijing for a high-stakes summit with Xi Jinping aimed at
        stabilizing US-China ties against the backdrop of the Iran war and the race
        to control and contain AI. Tech CEOs including Jensen Huang and Elon Musk
        tagged along, sending Nvidia, Tesla and Chinese AI-related stocks higher.
        And while the US president may want to focus on trade, Beijing\u2019s role
        in the Middle East and Taiwan arms sales, Xi has a stronger hand than he did
        at their first summit. Co-Host of Bloomberg Tech Caroline Hyde joined Christina
        Ruffini on Bloomberg This Weekend to discuss. (Source: Bloomberg)]]></description><link>https://www.bloomberg.com/news/videos/2026-05-16/tech-chiefs-accompany-trump-on-china-trip-video</link><guid
