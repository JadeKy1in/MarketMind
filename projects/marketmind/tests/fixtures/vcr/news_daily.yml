    body:
      string: "<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<rss version=\"2.0\"\n\txmlns:atom=\"http://www.w3.org/2005/Atom\"\n\txmlns:dc=\"http://purl.org/dc/elements/1.1/\"\n\t\t\t>\n
        \ <channel>\n    <title>Oilprice.com</title>\n    <link>https://oilprice.com/rss/main</link>\n
        \   <description>The latest news and headlines</description>\n    <pubDate>Fri,
        22 May 2026 21:12:16 -0500</pubDate>\n    <atom:link href=\"https://oilprice.com/rss/main\"
        rel=\"self\" type=\"application/rss+xml\" />\n    <item>\n      <title>Colombia&#039;s
        Natural Gas Crisis Deepens as Strait of Hormuz Closure Cuts Supply</title>\n
        \     <link>https://oilprice.com/Energy/Energy-General/Colombias-Natural-Gas-Crisis-Deepens-as-Strait-of-Hormuz-Closure-Cuts-Supply.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44447</guid>\n      <description>Strife-torn
        Colombia is facing a severe energy crisis at a critical juncture. Global supply
        of natural gas is heavily constrained due to the closure of the Strait of
        Hormuz after U.S. strikes on Iran. This could not come at a worse time for
        Colombia, with the Andean country experiencing a massive surge in demand for
        natural gas at a time when domestic production is declining. The rapidly growing
        supply shortfall was filled by costly liquefied natural gas (LNG) imports,
        the future of which now appears uncertain. These events are weighing heavily\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 17:00:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>Matthew Smith</dc:creator>\n
        \   </item>\n    <item>\n      <title>Asia\u2019s Next Energy Hub May Rise
        in Malaysia</title>\n      <link>https://oilprice.com/Energy/Energy-General/Asias-Next-Energy-Hub-May-Rise-in-Malaysia.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44449</guid>\n      <description>Global
        energy market assumptions are breaking down. Until the Iran War, global oil
        and gas markets were built on a dangerous illusion: that the Strait of Hormuz
        would always remain open, predictable, and commercially dependable. Asia\u2019s
        entire energy security architecture, from LNG flows to crude imports and refined
        product trading, was designed around that assumption. Today, that assumption
        is collapsing in real time. The combined pressure of Iranian threats in the
        Strait of Hormuz, persistent insecurity in the Red Sea, fragmentation within\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 16:00:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>Cyril Widdershoven</dc:creator>\n
        \   </item>\n    <item>\n      <title>3D-Printed Copper Plates Could Cut Data
        Center Cooling Energy Use by 97%</title>\n      <link>https://oilprice.com/Energy/Energy-General/3D-Printed-Copper-Plates-Could-Cut-Data-Center-Cooling-Energy-Use-by-97.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44444</guid>\n      <description>The
        artificial intelligence boom is creating an energy monster that the world
        is unprepared and unequipped to deal with. Providing enough energy to fuel
        the AI ambitions of the future as well as to support human demand and development
        will require advances in energy technologies that are as-yet undiscovered.
        \u201CThere\u2019s no way to get there without a breakthrough,\u201D Sam Altman,
        co-founder and CEO of ChatGPT firm OpenAI, said at the 2024 World Economic
        Forum in Davos, Switzerland. More accurately, it will probably require several
        breakthroughs.\u2026</description>\n      <pubDate>Fri, 22 May 2026 15:00:00
        -0500</pubDate>\n      <lastmod>Fri, 22 May 2026 21:12:16 -0500</lastmod>\n
        \     <dc:creator>Haley Zaremba</dc:creator>\n    </item>\n    <item>\n      <title>Oil
        Prices Rise as Iran Tempers U.S. Deal Hopes</title>\n      <link>https://oilprice.com/Energy/Crude-Oil/Oil-Prices-Rise-as-Iran-Tempers-US-Deal-Hopes.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44450</guid>\n      <description>Oil
        prices turned to a gain Friday after Iran poured cold water on growing market
        hopes for a near-term agreement with the United States, reminding traders
        yet again that optimism around diplomacy and reality on the ground are not
        always moving in the same direction. Brent crude rose 0.78%, while U.S. benchmark
        WTI climbed 0.20% to $96.54. The move reversed part of Thursday\u2019s selloff,
        which briefly pushed both benchmarks to their lowest levels in nearly two
        weeks after comments from U.S. officials suggested progress in negotiations.
        That\u2026</description>\n      <pubDate>Fri, 22 May 2026 13:31:00 -0500</pubDate>\n
        \     <lastmod>Fri, 22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>Julianne
        Geiger</dc:creator>\n    </item>\n    <item>\n      <title>AI Could Unlock
        $500 Billion for Oil and Gas Producers by 2030</title>\n      <link>https://oilprice.com/Energy/Energy-General/AI-Could-Unlock-500-Billion-for-Oil-and-Gas-Producers-by-2030.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44440</guid>\n      <description>Digitalization
        and artificial intelligence (AI) will create close to $500 billion in cumulative
        value for E&amp;P companies between 2026 and 2030, according to Rystad Energy
        estimates. This value is captured through cost reductions from more efficient
        operations, production increases from higher uptime and increased recovery,
        and compressed development timelines. Cost reductions and production increases
        are the largest value pools and contribute roughly equally through 2030. Exploration
        and production (E&amp;P) players currently investing in digital\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 13:00:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>OilPrice.com</dc:creator>\n
        \   </item>\n    <item>\n      <title>Higher Oil Prices Tempt US Drillers
        To Turn Up The Volume</title>\n      <link>https://oilprice.com/Energy/Energy-General/Higher-Oil-Prices-Tempt-US-Drillers-To-Turn-Up-The-Volume.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44448</guid>\n      <description>The
        total number of active drilling rigs for oil and gas in the United States
        rose this week, according to new data that Baker Hughes published on Friday,
        bringing the total rig count in the US to 558, \_down just 8 from this same
        time last year. The number of active oil rigs rose by 10 to 425 during the
        latest reporting period, according to the data. This is 30 below this same
        time last year. The number of gas rigs fell by 3. Gas rigs now sit at 125,
        which is 17 more than this time last year. The miscellaneous rig stayed the
        same at 8. The\u2026</description>\n      <pubDate>Fri, 22 May 2026 12:14:00
        -0500</pubDate>\n      <lastmod>Fri, 22 May 2026 21:12:16 -0500</lastmod>\n
        \     <dc:creator>Julianne Geiger</dc:creator>\n    </item>\n    <item>\n
        \     <title>Kazakhstan Court Upholds $1.4 Billion Award Against Gazprom</title>\n
        \     <link>https://oilprice.com/Energy/Energy-General/Kazakhstan-Court-Upholds-14-Billion-Award-Against-Gazprom.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44438</guid>\n      <description>A
        court in Kazakhstan has inserted itself into the Russia-Ukraine conflict,
        ruling in favor of the Ukrainian state gas entity Naftogaz in a $1.4-billion
        dispute with the Russian energy behemoth Gazprom. The\_judgment\_and\_order\_issued
        by the court of Astana International Finance Center (AIFC) endorses last year\u2019s
        ICC International Court of Arbitration award in favor of Naftogaz. \u201CThe
        ICC Award dated 16 June 2025 \u2026 in the arbitration Case No. 27245/GL/DTI
        between the Claimant and the Defendant shall be recognized\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 11:00:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>OilPrice.com</dc:creator>\n
        \   </item>\n    <item>\n      <title>Ukraine Hits 300,000-Bpd Gazprom Neft
        Refinery in Overnight Drone Strike</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/Ukraine-Hits-300000-Bpd-Gazprom-Neft-Refinery-in-Overnight-Drone-Strike.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44449</guid>\n      <description>Ukraine
        targeted overnight the Yaroslavl oil refinery in Russia, escalating the drone
        attacks on Russian refining and oil exporting assets, Ukrainian President
        Volodymyr Zelenskyy said on Friday. \u201CToday, there was a report by Commander-in-Chief
        of the Armed Forces of Ukraine Oleksandr Syrskyi on the use of long-range
        drones against Russian oil refining and export assets,\u201D Zelenskyy wrote
        on social media. \u201CIn particular, overnight, the Defense Forces of Ukraine
        operated against targets associated with the Yaroslavl oil refinery\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 10:30:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>Charles Kennedy</dc:creator>\n
        \   </item>\n    <item>\n      <title>Oil Markets Ignore Red Flags as Global
        Energy Crisis Deepens</title>\n      <link>https://oilprice.com/Energy/Energy-General/Oil-Markets-Ignore-Red-Flags-as-Global-Energy-Crisis-Deepens.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44446</guid>\n      <description>Global
        oil markets remain under severe stress as Hormuz disruptions, weak economic
        data, and tightening inventories reshape energy flows worldwide. Friday, May
        22, 2026 In a week of contradicting narratives, the largest ever US inventory
        drawdown sparked only a minor bullish moment as media reports of some form
        of negotiations between the US and Iran continue to resonate. With Europe
        posting its worst macroeconomic numbers since 2023 and the IEA warning of
        oil markets hitting the \u2018red zone\u2019 by July-August, ICE Brent is
        unlikely to fall\u2026</description>\n      <pubDate>Fri, 22 May 2026 10:24:02
        -0500</pubDate>\n      <lastmod>Fri, 22 May 2026 21:12:16 -0500</lastmod>\n
        \     <dc:creator>Tom Kool</dc:creator>\n    </item>\n    <item>\n      <title>EU
        Warns Energy Prices Will Stay Elevated Through 2027</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/EU-Warns-Energy-Prices-Will-Stay-Elevated-Through-2027.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44450</guid>\n      <description>Top
        EU officials said Friday that oil and gas prices are expected to remain elevated
        through at least the end of 2027, with the fallout from the Iran war likely
        to keep pressure on inflation and economic growth. Speaking after a meeting
        of eurozone finance ministers in Cyprus on Friday, EU Economy Commissioner
        Valdis Dombrovskis said higher energy costs are now expected to drive inflation
        to 3.1% this year and 2.4% in 2027\u2014well above the bloc\u2019s earlier
        forecast of 1.9% for this year. The concern is no longer just fuel prices
        themselves.\u2026</description>\n      <pubDate>Fri, 22 May 2026 09:41:00
        -0500</pubDate>\n      <lastmod>Fri, 22 May 2026 21:12:16 -0500</lastmod>\n
        \     <dc:creator>Julianne Geiger</dc:creator>\n    </item>\n    <item>\n
        \     <title>Pakistan Looks to Host Crude Reserve Sites of Gulf Oil Producers</title>\n
        \     <link>https://oilprice.com/Latest-Energy-News/World-News/Pakistan-Looks-to-Host-Crude-Reserve-Sites-of-Gulf-Oil-Producers.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44448</guid>\n      <description>Pakistan
        is encouraging oil producers from the Persian Gulf to set up crude reserve
        buffers at a planned Energy City near one of its ports, The Express Tribune
        reported on Friday. &quot;In case of emergencies like the breakout of war,
        Pakistan will have the first right to utilise the oil reserves,&quot; a Pakistani
        official told the publication. Pakistan, which doesn&#039;t have crude reserves
        at present to act as a buffer in case of emergencies, has been reeling from
        the Middle East crisis and negotiating with Iran to secure the passage of
        cargoes through the\u2026</description>\n      <pubDate>Fri, 22 May 2026 09:30:00
        -0500</pubDate>\n      <lastmod>Fri, 22 May 2026 21:12:16 -0500</lastmod>\n
        \     <dc:creator>Charles Kennedy</dc:creator>\n    </item>\n    <item>\n
        \     <title>Iran Is Tightening Its Grip on the Strait of Hormuz</title>\n
        \     <link>https://oilprice.com/Energy/Energy-General/Iran-Is-Tightening-Its-Grip-on-the-Strait-of-Hormuz.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44439</guid>\n      <description>Shortly
        after the outbreak of the war with the United States and Israel, Iran took
        control of the Strait of Hormuz, a key artery for global oil and gas supplies.
        By threatening and attacking international shipping, Iran brought maritime
        traffic to a virtual standstill, giving it significant leverage over its neighbors
        in the Persian Gulf and the global economy. Now, the Islamic Republic is formalizing
        its dominance over the strategic chokepoint by imposing a new transit regime.
        That is despite repeated warnings from the United States, which has\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 09:00:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>RFE/RL staff</dc:creator>\n
        \   </item>\n    <item>\n      <title>TotalEnergies Eyes $100M+ Stake Sales
        in European Solar and Wind Portfolio</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/TotalEnergies-Eyes-100M-Stake-Sales-in-European-Solar-and-Wind-Portfolio.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44447</guid>\n      <description>TotalEnergies
        is considering selling 50% of some of its solar and wind assets in Europe
        as part of its strategy to partner with other companies in operating and monetizing
        its clean energy portfolio, Bloomberg reported on Friday, quoting anonymous
        sources with knowledge of the plans. The France-based oil and gas supermajor,
        which has been developing a global renewable energy portfolio for years, is
        now working with advisers to potentially market 50% in a combined 1.2 gigawatts
        (GW) of solar and wind power assets in France, Germany, Spain, and Poland,\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 08:30:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>Michael Kern</dc:creator>\n
        \   </item>\n    <item>\n      <title>China&#039;s Fuel Exports to Remain
        Low as Curbs Persist</title>\n      <link>https://oilprice.com/Latest-Energy-News/World-News/Chinas-Fuel-Exports-to-Remain-Low-as-Curbs-Persist.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-news-44446</guid>\n      <description>China&#039;s
        fuel exports will rise only slightly in June from May as government restrictions
        on shipments largely remain in place to preserve supply for the domestic market
        amid the biggest oil disruption in history. China is expected to export about
        550,000 metric tons of fuels next month, up from around 500,000 tons set to
        be shipped this month, trade sources with knowledge of the plans told Reuters
        on Friday. Days after the conflict in the Middle East erupted and led to the
        closure of the Strait of Hormuz, the Chinese government moved to ban all\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 07:30:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>Tsvetana Paraskova</dc:creator>\n
        \   </item>\n    <item>\n      <title>Volatility Spikes as Iran Diplomacy
        Collides With Hormuz Fears</title>\n      <link>https://oilprice.com/Energy/Energy-General/Volatility-Spikes-as-Iran-Diplomacy-Collides-With-Hormuz-Fears.html</link>\n
        \     <guid isPermaLink=\"false\">oilprice-article-44436</guid>\n      <description>July
        WTI crude oil delivered a volatile week as traders aggressively repriced geopolitical
        risk and then rapidly removed part of that premium on hopes of a diplomatic
        breakthrough between the United States and Iran. Through Thursday, May 21,
        July WTI posted a high of $105.21, a low of $95.76, and settled at $97.77,
        up $3.39, or 3.35%, for the week. The price action told a much bigger story
        than the weekly gain itself. Crude spent the early part of the week climbing
        sharply as traders focused on supply disruptions tied to Iran and the continuing\u2026</description>\n
        \     <pubDate>Fri, 22 May 2026 06:30:00 -0500</pubDate>\n      <lastmod>Fri,
        22 May 2026 21:12:16 -0500</lastmod>\n      <dc:creator>Editorial Dept</dc:creator>\n
        \   </item>\n  </channel>\n</rss>\n"
