        eaise extra debt to fund capex, repairs]]> </title><description><![CDATA[In
        a significant regulatory shift, India's Securities and Exchange Board of India
        (Sebi) has unveiled new guidelines for Infrastructure Investment Trusts, or
        InvITs. These entities are now permitted to exceed the 49% debt cap of their
        asset value, unlocking a new avenue for funding vital capital projects and
        enhancements.]]> </description><link>https://economictimes.indiatimes.com/markets/digital-real-estate/realty-news/invits-can-eaise-extra-debt-to-fund-capex-repairs/articleshow/131131542.cms</link><enclosure
